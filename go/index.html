<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MR. BONUS VIP | PRESTIGE CLUB</title>
    <style>
        body {
            margin: 0; padding: 0; background: #050505;
            font-family: 'Segoe UI', sans-serif; color: #fff;
            display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; overflow-x: hidden; padding-top: 30px;
        }

        .brand-header {
            font-size: clamp(38px, 11vw, 54px); font-weight: 900;
            background: linear-gradient(to bottom, #ffffff 0%, #d4af37 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-transform: uppercase; letter-spacing: 5px;
            filter: drop-shadow(0 0 20px rgba(212, 175, 55, 0.6));
            margin-bottom: 5px; text-align: center;
        }

        .sub-header { font-size: 13px; color: #666; letter-spacing: 6px; margin-bottom: 30px; text-transform: uppercase; font-weight: bold; }

        .slot-frame {
            background: linear-gradient(145deg, #1a1a1a, #000);
            padding: 25px; border-radius: 35px;
            border: 4px solid #d4af37; position: relative;
            transition: all 0.4s ease; margin-bottom: 40px;
            display: flex; align-items: center; gap: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .slot-frame.win-glow {
            box-shadow: 0 0 80px #2ecc71, inset 0 0 40px #2ecc71;
            border-color: #2ecc71; transform: scale(1.05);
        }

        #winMessage {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
            font-size: 90px; font-weight: 900; color: #2ecc71;
            text-shadow: 0 0 20px #000, 0 0 50px #2ecc71;
            z-index: 100; pointer-events: none; text-transform: uppercase;
        }
        #winMessage.show { 
            animation: winPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards, 
                       winPulse 0.7s ease-in-out infinite 0.4s; 
        }

        @keyframes winPop { 0% { transform: translate(-50%, -50%) scale(0); } 100% { transform: translate(-50%, -50%) scale(1.2); } }
        @keyframes winPulse { 0%, 100% { transform: translate(-50%, -50%) scale(1.2); } 50% { transform: translate(-50%, -50%) scale(1.4); opacity: 0.8; } }

        .slot-container { display: flex; gap: 12px; z-index: 2; position: relative; transition: opacity 0.4s, filter 0.4s; }
        .slot-container.fade-out { opacity: 0.1; filter: blur(5px); }

        .reel {
            width: 90px; height: 100px; background: #000;
            border-radius: 15px; overflow: hidden !important; 
            border: 2px solid #d4af37; position: relative;
            box-shadow: inset 0 10px 20px #000, inset 0 -10px 20px #000, 0 0 10px rgba(212, 175, 55, 0.2);
            transition: border-color 0.4s, box-shadow 0.4s;
        }

        .win-glow .reel { border-color: #2ecc71; box-shadow: inset 0 10px 20px #000, 0 0 20px rgba(46, 204, 113, 0.5); }

        .symbols-track { display: flex; flex-direction: column; align-items: center; width: 100%; }
        .symbol { font-size: 55px; height: 100px; min-height: 100px; display: flex; align-items: center; justify-content: center; user-select: none; }

        .lever-container { position: relative; width: 50px; height: 140px; cursor: pointer; user-select: none; }
        .lever-base { 
            width: 35px; height: 100px; 
            background: linear-gradient(145deg, #d4af37, #8a6d3b);
            border-radius: 10px; border: 1px solid #fff2ac;
            position: absolute; bottom: 0; left: 7px;
            box-shadow: inset -2px -2px 5px rgba(0,0,0,0.5), inset 2px 2px 5px rgba(255,255,255,0.3);
        }
        .lever-slot { width: 12px; height: 70px; background: #000; position: absolute; top: 10px; left: 11px; border-radius: 10px; box-shadow: inset 0 2px 5px #000; }
        .lever-arm { 
            width: 10px; height: 90px; 
            background: linear-gradient(90deg, #999, #eee, #999);
            position: absolute; bottom: 35px; left: 13px; border-radius: 5px;
            transform-origin: bottom center; transition: transform 0.4s cubic-bezier(0.45, 0.05, 0.55, 0.95);
            z-index: 5;
        }
        .lever-knob { 
            width: 40px; height: 40px; 
            background: radial-gradient(circle at 30% 30%, #ff4b2b, #800000);
            border-radius: 50%; position: absolute; top: -30px; left: -15px; 
            box-shadow: 0 8px 15px rgba(0,0,0,0.6), inset -2px -2px 10px rgba(0,0,0,0.5);
        }
        .lever-active .lever-arm { transform: rotateX(150deg) scaleY(0.8); }

        .btn {
            display: block; width: 320px; text-align: center;
            background: linear-gradient(135deg, #d4af37 0%, #fff2ac 50%, #d4af37 100%);
            background-size: 200% auto; color: #000; padding: 22px 0;
            font-size: 24px; font-weight: 900; border-radius: 80px;
            text-decoration: none; text-transform: uppercase;
            box-shadow: 0 10px 40px rgba(212, 175, 55, 0.4);
            animation: pulse 2s infinite, shine 3s infinite; margin-bottom: 15px; border: none; cursor: pointer;
        }
        .btn-sub {
            display: block; width: 300px; text-align: center;
            background: rgba(255,255,255,0.05); color: #d4af37; padding: 15px 0;
            font-size: 16px; font-weight: 700; border-radius: 40px;
            text-decoration: none; text-transform: uppercase;
            border: 1px solid rgba(212,175,55,0.3); margin-bottom: 50px;
            transition: 0.3s;
        }

        #winPopup {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
            background: rgba(0,0,0,0.98); padding: 40px 30px; border: 2px solid #2ecc71; border-radius: 30px;
            text-align: center; color: white; z-index: 2000; box-shadow: 0 0 100px rgba(46, 204, 113, 0.3);
            transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); width: 290px;
        }
        .close-btn { position: absolute; top: 15px; right: 20px; font-size: 24px; color: #555; cursor: pointer; }
        
        .luxury-footer { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; width: 100%; gap: 10px; padding: 40px 0; background: #000; border-top: 1px solid #222; }
        .age-container { border: 2px solid #d4af37; padding: 8px 15px; border-radius: 8px; color: #d4af37; font-weight: 900; font-size: 20px; background: rgba(0,0,0,0.5); }
        .responsible-text { font-size: 10px; color: rgba(255,255,255,0.4); text-transform: uppercase; font-weight: bold; max-width: 350px; }

        @keyframes shine { 0% {background-position: 0% 50%;} 100% {background-position: 200% 50%;} }
        @keyframes pulse { 0%, 100% {transform: scale(1);} 50% {transform: scale(1.03);} }
    </style>
</head>
<body>

    <div class="brand-header">MR BONUS VIP</div>
    <div class="sub-header">ESTABLISHED 2020</div>

    <div class="slot-frame" id="mainFrame">
        <div id="winMessage">WIN</div>
        <div class="slot-container" id="slotContainer">
            <div class="reel" id="reel1"><div class="symbols-track"></div></div>
            <div class="reel" id="reel2"><div class="symbols-track"></div></div>
            <div class="reel" id="reel3"><div class="symbols-track"></div></div>
        </div>
        <div class="lever-container" id="leverNode" onclick="startSpin()">
            <div class="lever-base"><div class="lever-slot"></div></div>
            <div class="lever-arm"><div class="lever-knob"></div></div>
        </div>
    </div>

    <button onclick="startSpin()" class="btn">Крутити Слоти 🎰</button>
    <a href="https://t.me" class="btn-sub">Забрати Бонус 🎁</a>

    <div id="winPopup">
        <div class="close-btn" onclick="closePopup()">×</div>
        <h2 style="color:#2ecc71; margin:0; font-size: 32px; text-transform: uppercase;">Jackpot!</h2>
        <p style="color: #aaa; margin: 10px 0;">Ваш VIP статус активовано:</p>
        <div id="promoCode" style="font-size: 26px; font-weight: 900; background: #111; padding: 18px; border: 1px dashed #2ecc71; margin: 25px 0; letter-spacing: 2px;">MR-VIP-777</div>
        <button onclick="copyAndGo()" style="width: 100%; padding: 18px; cursor: pointer; background: linear-gradient(135deg, #2ecc71, #27ae60); border: none; color: #000; font-weight: 900; border-radius: 12px; text-transform: uppercase;">Забрати та Перейти</button>
    </div>

    <div class="luxury-footer">
        <div class="age-container">21+</div>
        <div class="responsible-text">ГРАЙТЕ ВІДПОВІДАЛЬНО! Участь в азартних іграх може викликати залежність.</div>
    </div>

<script>
    // Аудіо ресурси
    const audioLever = new Audio('https://www.soundjay.com');
    const audioSpin = new Audio('https://www.soundjay.com');
    const audioWin = new Audio('https://www.myinstants.com');

    const symbolsList = ['💎', '🎰', '🔥', '❤️', '🍀', '7️⃣'];
    let spinCount = 0;
    let winIdx = 0;
    let isSpinActive = false;

    window.onload = () => {
        [1, 2, 3].forEach(i => {
            document.getElementById('reel' + i).querySelector('.symbols-track').innerHTML = 
                `<div class="symbol">${symbolsList[Math.floor(Math.random()*6)]}</div>`;
        });
    };

    function closePopup() {
        document.getElementById('winPopup').style.transform = 'translate(-50%, -50%) scale(0)';
    }

    function startSpin() {
        if (isSpinActive) return;
        isSpinActive = true;
        
        // Звук важеля
        audioLever.play().catch(e => {});

        const lever = document.getElementById('leverNode');
        lever.classList.add('lever-active');
        setTimeout(() => lever.classList.remove('lever-active'), 500);

        spinCount++;
        const frame = document.getElementById('mainFrame');
        const container = document.getElementById('slotContainer');
        const winMsg = document.getElementById('winMessage');
        const popup = document.getElementById('winPopup');
        
        frame.classList.remove('win-glow');
        container.classList.remove('fade-out');
        winMsg.classList.remove('show');
        closePopup();

        const isWin = (spinCount % 3 === 0);
        let finalRes = isWin 
            ? [symbolsList[winIdx % symbolsList.length], symbolsList[winIdx % symbolsList.length], symbolsList[winIdx % symbolsList.length]] 
            : [...symbolsList].sort(() => Math.random() - 0.5).slice(0, 3);
        if (isWin) winIdx++;

        let completed = 0;
        [1, 2, 3].forEach((i, index) => {
            const track = document.getElementById('reel' + i).querySelector('.symbols-track');
            track.innerHTML = '';
            const resDiv = document.createElement('div');
            resDiv.className = 'symbol';
            resDiv.innerText = finalRes[index];
            track.appendChild(resDiv);

            for (let s = 0; s < 35; s++) {
                const div = document.createElement('div');
                div.className = 'symbol';
                div.innerText = symbolsList[Math.floor(Math.random() * symbolsList.length)];
                track.insertBefore(div, track.firstChild);
            }
            
            const symbolHeight = 100;
            const travelDistance = (track.children.length - 1) * symbolHeight;

            // Звук початку прокрутки
            audioSpin.currentTime = 0;
            audioSpin.play().catch(e => {});

            track.animate([
                { transform: `translateY(-${travelDistance}px)` },
                { transform: 'translateY(0)' }
            ], {
                duration: 1400 + (index * 400),
                easing: 'cubic-bezier(0.175, 0.885, 0.32, 1.05)', 
                fill: 'forwards'
            }).onfinish = () => {
                completed++;
                if (completed === 3) {
                    if (isWin) {
                        audioWin.play().catch(e => {}); // Звук перемоги
                        frame.classList.add('win-glow');
                        container.classList.add('fade-out');
                        winMsg.classList.add('show');
                        setTimeout(() => { popup.style.transform = 'translate(-50%, -50%) scale(1)'; }, 1000);
                    }
                    isSpinActive = false;
                }
            };
        });
    }

    function copyAndGo() {
        const code = document.getElementById('promoCode').innerText;
        navigator.clipboard.writeText(code);
        event.target.innerText = 'КОД СКОПІЙОВАНО!';
        setTimeout(() => { window.location.href = 'https://t.me'; }, 1000);
    }
</script>
</body>
</html>
