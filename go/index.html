<script>
    const symbolsList = ['💎', '🎰', '🔥', '❤️', '🍀', '7️⃣'];
    let spinCount = 0;
    let winIdx = 0;
    let isSpinActive = false;

    function startSpin() {
        if (isSpinActive) return;
        isSpinActive = true;
        
        spinCount++;
        const frame = document.getElementById('mainFrame');
        const container = document.getElementById('slotContainer');
        const winMsg = document.getElementById('winMessage');
        
        frame.classList.remove('win-glow');
        container.classList.remove('fade-out');
        winMsg.classList.remove('show');

        const isWin = (spinCount % 3 === 0);
        let finalRes = [];

        if (isWin) {
            // ГАРАНТОВАНО 3 ОДНАКОВИХ
            const s = symbolsList[winIdx % symbolsList.length];
            finalRes = [s, s, s];
            winIdx++;
        } else {
            // ГАРАНТОВАНО 3 РІЗНИХ
            let pool = [...symbolsList].sort(() => Math.random() - 0.5);
            finalRes = [pool[0], pool[1], pool[2]];
        }

        const reels = [1, 2, 3];
        let completed = 0;

        reels.forEach((i, index) => {
            const track = document.getElementById('reel' + i).querySelector('.symbols-track');
            track.innerHTML = '';
            
            // 1. СТВОРЮЄМО РЕЗУЛЬТАТ (ВІН БУДЕ ВНИЗУ, ТУТ ЗУПИНКА)
            const resDiv = document.createElement('div');
            resDiv.className = 'symbol';
            resDiv.innerText = finalRes[index];
            track.appendChild(resDiv);

            // 2. ДОДАЄМО 40 СИМВОЛІВ "ВГОРУ" (ВОНИ БУДУТЬ ПАДАТИ ВНИЗ)
            for (let s = 0; s < 40; s++) {
                const div = document.createElement('div');
                div.className = 'symbol';
                div.innerText = symbolsList[Math.floor(Math.random() * symbolsList.length)];
                track.insertBefore(div, track.firstChild); // Додаємо на початок списку
            }

            const symbolHeight = 100; // Фіксована висота для точності
            const travelDistance = (track.children.length - 1) * symbolHeight;

            // 3. АНІМАЦІЯ: З МІНУСА В НУЛЬ (ПАДІННЯ ВНИЗ) + М'ЯКИЙ ВІДСКОК
            const animation = track.animate([
                { transform: `translateY(-${travelDistance}px)` }, // Початок (високо в небі)
                { transform: 'translateY(15px)', offset: 0.85 },    // Проліт нижче (амплітуда)
                { transform: 'translateY(-5px)', offset: 0.95 },    // Легкий відскок назад
                { transform: 'translateY(0)' }                      // Фінальна точка
            ], {
                duration: 2000 + (index * 500), // Поступова зупинка барабанів
                easing: 'cubic-bezier(0.25, 0.1, 0.25, 1)',
                fill: 'forwards'
            });

            animation.onfinish = () => {
                completed++;
                if (completed === 3) {
                    if (isWin) {
                        frame.classList.add('win-glow');
                        container.classList.add('fade-out');
                        winMsg.classList.add('show');
                        // Пауза 3.5 сек на виграш
                        setTimeout(() => { isSpinActive = false; }, 3500);
                    } else {
                        // Пауза 1.5 сек на програш
                        setTimeout(() => { isSpinActive = false; }, 1500);
                    }
                }
            };
        });
    }

    // Постійна перевірка готовності до нового спіну
    setInterval(() => {
        if (!isSpinActive) startSpin();
    }, 100);

    // Перший запуск
    startSpin();
</script>
