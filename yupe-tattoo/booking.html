<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЗАПИС — YUPE TATTOO</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
    <style>
        body { display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: #050505; overflow: hidden; font-family: sans-serif; }
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex; justify-content: center; align-items: center; transition: 0.8s ease; }
        .loader-text { font-size: 24px; font-weight: bold; letter-spacing: 10px; color: #fff; text-shadow: 0 0 10px #ff69b4; animation: textGlow 2s infinite ease-in-out; }
        @keyframes textGlow { 0%, 100% { opacity: 0.4; transform: scale(0.95); } 50% { opacity: 1; transform: scale(1.05); } }
        #main-content { display: flex; justify-content: center; align-items: center; width: 100%; padding: 20px; box-sizing: border-box; }
        #main-content.hidden { display: none; }
        #calendar { background: rgba(255,255,255,0.05); padding: 10px; border-radius: 20px; font-size: 11px; margin-top: 10px; width: 100%; color: white; }
        .fc-daygrid-day-number { color: #ccc !important; text-decoration: none !important; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 10000; backdrop-filter: blur(10px); }
        .modal { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #0a0a0a; padding: 25px; border-radius: 35px; border: 2px solid #ff69b4; width: 90%; max-width: 300px; text-align: center; color: white; }
        .time-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        .time-slot { padding: 12px; border: 1.5px solid #ff0000; border-radius: 12px; background: transparent; color: white; cursor: pointer; font-weight: bold; }
        .time-slot.selected { background: #ff0000; box-shadow: 0 0 15px #ff0000; }
        .time-slot.blocked { background: #222 !important; border-color: #444 !important; color: #555 !important; text-decoration: line-through; cursor: not-allowed; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 12px; text-align: center; }
        .admin-access { margin-top: 15px; font-size: 9px; color: #333; cursor: pointer; text-align: center; }
        .btn { background: #ff0000; color: white; border: none; padding: 10px; border-radius: 10px; cursor: pointer; width: 100%; font-weight: bold; }
    </style>
</head>
<body>

    <div id="loader"><div class="loader-text">CALENDAR</div></div>

    <main id="main-content" class="hidden">
        <div class="glass-card">
            <h1 style="font-size: 22px; margin: 0; color: white; text-align: center;">ОБЕРІТЬ ДАТУ</h1>
            <div id="calendar"></div>
            <div class="admin-access" onclick="adminAuth()">ADMIN ACCESS</div>
            <button class="btn" style="margin-top: 15px; background: #222;" onclick="window.location.href='index.html'">НАЗАД</button>
        </div>
    </main>

    <div class="modal-overlay" id="overlay">
        <div class="modal">
            <h4 id="dateTitle" style="color: #ff69b4; margin: 0;"></h4>
            <div class="time-grid" id="timeGrid">
                <button class="time-slot" data-time="10:00" onclick="handleTimeClick(this)">10:00</button>
                <button class="time-slot" data-time="13:00" onclick="handleTimeClick(this)">13:00</button>
                <button class="time-slot" data-time="16:00" onclick="handleTimeClick(this)">16:00</button>
                <button class="time-slot" data-time="19:00" onclick="handleTimeClick(this)">19:00</button>
            </div>
            <input type="text" id="clientName" placeholder="Ваше ім'я / Інста">
            <button class="btn" id="confirmBtn" onclick="confirmBooking()">ПІДТВЕРДИТИ</button>
            <button onclick="document.getElementById('overlay').style.display='none'" style="background:none; border:none; color:#555; margin-top:10px; cursor:pointer;">Закрити</button>
        </div>
    </div>

    <!-- Підключення бази даних -->
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>

    <script>
        // --- НАЛАШТУВАННЯ (ЗМІНІТЬ ТІЛЬКИ ЦЕ) ---
        const firebaseConfig = { databaseURL: "https://yupe-cd9c3-default-rtdb.firebaseio.com/" };
        const TG_TOKEN = '8774532067:AAEKdELLNfVHATjIGB7SLu4txv1SImoJNuc';
        const TG_ADMIN_ID = '558274847';
        // ---------------------------------------

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let selTime = "", selDate = "", isAdm = false, blockedSlots = {};

        // Завантаження зайнятих слотів з бази
        db.ref('slots').on('value', (snap) => {
            blockedSlots = snap.val() || {};
            updateTimeSlotsVisibility();
        });

        window.onload = () => {
            setTimeout(() => {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('main-content').classList.remove('hidden');
            }, 2000);
        };

        document.addEventListener('DOMContentLoaded', () => {
            const calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
                initialView: 'dayGridMonth', locale: 'uk', firstDay: 1,
                dateClick: (info) => { selDate = info.dateStr; openBookingModal(); }
            });
            calendar.render();
        });

        function openBookingModal() {
            document.getElementById('dateTitle').innerText = selDate;
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('clientName').style.display = isAdm ? 'none' : 'block';
            document.getElementById('confirmBtn').style.display = isAdm ? 'none' : 'block';
            selTime = "";
            updateTimeSlotsVisibility();
        }

        function updateTimeSlotsVisibility() {
            const slots = document.querySelectorAll('.time-slot');
            const dayBlocks = blockedSlots[selDate] ? Object.values(blockedSlots[selDate]) : [];
            slots.forEach(slot => {
                slot.classList.remove('selected', 'blocked');
                if (dayBlocks.includes(slot.dataset.time)) slot.classList.add('blocked');
            });
        }

        function handleTimeClick(btn) {
            const time = btn.dataset.time;
            if (isAdm) {
                const ref = db.ref('slots/' + selDate);
                if (btn.classList.contains('blocked')) {
                    ref.once('value').then(s => s.forEach(c => { if(c.val() === time) c.ref.remove(); }));
                } else { ref.push(time); }
            } else {
                if (btn.classList.contains('blocked')) return;
                document.querySelectorAll('.time-slot').forEach(s => s.classList.remove('selected'));
                btn.classList.add('selected');
                selTime = time;
            }
        }

        function adminAuth() {
            if(prompt("Пароль:") === "yupe123234") { isAdm = true; alert("Адмін-режим активовано"); }
        }

        async function confirmBooking() {
            const name = document.getElementById('clientName').value;
            if (!name || !selTime) return alert("Вкажіть ім'я та оберіть час!");

            const message = `🚀 Новий запис!\n👤 Ім'я: ${name}\n📅 Дата: ${selDate}\n🕒 Час: ${selTime}`;
            
            try {
                const res = await fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: TG_ADMIN_ID, text: message })
                });

                if (res.ok) {
                    // Зберігаємо в базу, щоб всі бачили блок
                    db.ref('slots/' + selDate).push(selTime);
                    alert("Дякую! Запис прийнято, я вам відпишу в інстаграм.");
                    document.getElementById('overlay').style.display = 'none';
                } else {
                    alert("Помилка Telegram. Перевірте налаштування бота.");
                }
            } catch (e) { alert("Помилка з'єднання."); }
        }
    </script>
</body>
</html>
