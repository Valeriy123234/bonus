<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ЗАПИС — YUPE TATTOO</title>
    <link rel="stylesheet" href="style.css">
    <!-- ПРАВИЛЬНЕ ПОСИЛАННЯ НА СТИЛІ КАЛЕНДАРЯ -->
    <link href="https://jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
    <style>
        /* Додаткові стилі суто для цієї сторінки */
        #calendar { background: rgba(0,0,0,0.3); padding: 10px; border-radius: 20px; font-size: 13px; margin-top: 10px; }
        .fc-daygrid-day-number { color: #ccc; text-decoration: none !important; }
        .disabled-day { background: rgba(255,0,0,0.15) !important; opacity: 0.5; pointer-events: none; }
        
        /* Лоадер "Вакханалія" */
        .flying-cal { position: absolute; font-size: 25px; z-index: 1000; animation: chaos 2s ease-in-out infinite; }
        @keyframes chaos {
            0% { transform: translate(0, 0) rotate(0deg) scale(0); opacity: 0; }
            50% { opacity: 1; transform: scale(1.2); }
            100% { transform: translate(var(--mx), var(--my)) rotate(720deg) scale(0.2); opacity: 0; }
        }

        /* Модалка вибору часу */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 10000; backdrop-filter: blur(10px); }
        .modal { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #0a0a0a; padding: 30px; border-radius: 35px; border: 2px solid var(--hot-pink); width: 280px; text-align: center; }
        .time-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; }
        .time-slot { padding: 12px; border: 1px solid var(--primary-red); border-radius: 12px; background: transparent; color: white; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .time-slot.selected { background: var(--primary-red); box-shadow: 0 0 15px var(--primary-red); }
        input { width: 100%; padding: 12px; margin-bottom: 15px; background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 12px; box-sizing: border-box; }
        
        .admin-access { margin-top: 15px; font-size: 9px; color: #333; cursor: pointer; letter-spacing: 2px; text-align: center; }
    </style>
</head>
<body>

    <!-- ЛОАДЕР З КАЛЕНДАРЯМИ -->
    <div id="loader" class="loader-wrapper">
        <div class="loader-text">CALENDAR...</div>
    </div>

    <main id="main-content" class="hidden">
        <div class="glass-card">
            <h1 style="font-size: 24px;">ОБЕРІТЬ ДАТУ</h1>
            
            <div id="calendar"></div>

            <div class="admin-access" onclick="adminAuth()">ADMIN ACCESS</div>
            
            <!-- Кнопка назад -->
            <button class="btn" style="margin-top: 20px; padding: 10px;" onclick="window.location.href='index.html'">НАЗАД</button>
        </div>
    </main>

    <!-- Вікно запису -->
    <div class="modal-overlay" id="overlay">
        <div class="modal">
            <h4 id="dateTitle" style="color: var(--hot-pink); margin: 0; letter-spacing: 2px;"></h4>
            <div class="time-grid">
                <button class="time-slot" onclick="selectSlot(this)">10:00</button>
                <button class="time-slot" onclick="selectSlot(this)">13:00</button>
                <button class="time-slot" onclick="selectSlot(this)">16:00</button>
                <button class="time-slot" onclick="selectSlot(this)">19:00</button>
            </div>
            <input type="text" id="clientName" placeholder="Ваше ім'я / Інста">
            <button class="btn" onclick="confirmBooking()">ПІДТВЕРДИТИ</button>
            <button onclick="document.getElementById('overlay').style.display='none'" style="background:none; border:none; color:#555; margin-top:10px; cursor:pointer;">Закрити</button>
        </div>
    </div>

    <!-- ПРАВИЛЬНЕ ПОСИЛАННЯ НА СКРИПТ КАЛЕНДАРЯ -->
    <script src="https://jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
    <script>
        // 1. Лоадер "Вакханалія" (2 секунди)
        const loader = document.getElementById('loader');
        for(let i=0; i<20; i++){
            let c = document.createElement('div');
            c.className = 'flying-cal'; c.innerHTML = '📅';
            c.style.left = '50%'; c.style.top = '50%';
            c.style.setProperty('--mx', (Math.random()*600 - 300)+'px');
            c.style.setProperty('--my', (Math.random()*600 - 300)+'px');
            c.style.animationDelay = (Math.random()*1.5)+'s';
            loader.appendChild(c);
        }

        window.onload = () => {
            setTimeout(() => {
                loader.style.opacity = '0';
                setTimeout(() => {
                    loader.style.display = 'none';
                    document.getElementById('main-content').classList.remove('hidden');
                }, 500);
            }, 2000); 
        };

        let selTime = "", selDate = "", isAdm = false;
        let blocked = JSON.parse(localStorage.getItem('blockedDates')) || [];

        document.addEventListener('DOMContentLoaded', function() {
            const calEl = document.getElementById('calendar');
            const calendar = new FullCalendar.Calendar(calEl, {
                initialView: 'dayGridMonth', locale: 'uk', firstDay: 1,
                headerToolbar: { left: 'prev', center: 'title', right: 'next' },
                dayCellDidMount: (info) => { if(blocked.includes(info.dateStr)) info.el.classList.add('disabled-day'); },
                dateClick: (info) => {
                    if(isAdm) {
                        if(blocked.includes(info.dateStr)) blocked = blocked.filter(d => d !== info.dateStr);
                        else blocked.push(info.dateStr);
                        localStorage.setItem('blockedDates', JSON.stringify(blocked));
                        location.reload();
                    } else if(!blocked.includes(info.dateStr)) {
                        selDate = info.dateStr;
                        document.getElementById('dateTitle').innerText = info.dateStr;
                        document.getElementById('overlay').style.display = 'block';
                    }
                }
            });
            calendar.render();
        });

        function adminAuth() {
            if(prompt("Пароль:") === "yupe123234") {
                isAdm = true; alert("Admin Active! Click days to block.");
            }
        }

        function selectSlot(btn) {
            document.querySelectorAll('.time-slot').forEach(s => s.classList.remove('selected'));
            btn.classList.add('selected'); selTime = btn.innerText;
        }

        function confirmBooking() {
            let name = document.getElementById('clientName').value;
            if(name && selTime) {
                alert(`Успіх! ${name}, дата: ${selDate}, час: ${selTime}`);
                document.getElementById('overlay').style.display='none';
            } else alert("Оберіть час та введіть ім'я!");
        }
    </script>
</body>
</html>
