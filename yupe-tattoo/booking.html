<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Запис — Оберіть час</title>
    <!-- FullCalendar CSS -->
    <link href="https://jsdelivr.net" rel="stylesheet">
    <style>
        :root {
            --main-bg: #050505;
            --primary-red: #ff003c;
            --hot-pink: #ff007f;
            --tg-blue: #00d4ff;
        }

        body {
            background: var(--main-bg);
            color: white;
            font-family: 'Inter', sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0; padding: 20px;
            overflow-x: hidden;
        }

        /* ПУЛЬСУЮЧА КАРТКА */
        .glass-card {
            background: rgba(255, 255, 255, 0.02);
            padding: 35px; border-radius: 40px;
            backdrop-filter: blur(15px);
            border: 2px solid var(--primary-red);
            width: 100%; max-width: 650px;
            box-shadow: 0 0 30px rgba(255, 0, 60, 0.2);
            animation: cardPulse 4s infinite ease-in-out;
            position: relative;
        }

        @keyframes cardPulse {
            0%, 100% { border-color: var(--primary-red); box-shadow: 0 0 20px rgba(255, 0, 60, 0.2); }
            50% { border-color: var(--hot-pink); box-shadow: 0 0 45px rgba(255, 0, 127, 0.4); }
        }

        h2 { text-align: center; letter-spacing: 5px; background: linear-gradient(to right, var(--primary-red), var(--hot-pink)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 25px; }

        /* КАЛЕНДАР */
        #calendar { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); }
        .fc-daygrid-day { cursor: pointer !important; transition: 0.2s; }
        .fc-day-today { background: rgba(255, 0, 60, 0.1) !important; }
        .fc-button { background: transparent !important; border: 1px solid var(--primary-red) !important; color: white !important; text-transform: uppercase !important; font-size: 0.7em !important; font-weight: bold !important; }
        .fc-button:hover { background: var(--primary-red) !important; box-shadow: 0 0 10px var(--primary-red); }
        .fc-daygrid-day-number { color: #ccc; text-decoration: none !important; font-size: 0.9em; padding: 5px; }
        .fc-col-header-cell-cushion { color: var(--hot-pink); text-decoration: none; font-size: 0.8em; letter-spacing: 1px; }
        .fc-toolbar-title { font-size: 1.1em !important; letter-spacing: 2px; }

        /* СТАТУС ЗАКРИТОГО ДНЯ */
        .disabled-day { 
            background: repeating-linear-gradient(45deg, rgba(255,0,0,0.1), rgba(255,0,0,0.1) 10px, rgba(0,0,0,0) 10px, rgba(0,0,0,0) 20px) !important;
            cursor: not-allowed !important;
        }

        /* МОДАЛЬНЕ ВІКНО */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 1000; backdrop-filter: blur(8px);
        }

        .modal {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #0a0a0a; padding: 35px; border-radius: 35px; border: 2px solid var(--hot-pink);
            width: 90%; max-width: 320px; text-align: center; box-shadow: 0 0 50px rgba(0,0,0,1);
        }

        /* КНОПКИ ЧАСУ (ЯК У БОТІ) */
        .time-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 20px 0; }
        .time-slot {
            padding: 15px; border: 1.5px solid var(--primary-red); border-radius: 15px;
            background: transparent; color: white; cursor: pointer; transition: 0.3s;
            font-weight: bold; letter-spacing: 1px;
        }
        .time-slot:hover { background: rgba(255, 0, 60, 0.1); transform: translateY(-2px); }
        .time-slot.selected { background: var(--primary-red); box-shadow: 0 0 20px var(--primary-red); border-color: var(--primary-red); }

        input {
            width: 100%; padding: 15px; margin-bottom: 20px; background: rgba(255,255,255,0.05);
            border: 1px solid #333; color: white; border-radius: 15px; box-sizing: border-box; outline: none;
        }
        input:focus { border-color: var(--hot-pink); }

        .btn-confirm {
            width: 100%; padding: 16px; background: var(--primary-red); border: none;
            color: white; border-radius: 15px; font-weight: bold; cursor: pointer;
            letter-spacing: 2px; transition: 0.3s;
        }
        .btn-confirm:hover { background: #d60032; box-shadow: 0 0 25px var(--primary-red); }

        .admin-toggle {
            text-align: center; margin-top: 20px; font-size: 10px; color: #333; 
            cursor: pointer; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s;
        }
        .admin-toggle:hover { color: #666; }
    </style>
</head>
<body>

    <div class="glass-card">
        <h2>ОБЕРІТЬ ДАТУ</h2>
        <div id="calendar"></div>
        <div class="admin-toggle" id="adminBtn" onclick="toggleAdminMode()">Admin Access</div>
    </div>

    <!-- Модалка вибору часу -->
    <div class="modal-overlay" id="overlay">
        <div class="modal">
            <h3 id="dateLabel" style="color: var(--hot-pink); margin: 0 0 20px 0; letter-spacing: 2px;"></h3>
            <input type="text" id="userName" placeholder="Ваше ім'я або @username">
            
            <div style="font-size: 11px; color: #666; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px;">Оберіть час:</div>
            <div class="time-grid">
                <button class="time-slot" onclick="selectTime(this)">10:00</button>
                <button class="time-slot" onclick="selectTime(this)">13:00</button>
                <button class="time-slot" onclick="selectTime(this)">16:00</button>
                <button class="time-slot" onclick="selectTime(this)">19:00</button>
            </div>

            <button class="btn-confirm" onclick="sendBooking()">ПІДТВЕРДИТИ ЗАПИС</button>
            <button onclick="closeModal()" style="background:none; border:none; color:#444; margin-top:15px; cursor:pointer; font-size: 12px;">СКАСУВАТИ</button>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://jsdelivr.net"></script>
    <script>
        let selectedTime = "";
        let selectedDate = "";
        let adminMode = false;
        // Завантаження закритих дат з пам'яті браузера
        let blockedDates = JSON.parse(localStorage.getItem('blockedDates')) || [];

        document.addEventListener('DOMContentLoaded', function() {
            const calendarEl = document.getElementById('calendar');
            const calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: 'uk',
                firstDay: 1,
                headerToolbar: { left: 'prev,next', center: 'title', right: 'today' },
                dayCellDidMount: function(info) {
                    // Якщо дата в списку заблокованих — візуально міняємо стиль
                    if (blockedDates.includes(info.dateStr)) {
                        info.el.classList.add('disabled-day');
                    }
                },
                dateClick: function(info) {
                    if (adminMode) {
                        handleAdminAction(info);
                    } else {
                        if (blockedDates.includes(info.dateStr)) {
                            alert("Цей день наразі закритий для запису.");
                        } else {
                            openModal(info.dateStr);
                        }
                    }
                }
            });
            calendar.render();
        });

        function handleAdminAction(info) {
            if (blockedDates.includes(info.dateStr)) {
                blockedDates = blockedDates.filter(d => d !== info.dateStr);
                info.dayEl.classList.remove('disabled-day');
            } else {
                blockedDates.push(info.dateStr);
                info.dayEl.classList.add('disabled-day');
            }
            localStorage.setItem('blockedDates', JSON.stringify(blockedDates));
        }

        function toggleAdminMode() {
            if (!adminMode) {
                let pass = prompt("Введіть пароль для керування датами:");
                if (pass === "yupe123234") {
                    adminMode = true;
                    document.getElementById('adminBtn').innerText = "ADMIN MODE: ON (Click days to block)";
                    document.getElementById('adminBtn').style.color = "var(--hot-pink)";
                    alert("Режим адміна активовано. Тепер ви можете закривати/відкривати дні кліком.");
                } else {
                    alert("Доступ заборонено!");
                }
            } else {
                adminMode = false;
                document.getElementById('adminBtn').innerText = "Admin Access";
                document.getElementById('adminBtn').style.color = "#333";
                alert("Режим адміна вимкнено.");
            }
        }

        function openModal(date) {
            selectedDate = date;
            document.getElementById('dateLabel').innerText = date;
            document.getElementById('overlay').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('overlay').style.display = 'none';
            selectedTime = "";
            document.querySelectorAll('.time-slot').forEach(s => s.classList.remove('selected'));
        }

        function selectTime(btn) {
            document.querySelectorAll('.time-slot').forEach(s => s.classList.remove('selected'));
            btn.classList.add('selected');
            selectedTime = btn.innerText;
        }

        function sendBooking() {
            const name = document.getElementById('userName').value;
            if (!name || !selectedTime) {
                alert("Введіть ім'я та оберіть час!");
                return;
            }
            // Повідомлення про успіх
            alert(`Готово! ${name}, ви записані на ${selectedDate} о ${selectedTime}.`);
            closeModal();
        }
    </script>
</body>
</html>
