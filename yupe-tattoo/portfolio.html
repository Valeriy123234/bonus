 #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: flex; justify-content: center; align-items: center; transition: 0.8s ease; }
        .loader-text { font-size: 24px; font-weight: bold; letter-spacing: 10px; color: #fff; text-shadow: 0 0 10px var(--hot-pink); animation: textGlow 2s infinite ease-in-out; z-index: 10001; }
        @keyframes textGlow { 0%, 100% { opacity: 0.4; transform: scale(0.95); text-shadow: 0 0 5px var(--hot-pink); } 50% { opacity: 1; transform: scale(1.05); text-shadow: 0 0 20px var(--hot-pink), 0 0 30px var(--primary-red); } }
        .floating-emoji { position: absolute; font-size: 25px; pointer-events: none; filter: drop-shadow(0 0 10px var(--hot-pink)); animation: levitate 4s ease-in-out infinite; opacity: 0; }
        @keyframes levitate { 0% { transform: translateY(0) rotate(0deg); opacity: 0; } 50% { transform: translateY(-30px) rotate(15deg); opacity: 0.8; } 100% { transform: translateY(-60px) rotate(-15deg); opacity: 0; } }

           <!-- ПІДКЛЮЧЕННЯ БІБЛІОТЕКИ -->
 <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<script>
    window.addEventListener('load', () => {
        setTimeout(() => {
            const loader = document.getElementById('loader');
            if(loader) loader.style.opacity = '0';
            
            setTimeout(() => {
                if(loader) loader.style.display = 'none';
                const content = document.getElementById('main-content');
                if(content) content.classList.remove('hidden');
                
                new Swiper('.mySwiper', {
                    effect: 'slide',
                    grabCursor: true,
                    centeredSlides: true,
                    slidesPerView: 1.2, 
                    spaceBetween: 20,
                    loop: true,
                    speed: 600, // Оптимально для 120Hz екранів

                    // Плавність без лагів (iOS Optimization)
                    touchEventsTarget: 'container',
                    touchReleaseOnEdges: true,
                    resistanceRatio: 0.85,
                    watchSlidesProgress: true,
                    
                    pagination: {
                        el: '.swiper-pagination',
                        clickable: true,
                        dynamicBullets: true,
                        dynamicMainBullets: 1, 
                    },
                });
            }, 600);
        }, 2000);
    });
</script>

<style>
    /* 1. ПЛАВНА ПОЯВА ТЕКСТУ */
    .swiper-slide .work-info, 
    .swiper-slide .book-now,
    .swiper-slide .btn { 
        opacity: 0; 
        transition: opacity 0.5s ease;
        pointer-events: none;
    }

    .swiper-slide-active .work-info, 
    .swiper-slide-active .book-now, 
    .swiper-slide-active .btn { 
        opacity: 1; 
        pointer-events: auto;
    }

    /* 2. ОПТИМІЗАЦІЯ ДЛЯ 14 PRO MAX (БЕЗ FILTER) */
    .swiper-slide {
        /* Опасіті працює через GPU, тому не лагає */
        opacity: 0.4;
        transition: transform 0.6s cubic-bezier(0.2, 1, 0.4, 1), opacity 0.6s ease !important;
        transform: scale(0.88) translateZ(0);
        backface-visibility: hidden;
        -webkit-backface-visibility: hidden;
        will-change: transform, opacity;
    }

    .swiper-slide-active {
        opacity: 1;
        transform: scale(1) translateZ(0);
        z-index: 10;
    }

    /* 3. КРАПКИ (3 штуки) */
    .swiper-pagination { bottom: 25px !important; }

    .swiper-pagination-bullets-dynamic {
        width: 60px !important; 
        overflow: hidden;
    }

    .swiper-pagination-bullet {
        width: 8px; height: 8px;
        background: #fff !important;
        opacity: 0.3; 
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1) !important;
    }

    .swiper-pagination-bullet-active {
        width: 22px !important;
        border-radius: 10px !important;
        background: var(--hot-pink, #ff1493) !important;
        opacity: 1;
    }

    /* 4. КАРТИНКА */
    .swiper-slide img {
        width: 100%; height: 100%;
        object-fit: cover; border-radius: 25px;
        /* Прискорює рендер на iPhone */
        -webkit-transform-style: preserve-3d;
        transform-style: preserve-3d;
    }
</style>
