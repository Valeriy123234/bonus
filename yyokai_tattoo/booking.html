<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YYOKAI | BOOKING SYSTEM</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --red: #ff0000; --bg: #000; --white: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; touch-action: manipulation; }

        /* --- ЛОУДЕР (ЯК В ОРИГІНАЛІ) --- */
        #loader { 
            position: fixed; inset: 0; background: #000; z-index: 9999; 
            display: flex; justify-content: center; align-items: center; 
            transition: transform 1s cubic-bezier(0.85, 0, 0.15, 1); 
        }
        .loader-num { font-family: 'Unbounded', sans-serif; font-size: 25vw; color: #fff; }

        /* --- ГОЛОВНЕ ЛОГО (ТВІЙ СТИЛЬ) --- */
        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; }
        .hero-title {
            font-family: 'Unbounded', sans-serif; font-size: 24vw; line-height: 0.9;
            text-transform: uppercase; text-align: center; letter-spacing: -0.05em;
            display: flex; flex-direction: column; visibility: hidden;
        }
        .hero-title.visible { visibility: visible; }
        .hero-title span {
            display: inline-block; opacity: 0;
            transform: scaleY(4) translateY(200px);
            filter: blur(20px); transition: all 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .hero-title.active span { opacity: 1; transform: scaleY(1) translateY(0); filter: blur(0); }
        /* Відступи між YYO та KAI */
        .hero-title span:nth-child(2) { transition-delay: 0.15s; margin-top: 25px; margin-bottom: 25px; }

        /* --- КОНТЕНТ БУКІНГУ --- */
        .container { padding: 40px 20px; max-width: 500px; margin: 0 auto; opacity: 0; transition: 1.5s; }
        .container.visible { opacity: 1; }

        /* КАЛЕНДАР (БІЛИЙ СТИЛЬНИЙ) --- */
        .calendar-box { background: var(--white); padding: 25px; border-radius: 35px; margin-bottom: 30px; margin-top: 50px; }
        .calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
        .day { 
            aspect-ratio: 1; background: #f0f0f0; color: #000; border-radius: 12px;
            display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600;
            cursor: pointer; transition: 0.3s; position: relative;
        }
        .day.selected { background: var(--red); color: #fff; transform: scale(1.1); box-shadow: 0 8px 20px rgba(255,0,0,0.3); }
        .day.booked { opacity: 0.3; cursor: not-allowed; }

        /* ФОРМА (БЕЗ ЗУМУ) --- */
        #bookingForm { display: none; flex-direction: column; gap: 15px; }
        #bookingForm.active { display: flex; animation: slideUp 0.6s ease forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        input { background: #111; border: 1px solid #222; padding: 20px; color: #fff; font-size: 16px; border-radius: 18px; }
        input:focus { outline: none; border-color: var(--red); }
        .submit-btn { background: var(--red); color: #fff; border: none; padding: 22px; border-radius: 18px; font-family: 'Unbounded', sans-serif; font-size: 11px; font-weight: 900; cursor: pointer; }

        /* АДМІНКА --- */
        .admin-trigger { margin: 100px 0; text-align: center; opacity: 0.1; font-size: 10px; cursor: pointer; }
        #adminSection { display: none; padding: 20px; background: #080808; border-radius: 20px; margin-top: 40px; }
    </style>
</head>
<body>

    <div id="loader"><div class="loader-num" id="load-val">0</div></div>

    <main>
        <!-- ТВОЄ ІСТИННЕ ЛОГО ПІСЛЯ ЛОУДЕРА -->
        <section class="hero">
            <h1 class="hero-title" id="main-logo"><span>YYO</span><span>KAI</span></h1>
        </section>

        <div class="container" id="mainContent">
            <div class="calendar-box">
                <div class="calendar" id="calendarGrid"></div>
            </div>

            <form id="bookingForm">
                <p id="dateLabel" style="color: var(--red); font-size: 9px; letter-spacing: 3px; margin-bottom: 15px; font-weight: 900;"></p>
                <input type="text" id="userName" placeholder="IDENTITY / NAME" required>
                <input type="text" id="userPhone" placeholder="CONTACT PHONE" required>
                <input type="text" id="userInsta" placeholder="INSTAGRAM TAG" required>
                <button type="submit" class="submit-btn">INITIATE PROTOCOL</button>
            </form>

            <div id="success" style="display:none; text-align:center; color:var(--red); font-family:'Unbounded'; padding: 40px 0;">PROTOCOL ACCEPTED.</div>

            <div id="adminSection"><div id="adminList"></div></div>
            <div class="admin-trigger" onclick="unlockAdmin()">.access_protocol</div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://gstatic.com";
        import { getDatabase, ref, set, push, onValue, remove } from "https://gstatic.com";

        // ВСТАВ СВІЙ АПІ КЕЙ ТУТ (ЯКЩО ПОРОЖНЬО - АНІМАЦІЯ ВСЕ ОДНО ПРАЦЮВАТИМЕ)
        const firebaseConfig = {
    apiKey: "AIzaSyALs-ZgFX7auGxRQ2EeQnVngjnejimPLV4",
    authDomain: "yyokai-tattoo-system.firebaseapp.com",
    databaseURL: "https://yyokai-tattoo-system-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "yyokai-tattoo-system",
    storageBucket: "yyokai-tattoo-system.firebasestorage.app",
    messagingSenderId: "995298614954",
    appId: "1:995298614954:web:e4039c69fcb0541a95fad3",
    measurementId: "G-LFQF1MLPWM"
};


        // Безпечний запуск Firebase
        let db;
        try {
            const app = initializeApp(firebaseConfig);
            db = getDatabase(app);
        } catch (e) { console.error("Firebase config missing"); }

        // ЛОДЕР ТА АНІМАЦІЯ ЛОГО (ТВІЙ ОРИГІНАЛЬНИЙ СКРИПТ)
        window.addEventListener('DOMContentLoaded', () => {
            let count = 0;
            const loadVal = document.getElementById('load-val');
            const loader = document.getElementById('loader');
            const logo = document.getElementById('main-logo');
            const content = document.getElementById('mainContent');

            const interval = setInterval(() => {
                count += Math.floor(Math.random() * 8) + 1;
                if (count >= 100) {
                    count = 100;
                    clearInterval(interval);
                    setTimeout(() => {
                        loader.style.transform = "translateY(-100%)";
                        logo.classList.add('visible');
                        setTimeout(() => { 
                            logo.classList.add('active'); 
                            // Через 2 секунди після лого з'являється календар
                            setTimeout(() => { content.classList.add('visible'); }, 1500);
                        }, 200);
                    }, 400);
                }
                loadVal.innerText = count;
            }, 50);

            if (db) initApp(db);
        });

        function initApp(db) {
            onValue(ref(db, 'bookings'), (snapshot) => {
                const grid = document.getElementById('calendarGrid');
                grid.innerHTML = '';
                const data = snapshot.val() || {};
                const bookedDays = Object.values(data).map(b => b.date);

                for (let i = 1; i <= 31; i++) {
                    const day = document.createElement('div');
                    day.className = 'day' + (bookedDays.includes(i.toString()) ? ' booked' : '');
                    day.innerText = i;
                    day.onclick = () => {
                        if (!day.classList.contains('booked')) {
                            document.querySelectorAll('.day').forEach(d => d.classList.remove('selected'));
                            day.classList.add('selected');
                            window.selectedDate = i;
                            document.getElementById('dateLabel').innerText = `DATE: ${i} / MAY`;
                            document.getElementById('bookingForm').classList.add('active');
                            document.getElementById('bookingForm').scrollIntoView({behavior: 'smooth'});
                        }
                    };
                    grid.appendChild(day);
                }
                updateAdminList(data);
            });
        }

        // Кліки для кнопок
        window.unlockAdmin = () => { if(prompt('PASS:') === 'yokai123234') document.getElementById('adminSection').style.display='block'; };
    </script>
</body>
</html>
