<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YYOKAI | SYSTEM</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --red: #ff0000; --bg: #000; --white: #fff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Unbounded', sans-serif; scroll-behavior: smooth; }
        body { background: #000; color: #fff; overflow-x: hidden; }

        /* --- HERO --- */
        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .hero-logo { 
            font-size: 18vw; font-weight: 900; transform: translateY(100vh);
            animation: jumpUp 1s cubic-bezier(0.2, 0.8, 0.2, 1.1) forwards;
        }
        @keyframes jumpUp {
            0% { transform: translateY(100vh) scaleY(2); }
            60% { transform: translateY(-20px) scaleY(0.9); }
            100% { transform: translateY(0) scaleY(1); }
        }

        /* --- CONTENT --- */
        #mainContent { display: none; padding: 100px 20px; display: flex; flex-direction: column; align-items: center; }
        .calendar-box { background: #111; padding: 25px; border-radius: 30px; border: 1px solid #222; width: 100%; max-width: 400px; }
        
        table { width: 100%; border-spacing: 5px; }
        td { height: 45px; text-align: center; border-radius: 12px; cursor: pointer; font-size: 13px; }
        td.active { background: var(--red) !important; font-weight: 900; }
        td.booked-day { opacity: 0.15; text-decoration: line-through; pointer-events: none; }

        .slots { display: none; grid-template-columns: repeat(2, 1fr); gap: 10px; margin: 25px 0; width: 100%; max-width: 400px; }
        .slot { background: #111; border: 1px solid #333; padding: 15px; border-radius: 15px; text-align: center; cursor: pointer; font-size: 12px; }
        .slot.selected { background: #fff; color: #000; font-weight: 900; }
        .slot.disabled { opacity: 0.2; pointer-events: none; text-decoration: line-through; border: 1px dashed #444; }
        .slot.admin-off { background: var(--red); border-color: var(--red); color: #fff; }

        #bookingForm { display: none; flex-direction: column; gap: 10px; width: 100%; max-width: 400px; }
        input { background: #080808; border: 1px solid #333; padding: 18px; color: #fff; border-radius: 15px; outline: none; }

        .float-btn {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: var(--red); color: #fff; border: none; padding: 20px 40px;
            border-radius: 50px; font-weight: 900; box-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
            z-index: 100; display: none; cursor: pointer;
        }

        .admin-trigger { margin: 50px 0; opacity: 0.1; font-size: 8px; cursor: pointer; }
    </style>
</head>
<body>

<section class="hero">
    <div class="hero-logo">YYO<br>KAI</div>
    <button onclick="scrollToMain()" style="margin-top:40px; background:none; border:none; cursor:pointer;">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M7 13l5 5 5-5M7 6l5 5 5-5"/></svg>
    </button>
</section>

<div id="mainContent">
    <div class="calendar-box">
        <div style="display:flex; justify-content:space-between; margin-bottom:15px; font-size:12px;">
            <button onclick="changeMonth(-1)" style="color:#fff; background:none; border:none; cursor:pointer;">←</button>
            <span id="monthName"></span>
            <button onclick="changeMonth(1)" style="color:#fff; background:none; border:none; cursor:pointer;">→</button>
        </div>
        <table id="calTable"><tbody id="calBody"></tbody></table>
    </div>

    <div id="adminBadge" style="display:none; color:red; font-size:10px; margin-top:20px;">РЕЖИМ АДМІНА: ТИСНИ НА ЧАС ЩОБ ЗАКРИТИ</div>

    <div class="slots" id="slotsGrid">
        <div class="slot" data-time="10:00">10:00</div>
        <div class="slot" data-time="13:00">13:00</div>
        <div class="slot" data-time="16:00">16:00</div>
        <div class="slot" data-time="19:00">19:00</div>
    </div>

    <form id="bookingForm">
        <input type="text" id="uName" placeholder="ІМ'Я" required>
        <input type="text" id="uInsta" placeholder="@INSTAGRAM" required>
        <input type="text" id="uPhone" value="+380" required>
        <button type="submit" style="background:var(--red); color:#fff; border:none; padding:20px; border-radius:15px; font-weight:900; cursor:pointer;">ЗАБРОНЮВАТИ</button>
    </form>

    <div class="admin-trigger" onclick="openAdmin()">.access_protocol</div>
</div>

<button class="float-btn" id="menuBtn" onclick="location.reload()">ДО МЕНЮ</button>

<script>
const DB_URL = "https://yyokai-tattoo-system-default-rtdb.europe-west1.firebasedatabase.app/";
const TG_BOT = "https://t.me/yyokai_ink_bot";
const CHAT_ID = "1634779056";

let currentMonth = new Date().getMonth();
let currentYear = new Date().getFullYear();
let selDate = "", isAdmin = false;
let db = { bookings: {}, manualBlocks: {} }; // Структура: manualBlocks: { "date": ["10:00", "13:00"] }

async function loadDB() {
    const res = await fetch(DB_URL + ".json");
    const data = await res.json() || {};
    db.bookings = data.bookings || {};
    db.manualBlocks = data.manualBlocks || {};
    renderCal();
}

function renderCal() {
    const body = document.getElementById('calBody');
    body.innerHTML = "";
    document.getElementById('monthName').innerText = new Intl.DateTimeFormat('uk-UA', {month:'long', year:'numeric'}).format(new Date(currentYear, currentMonth)).toUpperCase();

    const offset = (new Date(currentYear, currentMonth, 1).getDay() || 7) - 1;
    const days = new Date(currentYear, currentMonth + 1, 0).getDate();

    let date = 1;
    for (let i = 0; i < 6; i++) {
        let row = document.createElement('tr');
        for (let j = 0; j < 7; j++) {
            let cell = document.createElement('td');
            if (i === 0 && j < offset || date > days) {
                cell.className = "empty";
            } else {
                let dStr = `${currentYear}-${currentMonth+1}-${date}`;
                cell.innerText = date;
                
                // Якщо всі 4 слоти зайняті - закреслюємо день
                const blockedForDay = db.manualBlocks[dStr] || [];
                const bookedForDay = Object.values(db.bookings).filter(b => b.date === dStr).map(b => b.time);
                if ([...new Set([...blockedForDay, ...bookedForDay])].length >= 4) cell.classList.add('booked-day');

                cell.onclick = () => {
                    document.querySelectorAll('td').forEach(t => t.classList.remove('active'));
                    cell.classList.add('active'); selDate = dStr;
                    renderSlots(dStr);
                };
                date++;
            }
            row.appendChild(cell);
        }
        body.appendChild(row);
        if (date > days) break;
    }
}

function renderSlots(dStr) {
    const grid = document.getElementById('slotsGrid');
    grid.style.display = 'grid';
    document.getElementById('bookingForm').style.display = 'none';

    document.querySelectorAll('.slot').forEach(slot => {
        const time = slot.dataset.time;
        const isBooked = Object.values(db.bookings).some(b => b.date === dStr && b.time === time);
        const isManuallyBlocked = db.manualBlocks[dStr] && db.manualBlocks[dStr].includes(time);

        slot.className = 'slot';
        if (isBooked) slot.classList.add('disabled');
        if (isManuallyBlocked) slot.classList.add('admin-off');

        slot.onclick = async () => {
            if (isAdmin) {
                // Логіка адміна: перемикаємо блок
                if (!db.manualBlocks[dStr]) db.manualBlocks[dStr] = [];
                if (db.manualBlocks[dStr].includes(time)) {
                    db.manualBlocks[dStr] = db.manualBlocks[dStr].filter(t => t !== time);
                } else {
                    db.manualBlocks[dStr].push(time);
                }
                await fetch(DB_URL + "manualBlocks.json", { method: 'PUT', body: JSON.stringify(db.manualBlocks) });
                renderSlots(dStr);
                renderCal();
            } else {
                // Логіка клієнта
                if (isBooked || isManuallyBlocked) return;
                document.querySelectorAll('.slot').forEach(s => s.classList.remove('selected'));
                slot.classList.add('selected');
                window.selTime = time;
                document.getElementById('bookingForm').style.display = 'flex';
            }
        };
    });
}

function openAdmin() {
    if(prompt("PASS:") === "yokai123234") {
        isAdmin = true;
        document.getElementById('adminBadge').style.display = 'block';
        if(selDate) renderSlots(selDate);
    }
}

function scrollToMain() {
    document.getElementById('mainContent').style.display = 'flex';
    document.getElementById('menuBtn').style.display = 'block';
    window.scrollTo({ top: window.innerHeight, behavior: 'smooth' });
}

document.getElementById('bookingForm').onsubmit = async (e) => {
    e.preventDefault();
    const data = { 
        date: selDate, time: window.selTime, 
        name: document.getElementById('uName').value, 
        insta: document.getElementById('uInsta').value,
        phone: document.getElementById('uPhone').value 
    };
    await fetch(DB_URL + "bookings.json", { method: 'POST', body: JSON.stringify(data) });
    await fetch(`${TG_BOT}?chat_id=${CHAT_ID}&text=${encodeURIComponent("🔥 ЗАПИС: "+data.date+" о "+data.time+"\n👤 "+data.name+"\n📱 "+data.insta)}`);
    location.reload();
};

function changeMonth(dir) { currentMonth += dir; if(currentMonth>11){currentMonth=0;currentYear++} if(currentMonth<0){currentMonth=11;currentYear--} renderCal(); }

loadDB();
</script>
</body>
</html>
