<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YYOKAI | BOOKING SYSTEM</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --red: #ff0000; --bg: #000; --white: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; touch-action: manipulation; }

        /* ЛОУДЕР - ТЕПЕР ВІН ЗВЕРХУ ВСЬОГО */
        #loader { 
            position: fixed; inset: 0; background: #000; z-index: 9999; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            transition: 1.2s cubic-bezier(0.85, 0, 0.15, 1); 
        }
        .loader-logo { font-family: 'Unbounded', sans-serif; font-size: 15vw; text-align: center; line-height: 0.8; color: #fff; }
        .loader-logo span { display: block; }

        /* КОНТЕНТ (ПРИХОВАНИЙ СПОЧАТКУ) */
        .container { padding: 40px 20px; max-width: 500px; margin: 0 auto; opacity: 0; visibility: hidden; transition: 1s ease; }
        .container.visible { opacity: 1; visibility: visible; }

        h1 { font-family: 'Unbounded', sans-serif; font-size: 42px; text-transform: uppercase; margin-bottom: 30px; letter-spacing: -2px; }

        /* КАЛЕНДАР (БІЛИЙ З ЗАКРУГЛЕННЯМИ) */
        .calendar-box { background: var(--white); padding: 25px; border-radius: 35px; margin-bottom: 30px; }
        .calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; }
        
        .day { 
            aspect-ratio: 1; background: #f0f0f0; color: #000; border-radius: 12px;
            display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600;
            cursor: pointer; transition: 0.3s; position: relative;
        }
        .day:hover:not(.booked) { background: #e0e0e0; transform: scale(1.05); }
        .day.selected { background: var(--red); color: #fff; transform: scale(1.1); box-shadow: 0 8px 20px rgba(255,0,0,0.3); }
        .day.booked { opacity: 0.3; cursor: not-allowed; }
        .day.booked::after { content: ''; position: absolute; width: 60%; height: 1px; background: #000; transform: rotate(-45deg); }

        /* ФОРМА ТА ІНПУТИ */
        #bookingForm { display: none; flex-direction: column; gap: 15px; }
        #bookingForm.active { display: flex; animation: slideUp 0.6s ease forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        input { background: #111; border: 1px solid #222; padding: 20px; color: #fff; font-size: 16px; border-radius: 18px; transition: 0.3s; }
        input:focus { outline: none; border-color: var(--red); background: #151515; }
        
        .submit-btn { background: var(--red); color: #fff; border: none; padding: 22px; border-radius: 18px; font-family: 'Unbounded', sans-serif; font-size: 11px; font-weight: 900; cursor: pointer; margin-top: 10px; }
        
        .success-msg { display: none; text-align: center; color: var(--red); font-family: 'Unbounded', sans-serif; font-size: 14px; margin-top: 40px; }

        /* АДМІН */
        #adminSection { display: none; margin-top: 60px; padding-top: 30px; border-top: 1px solid #222; }
        .booking-card { background: #111; padding: 20px; border-radius: 20px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
        .del-btn { color: var(--red); border: 1px solid var(--red); background: none; padding: 10px 15px; border-radius: 10px; cursor: pointer; font-size: 10px; }

        .admin-trigger { margin: 80px 0; text-align: center; opacity: 0.1; font-size: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="loader-logo"><span>YYO</span><span>KAI</span></div>
    </div>

    <main class="container" id="mainContent">
        <h1>BOOKING</h1>
        
        <div class="calendar-box">
            <div class="calendar" id="calendarGrid"></div>
        </div>

        <form id="bookingForm">
            <p id="dateLabel" style="color: var(--red); font-size: 9px; letter-spacing: 3px; margin-bottom: 10px; font-weight: 900;"></p>
            <input type="text" id="userName" placeholder="IDENTITY / NAME" required>
            <input type="text" id="userPhone" placeholder="CONTACT PHONE" required>
            <input type="text" id="userInsta" placeholder="INSTAGRAM TAG" required>
            <button type="submit" class="submit-btn">INITIATE PROTOCOL</button>
        </form>

        <div id="success" class="success-msg">PROTOCOL ACCEPTED.<br>Я ЗКОНТАКТУЮ З ТОБОЮ.</div>

        <div id="adminSection"><div id="adminList"></div></div>
        <div class="admin-trigger" onclick="unlockAdmin()">.access_protocol</div>
    </main>

            appId: "995298614954"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Логіка лоудера
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loader').style.transform = "translateY(-100%)";
                document.getElementById('mainContent').classList.add('visible');
                initApp();
            }, 1800);
        });

        let selectedDate = null;

        function initApp() {
            onValue(ref(db, 'bookings'), (snapshot) => {
                const grid = document.getElementById('calendarGrid');
                grid.innerHTML = '';
                const data = snapshot.val() || {};
                const bookedDays = Object.values(data).map(b => b.date);

                for (let i = 1; i <= 31; i++) {
                    const day = document.createElement('div');
                    day.className = 'day' + (bookedDays.includes(i.toString()) ? ' booked' : '');
                    day.innerText = i;
                    day.onclick = () => {
                        if (!day.classList.contains('booked')) {
                            document.querySelectorAll('.day').forEach(d => d.classList.remove('selected'));
                            day.classList.add('selected');
                            selectedDate = i;
                            document.getElementById('dateLabel').innerText = `DATE SELECTED: ${i} / MAY`;
                            document.getElementById('bookingForm').classList.add('active');
                            document.getElementById('bookingForm').scrollIntoView({behavior: 'smooth'});
                        }
                    };
                    grid.appendChild(day);
                }
                updateAdminList(data);
            });
        }

        document.getElementById('bookingForm').onsubmit = async (e) => {
            e.preventDefault();
            await push(ref(db, 'bookings'), {
                date: selectedDate.toString(),
                name: document.getElementById('userName').value,
                phone: document.getElementById('userPhone').value,
                insta: document.getElementById('userInsta').value
            });
            document.getElementById('bookingForm').style.display = 'none';
            document.getElementById('success').style.display = 'block';
        };

        window.unlockAdmin = function() {
            if (prompt('PASSCODE:') === 'yokai123234') {
                document.getElementById('adminSection').style.display = 'block';
            }
        };

        function updateAdminList(data) {
            const list = document.getElementById('adminList');
            list.innerHTML = '';
            for (let id in data) {
                const b = data[id];
                list.innerHTML += `<div class="booking-card">
                    <div><b>DATE: ${b.date}</b><br>${b.name}<br><span>${b.insta}</span></div>
                    <button class="del-btn" onclick="deleteEntry('${id}')">RELEASE</button>
                </div>`;
            }
        }
        window.deleteEntry = (id) => { if(confirm('FREE THIS DATE?')) remove(ref(db, `bookings/${id}`)); };
    </script>
</body>
</html>
