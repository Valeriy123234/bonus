<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YYOKAI | SYSTEM</title>
    <link href="https://googleapis.com" rel="stylesheet">
     <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
    <style>
        :root { --red: #ff0000; --bg: #000; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Unbounded', sans-serif; }
        body { background: var(--bg); color: #fff; overflow-x: hidden; }

        /* --- HERO --- */
        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .hero-logo { font-size: 18vw; font-weight: 900; transform: translateY(100vh); animation: jumpUp 1.2s cubic-bezier(0.2, 0.8, 0.2, 1.1) forwards; }
        @keyframes jumpUp { 0% { transform: translateY(100vh) scaleY(1.5); } 60% { transform: translateY(-20px) scaleY(0.9); } 100% { transform: translateY(0) scaleY(1); } }
        .scroll-hint { margin-top: 30px; font-size: 10px; opacity: 0; animation: fadeIn 0.8s forwards 1.4s; }
        .arrow { margin-top: 15px; opacity: 0; background: none; border: none; animation: fadeIn 1s forwards 2s, jump 2s infinite 2s; cursor: pointer; }
        @keyframes fadeIn { to { opacity: 0.6; } }
        @keyframes jump { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(10px); } }

        /* --- CONTENT --- */
        #mainContent { padding: 60px 15px; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
        .calendar-card { background: #0a0a0a; padding: 15px; border-radius: 30px; border: 1px solid #1a1a1a; width: 100%; max-width: 450px; }
        .fc { --fc-button-bg-color: #111; --fc-border-color: #222; }

        /* --- MODAL --- */
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 10000; backdrop-filter: blur(10px); align-items: center; justify-content: center; padding: 20px; }
        .modal { background: #0a0a0a; padding: 30px; border-radius: 40px; border: 1px solid var(--red); width: 100%; max-width: 340px; text-align: center; max-height: 90vh; overflow-y: auto; }
        
        .time-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 20px 0; }
        .time-slot { padding: 15px; border: 1.5px solid #222; border-radius: 15px; background: transparent; color: white; cursor: pointer; font-size: 12px; font-weight: 900; }
        .time-slot.selected { background: var(--red); border-color: var(--red); }
        .time-slot.blocked { background: #1a1a1a !important; color: #333 !important; text-decoration: line-through; pointer-events: none; }
        
        /* СВІТЛА АДМІНКА */
        .time-slot.admin-off { background: #cccccc !important; border: 3px solid var(--red) !important; color: #000 !important; font-weight: 900; opacity: 1 !important; text-decoration: line-through; }

        input, .file-label { width: 100%; padding: 18px; margin-bottom: 12px; background: #111; border: 1px solid #333; color: white; border-radius: 15px; text-align: center; outline: none; font-size: 16px; display: block; cursor: pointer; }
        .file-label { font-size: 10px; border: 1px dashed var(--red); color: var(--red); }
        .btn-confirm { background: var(--red); color: white; border: none; padding: 20px; border-radius: 15px; width: 100%; font-weight: 900; cursor: pointer; }

        #bonusModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 10001; align-items: center; justify-content: center; padding: 20px; }
        .promo-code { font-size: 32px; font-weight: 900; color: var(--red); margin: 20px 0; }

        .menu-float-btn {
    position: fixed;
    bottom: 30px;
    right: 20px;
    background: var(--red);
    color: #fff;
    border: none;
    padding: 15px 25px;
    border-radius: 50px;
    font-family: 'Unbounded', sans-serif;
    font-size: 10px;
    font-weight: 900;
    cursor: pointer;
    z-index: 999;
    
    /* Свічення (Glow effect) */
    box-shadow: 0 0 15px var(--red), 0 0 30px rgba(255, 0, 0, 0.4);
    
    /* Плавна поява кнопки */
    opacity: 0;
    visibility: hidden;
    transition: 0.4s all ease-in-out;
}

/* Клас, який додасться при скролі */
.menu-float-btn.visible {
    opacity: 1;
    visibility: visible;
}

    
    </style>
</head>
<body>

    <button class="menu-float-btn" id="floatingMenuBtn" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">
    ДО МЕНЮ
</button>

    <section class="hero">
        <div class="hero-logo">YYO<br>KAI</div>
        <p class="scroll-hint">ЗАПИСАТИСЬ ГОРТАЙ ВНИЗ</p>
        <button class="arrow" onclick="document.getElementById('mainContent').scrollIntoView()">
            <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M7 13l5 5 5-5M7 6l5 5 5-5"/></svg>
        </button>
    </section>

    <main id="mainContent">
        <div class="calendar-card"><div id="calendar"></div></div>
        <div onclick="adminAuth()" style="margin-top:80px; opacity:0.1; cursor:pointer; font-size:8px;">.access_protocol</div>
    </main>

    <div class="overlay" id="overlay">
        <div class="modal">
            <h4 id="dateTitle" style="color:var(--red); font-size:12px; margin-bottom:10px;"></h4>
            <div id="adminNotice" style="display:none; font-size:9px; color:#ccc; margin-bottom:10px; background:var(--red); padding:5px;">ADMIN MODE: ТИСНИ НА ЧАС</div>
            <div class="time-grid">
                <button class="time-slot" data-time="10:00" onclick="handleTimeClick(this)">10:00</button>
                <button class="time-slot" data-time="13:00" onclick="handleTimeClick(this)">13:00</button>
                <button class="time-slot" data-time="16:00" onclick="handleTimeClick(this)">16:00</button>
                <button class="time-slot" data-time="19:00" onclick="handleTimeClick(this)">19:00</button>
            </div>
            <div id="bookingFields">
                <input type="text" id="clientName" placeholder="ТВОЄ ІМ'Я">
                <input type="text" id="clientInsta" placeholder="@INSTAGRAM">
                <input type="tel" id="clientPhone" value="+380" maxlength="13">
                <label for="clientFiles" class="file-label" id="fileLabel">ДОДАТИ ФОТО ІДЕЇ (МАКС 5)</label>
                <input type="file" id="clientFiles" accept="image/*" multiple onchange="document.getElementById('fileLabel').innerText='ОБРАНО: '+this.files.length" style="display:none">
                <button class="btn-confirm" id="mainBtn" onclick="confirmBooking()">БРОНЮВАТИ</button>
            </div>
            <button onclick="document.getElementById('overlay').style.display='none'" style="background:none; border:none; color:#444; margin-top:15px; font-size:10px;">ЗАКРИТИ</button>
        </div>
    </div>

       <div id="bonusModal">
        <div class="modal">
            <p style="color:var(--red); font-size:12px; font-weight:900; letter-spacing:1px;">ТРИМАЙ -10% ЗНИЖКИ НА СЕАНС</p>
            <p style="color:#fff; font-size:10px; margin-top:5px; opacity:0.8;">А ТАКОЖ -20% ЗА ТЕ ЩО ПРИВЕДЕШ ДРУГА</p>
            
            <div id="promoRes" class="promo-code" onclick="copyPromo()">XXXXXXX</div>

            <p style="font-size:9px; opacity:0.5; margin-bottom:20px;">НАТИСНИ НА КОД ЩОБ СКОПІЮВАТИ</p>
            <button class="btn-confirm" onclick="location.reload()">НА ГОЛОВНУ</button>
        </div>
    </div>


    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = { databaseURL: "https://yyokai-tattoo-system-default-rtdb.europe-west1.firebasedatabase.app/" };
        const TG_TOKEN = '8747396400:AAFgsvQfGymY2SlG2slGuidFXgvbEVVmq-o';
        const TG_CHAT_ID = '1634779056';

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let selDate = "", selTime = "", isAdm = false, blockedSlots = {};

        const phoneInput = document.getElementById('clientPhone');
        phoneInput.oninput = function() { if(!this.value.startsWith('+380')) this.value = '+380'; };
        phoneInput.onkeydown = function(e) { if(this.selectionStart < 4 && (e.key==='Backspace'||e.key==='Delete')) e.preventDefault(); };

        function initCalendar() {
            new FullCalendar.Calendar(document.getElementById('calendar'), {
                initialView: 'dayGridMonth', locale: 'uk', firstDay: 1,
                headerToolbar: { left: 'prev', center: 'title', right: 'next' },
                dateClick: (info) => { selDate = info.dateStr; openBookingModal(); }
            }).render();
        }

        db.ref('slots').on('value', (snap) => {
            blockedSlots = snap.val() || {};
            if(document.getElementById('overlay').style.display === 'flex') updateSlotsUI();
        });

        function openBookingModal() {
            document.getElementById('dateTitle').innerText = selDate;
            document.getElementById('overlay').style.display = 'flex';
            document.getElementById('bookingFields').style.display = isAdm ? 'none' : 'block';
            document.getElementById('adminNotice').style.display = isAdm ? 'block' : 'none';
            updateSlotsUI();
        }

        function updateSlotsUI() {
            const slots = document.querySelectorAll('.time-slot');
            const dayData = blockedSlots[selDate] ? Object.values(blockedSlots[selDate]) : [];
            slots.forEach(slot => {
                slot.className = 'time-slot';
                if (dayData.includes(slot.dataset.time)) slot.classList.add(isAdm ? 'admin-off' : 'blocked');
            });
        }

        function handleTimeClick(btn) {
            const time = btn.dataset.time;
            if (isAdm) {
                const ref = db.ref('slots/' + selDate);
                if (btn.classList.contains('admin-off')) {
                    ref.once('value').then(s => s.forEach(c => { if(c.val() === time) c.ref.remove(); }));
                } else { ref.push(time); }
            } else {
                if (btn.classList.contains('blocked')) return;
                document.querySelectorAll('.time-slot').forEach(s => s.classList.remove('selected'));
                btn.classList.add('selected'); selTime = time;
            }
        }

        async function confirmBooking() {
            const name = document.getElementById('clientName').value;
            const phone = document.getElementById('clientPhone').value;
            const insta = document.getElementById('clientInsta').value;
            const files = document.getElementById('clientFiles').files;

            if (!name || !selTime || phone.length < 13) return alert("Заповни всі дані!");

            document.getElementById('mainBtn').innerText = "ВІДПРАВКА...";
            const promo = Math.random().toString(36).substring(2, 9).toUpperCase();
            const msg = `🏮 ЗАПИС!\n👤 ${name}\n📱 Insta: ${insta}\n📞 ${phone}\n📅 ${selDate} о ${selTime}\n🎁 Код: ${promo}`;

            try {
                // 1. Текст
                await fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ chat_id: TG_CHAT_ID, text: msg })
                });

                // 2. Фото (по черзі)
                for (let file of files) {
                    let fd = new FormData();
                    fd.append('chat_id', TG_CHAT_ID);
                    fd.append('photo', file);
                    await fetch(`https://api.telegram.org/bot${TG_TOKEN}/sendPhoto`, { method: 'POST', body: fd });
                }

                db.ref('slots/' + selDate).push(selTime);
                document.getElementById('promoRes').innerText = promo;
                document.getElementById('overlay').style.display = 'none';
                document.getElementById('bonusModal').style.display = 'flex';
            } catch (e) { alert("Помилка! Спробуй без фото або перевір інет."); document.getElementById('mainBtn').innerText = "БРОНЮВАТИ"; }
        }

        function adminAuth() { if(prompt("PASS:") === "yokai123234") { isAdm = true; alert("ADMIN ON"); } }
        document.addEventListener('DOMContentLoaded', initCalendar);
    

    function copyPromo() {
    const code = document.getElementById('promoRes').innerText;
    navigator.clipboard.writeText(code).then(() => {
        alert("СКОПІЙОВАНО: " + code);
    }).catch(() => {
        const input = document.createElement("textarea");
        input.value = code;
        document.body.appendChild(input);
        input.select();
        document.execCommand("copy");
        document.body.removeChild(input);
        alert("СКОПІЙОВАНО: " + code);
    });
}

        window.onscroll = function() {
    const btn = document.getElementById('floatingMenuBtn');
    // Якщо проскролив більше 300 пікселів - показуємо кнопку
    if (document.body.scrollTop > 300 || document.documentElement.scrollTop > 300) {
        btn.classList.add('visible');
    } else {
        btn.classList.remove('visible');
    }
};

</script>
</body>
</html>
