<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YYOKAI | SYSTEM</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --red: #ff0000; --bg: #000; --white: #fff; --gray: rgba(20, 20, 20, 0.9); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Unbounded', sans-serif; }
        
        body { 
            background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.75)), 
                        url('https://unsplash.com'); 
            background-size: cover; background-position: center; background-attachment: fixed;
            color: var(--white); overflow-x: hidden; 
        }

        /* --- HERO --- */
        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .hero-logo { font-size: 18vw; font-weight: 900; animation: floatBounce 4s ease-in-out infinite; color: #fff; }
        @keyframes floatBounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-30px); } }
        .scroll-hint { margin-top: 20px; font-size: 10px; letter-spacing: 2px; opacity: 0.6; }
        .arrow { margin-top: 10px; animation: arrow 2s infinite; }
        @keyframes arrow { 0%, 100% { transform: translateY(0); opacity: 0.3; } 50% { transform: translateY(10px); opacity: 1; } }

        /* --- CONTENT --- */
        #mainContent { display: none; padding: 40px 20px; max-width: 450px; margin: 0 auto; }
        .calendar-box { background: var(--gray); padding: 20px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); }
        .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .cal-btn { background: rgba(255,255,255,0.1); border: none; color: #fff; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; }
        
        table { width: 100%; border-spacing: 5px; }
        td { height: 45px; text-align: center; border-radius: 12px; cursor: pointer; font-size: 13px; transition: 0.3s; }
        td.active { background: var(--red) !important; font-weight: 900; }
        td.booked-day { opacity: 0.2; text-decoration: line-through; color: var(--red); pointer-events: none; }
        td.admin-blocked { background: rgba(255,0,0,0.3); text-decoration: line-through; border: 1px dashed red; }

        .slots { display: none; grid-template-columns: repeat(2, 1fr); gap: 10px; margin: 25px 0; }
        .slot { background: var(--gray); border: 1px solid #333; padding: 15px; border-radius: 15px; text-align: center; cursor: pointer; }
        .slot.selected { background: var(--white); color: #000; font-weight: 900; }

        #bookingForm { display: none; flex-direction: column; gap: 12px; }
        input { background: rgba(0,0,0,0.8); border: 1px solid #444; padding: 18px; color: #fff; border-radius: 15px; outline: none; }
        .btn-red { background: var(--red); color: #fff; border: none; padding: 20px; border-radius: 15px; font-weight: 900; cursor: pointer; width: 100%; }

        /* --- ADMIN --- */
        .admin-trigger { margin-top: 80px; text-align: center; opacity: 0.1; font-size: 8px; cursor: pointer; padding: 20px; }
        #adminSection { display: none; background: #000; padding: 20px; border-radius: 25px; margin-top: 20px; border: 1px solid var(--red); }
        .admin-toggle { margin-bottom: 15px; padding: 12px; background: #1a1a1a; border-radius: 12px; text-align: center; font-size: 10px; cursor: pointer; border: 1px solid #333; }
        .admin-card { background: #111; padding: 15px; border-radius: 10px; margin-bottom: 10px; font-size: 11px; border-left: 3px solid var(--red); position: relative; }
        .del-btn { position: absolute; right: 10px; top: 10px; color: var(--red); cursor: pointer; }

        /* --- MODAL --- */
        #bonusModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.96); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .modal-card { background: #111; padding: 35px; border-radius: 30px; border: 1px solid var(--red); text-align: center; width: 100%; max-width: 400px; }
    </style>
</head>
<body>

<div id="loader" style="position:fixed; inset:0; background:#000; z-index:9999; display:flex; justify-content:center; align-items:center; font-size:40px; font-weight:900;">0%</div>

<section class="hero">
    <div class="hero-logo">YYO<br>KAI</div>
    <div class="scroll-hint">ЗАПИСАТИСЬ ГОРТАЙ ВНИЗ</div>
    <div class="arrow"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M7 13l5 5 5-5M7 6l5 5 5-5"/></svg></div>
</section>

<div id="mainContent">
    <div class="cal-header">
        <button class="cal-btn" onclick="changeMonth(-1)">←</button>
        <h3 id="monthName" style="font-size: 14px;"></h3>
        <button class="cal-btn" onclick="changeMonth(1)">→</button>
    </div>
    
    <div class="calendar-box">
        <table id="calTable">
            <thead><tr style="font-size: 9px; opacity: 0.5;"><th>ПН</th><th>ВТ</th><th>СР</th><th>ЧТ</th><th>ПТ</th><th>СБ</th><th>НД</th></tr></thead>
            <tbody id="calBody"></tbody>
        </table>
    </div>

    <div id="userInterface">
        <div class="slots" id="slotsGrid">
            <div class="slot" data-time="10:00">10:00</div>
            <div class="slot" data-time="13:00">13:00</div>
            <div class="slot" data-time="16:00">16:00</div>
            <div class="slot" data-time="19:00">19:00</div>
        </div>
        <form id="bookingForm">
            <input type="text" id="uName" placeholder="ІМ'Я" required>
            <input type="text" id="uInsta" placeholder="@INSTAGRAM" required>
            <input type="text" id="uPhone" value="+380" required>
            <button type="submit" class="btn-red">ЗАБРОНЮВАТИ</button>
        </form>
    </div>

    <div class="admin-trigger" onclick="authAdmin()">.access_protocol</div>
    <div id="adminSection">
        <div class="admin-toggle" id="adminModeStatus" onclick="toggleAdminEdit()">РЕЖИМ: ПЕРЕГЛЯД</div>
        <div id="adminList"></div>
    </div>
</div>

<div id="bonusModal">
    <div class="modal-card">
        <p style="color:var(--red); font-size:12px;">ТРИМАЙ НА СЕАНС 10% ЗНИЖКИ</p>
        <div id="promoRes" style="font-size:32px; margin:20px 0; font-weight:900; letter-spacing:2px;" onclick="copyCode()"></div>
        <p style="font-size:10px; opacity:0.7; line-height:1.6;">ЗАПРОСИ ДРУГА ТА ОТРИМАЙ -20%<br>НА НАСТУПНИЙ СЕАНС</p>
        <button class="btn-red" style="margin-top:25px; padding:15px;" onclick="location.reload()">ДО МЕНЮ</button>
    </div>
</div>

<script>
// --- КОНФІГУРАЦІЯ ---
const DB_URL = "https://yyokai-tattoo-system-default-rtdb.europe-west1.firebasedatabase.app/"; // ВСТАВ СВОЄ ПОСИЛАННЯ
const TG_TOKEN = "8747396400:AAFgsvQfGymY2SlG2slGuidFXgvbEVVmq-o";
const TG_CHAT_ID = "1634779056";

let currentMonth = new Date().getMonth();
let currentYear = new Date().getFullYear();
let selDate = "", selTime = "", isAdmin = false;
let dbData = { bookings: {}, blockedDays: [] };

// --- FIREBASE DATA ---
async function fetchDB() {
    const res = await fetch(DB_URL + ".json");
    const data = await res.json();
    if(data) {
        dbData.bookings = data.bookings || {};
        dbData.blockedDays = data.blockedDays || [];
    }
    renderCal();
}

async function syncBlocked() {
    await fetch(DB_URL + "blockedDays.json", { method: 'PUT', body: JSON.stringify(dbData.blockedDays) });
}

// --- LOADER ---
let c = 0;
let iv = setInterval(() => {
    c += 10; if(c >= 100) { c = 100; clearInterval(iv); document.getElementById('loader').style.display='none'; document.getElementById('mainContent').style.display='block'; fetchDB(); }
    document.getElementById('loader').innerText = c + "%";
}, 40);

// --- CALENDAR ---
function renderCal() {
    const body = document.getElementById('calBody');
    body.innerHTML = "";
    document.getElementById('monthName').innerText = new Intl.DateTimeFormat('uk-UA', { month: 'long', year: 'numeric' }).format(new Date(currentYear, currentMonth));

    const first = new Date(currentYear, currentMonth, 1).getDay();
    const days = new Date(currentYear, currentMonth + 1, 0).getDate();
    const offset = first === 0 ? 6 : first - 1;

    let date = 1;
    for (let i = 0; i < 6; i++) {
        let row = document.createElement('tr');
        for (let j = 0; j < 7; j++) {
            let cell = document.createElement('td');
            if (i === 0 && j < offset || date > days) {
                cell.className = "empty";
            } else {
                let dStr = `${currentYear}-${currentMonth+1}-${date}`;
                cell.innerText = date;
                if(dbData.blockedDays.includes(dStr)) cell.classList.add(isAdmin ? 'admin-blocked' : 'booked-day');
                
                cell.onclick = () => {
                    if(isAdmin) {
                        if(dbData.blockedDays.includes(dStr)) dbData.blockedDays = dbData.blockedDays.filter(d => d !== dStr);
                        else dbData.blockedDays.push(dStr);
                        syncBlocked(); renderCal();
                    } else {
                        document.querySelectorAll('td').forEach(t => t.classList.remove('active'));
                        cell.classList.add('active'); selDate = dStr;
                        document.getElementById('slotsGrid').style.display = 'grid';
                    }
                };
                date++;
            }
            row.appendChild(cell);
        }
        body.appendChild(row);
        if (date > days) break;
    }
}

// --- LOGIC ---
function toggleAdminEdit() {
    isAdmin = !isAdmin;
    document.getElementById('adminModeStatus').innerText = isAdmin ? "РЕЖИМ: РЕДАГУВАННЯ ДАТ" : "РЕЖИМ: ПЕРЕГЛЯД";
    document.getElementById('adminModeStatus').style.color = isAdmin ? "red" : "white";
    document.getElementById('userInterface').style.display = isAdmin ? "none" : "block";
    renderCal();
}

function authAdmin() {
    if(prompt("PASS:") === "yokai123234") {
        document.getElementById('adminSection').style.display = 'block';
        updateAdminList();
    }
}

async function updateAdminList() {
    const list = document.getElementById('adminList');
    list.innerHTML = "";
    Object.keys(dbData.bookings).forEach(key => {
        const b = dbData.bookings[key];
        list.innerHTML += `<div class="admin-card"><span class="del-btn" onclick="delBooking('${key}')">✕</span><b>${b.date} | ${b.time}</b><br>${b.name} (${b.insta})</div>`;
    });
}

async function delBooking(key) {
    await fetch(`${DB_URL}bookings/${key}.json`, { method: 'DELETE' });
    fetchDB();
}

document.querySelectorAll('.slot').forEach(s => {
    s.onclick = () => {
        document.querySelectorAll('.slot').forEach(sl => sl.classList.remove('selected'));
        s.classList.add('selected'); selTime = s.dataset.time;
        document.getElementById('bookingForm').style.display = 'flex';
    };
});

document.getElementById('bookingForm').onsubmit = async (e) => {
    e.preventDefault();
    const promo = Math.random().toString(36).substring(2, 9).toUpperCase();
    const data = { 
        date: selDate, time: selTime, promo,
        name: document.getElementById('uName').value, 
        insta: document.getElementById('uInsta').value,
        phone: document.getElementById('uPhone').value 
    };

    await fetch(DB_URL + "bookings.json", { method: 'POST', body: JSON.stringify(data) });
    
    const text = `🏮 ЗАПИС!\n👤 ${data.name}\n📱 Insta: ${data.insta}\n📞 ${data.phone}\n📅 ${data.date} о ${data.time}\n🎁 Промо: ${promo}`;
    fetch(`https://telegram.org{TG_TOKEN}/sendMessage?chat_id=${TG_CHAT_ID}&text=${encodeURIComponent(text)}`);

    document.getElementById('promoRes').innerText = promo;
    document.getElementById('bonusModal').style.display = 'flex';
};

function changeMonth(dir) { currentMonth += dir; if(currentMonth>11){currentMonth=0;currentYear++} if(currentMonth<0){currentMonth=11;currentYear--} renderCal(); }
function copyCode() { navigator.clipboard.writeText(document.getElementById('promoRes').innerText); alert("Код скопійовано!"); }
</script>
</body>
</html>
