<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YYOKAI | BOOKING</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --red: #ff0000; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { background: #000; color: #fff; font-family: sans-serif; overflow-x: hidden; touch-action: manipulation; }

        /* --- ЛОУДЕР 0-100 (ПРАЦЮЄ ЗАВЖДИ) --- */
        #loader { 
            position: fixed; inset: 0; background: #000; z-index: 9999; 
            display: flex; justify-content: center; align-items: center; 
        }
        #l-val { font-family: 'Unbounded', sans-serif; font-size: 25vw; color: #fff; }

        /* --- КОНТЕНТ --- */
        #mainContent { display: none; padding: 20px; max-width: 450px; margin: 0 auto; text-align: center; }

        .logo { font-family: 'Unbounded', sans-serif; font-size: 45px; line-height: 0.8; margin: 40px 0; text-transform: uppercase; }
        .logo span { display: block; }
        .logo b { color: var(--red); }

        /* --- КАЛЕНДАР (СІТКА ТАБЛИЦЕЮ) --- */
        .calendar-box { background: #fff; padding: 20px; border-radius: 30px; margin-bottom: 25px; width: 100%; }
        table { width: 100%; border-collapse: separate; border-spacing: 8px; }
        td { 
            background: #eee; color: #000; width: 14%; height: 50px; 
            border-radius: 12px; font-weight: 900; cursor: pointer; font-size: 14px; 
        }
        td.selected { background: var(--red); color: #fff; transform: scale(1.1); }
        td.booked { opacity: 0.15; cursor: not-allowed; text-decoration: line-through; }

        /* --- ФОРМА --- */
        #bookingForm { display: none; flex-direction: column; gap: 12px; }
        input { background: #111; border: 1px solid #222; padding: 18px; color: #fff; font-size: 16px; border-radius: 15px; width: 100%; }
        input:focus { outline: none; border-color: var(--red); }
        .btn { background: var(--red); color: #fff; border: none; padding: 20px; border-radius: 15px; font-family: 'Unbounded'; font-size: 10px; font-weight: 900; cursor: pointer; }
        
        .admin-btn { margin-top: 50px; opacity: 0.05; font-size: 8px; cursor: pointer; padding: 20px; }
    </style>
</head>
<body>

    <div id="loader"><div id="l-val">0</div></div>

    <div id="mainContent">
        <div class="logo"><span>YYO</span><b>KAI</b></div>
        
        <div class="calendar-box">
            <table id="calTable"></table>
        </div>

        <form id="bookingForm">
            <p id="dateLabel" style="color:red; font-weight:900; margin-bottom:15px; font-size:10px; letter-spacing:2px;"></p>
            <input type="text" id="userName" placeholder="IDENTITY / NAME" required>
            <input type="text" id="userPhone" placeholder="PHONE NUMBER" required>
            <input type="text" id="userInsta" placeholder="INSTAGRAM TAG" required>
            <button type="submit" class="btn">INITIATE PROTOCOL</button>
        </form>

        <div id="success" style="display:none; color:red; font-family:'Unbounded'; font-size:12px; padding:40px 0;">Я ЗКОНТАКТУЮ З ТОБОЮ.</div>
        
        <div class="admin-btn" onclick="openAdmin()">.system_access</div>
    </div>

    <script>
        const DB_URL = "https://yyokai-tattoo-system-default-rtdb.europe-west1.firebasedatabase.app/";

        // 1. ЛОУДЕР 0-100
        let c = 0;
        let iv = setInterval(() => {
            c += Math.floor(Math.random() * 5) + 2;
            if(c >= 100) {
                c = 100; clearInterval(iv);
                setTimeout(() => {
                    document.getElementById('loader').style.display = 'none';
                    document.getElementById('mainContent').style.display = 'block';
                    loadBookings();
                }, 500);
            }
            document.getElementById('l-val').innerText = c;
        }, 40);

        // 2. ЗАВАНТАЖЕННЯ ДАНИХ (БЕЗ КЛЮЧІВ)
        async function loadBookings() {
            try {
                const res = await fetch(DB_URL);
                const data = await res.json();
                const booked = data ? Object.values(data).map(b => b.date) : [];
                renderCalendar(booked);
            } catch (e) { renderCalendar([]); }
        }

        function renderCalendar(booked) {
            const table = document.getElementById('calTable');
            table.innerHTML = '';
            let day = 1;
            for(let r = 0; r < 5; r++) {
                let tr = document.createElement('tr');
                for(let d = 0; d < 7; d++) {
                    if(day > 31) break;
                    let td = document.createElement('td');
                    td.innerText = day;
                    if(booked.includes(day.toString())) {
                        td.className = 'booked';
                    } else {
                        td.onclick = function() {
                            document.querySelectorAll('td').forEach(el => el.classList.remove('selected'));
                            this.classList.add('selected');
                            window.selDate = this.innerText;
                            document.getElementById('dateLabel').innerText = "SELECTED: " + this.innerText + " / MAY";
                            document.getElementById('bookingForm').style.display = 'flex';
                            document.getElementById('bookingForm').scrollIntoView({behavior: 'smooth'});
                        };
                    }
                    tr.appendChild(td);
                    day++;
                }
                table.appendChild(tr);
            }
        }

        // 3. ВІДПРАВКА ДАНИХ
        document.getElementById('bookingForm').onsubmit = async (e) => {
            e.preventDefault();
            const payload = {
                date: window.selDate,
                name: document.getElementById('userName').value,
                phone: document.getElementById('userPhone').value,
                insta: document.getElementById('userInsta').value
            };

            await fetch(DB_URL, {
                method: 'POST',
                body: JSON.stringify(payload)
            });

            document.getElementById('bookingForm').style.display = 'none';
            document.getElementById('success').style.display = 'block';
        };

        function openAdmin() {
            if(prompt('KEY:') === 'yokai123234') {
                window.location.href = "https://google.com";
            }
        }
    </script>
</body>
</html>
