<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YYOKAI | SYSTEM</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --red: #ff0000; --bg: #000; --white: #fff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Unbounded', sans-serif; }
        body { background: #000; color: #fff; overflow-x: hidden; }

        /* --- ЛОУДЕР --- */
        #loader { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; justify-content: center; align-items: center; }
        #l-val { font-size: 15vw; font-weight: 900; }

        /* --- HERO --- */
        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        
        /* Анімація викривлення YOKAI */
        .hero-logo { font-size: 20vw; line-height: 0.85; text-transform: uppercase; font-weight: 900; position: relative; }
        .hero-logo span { display: block; animation: glitch 3s infinite; }
        .hero-logo span:nth-child(2) { color: var(--red); animation-delay: 0.1s; }

        @keyframes glitch {
            0% { transform: translate(0); text-shadow: none; }
            2% { transform: translate(-5px, 2px); text-shadow: 2px 0 var(--red); }
            4% { transform: translate(5px, -2px); text-shadow: -2px 0 blue; }
            6% { transform: translate(0); }
            100% { transform: translate(0); }
        }

        .scroll-hint { font-size: 10px; letter-spacing: 3px; margin-top: 50px; opacity: 0.7; }

        /* --- CONTENT --- */
        #mainContent { display: none; padding: 20px; max-width: 480px; margin: 0 auto; }
        .calendar-box { background: #fff; padding: 15px; border-radius: 20px; margin-bottom: 20px; }
        
        table { width: 100%; border-collapse: collapse; }
        td { color: #000; height: 45px; text-align: center; border-radius: 10px; cursor: pointer; font-weight: 900; font-size: 14px; }
        td.selected { background: var(--red) !important; color: #fff; }
        td.empty { pointer-events: none; }
        td:hover:not(.empty) { background: #eee; }

        .slots { display: none; grid-template-columns: repeat(2, 1fr); gap: 10px; margin: 20px 0; }
        .slot { border: 1px solid #333; padding: 15px; border-radius: 10px; text-align: center; font-size: 12px; cursor: pointer; }
        .slot.selected { background: var(--red); border-color: var(--red); }

        #bookingForm { display: none; flex-direction: column; gap: 10px; }
        input { background: #111; border: 1px solid #333; padding: 15px; color: #fff; border-radius: 10px; }
        .btn { background: var(--red); color: #fff; border: none; padding: 18px; border-radius: 10px; font-weight: 900; cursor: pointer; margin-top: 10px; }

        /* MODAL */
        #bonusModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 10000; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: #111; padding: 30px; border-radius: 20px; border: 1px solid var(--red); text-align: center; width: 100%; }
        .promo-box { border: 2px dashed var(--red); padding: 15px; margin: 20px 0; font-size: 24px; color: var(--red); }
    </style>
</head>
<body>

<div id="loader"><div id="l-val">0</div></div>

<section class="hero">
    <div class="hero-logo">
        <span>YYO</span>
        <span>KAI</span>
    </div>
    <div class="scroll-hint">ГОРТАЙ ВНИЗ ↓</div>
</section>

<div id="mainContent">
    <h2 style="margin-bottom: 20px; font-size: 14px; text-align: center;">ОБЕРИ ДАТУ ТА ЧАС</h2>
    <div class="calendar-box">
        <table id="calTable"></table>
    </div>

    <div class="slots" id="slotsGrid">
        <div class="slot" data-time="10:00">10:00</div>
        <div class="slot" data-time="13:00">13:00</div>
        <div class="slot" data-time="16:00">16:00</div>
        <div class="slot" data-time="19:00">19:00</div>
    </div>

    <form id="bookingForm">
        <p id="dateLabel" style="color:var(--red); font-size:12px; margin-bottom:10px; text-align:center;"></p>
        <input type="text" id="uName" placeholder="ІМ'Я" required>
        <input type="text" id="uPhone" value="+380" required>
        <input type="text" id="uInsta" placeholder="@INSTAGRAM" required>
        <button type="submit" class="btn">ЗАБРОНЮВАТИ</button>
    </form>
</div>

<div id="bonusModal">
    <div class="modal-content">
        <p>ЗАПИС СТВОРЕНО!</p>
        <div class="promo-box" id="promoCode">------</div>
        <p style="font-size: 10px; opacity: 0.6;">СКОПІЮЙТЕ КОД ДЛЯ ЗНИЖКИ -10%</p>
        <button class="btn" onclick="location.reload()">ЗАКРИТИ</button>
    </div>
</div>

<script>
const DB_URL = "https://yyokai-tattoo-system-default-rtdb.europe-west1.firebasedatabase.app/";
const TG_BOT_URL = "https://t.me/yyokai_ink_bot";
const TG_CHAT_ID = "1634779056";

let bookings = {}, selD = "", selT = "";

// Loader
let c = 0;
let iv = setInterval(() => {
    c += Math.floor(Math.random() * 10) + 2;
    if(c >= 100) {
        c = 100; clearInterval(iv);
        setTimeout(() => {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('mainContent').style.display = 'block';
            renderCal();
        }, 400);
    }
    document.getElementById('l-val').innerText = c;
}, 30);

function renderCal() {
    const table = document.getElementById('calTable');
    table.innerHTML = "";
    let date = 1;
    // Спрощена генерація на травень 2026 (починається з п'ятниці)
    for(let i=0; i<6; i++) {
        let tr = document.createElement('tr');
        for(let j=0; j<7; j++) {
            let td = document.createElement('td');
            if((i===0 && j<4) || date > 31) {
                td.className = "empty";
            } else {
                let currentDay = date;
                td.innerText = currentDay;
                td.onclick = () => selectDay(`2026-05-${currentDay}`, td);
                date++;
            }
            tr.appendChild(td);
        }
        table.appendChild(tr);
    }
}

function selectDay(dStr, el) {
    document.querySelectorAll('td').forEach(t => t.classList.remove('selected'));
    el.classList.add('selected');
    selD = dStr;
    document.getElementById('slotsGrid').style.display = 'grid';
    document.getElementById('bookingForm').style.display = 'none';
}

document.querySelectorAll('.slot').forEach(s => {
    s.onclick = () => {
        document.querySelectorAll('.slot').forEach(sl => sl.classList.remove('selected'));
        s.classList.add('selected');
        selT = s.dataset.time;
        document.getElementById('dateLabel').innerText = `ОБРАНО: ${selD} о ${selT}`;
        document.getElementById('bookingForm').style.display = 'flex';
    };
});

document.getElementById('bookingForm').onsubmit = async (e) => {
    e.preventDefault();
    const promo = Math.floor(100000 + Math.random() * 900000);
    const data = {
        date: selD, time: selT, promo,
        name: document.getElementById('uName').value,
        insta: document.getElementById('uInsta').value,
        phone: document.getElementById('uPhone').value
    };

    // Відправка в Firebase
    await fetch(DB_URL, { method: 'POST', body: JSON.stringify(data) });

    // Відправка в Telegram
    const msg = `⚡️ НОВИЙ ЗАПИС!\n📅 Дата: ${data.date}\n⏰ Час: ${data.time}\n👤 Ім'я: ${data.name}\n📱 Insta: ${data.insta}\n📞 Тел: ${data.phone}\n🎁 Промо: ${promo}`;
    
    await fetch(`${TG_BOT_URL}?chat_id=${TG_CHAT_ID}&text=${encodeURIComponent(msg)}`);

    document.getElementById('promoCode').innerText = promo;
    document.getElementById('bonusModal').style.display = 'flex';
};
</script>
</body>
</html>
