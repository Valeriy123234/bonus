<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YYOKAI SYSTEM</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --red: #ff0000; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Unbounded', sans-serif; }
        body { background: #000; color: #fff; line-height: 1.5; }

        /* HERO */
        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .hero-logo { font-size: 18vw; font-weight: 900; animation: jumpIn 1.2s ease-out forwards; }
        @keyframes jumpIn { from { transform: translateY(100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .arrow { margin-top: 20px; cursor: pointer; animation: pulse 2s infinite; background: none; border: none; }
        @keyframes pulse { 0%, 100% { transform: translateY(0); opacity: 0.3; } 50% { transform: translateY(10px); opacity: 1; } }

        /* CONTENT */
        .container { max-width: 450px; margin: 0 auto; padding: 20px; }
        .calendar-box { background: #111; padding: 20px; border-radius: 25px; border: 1px solid #222; }
        .cal-head { display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 12px; }
        
        table { width: 100%; border-collapse: collapse; }
        td { height: 45px; text-align: center; cursor: pointer; border-radius: 10px; }
        td.active { background: var(--red); font-weight: 900; }
        td.booked-day { opacity: 0.1; text-decoration: line-through; pointer-events: none; }

        /* SLOTS & FORM */
        .slots { display: none; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 20px; }
        .slot { background: #111; border: 1px solid #333; padding: 15px; border-radius: 15px; text-align: center; cursor: pointer; font-size: 12px; }
        .slot.selected { background: #fff; color: #000; }
        .slot.off { background: var(--red); opacity: 0.5; }

        #form-box { display: none; margin-top: 20px; }
        input { width: 100%; background: #080808; border: 1px solid #333; padding: 15px; color: #fff; border-radius: 15px; margin-bottom: 10px; outline: none; }
        .btn { width: 100%; background: var(--red); color: #fff; border: none; padding: 18px; border-radius: 15px; font-weight: 900; cursor: pointer; }

        /* ADMIN */
        #admin-panel { display: none; background: #050505; border: 2px solid var(--red); padding: 20px; border-radius: 20px; margin-top: 30px; }
        .admin-item { border-bottom: 1px solid #222; padding: 10px 0; font-size: 11px; }

        /* MODAL */
        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 999; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        .promo { font-size: 32px; color: var(--red); margin: 20px 0; font-weight: 900; }
    </style>
</head>
<body>

    <section class="hero">
        <div class="hero-logo">YYO<br>KAI</div>
        <p style="font-size: 10px; opacity: 0.5; margin-top: 20px;">ЗАПИСАТИСЬ ГОРТАЙ ВНИЗ</p>
        <button class="arrow" onclick="document.getElementById('booking-section').scrollIntoView()">
            <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5"><path d="M7 13l5 5 5-5M7 6l5 5 5-5"/></svg>
        </button>
    </section>

    <div class="container" id="booking-section">
        <div class="calendar-box">
            <div class="cal-head">
                <button onclick="moveMonth(-1)" style="color:#fff; background:none; border:none;">←</button>
                <span id="month-title"></span>
                <button onclick="moveMonth(1)" style="color:#fff; background:none; border:none;">→</button>
            </div>
            <table id="calendar"></table>
        </div>

        <div class="slots" id="slots-grid">
            <div class="slot" onclick="selSlot('10:00', this)">10:00</div>
            <div class="slot" onclick="selSlot('13:00', this)">13:00</div>
            <div class="slot" onclick="selSlot('16:00', this)">16:00</div>
            <div class="slot" onclick="selSlot('19:00', this)">19:00</div>
        </div>

        <div id="form-box">
            <input type="text" id="name" placeholder="ІМ'Я">
            <input type="text" id="insta" placeholder="@INSTAGRAM">
            <input type="text" id="phone" value="+380">
            <button class="btn" onclick="sendBooking()">ЗАБРОНЮВАТИ</button>
        </div>

        <div onclick="askAdmin()" style="margin-top:100px; opacity:0.1; font-size:8px; text-align:center;">.access_protocol</div>
        
        <div id="admin-panel">
            <h4 style="color:var(--red); font-size:12px; margin-bottom:15px;">ADMIN PANEL</h4>
            <p style="font-size:10px; margin-bottom:10px;">Клікни на слот в календарі, щоб закрити час</p>
            <div id="booking-list"></div>
        </div>
    </div>

    <div id="modal">
        <div style="border:1px solid var(--red); padding:30px; border-radius:30px; width:100%;">
            <p style="font-size:12px;">ТВОЯ ЗНИЖКА -10%</p>
            <div class="promo" id="promo-code"></div>
            <p style="font-size:10px; opacity:0.6;">ЗАПРОСИ ДРУГА — ОТРИМАЙ -20%</p>
            <button class="btn" style="margin-top:20px;" onclick="location.reload()">ЗАКРИТИ</button>
        </div>
    </div>

<script>
    const DB = "https://yyokai-tattoo-system-default-rtdb.europe-west1.firebasedatabase.app/";
    const BOT = "8747396400:AAFgsvQfGymY2SlG2slGuidFXgvbEVVmq-o";
    const CHAT = "1634779056";

    let m = new Date().getMonth(), y = new Date().getFullYear();
    let selD = "", selT = "", isAdmin = false, data = { bookings: {}, manual: {} };

    async function init() {
        const r = await fetch(DB + ".json");
        const d = await r.json() || {};
        data.bookings = d.bookings || {};
        data.manual = d.manual || {};
        render();
    }

    function render() {
        const title = document.getElementById('month-title');
        const cal = document.getElementById('calendar');
        cal.innerHTML = "";
        title.innerText = new Intl.DateTimeFormat('uk-UA', {month:'long', year:'numeric'}).format(new Date(y, m)).toUpperCase();
        
        const first = (new Date(y, m, 1).getDay() || 7) - 1;
        const days = new Date(y, m + 1, 0).getDate();
        let d = 1;

        for (let i = 0; i < 6; i++) {
            let tr = document.createElement('tr');
            for (let j = 0; j < 7; j++) {
                let td = document.createElement('td');
                if (i === 0 && j < first || d > days) { td.innerText = ""; } 
                else {
                    let dateStr = `${y}-${m+1}-${d}`;
                    td.innerText = d;
                    if (data.manual[dateStr]?.length >= 4) td.className = 'booked-day';
                    td.onclick = () => {
                        document.querySelectorAll('td').forEach(el => el.classList.remove('active'));
                        td.classList.add('active');
                        selD = dateStr;
                        showSlots(dateStr);
                    };
                    d++;
                }
                tr.appendChild(td);
            }
            cal.appendChild(tr);
            if (d > days) break;
        }
    }

    function showSlots(date) {
        document.getElementById('slots-grid').style.display = 'grid';
        document.querySelectorAll('.slot').forEach(s => {
            const time = s.innerText;
            const isOff = data.manual[date]?.includes(time);
            const isTaken = Object.values(data.bookings).some(b => b.date === date && b.time === time);
            s.className = 'slot' + (isOff || isTaken ? ' off' : '');
            s.onclick = () => isAdmin ? toggleTime(date, time) : selSlot(time, s);
        });
    }

    async function toggleTime(date, time) {
        if (!data.manual[date]) data.manual[date] = [];
        if (data.manual[date].includes(time)) data.manual[date] = data.manual[date].filter(x => x !== time);
        else data.manual[date].push(time);
        await fetch(`${DB}manual/${date}.json`, { method: 'PUT', body: JSON.stringify(data.manual[date]) });
        init();
    }

    function selSlot(t, el) {
        if (el.classList.contains('off')) return;
        document.querySelectorAll('.slot').forEach(s => s.classList.remove('selected'));
        el.classList.add('selected');
        selT = t;
        document.getElementById('form-box').style.display = 'block';
    }

    async function sendBooking() {
        const n = document.getElementById('name').value, i = document.getElementById('insta').value;
        if (!n || !i) return alert("Заповни все!");
        const promo = Math.random().toString(36).substring(7).toUpperCase();
        const b = { date: selD, time: selT, name: n, insta: i, promo };
        
        document.getElementById('promo-code').innerText = promo;
        document.getElementById('modal').style.display = 'flex';

        fetch(DB + "bookings.json", { method: 'POST', body: JSON.stringify(b) });
        fetch(`https://telegram.org{BOT}/sendMessage?chat_id=${CHAT}&text=${encodeURIComponent("🏮 ЗАПИС: "+selD+" "+selT+"\n👤 "+n+"\n📱 "+i+"\n🎁 "+promo)}`);
    }

    function askAdmin() {
        if (prompt("PASS") === "yokai123234") {
            isAdmin = true;
            document.getElementById('admin-panel').style.display = 'block';
            updateList();
        }
    }

    function updateList() {
        const box = document.getElementById('booking-list');
        box.innerHTML = "";
        Object.entries(data.bookings).forEach(([id, b]) => {
            box.innerHTML += `<div class="admin-item"><b>${b.date} | ${b.time}</b> - ${b.name} <span onclick="del('${id}')" style="color:red; float:right">X</span></div>`;
        });
    }

    async function del(id) {
        await fetch(`${DB}bookings/${id}.json`, { method: 'DELETE' });
        init(); updateList();
    }

    function moveMonth(dir) { m += dir; if(m>11){m=0;y++} if(m<0){m=11;y--} render(); }
    init();
</script>
</body>
</html>
