<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        @import url('https://googleapis.com');

        body { 
            background: #000; 
            margin: 0; 
            color: #fff;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* --- ЯПОНСЬКА МАТРИЦЯ (12%) --- */
        .matrix-bg {
            position: fixed; inset: 0; font-family: 'Noto Sans JP';
            font-size: 18px; color: #fff; opacity: 0.12;
            display: flex; justify-content: space-around; z-index: -1;
            pointer-events: none;
        }
        .matrix-column { display: flex; flex-direction: column; animation: matrixDrop 15s linear infinite; }
        @keyframes matrixDrop { from { transform: translateY(-50%); } to { transform: translateY(0%); } }

        /* --- ПРЕМІУМ МЕНЮ --- */
        header {
            position: fixed; top: 30px; right: 25px; z-index: 7000;
        }
        .burger {
            width: 30px; height: 18px;
            display: flex; flex-direction: column; justify-content: space-between;
            cursor: pointer;
        }
        .burger span { display: block; height: 2px; width: 100%; background: #fff; transition: 0.3s; }

        .nav-overlay {
            position: fixed; inset: 0; background: #000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transform: translateY(-100%); transition: 0.5s cubic-bezier(0.8, 0, 0.2, 1); z-index: 6000;
        }
        .nav-overlay.active { transform: translateY(0); }
        .nav-title { position: absolute; top: 40px; font-family: 'Cinzel'; letter-spacing: 10px; opacity: 0.3; }
        .nav-overlay a { font-size: 30px; color: #fff; text-decoration: none; margin: 15px; font-weight: 200; letter-spacing: 5px; }

        /* --- КОЛЕКЦІЯ --- */
        .container { display: flex; flex-direction: column; gap: 130px; padding: 100px 0; align-items: center; }

        .card-nft { width: 330px; transform-style: preserve-3d; perspective: 1200px; }

        /* ТВІЙ ОРИГІНАЛЬНИЙ БУТЕРБРОД */
        .artifact-stack { 
            width: 100%; height: 460px; 
            position: relative; transform-style: preserve-3d; 
        }
        
        .layer { 
            position: absolute; inset: 0; 
            background-size: contain; background-repeat: no-repeat; background-position: center; 
            pointer-events: none; 
        }

        /* Унікальні анімації з великою амплітудою */
        .anim-1 { animation: swingOni 7s infinite ease-in-out; }
        @keyframes swingOni {
            0%, 100% { transform: rotateY(-20deg) rotateX(5deg); }
            50% { transform: rotateY(20deg) rotateX(-3deg); }
        }

        .anim-2 { animation: swingKitsune 6s infinite ease-in-out; }
        @keyframes swingKitsune {
            0%, 100% { transform: translateZ(0) rotateY(10deg); }
            50% { transform: translateZ(50px) rotateY(-10deg); }
        }

        /* --- HEARTHSTONE ПЕРЕЛИВ РІДКОСТІ --- */
        .rarity-ui {
            margin: 25px 0;
            text-align: center;
            transform: translateZ(60px);
        }

        .rarity-text {
            font-family: 'Cinzel';
            font-size: 20px;
            letter-spacing: 10px;
            font-weight: 900;
            background: linear-gradient(90deg, #ff0000, #ffee00, #00ff00, #00ffff, #ff00ff, #ff0000);
            background-size: 300% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: hsColor 4s linear infinite;
        }
        @keyframes hsColor { to { background-position: 300% center; } }

        /* --- КНОПКА ПРИМІРЯТИ --- */
        .btn-try {
            margin-top: 30px;
            display: block; width: 100%; padding: 20px 0;
            background: #fff; color: #000;
            font-size: 14px; font-weight: 900; letter-spacing: 5px;
            text-align: center; text-decoration: none;
            box-shadow: 0 10px 30px rgba(255,255,255,0.2);
        }
        .btn-try:active { transform: scale(0.95); }

    </style>
</head>
<body>

    <div class="matrix-bg" id="matrix"></div>

    <header>
        <div class="burger" id="btnMenu">
            <span></span><span></span><span></span>
        </div>
    </header>

    <nav class="nav-overlay" id="menuFs">
        <div class="nav-title">MENU</div>
        <a href="#">ГОЛОВНА</a>
        <a href="#">ЗАПИСАТИСЬ</a>
    </nav>

    <div class="container">

        <!-- КАРТКА 01: ПОВНИЙ ПЕРЕЛІК ТВОЇХ ФАЙЛІВ -->
        <div class="card-nft">
            <a href="primerka.html" class="artifact-stack anim-1">
                <div class="layer" style="transform: translateZ(0px); background-image: url('01.PNG');"></div>
                <div class="layer" style="transform: translateZ(4px); background-image: url('01.PNG'); opacity: 0.3;"></div>
                <div class="layer" style="transform: translateZ(10px); background-image: url('02.PNG');"></div> <!-- ТВІЙ ЕСКІЗ -->
                <div class="layer" style="transform: translateZ(14px); background-image: url('01.PNG'); opacity: 0.5;"></div>
                <div class="layer" style="transform: translateZ(18px); background-image: url('01.PNG');"></div>
            </a>
            
            <div class="rarity-ui">
                <span class="rarity-text">LEGENDARY</span>
            </div>

            <div style="text-align: center;">
                <h2 style="margin:0; letter-spacing:4px; font-size:24px;">ONI MASK</h2>
                <a href="primerka.html" class="btn-try">ПРИМІРЯТИ</a>
            </div>
        </div>

        <!-- КАРТКА 02 -->
        <div class="card-nft">
            <a href="primerka.html" class="artifact-stack anim-2">
                <div class="layer" style="transform: translateZ(0px); background-image: url('03.PNG');"></div>
                <div class="layer" style="transform: translateZ(4px); background-image: url('03.PNG'); opacity: 0.3;"></div>
                <div class="layer" style="transform: translateZ(10px); background-image: url('04.PNG');"></div>
                <div class="layer" style="transform: translateZ(14px); background-image: url('03.PNG'); opacity: 0.5;"></div>
                <div class="layer" style="transform: translateZ(18px); background-image: url('03.PNG');"></div>
            </a>

            <div class="rarity-ui">
                <span class="rarity-text" style="background: linear-gradient(90deg, #bf953f, #fcf6ba, #b38728, #bf953f); background-size: 200% auto;">MYTHIC</span>
            </div>

            <div style="text-align: center;">
                <h2 style="margin:0; letter-spacing:4px; font-size:24px;">KITSUNE</h2>
                <a href="primerka.html" class="btn-try">ПРИМІРЯТИ</a>
            </div>
        </div>

    </div>

    <script>
        // Матриця
        const matrix = document.getElementById('matrix');
        const chars = "般若狐霊魂天人地龍神鬼";
        for (let i = 0; i < 12; i++) {
            const col = document.createElement('div');
            col.className = 'matrix-column';
            col.style.animationDuration = (10 + Math.random() * 10) + 's';
            let content = "";
            for (let j = 0; j < 60; j++) { content += chars[Math.floor(Math.random() * chars.length)] + "<br>"; }
            col.innerHTML = content + content;
            matrix.appendChild(col);
        }

        // Меню
        const btn = document.getElementById('btnMenu');
        const menu = document.getElementById('menuFs');
        btn.onclick = () => {
            menu.classList.toggle('active');
            document.body.style.overflow = menu.classList.contains('active') ? 'hidden' : 'auto';
        }
    </script>
</body>
</html>
