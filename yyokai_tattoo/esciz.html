<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; perspective: 2000px; margin: 0; overflow: hidden; }

        .artifact-3d {
            width: 350px;
            height: 500px;
            position: relative;
            transform-style: preserve-3d;
            animation: rotateFull 12s infinite linear;
        }

        @keyframes rotateFull {
            0% { transform: rotateY(0deg) rotateX(5deg); }
            100% { transform: rotateY(360deg) rotateX(5deg); }
        }

        /* ШАР РАМКИ */
        .frame-layer {
            position: absolute;
            inset: 0;
            background: url('022.PNG') no-repeat center/contain;
            transform-style: preserve-3d;
            pointer-events: none;
            /* Важливо для Safari/Chrome */
            -webkit-backface-visibility: visible;
            backface-visibility: visible;
        }

        /* ЕСКІЗ */
        .sketch-layer {
            position: absolute;
            inset: 0; /* Тепер 0, бо маска сама все обріже */
            z-index: 5;
            transform-style: preserve-3d;
            /* Маскування */
            -webkit-mask-image: url('022.PNG');
            mask-image: url('022.PNG');
            -webkit-mask-size: contain;
            mask-size: contain;
            -webkit-mask-repeat: no-repeat;
            mask-position: center;
        }

        .sketch-layer img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block; /* Гарантує видимість */
        }

        /* СКЛО (строго всередині рамки) */
        .glass-pane {
            position: absolute;
            inset: 50px; /* Збільшив відступ, щоб не вилазило за краї */
            background: rgba(0, 242, 255, 0.05);
            backdrop-filter: blur(2px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transform-style: preserve-3d;
            pointer-events: none;
        }

        .yokai-text {
            position: absolute;
            color: rgba(0, 0, 0, 0.9);
            font-size: 50px;
            font-family: 'Arial Black';
            letter-spacing: 10px;
            transform: rotateY(180deg); /* Для задньої сторони */
            white-space: nowrap;
        }

        .glow {
            position: absolute;
            inset: -100px;
            background: radial-gradient(circle, rgba(0, 242, 255, 0.3) 0%, transparent 70%);
            filter: blur(60px);
            transform: translateZ(-100px);
        }
    </style>
</head>
<body>

    <div class="artifact-3d" id="artifact">
        <div class="glow"></div>
    </div>

    <script>
        const container = document.getElementById('artifact');
        const layers = 30;

        for (let i = 0; i < layers; i++) {
            // Створюємо фізичний шар рамки
            const f = document.createElement('div');
            f.className = 'frame-layer';
            f.style.transform = `translateZ(${i}px)`;
            container.appendChild(f);

            // Вставляємо ескіз посередині "пирога"
            if (i === 15) {
                const s = document.createElement('div');
                s.className = 'sketch-layer';
                s.style.transform = `translateZ(${i}px)`;
                // ПЕРЕВІР, ЩО ФАЙЛ 011.PNG ІСНУЄ
                s.innerHTML = `<img src="011.PNG" onerror="this.style.display='none'; console.log('Ескіз не знайдено')">`;
                container.appendChild(s);
            }

            // Додаємо скло тільки на декількох шарах, щоб не перевантажувати
            if (i === 5 || i === 25) {
                const g = document.createElement('div');
                g.className = 'glass-pane';
                g.style.transform = `translateZ(${i}px)`;
                container.appendChild(g);
            }
        }

        // Логотип на самому останньому шарі ззаду
        const logo = document.createElement('div');
        logo.className = 'yokai-text';
        logo.style.transform = `translateZ(-2px) rotateY(180deg)`;
        logo.innerText = 'YYOKAI';
        container.appendChild(logo);
    </script>
</body>
</html>
