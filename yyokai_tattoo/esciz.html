<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        @import url('https://googleapis.com');

        body { 
            background: #000; 
            margin: 0; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            min-height: 100vh; 
            perspective: 1500px; 
            font-family: 'Bebas Neue', cursive;
        }

        .artifact-grid {
            display: flex;
            flex-direction: column;
            gap: 120px;
            padding: 60px 0;
            width: 100%;
        }

        .artifact-container {
            position: relative;
            width: 250px; 
            height: 360px;
            margin: 0 auto;
            transform-style: preserve-3d;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            /* Відгук на дотик для мобілок */
            -webkit-tap-highlight-color: transparent;
        }

        .artifact-container:active .artifact {
            transform: scale(0.92) rotateY(0deg); /* Ефект натискання */
            transition: 0.1s;
        }

        .artifact {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            animation: mobileSwing 5s infinite ease-in-out;
            transition: transform 0.5s ease;
        }

        @keyframes mobileSwing {
            0%, 100% { transform: rotateY(-10deg) rotateX(2deg); }
            50% { transform: rotateY(10deg) rotateX(-2deg); }
        }

        .layer {
            position: absolute; 
            inset: 0;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            pointer-events: none;
        }

        /* КНОПКА-ПІДКАЗКА (ІНТУЇТИВНО) */
        .action-btn {
            margin-top: 20px;
            padding: 8px 30px;
            background: rgba(0, 242, 255, 0.1);
            border: 1px solid #00f2ff;
            color: #00f2ff;
            font-size: 16px;
            letter-spacing: 2px;
            border-radius: 2px;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
            animation: pulseBtn 2s infinite;
        }

        @keyframes pulseBtn {
            0%, 100% { opacity: 0.6; box-shadow: 0 0 5px #00f2ff; }
            50% { opacity: 1; box-shadow: 0 0 20px #00f2ff; }
        }

        .rarity {
            font-size: 12px;
            color: #444;
            letter-spacing: 3px;
            margin-top: 10px;
        }

        .glow {
            position: absolute;
            bottom: 60px;
            width: 150px;
            height: 30px;
            background: rgba(0, 242, 255, 0.3);
            filter: blur(25px);
            z-index: -1;
        }
    </style>
</head>
<body>

<div class="artifact-grid">

    <!-- КАРТКА №1 -->
    <a href="page1.html" class="artifact-container">
        <div class="artifact">
            <!-- 5 шарів для об'єму -->
            <div class="layer" style="transform: translateZ(0px); background-image: url('022.PNG');"></div>
            <div class="layer" style="transform: translateZ(2px); background-image: url('022.PNG');"></div>
            <!-- Ескіз по центру -->
            <div class="layer" style="transform: translateZ(4px); background-image: url('023.PNG');"></div>
            <div class="layer" style="transform: translateZ(6px); background-image: url('022.PNG');"></div>
            <div class="layer" style="transform: translateZ(8px); background-image: url('022.PNG');"></div>
        </div>
        
        <div class="rarity">LEGENDARY ARTIFACT</div>
        <div class="action-btn">BOOK NOW</div> <!-- Кнопка для інтуїтивності -->
        <div class="glow"></div>
    </a>

</div>

</body>
</html>
