<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        @import url('https://googleapis.com');

        body { 
            background: #000; 
            margin: 0; 
            color: #fff;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* --- ЧЕРВОНА МАТРИЦЯ (Підвищена прозорість ~18-20%) --- */
        .matrix-bg {
            position: fixed; inset: 0; font-family: 'Noto Sans JP';
            font-size: 18px; color: #ff0000; opacity: 0.18; 
            display: flex; justify-content: space-around; z-index: -1;
            pointer-events: none;
        }
        .matrix-column { display: flex; flex-direction: column; animation: matrixDrop 10s linear infinite; }
        @keyframes matrixDrop { from { transform: translateY(-50%); } to { transform: translateY(0%); } }

        /* --- UI: MENU (БУТЕРБРОД) --- */
        header { position: fixed; top: 35px; right: 25px; z-index: 7000; }
        .burger { 
            width: 32px; height: 16px; 
            display: flex; flex-direction: column; justify-content: space-between; 
            cursor: pointer; 
        }
        .burger span { 
            display: block; height: 2px; width: 100%; 
            background: #fff; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            box-shadow: 0 0 8px rgba(255,255,255,0.5);
        }
        .burger.active span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
        .burger.active span:nth-child(2) { opacity: 0; transform: scale(0); }
        .burger.active span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

        .nav-overlay {
            position: fixed; inset: 0; background: radial-gradient(circle at 90% 10%, #1a0000 0%, #000 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            opacity: 0; visibility: hidden; transition: 0.5s; z-index: 6000;
        }
        .nav-overlay.active { opacity: 1; visibility: visible; }
        .nav-overlay a { font-size: 32px; color: #fff; text-decoration: none; margin: 20px; font-weight: 900; letter-spacing: 8px; text-transform: uppercase; }

        /* --- КАРТКИ --- */
        .container { display: flex; flex-direction: column; gap: 140px; padding: 120px 0; align-items: center; }

        .nft-card {
            width: 320px; height: 450px;
            position: relative; transform-style: preserve-3d;
            display: block; text-decoration: none;
        }

        /* Агресивні анімації */
        .anim-oni { animation: moveOni 6s infinite ease-in-out; }
        @keyframes moveOni { 0%, 100% { transform: rotateY(-20deg) rotateX(10deg); } 50% { transform: rotateY(20deg) rotateX(-5deg); } }

        .anim-kitsune { animation: moveKitsune 5s infinite ease-in-out; }
        @keyframes moveKitsune { 0%, 100% { transform: translateZ(0) translateY(0); } 50% { transform: translateZ(60px) translateY(-30px); } }

        .layer {
            position: absolute; inset: 0; background-size: contain; 
            background-repeat: no-repeat; background-position: center;
        }

        /* --- ЕПІЧНА ГОЛОГРАФІЧНА РІДКІСТЬ --- */
        .rarity-wrapper {
            margin: 25px 0; text-align: center;
            position: relative; transform: translateZ(80px);
        }

        .rarity-holo {
            font-family: 'Cinzel'; font-size: 24px; font-weight: 900; letter-spacing: 10px;
            position: relative; display: inline-block;
            color: rgba(255,255,255,0.9);
            text-transform: uppercase;
        }

        /* Ефект кристалічного відблиску */
        .rarity-holo::before {
            content: attr(data-text);
            position: absolute; inset: 0;
            background: linear-gradient(110deg, transparent 40%, rgba(255,255,255,0.8) 50%, transparent 60%);
            background-size: 200% 100%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: holoShine 3s infinite;
            z-index: 1;
        }

        /* Тінь/Сяйво за текстом */
        .rarity-holo::after {
            content: attr(data-text);
            position: absolute; inset: 0;
            z-index: -1;
            filter: blur(12px);
            opacity: 0.7;
            animation: neonPulse 2s infinite alternate;
        }

        .legendary::after { background: #ff0000; -webkit-background-clip: text; }
        .mythic::after { background: #ffcc00; -webkit-background-clip: text; }

        @keyframes holoShine { 0% { background-position: 150% 0; } 100% { background-position: -50% 0; } }
        @keyframes neonPulse { from { transform: scale(1); opacity: 0.4; } to { transform: scale(1.2); opacity: 0.8; } }

        /* --- КНОПКА ПРИМІРЯТИ --- */
        .btn-try {
            margin-top: 35px; display: block; width: 100%; padding: 22px 0;
            background: #fff; color: #000; font-size: 14px; font-weight: 900;
            letter-spacing: 6px; text-transform: uppercase; text-align: center;
            text-decoration: none; border: none;
            box-shadow: 0 0 30px rgba(255,255,255,0.2);
        }
        .btn-try:active { background: #ff0000; color: #fff; transform: scale(0.95); }

    </style>
</head>
<body>

    <div class="matrix-bg" id="matrix"></div>

    <header>
        <div class="burger" id="burger">
            <span></span><span></span><span></span>
        </div>
    </header>

    <nav class="nav-overlay" id="nav">
        <div style="font-family:'Cinzel'; font-size:10px; opacity:0.3; margin-bottom:50px; letter-spacing:15px;">YOKAI SYSTEM</div>
        <a href="#">ГОЛОВНА</a>
        <a href="#">ЗАПИСАТИСЬ</a>
        <a href="#">АРХІВ</a>
    </nav>

    <div class="container">

        <!-- КАРТКА 1 -->
        <div style="width: 320px;">
            <a href="primerka.html" class="nft-card anim-oni">
                <div class="layer" style="transform: translateZ(0px); background-image: url('01.PNG');"></div>
                <div class="layer" style="transform: translateZ(4px); background-image: url('01.PNG'); opacity: 0.2;"></div>
                <div class="layer" style="transform: translateZ(12px); background-image: url('02.PNG');"></div>
                <div class="layer" style="transform: translateZ(18px); background-image: url('01.PNG'); opacity: 0.4;"></div>
                <div class="layer" style="transform: translateZ(24px); background-image: url('01.PNG');"></div>
            </a>
            <div class="rarity-wrapper">
                <span class="rarity-holo legendary" data-text="LEGENDARY">LEGENDARY</span>
            </div>
            <h2 style="text-align:center; letter-spacing:6px; font-size:26px; margin:0; font-weight:900;">ONI CORE</h2>
            <a href="primerka.html" class="btn-try">ПРИМІРЯТИ</a>
        </div>

        <!-- КАРТКА 2 -->
        <div style="width: 320px;">
            <a href="primerka.html" class="nft-card anim-kitsune">
                <div class="layer" style="transform: translateZ(0px); background-image: url('03.PNG');"></div>
                <div class="layer" style="transform: translateZ(4px); background-image: url('03.PNG'); opacity: 0.2;"></div>
                <div class="layer" style="transform: translateZ(12px); background-image: url('04.PNG');"></div>
                <div class="layer" style="transform: translateZ(18px); background-image: url('03.PNG'); opacity: 0.4;"></div>
                <div class="layer" style="transform: translateZ(24px); background-image: url('03.PNG');"></div>
            </a>
            <div class="rarity-wrapper">
                <span class="rarity-holo mythic" data-text="MYTHIC">MYTHIC</span>
            </div>
            <h2 style="text-align:center; letter-spacing:6px; font-size:26px; margin:0; font-weight:900;">KITSUNE</h2>
            <a href="primerka.html" class="btn-try">ПРИМІРЯТИ</a>
        </div>

    </div>

    <script>
        const matrix = document.getElementById('matrix');
        const chars = "般若狐霊魂天人地龍神鬼";
        for (let i = 0; i < 14; i++) {
            const col = document.createElement('div');
            col.className = 'matrix-column';
            col.style.animationDuration = (8 + Math.random() * 10) + 's';
            let content = "";
            for (let j = 0; j < 60; j++) { content += chars[Math.floor(Math.random() * chars.length)] + "<br>"; }
            col.innerHTML = content + content;
            matrix.appendChild(col);
        }

        const burger = document.getElementById('burger');
        const nav = document.getElementById('nav');
        burger.onclick = () => {
            burger.classList.toggle('active');
            nav.classList.toggle('active');
            document.body.style.overflow = nav.classList.contains('active') ? 'hidden' : 'auto';
        };
    </script>
</body>
</html>
