<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YYOKAI Collection</title>
    <style>
        body { 
            background: #000; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            min-height: 100vh; 
            perspective: 2000px; 
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* СІТКА ДЛЯ ВСІХ РАМОК */
        .artifact-grid {
            display: grid;
            /* Автоматично підлаштовує кількість колонок залежно від ширини екрану */
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 120px 40px;
            padding: 80px 20px;
            width: 100%;
            max-width: 1200px;
            justify-items: center;
        }

        .artifact-container {
            position: relative;
            width: 260px; 
            height: 380px;
            transform-style: preserve-3d;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* САМА РАМКА - ОБЕРТАННЯ */
        .artifact {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            animation: rotate 18s infinite linear;
            cursor: pointer;
            transition: 0.3s;
        }

        .artifact:hover {
            filter: brightness(1.2);
        }

        @keyframes rotate {
            from { transform: rotateY(0deg) rotateX(5deg); }
            to { transform: rotateY(360deg) rotateX(5deg); }
        }

        .layer {
            position: absolute; inset: 0;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            pointer-events: none;
            backface-visibility: visible;
        }

        /* ШАР СКЛА З БЛІКОМ */
        .glass-layer {
            position: absolute;
            inset: 25px;
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 60%);
            transform: translateZ(5px);
            z-index: 4;
            pointer-events: none;
        }

        /* ЗАДНЯ СТОРОНА (YYOKAI) */
        .back-glass {
            position: absolute; inset: 0;
            background: rgba(0, 0, 0, 0.95);
            transform: rotateY(180deg) translateZ(-1px);
            display: flex; justify-content: center; align-items: center;
            backface-visibility: hidden;
            /* Обрізка за формою порожньої рамки */
            -webkit-mask: inherit; 
            mask: inherit;
        }
        .logo { color: #111; font-size: 32px; font-family: sans-serif; font-weight: 900; letter-spacing: 6px; transform: scaleX(-1); }

        /* СТАТИЧНА ПЛАШКА РІДКОСТІ */
        .rarity-static {
            margin-top: 20px;
            color: #00f2ff;
            font-family: 'Arial Black', sans-serif;
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-shadow: 0 0 10px #00f2ff;
            background: rgba(0, 242, 255, 0.05);
            padding: 6px 20px;
            border: 1px solid rgba(0, 242, 255, 0.3);
            border-radius: 2px;
            transform: translateZ(20px) rotateX(10deg);
            pointer-events: none;
            white-space: nowrap;
        }

        /* СТАТИЧНЕ СЯЙВО ЗНИЗУ */
        .glow {
            position: absolute;
            bottom: 60px;
            width: 200px;
            height: 40px;
            background: radial-gradient(circle, rgba(0, 242, 255, 0.3), transparent 70%);
            filter: blur(30px);
            z-index: -1;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div class="artifact-grid">

    <!-- ========================================== -->
    <!-- ПОЧАТОК КАРТКИ (Скопіюй цей блок для нової рамки) -->
    <div class="artifact-container">
        <a href="page1.html" style="text-decoration:none; width:100%; height:100%;">
            <div class="artifact">
                <div class="glass-layer"></div>
                
                <!-- Задній шар + ЛОГО -->
                <div class="layer" style="transform: translateZ(0px); background-image: url('022.PNG');">
                    <div class="back-glass" style="-webkit-mask: url('022.PNG') no-repeat center/contain; mask: url('022.PNG') no-repeat center/contain;">
                        <div class="logo">YYOKAI</div>
                    </div>
                </div>
                
                <!-- Середні шари для об'єму (порожня рамка) -->
                <div class="layer" style="transform: translateZ(2px); background-image: url('022.PNG');"></div>
                
                <!-- ЦЕНТРАЛЬНИЙ ШАР (Рамка з ескізом 023.PNG) -->
                <div class="layer" style="transform: translateZ(4px); background-image: url('023.PNG');"></div>
                
                <!-- Передні шари для об'єму (порожня рамка) -->
                <div class="layer" style="transform: translateZ(6px); background-image: url('022.PNG');"></div>
            </div>
        </a>
        
        <!-- Текст рідкості (можна змінювати: LEGENDARY, EPIC, RARE) -->
        <div class="rarity-static">LEGENDARY QUALITY</div>
        
        <!-- Сяйво під цією рамкою -->
        <div class="glow"></div>
    </div>
    <!-- КІНЕЦЬ КАРТКИ -->
    <!-- ========================================== -->


    <!-- МІСЦЕ ДЛЯ НАСТУПНОЇ КАРТКИ (Встав копію сюди) -->


</div>

</body>
</html>
