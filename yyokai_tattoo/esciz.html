<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        @import url('https://googleapis.com');

        body { 
            background: #000; 
            margin: 0; 
            color: #fff;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* --- ЧЕРВОНА МАТРИЦЯ (10%) --- */
        .matrix-bg {
            position: fixed; inset: 0; font-family: 'Noto Sans JP';
            font-size: 16px; color: #ff0000; opacity: 0.1; /* 10% прозорості */
            display: flex; justify-content: space-around; z-index: -1;
            pointer-events: none;
        }
        .matrix-column { display: flex; flex-direction: column; animation: matrixDrop 15s linear infinite; }
        @keyframes matrixDrop { from { transform: translateY(-50%); } to { transform: translateY(0%); } }

        /* --- КНОПКА МЕНЮ З АНІМАЦІЄЮ --- */
        header { position: fixed; top: 30px; right: 25px; z-index: 7000; }
        .burger { 
            width: 30px; height: 20px; 
            display: flex; flex-direction: column; justify-content: space-between; 
            cursor: pointer; 
        }
        .burger span { 
            display: block; height: 2px; width: 100%; 
            background: #fff; transition: all 0.4s cubic-bezier(0.68, -0.6, 0.32, 1.6); 
        }

        /* Анімація перетворення в Хрестик */
        .burger.active span:nth-child(1) { transform: translateY(9px) rotate(45deg); }
        .burger.active span:nth-child(2) { opacity: 0; transform: translateX(-20px); }
        .burger.active span:nth-child(3) { transform: translateY(-9px) rotate(-45deg); }

        .nav-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.98);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            clip-path: circle(0% at 90% 5%); transition: 0.6s ease-in-out; z-index: 6000;
        }
        .nav-overlay.active { clip-path: circle(150% at 90% 5%); }
        .nav-overlay a { font-size: 32px; color: #fff; text-decoration: none; margin: 15px; letter-spacing: 5px; font-weight: 900; }

        /* --- КАРТКИ --- */
        .container { display: flex; flex-direction: column; gap: 120px; padding: 100px 0; align-items: center; }

        .artifact-card {
            width: 320px; height: 450px;
            position: relative; transform-style: preserve-3d;
            display: block; text-decoration: none;
        }

        /* Різні анімації для рамок */
        .anim-1 { animation: swingOni 8s infinite ease-in-out; }
        @keyframes swingOni { 0%, 100% { transform: rotateY(-15deg) rotateX(5deg); } 50% { transform: rotateY(15deg) rotateX(-2deg); } }

        .anim-2 { animation: driftKitsune 6s infinite ease-in-out; }
        @keyframes driftKitsune { 0%, 100% { transform: translateY(0) rotateY(5deg); } 50% { transform: translateY(-25px) rotateY(-5deg); } }

        .layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-size: contain; background-repeat: no-repeat; background-position: center;
        }

        /* --- ЕПІЧНА РІДКІСТЬ (Game UI Style) --- */
        .rarity-ui {
            margin: 25px 0; text-align: center;
            position: relative; transform: translateZ(50px);
        }

        .rarity-frame {
            display: inline-block;
            padding: 8px 25px;
            border: 1px solid;
            position: relative;
            background: rgba(0,0,0,0.6);
            overflow: hidden;
        }

        .legendary-ui { border-color: #ff0000; box-shadow: 0 0 15px rgba(255, 0, 0, 0.4); }
        .mythic-ui { border-color: #ffac00; box-shadow: 0 0 15px rgba(255, 172, 0, 0.4); }

        .rarity-text {
            font-family: 'Cinzel'; font-size: 18px; font-weight: 900; letter-spacing: 6px;
            background: linear-gradient(90deg, #fff, #aaa, #fff);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: textShine 3s infinite linear;
        }

        @keyframes textShine { to { background-position: 200% center; } }

        /* Декоративні кутики */
        .rarity-frame::before, .rarity-frame::after {
            content: ''; position: absolute; width: 5px; height: 5px; background: #fff;
        }
        .rarity-frame::before { top: 0; left: 0; }
        .rarity-frame::after { bottom: 0; right: 0; }

        /* --- КНОПКА (ПРИМІРЯТИ) --- */
        .btn-try {
            margin-top: 25px; display: block; width: 100%; padding: 22px 0;
            background: #fff; color: #000; font-size: 16px; font-weight: 900;
            letter-spacing: 5px; text-transform: uppercase; text-align: center;
            text-decoration: none; transition: 0.2s;
        }
        .btn-try:active { background: #ff0000; color: #fff; transform: scale(0.95); }

    </style>
</head>
<body>

    <div class="matrix-bg" id="matrix"></div>

    <header>
        <div class="burger" id="burgerBtn">
            <span></span><span></span><span></span>
        </div>
    </header>

    <nav class="nav-overlay" id="navMenu">
        <a href="#">ГОЛОВНА</a>
        <a href="#">ЗАПИСАТИСЬ</a>
        <a href="#">ПОРТФОЛІО</a>
    </nav>

    <div class="container">

        <!-- КАРТКА 1 -->
        <div style="width: 320px;">
            <a href="primerka.html" class="artifact-card anim-1">
                <div class="layer" style="transform: translateZ(0px); background-image: url('01.PNG');"></div>
                <div class="layer" style="transform: translateZ(4px); background-image: url('01.PNG'); opacity: 0.2;"></div>
                <div class="layer" style="transform: translateZ(10px); background-image: url('02.PNG');"></div> <!-- ЕСКІЗ -->
                <div class="layer" style="transform: translateZ(14px); background-image: url('01.PNG'); opacity: 0.4;"></div>
                <div class="layer" style="transform: translateZ(18px); background-image: url('01.PNG');"></div>
            </a>
            <div class="rarity-ui">
                <div class="rarity-frame legendary-ui">
                    <span class="rarity-text">LEGENDARY</span>
                </div>
            </div>
            <h2 style="text-align:center; letter-spacing:4px; font-size:24px; margin:0;">ONI MASK</h2>
            <a href="primerka.html" class="btn-try">ПРИМІРЯТИ</a>
        </div>

        <!-- КАРТКА 2 -->
        <div style="width: 320px;">
            <a href="primerka.html" class="artifact-card anim-2">
                <div class="layer" style="transform: translateZ(0px); background-image: url('03.PNG');"></div>
                <div class="layer" style="transform: translateZ(4px); background-image: url('03.PNG'); opacity: 0.2;"></div>
                <div class="layer" style="transform: translateZ(10px); background-image: url('04.PNG');"></div>
                <div class="layer" style="transform: translateZ(14px); background-image: url('03.PNG'); opacity: 0.4;"></div>
                <div class="layer" style="transform: translateZ(18px); background-image: url('03.PNG');"></div>
            </a>
            <div class="rarity-ui">
                <div class="rarity-frame mythic-ui">
                    <span class="rarity-text">MYTHIC</span>
                </div>
            </div>
            <h2 style="text-align:center; letter-spacing:4px; font-size:24px; margin:0;">KITSUNE</h2>
            <a href="primerka.html" class="btn-try">ПРИМІРЯТИ</a>
        </div>

    </div>

    <script>
        // Червона матриця
        const matrix = document.getElementById('matrix');
        const chars = "般若狐霊魂天人地龍神鬼";
        for (let i = 0; i < 12; i++) {
            const col = document.createElement('div');
            col.className = 'matrix-column';
            col.style.animationDuration = (12 + Math.random() * 8) + 's';
            let content = "";
            for (let j = 0; j < 60; j++) { content += chars[Math.floor(Math.random() * chars.length)] + "<br>"; }
            col.innerHTML = content + content;
            matrix.appendChild(col);
        }

        // Анімація Бургера та Меню
        const burger = document.getElementById('burgerBtn');
        const menu = document.getElementById('navMenu');

        burger.onclick = () => {
            burger.classList.toggle('active');
            menu.classList.toggle('active');
            document.body.style.overflow = menu.classList.contains('active') ? 'hidden' : 'auto';
        };
    </script>
</body>
</html>
