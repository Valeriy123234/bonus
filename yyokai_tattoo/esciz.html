<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <style>
        :root {
            --frame-color: #4a0404; /* Темно-червоне лаковане дерево */
            --gold: #c5a059;
        }

        body { background: #050505; display: flex; justify-content: center; height: 100vh; align-items: center; perspective: 2000px; margin: 0; }

        .nft-artifact {
            width: 350px;
            height: 500px;
            position: relative;
            transform-style: preserve-3d;
            animation: slowRotate 8s ease-in-out infinite;
        }

        @keyframes slowRotate {
            0%, 100% { transform: rotateY(-10deg) rotateX(5deg); }
            50% { transform: rotateY(10deg) rotateX(-5deg); }
        }

        /* Об'ємна рама з текстурою */
        .frame-body {
            position: absolute;
            inset: 0;
            background: var(--frame-color);
            /* Текстура старого дерева або металу */
            background-image: url('https://transparenttextures.com');
            border: 15px solid #1a1a1a;
            border-image: linear-gradient(#333, #000, #333) 1;
            box-shadow: 
                0 0 40px rgba(0,0,0,1),
                inset 0 0 60px rgba(130, 0, 0, 0.5);
            transform: translateZ(0px);
        }

        /* МАСКА ХАНЬЯ (Центральний елемент) */
        .hanya-mask {
            position: absolute;
            top: -40px; /* Виступає зверху */
            left: 50%;
            transform: translateX(-50%) translateZ(50px); /* Винесена вперед */
            width: 120px;
            height: auto;
            filter: drop-shadow(0 20px 30px rgba(0,0,0,0.8));
            z-index: 10;
        }

        /* Контент ескізу "всередині" */
        .sketch-vault {
            position: absolute;
            inset: 30px;
            background: #000;
            border: 2px solid var(--gold);
            overflow: hidden;
            transform: translateZ(-20px); /* Втиснутий всередину */
        }

        .sketch-vault img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.7;
            filter: contrast(1.2) sepia(0.3);
        }

        /* Сяйво очей маски або рамки */
        .glow-eyes {
            position: absolute;
            width: 100%;
            height: 100%;
            box-shadow: inset 0 0 100px rgba(255, 0, 0, 0.2);
            pointer-events: none;
        }

    </style>
</head>
<body>

    <div class="nft-artifact">
        <!-- ТУТ МАЄ БУТИ ТВОЄ PNG З МАСКОЮ ХАНЬЯ -->
        <img src="222.PNG" class="hanya-mask" alt="Hanya">

        <div class="frame-body">
            <div class="sketch-vault">
                <img src="111.PNG" alt="Sketch">
                <div class="glow-eyes"></div>
            </div>
        </div>
    </div>

</body>
</html>
