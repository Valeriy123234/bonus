<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        @import url('https://googleapis.com');

        :root {
            --red: #ff003c;
            --gold: #ffac00;
            --bg: #050505;
        }

        body { 
            background-color: var(--bg);
            /* Текстура рисового паперу на фоні */
            background-image: url('https://transparenttextures.com');
            margin: 0; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            min-height: 100vh; 
            perspective: 2000px; 
            overflow-x: hidden;
            font-family: 'Inter', sans-serif;
            color: #fff;
        }

        /* --- UI: HEADER --- */
        header {
            position: fixed;
            top: 0; width: 100%;
            padding: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 5000;
            mix-blend-mode: difference;
        }

        .logo { font-family: 'Syncopate'; font-weight: 700; font-size: 14px; letter-spacing: 5px; }

        .burger {
            width: 30px; height: 12px;
            display: flex; flex-direction: column; justify-content: space-between;
            cursor: pointer;
        }
        .burger span { display: block; height: 1px; width: 100%; background: #fff; transition: 0.4s; }
        .open span:nth-child(1) { transform: translateY(5.5px) rotate(45deg); }
        .open span:nth-child(2) { transform: translateY(-5.5px) rotate(-45deg); }

        /* --- NFT CARD --- */
        .collection-grid {
            display: flex; flex-direction: column;
            gap: 160px; padding: 120px 0;
        }

        .nft-container {
            position: relative;
            width: 340px;
            transform-style: preserve-3d;
        }

        /* Стек шарів з жорстким паралаксом */
        .artifact-box {
            position: relative;
            width: 100%;
            height: 480px;
            transform-style: preserve-3d;
            transition: 0.6s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .layer {
            position: absolute;
            inset: 0;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            pointer-events: none;
        }

        /* Анімації */
        .anim-float { animation: nftFloat 6s infinite ease-in-out; }
        @keyframes nftFloat {
            0%, 100% { transform: translateY(0) rotateX(2deg); }
            50% { transform: translateY(-25px) rotateX(-5deg); }
        }

        .anim-glitch { animation: nftGlitch 8s infinite ease-in-out; }
        @keyframes nftGlitch {
            0%, 100% { transform: rotateY(-10deg); }
            50% { transform: rotateY(10deg) scale(1.05); }
        }

        /* --- INFO PANEL (UI) --- */
        .info-panel {
            margin-top: -20px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-top: none;
            position: relative;
            z-index: 10;
        }

        .rarity-badge {
            font-family: 'Syncopate';
            font-size: 8px;
            padding: 4px 8px;
            border: 1px solid;
            display: inline-block;
            margin-bottom: 15px;
            letter-spacing: 2px;
        }

        .neon-red .rarity-badge { color: var(--red); border-color: var(--red); box-shadow: 0 0 10px rgba(255,0,60,0.3); }
        .neon-gold .rarity-badge { color: var(--gold); border-color: var(--gold); box-shadow: 0 0 10px rgba(255,172,0,0.3); }

        .title-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .nft-title {
            font-family: 'Inter';
            font-weight: 900;
            font-size: 24px;
            margin: 0;
            text-transform: uppercase;
        }

        .jp-id {
            font-family: 'Noto Sans JP';
            font-size: 14px;
            opacity: 0.1;
            position: absolute;
            right: 10px; top: 10px;
        }

        /* --- КНОПКА ЗАПИСУ --- */
        .cta-button {
            margin-top: 20px;
            width: 100%;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            font-family: 'Syncopate';
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 3px;
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
            transition: 0.4s;
        }

        .cta-button::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: 0.5s;
        }

        .cta-button:active::before { left: 100%; }
        .cta-button:active { background: #fff; color: #000; }

        /* МЕНЮ НАВІГАЦІЇ */
        .nav-fs {
            position: fixed;
            inset: 0; background: #000;
            z-index: 4000;
            display: flex; flex-direction: column;
            justify-content: center; padding: 40px;
            transform: translateY(-100%);
            transition: 0.6s cubic-bezier(0.85, 0, 0.15, 1);
        }
        .nav-fs.active { transform: translateY(0); }
        .nav-fs a {
            font-family: 'Syncopate';
            font-size: clamp(24px, 8vw, 40px);
            color: #fff; text-decoration: none;
            margin: 15px 0; font-weight: 700;
            opacity: 0.5; transition: 0.3s;
        }
        .nav-fs a:hover { opacity: 1; padding-left: 20px; color: var(--red); }

    </style>
</head>
<body>

    <header>
        <div class="logo">YOKAI.NFT</div>
        <div class="burger" id="menuToggle">
            <span></span><span></span>
        </div>
    </header>

    <nav class="nav-fs" id="navFs">
        <a href="#">ARCHIVE</a>
        <a href="#">BOOKING</a>
        <a href="#">COLLECTION</a>
        <a href="#">STORY</a>
    </nav>

    <div class="collection-grid">

        <!-- NFT ITEM 1 (RED) -->
        <div class="nft-container neon-red">
            <div class="jp-id">般若 №001</div>
            <a href="primerka.html" class="artifact-box anim-float">
                <!-- 5 ШАРІВ ОДНАКОВОГО РОЗМІРУ -->
                <div class="layer" style="transform: translateZ(0px); background-image: url('01.PNG');"></div>
                <div class="layer" style="transform: translateZ(10px); background-image: url('01.PNG'); opacity: 0.4;"></div>
                <div class="layer" style="transform: translateZ(30px); background-image: url('02.PNG'); filter: drop-shadow(0 20px 40px rgba(0,0,0,0.9));"></div>
                <div class="layer" style="transform: translateZ(45px); background-image: url('01.PNG');"></div>
                <div class="layer" style="transform: translateZ(60px); background-image: url('01.PNG'); opacity: 0.8;"></div>
            </a>
            
            <div class="info-panel">
                <div class="rarity-badge">LEGENDARY ARTIFACT</div>
                <div class="title-row">
                    <h2 class="nft-title">HANNYA CORE</h2>
                </div>
                <a href="https://t.me" class="cta-button">ЗАПИСАТИСЯ</a>
            </div>
        </div>

        <!-- NFT ITEM 2 (GOLD) -->
        <div class="nft-container neon-gold">
            <div class="jp-id">狐 №042</div>
            <a href="primerka.html" class="artifact-box anim-glitch">
                <div class="layer" style="transform: translateZ(0px); background-image: url('03.PNG');"></div>
                <div class="layer" style="transform: translateZ(10px); background-image: url('03.PNG'); opacity: 0.4;"></div>
                <div class="layer" style="transform: translateZ(30px); background-image: url('04.PNG'); filter: drop-shadow(0 20px 40px rgba(0,0,0,0.9));"></div>
                <div class="layer" style="transform: translateZ(45px); background-image: url('03.PNG');"></div>
                <div class="layer" style="transform: translateZ(60px); background-image: url('03.PNG'); opacity: 0.8;"></div>
            </a>
            
            <div class="info-panel">
                <div class="rarity-badge">MYTHIC POSSESSION</div>
                <div class="title-row">
                    <h2 class="nft-title">GOLD KITSUNE</h2>
                </div>
                <a href="https://t.me" class="cta-button">ЗАПИСАТИСЯ</a>
            </div>
        </div>

    </div>

    <script>
        const toggle = document.getElementById('menuToggle');
        const nav = document.getElementById('navFs');
        
        toggle.onclick = () => {
            toggle.classList.toggle('open');
            nav.classList.toggle('active');
            document.body.style.overflow = nav.classList.contains('active') ? 'hidden' : 'auto';
        };
    </script>

</body>
</html>
