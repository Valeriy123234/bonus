<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { 
            background: #000; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            perspective: 2000px; 
            font-family: 'Segoe UI', sans-serif;
        }

        .artifact-link {
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
        }

        .artifact {
            width: 320px; 
            height: 460px;
            position: relative;
            transform-style: preserve-3d;
            animation: rotate 18s infinite linear;
            margin-bottom: 50px;
        }

        @keyframes rotate {
            from { transform: rotateY(0deg) rotateX(5deg); }
            to { transform: rotateY(360deg) rotateX(5deg); }
        }

        .layer {
            position: absolute; inset: 0;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            pointer-events: none;
        }
        .empty { background-image: url('022.PNG'); }
        .full { background-image: url('023.PNG'); }

        /* ПЕРЕДНЄ СКЛО З ГРАДІЄНТНИМ НАПИСОМ */
        .glass-front {
            position: absolute;
            inset: 0;
            z-index: 20;
            transform: translateZ(8px); /* Трохи вище передньої рамки */
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            padding-bottom: 50px;
            pointer-events: none;
            /* Обрізаємо скло по формі рамки */
            -webkit-mask: url('022.PNG') no-repeat center/contain;
            mask: url('022.PNG') no-repeat center/contain;
        }

        .collector-tag {
            font-size: 10px;
            font-weight: 900;
            letter-spacing: 3px;
            text-transform: uppercase;
            /* КРУТИЙ ГРАДІЄНТ */
            background: linear-gradient(45deg, #00f2ff, #ffffff, #00f2ff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shineText 3s linear infinite;
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.5);
            padding: 5px 15px;
            border: 1px solid rgba(0, 242, 255, 0.3);
            background-color: rgba(0, 0, 0, 0.4);
            border-radius: 2px;
        }

        @keyframes shineText {
            to { background-position: 200% center; }
        }

        .static-glow {
            position: absolute;
            bottom: -30px;
            left: 50%;
            width: 260px;
            height: 70px;
            background: radial-gradient(ellipse at center, rgba(0, 242, 255, 0.5) 0%, transparent 70%);
            filter: blur(35px);
            transform: translateX(-50%) translateZ(-50px);
            z-index: -1;
        }

        .description-box {
            max-width: 320px;
            text-align: center;
            color: #fff;
            padding: 20px;
            border-top: 1px solid rgba(0, 242, 255, 0.2);
        }

        .description-box h2 {
            margin: 0;
            font-size: 20px;
            letter-spacing: 4px;
            color: #00f2ff;
            text-transform: uppercase;
        }

        /* ЗАДНЯ СТОРОНА */
        .back-glass {
            position: absolute; inset: 0;
            background: rgba(0, 0, 0, 0.92);
            transform: rotateY(180deg) translateZ(-1px);
            display: flex; justify-content: center; align-items: center;
            backface-visibility: hidden;
            -webkit-mask: url('022.PNG') no-repeat center/contain;
            mask: url('022.PNG') no-repeat center/contain;
        }

        .logo {
            color: #000; font-size: 35px; font-weight: 900;
            letter-spacing: 8px; transform: scaleX(-1);
            text-shadow: 1px 1px 0 rgba(255,255,255,0.05);
        }
    </style>
</head>
<body>

    <a href="ТВОЄ_ПОСИЛАННЯ" class="artifact-link">
        
        <div class="artifact">
            <div class="static-glow"></div>

            <!-- Передній шар скла з градієнтною плашкою -->
            <div class="glass-front">
                <div class="collector-tag">COLLECTOR'S EDITION</div>
            </div>

            <!-- Бутерброд -->
            <div class="layer empty" style="transform: translateZ(0px)">
                <div class="back-glass"><div class="logo">YYOKAI</div></div>
            </div>
            <div class="layer empty" style="transform: translateZ(1px)"></div>
            <div class="layer empty" style="transform: translateZ(2px)"></div>
            <div class="layer full" style="transform: translateZ(3px)"></div>
            <div class="layer empty" style="transform: translateZ(4px)"></div>
            <div class="layer empty" style="transform: translateZ(5px)"></div>
            <div class="layer empty" style="transform: translateZ(6px)"></div>
        </div>

        <div class="description-box">
            <h2>KUMIHO SPIRIT</h2>
            <p style="color: #666; font-size: 13px;">Натисніть на артефакт, щоб відкрити деталі та вибрати місце для нанесення.</p>
        </div>

    </a>

</body>
</html>
