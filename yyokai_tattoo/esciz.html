<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yokai Archive — Infinity Collection</title>
    <style>
        @import url('https://googleapis.com');

        :root {
            --gold-foil: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            --red-foil: linear-gradient(135deg, #8b0000, #ff4d4d, #b30000, #ff1a1a, #4d0000);
            --blue-foil: linear-gradient(135deg, #001a4d, #0055ff, #003399, #00d4ff, #000c1a);
        }

        body { background: #020202; margin: 0; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }

        /* --- UI: HEADER --- */
        header {
            position: fixed; top: 0; width: 100%; padding: 50px 35px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 5000; box-sizing: border-box; pointer-events: none;
        }
        .brand { font-family: 'Cinzel'; font-size: 11px; letter-spacing: 6px; opacity: 0.4; }
        .menu-btn { width: 22px; height: 12px; display: flex; flex-direction: column; justify-content: space-between; cursor: pointer; pointer-events: auto; }
        .menu-btn span { height: 1px; width: 100%; background: #fff; opacity: 0.6; }

        /* --- COLLECTION GRID --- */
        .viewport { display: flex; flex-direction: column; gap: 180px; padding: 160px 0; width: 100%; perspective: 1500px; }

        .nft-item { width: 320px; margin: 0 auto; transform-style: preserve-3d; position: relative; }

        /* БАЗОВИЙ СТЕК (КНИЖКОВИЙ ОБ'ЄМ) */
        .book-stack {
            width: 100%; height: 460px; position: relative; transform-style: preserve-3d;
        }

        .layer {
            position: absolute; inset: 0; background-size: contain; background-repeat: no-repeat;
            background-position: center; pointer-events: none; filter: drop-shadow(0 2px 5px rgba(0,0,0,0.5));
        }

        /* ---------------------------------------------------- */
        /* БІБЛІОТЕКА АНІМАЦІЙ (ДОДАВАЙ СВОЇ ТУТ) */
        
        /* 1. Повільний нахил (Tilt) */
        .anim-1 { animation: anim-1 8s infinite ease-in-out; }
        @keyframes anim-1 { 0%, 100% { transform: rotateY(-10deg) rotateX(2deg); } 50% { transform: rotateY(10deg) rotateX(-2deg); } }

        /* 2. Вертикальне плавання (Float) */
        .anim-2 { animation: anim-2 6s infinite ease-in-out; }
        @keyframes anim-2 { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

        /* 3. Глибоке дихання (Scale/Depth) */
        .anim-3 { animation: anim-3 7s infinite ease-in-out; }
        @keyframes anim-3 { 0%, 100% { transform: translateZ(0); } 50% { transform: translateZ(40px) scale(1.03); } }

        /* 4. Легкий дріфт (Drift) */
        .anim-4 { animation: anim-4 10s infinite ease-in-out; }
        @keyframes anim-4 { 0%, 100% { transform: rotateX(-5deg); } 50% { transform: rotateX(5deg) translateY(-10px); } }
        /* ---------------------------------------------------- */

        .meta-container { margin-top: 50px; text-align: center; }
        .rarity-label { font-family: 'Cinzel'; font-size: 10px; letter-spacing: 8px; font-weight: 900; margin-bottom: 20px; display: block; -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* Кольори фольги */
        .red .rarity-label { background-image: var(--red-foil); }
        .gold .rarity-label { background-image: var(--gold-foil); }
        .blue .rarity-label { background-image: var(--blue-foil); }

        .item-title { font-size: 22px; font-weight: 300; letter-spacing: 3px; margin: 0; text-transform: uppercase; }
        .jp-subtitle { font-family: 'Noto Sans JP'; font-size: 10px; color: #333; margin-top: 10px; display: block; letter-spacing: 5px; }

        .btn-reserve {
            margin-top: 40px; display: inline-block; padding: 18px 45px;
            border: 1px solid rgba(255,255,255,0.05); background: linear-gradient(180deg, rgba(255,255,255,0.02) 0%, transparent 100%);
            color: rgba(255,255,255,0.6); text-decoration: none; font-size: 9px; letter-spacing: 4px; text-transform: uppercase; transition: 0.5s;
        }
        .btn-reserve:active { color: #fff; border-color: rgba(255,255,255,0.5); background: rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <header>
        <div class="brand">Yokai Master // Archive</div>
        <div class="menu-btn"><span></span><span></span></div>
    </header>

    <div class="viewport">

        <!-- КАРТКА 01: Анімація anim-1 (Нахил) -->
        <div class="nft-item red">
            <div class="book-stack anim-1">
                <div class="layer" style="transform: translateZ(0px); background-image: url('01.PNG');"></div>
                <div class="layer" style="transform: translateZ(3px); background-image: url('01.PNG'); opacity: 0.3;"></div>
                <div class="layer" style="transform: translateZ(6px); background-image: url('02.PNG');"></div>
                <div class="layer" style="transform: translateZ(9px); background-image: url('01.PNG'); opacity: 0.5;"></div>
                <div class="layer" style="transform: translateZ(12px); background-image: url('01.PNG');"></div>
            </div>
            <div class="meta-container">
                <span class="rarity-label">LEGENDARY</span>
                <h2 class="item-title">ONI CORE</h2>
                <span class="jp-subtitle">般若 № 001</span>
                <a href="#" class="btn-reserve">Request Access</a>
            </div>
        </div>

        <!-- КАРТКА 02: Анімація anim-2 (Плавання) -->
        <div class="nft-item gold">
            <div class="book-stack anim-2">
                <div class="layer" style="transform: translateZ(0px); background-image: url('03.PNG');"></div>
                <div class="layer" style="transform: translateZ(3px); background-image: url('03.PNG'); opacity: 0.3;"></div>
                <div class="layer" style="transform: translateZ(6px); background-image: url('04.PNG');"></div>
                <div class="layer" style="transform: translateZ(9px); background-image: url('03.PNG'); opacity: 0.5;"></div>
                <div class="layer" style="transform: translateZ(12px); background-image: url('03.PNG');"></div>
            </div>
            <div class="meta-container">
                <span class="rarity-label">MYTHIC</span>
                <h2 class="item-title">GOLD KITSUNE</h2>
                <span class="jp-subtitle">狐 № 042</span>
                <a href="#" class="btn-reserve">Request Access</a>
            </div>
        </div>

        <!-- КАРТКА 03: Анімація anim-3 (Глибина) -->
        <!-- Тут ти просто міняєш картинки на нові (наприклад 05.PNG та 06.PNG) -->
        <div class="nft-item blue">
            <div class="book-stack anim-3">
                <div class="layer" style="transform: translateZ(0px); background-image: url('01.PNG');"></div>
                <div class="layer" style="transform: translateZ(3px); background-image: url('01.PNG'); opacity: 0.3;"></div>
                <div class="layer" style="transform: translateZ(6px); background-image: url('02.PNG');"></div>
                <div class="layer" style="transform: translateZ(9px); background-image: url('01.PNG'); opacity: 0.5;"></div>
                <div class="layer" style="transform: translateZ(12px); background-image: url('01.PNG');"></div>
            </div>
            <div class="meta-container">
                <span class="rarity-label">RARE</span>
                <h2 class="item-title">BLUE SPIRIT</h2>
                <span class="jp-subtitle">青い霊 — № 088</span>
                <a href="#" class="btn-reserve">Request Access</a>
            </div>
        </div>

    </div>

</body>
</html>
