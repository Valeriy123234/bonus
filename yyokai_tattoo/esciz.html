<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        @import url('https://googleapis.com');

        body { 
            background: #000; 
            margin: 0; 
            color: #fff;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* --- МАТРИЦЯ (11% ПРОЗОРІСТЬ) --- */
        .matrix-bg {
            position: fixed; inset: 0; font-family: 'Noto Sans JP';
            font-size: 16px; color: #ff0000; opacity: 0.11; 
            display: flex; justify-content: space-around; z-index: -1;
            pointer-events: none;
        }
        .matrix-column { display: flex; flex-direction: column; animation: matrixDrop 12s linear infinite; }
        @keyframes matrixDrop { from { transform: translateY(-50%); } to { transform: translateY(0%); } }

        /* --- МЕНЮ (БУТЕРБРОД У КУТКУ) --- */
        header { position: fixed; top: 25px; right: 25px; z-index: 7000; }
        .burger { 
            width: 30px; height: 18px; 
            display: flex; flex-direction: column; justify-content: space-between; 
            cursor: pointer; 
        }
        .burger span { display: block; height: 2px; width: 100%; background: #fff; transition: 0.4s; }
        .burger.active span:nth-child(1) { transform: translateY(8px) rotate(45deg); }
        .burger.active span:nth-child(2) { opacity: 0; }
        .burger.active span:nth-child(3) { transform: translateY(-8px) rotate(-45deg); }

        .nav-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.98);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            opacity: 0; visibility: hidden; transition: 0.4s; z-index: 6000;
        }
        .nav-overlay.active { opacity: 1; visibility: visible; }
        .nav-overlay a { font-size: 32px; color: #fff; text-decoration: none; margin: 15px; font-weight: 900; letter-spacing: 5px; }

        /* --- КАРТКИ --- */
        .container { display: flex; flex-direction: column; gap: 140px; padding: 100px 0; align-items: center; }

        .nft-card {
            width: 320px; height: 450px;
            position: relative; transform-style: preserve-3d;
            display: block; text-decoration: none;
        }

        /* Унікальні анімації */
        .anim-oni { animation: moveOni 8s infinite ease-in-out; }
        @keyframes moveOni { 0%, 100% { transform: rotateY(-18deg) rotateX(6deg); } 50% { transform: rotateY(18deg) rotateX(-4deg); } }

        .anim-kitsune { animation: moveKitsune 7s infinite ease-in-out; }
        @keyframes moveKitsune { 0%, 100% { transform: translateY(0) rotateY(12deg); } 50% { transform: translateY(-30px) rotateY(-8deg); } }

        .layer {
            position: absolute; inset: 0; background-size: contain; 
            background-repeat: no-repeat; background-position: center;
        }

        /* --- РІДКІСТЬ ПІД КАРТКОЮ (УНІКАЛЬНА) --- */
        .rarity-box {
            margin: 25px 0; text-align: center;
            position: relative; transform: translateZ(50px);
        }

        .rarity-text {
            font-family: 'Cinzel'; font-size: 24px; font-weight: 900; letter-spacing: 12px;
            position: relative; color: #fff; text-transform: uppercase;
        }

        /* Ефект енергетичного сяйва */
        .rarity-text::before {
            content: attr(data-text);
            position: absolute; inset: 0;
            z-index: -1;
            filter: blur(12px);
            opacity: 0.7;
            animation: breathGlow 2.5s infinite alternate;
        }

        .legendary::before { color: #ff0000; }
        .mythic::before { color: #ffcc00; }

        @keyframes breathGlow {
            from { transform: scale(1); opacity: 0.4; }
            to { transform: scale(1.2); opacity: 0.9; }
        }

        /* --- ТЕКСТ ТА КНОПКА --- */
        .meta { text-align: center; }
        .title { font-size: 26px; font-weight: 900; letter-spacing: 5px; margin: 0; text-transform: uppercase; color: #fff; }
        
        .btn-try {
            margin-top: 30px; display: block; width: 100%; padding: 22px 0;
            background: #fff; color: #000; font-size: 15px; font-weight: 900;
            letter-spacing: 5px; text-transform: uppercase; text-align: center;
            text-decoration: none; box-shadow: 0 0 25px rgba(255,255,255,0.2);
        }
        .btn-try:active { transform: scale(0.95); opacity: 0.8; }

    </style>
</head>
<body>

    <div class="matrix-bg" id="matrix"></div>

    <header>
        <div class="burger" id="burger">
            <span></span><span></span><span></span>
        </div>
    </header>

    <nav class="nav-overlay" id="nav">
        <div style="font-family:'Cinzel'; opacity:0.3; margin-bottom:40px; letter-spacing:10px;">MENU ARCHIVE</div>
        <a href="#">ГОЛОВНА</a>
        <a href="#">ЗАПИСАТИСЬ</a>
    </nav>

    <div class="container">

        <!-- КАРТКА 01: ONI (RED) -->
        <div style="width: 320px;">
            <a href="primerka.html" class="nft-card anim-oni">
                <!-- ЩІЛЬНІ ШАРИ (2px - 4px) ДЛЯ ЕФЕКТУ КНИГИ -->
                <div class="layer" style="transform: translateZ(0px); background-image: url('01.PNG');"></div>
                <div class="layer" style="transform: translateZ(2px); background-image: url('01.PNG'); opacity: 0.2;"></div>
                <div class="layer" style="transform: translateZ(5px); background-image: url('02.PNG');"></div> <!-- ЕСКІЗ -->
                <div class="layer" style="transform: translateZ(8px); background-image: url('01.PNG'); opacity: 0.4;"></div>
                <div class="layer" style="transform: translateZ(11px); background-image: url('01.PNG');"></div>
            </a>
            
            <div class="rarity-box">
                <span class="rarity-text legendary" data-text="LEGENDARY">LEGENDARY</span>
            </div>

            <div class="meta">
                <h2 class="title">ONI MASK</h2>
                <a href="primerka.html" class="btn-try">ПРИМІРЯТИ</a>
            </div>
        </div>

        <!-- КАРТКА 02: KITSUNE (GOLD) -->
        <div style="width: 320px;">
            <a href="primerka.html" class="nft-card anim-kitsune">
                <div class="layer" style="transform: translateZ(0px); background-image: url('03.PNG');"></div>
                <div class="layer" style="transform: translateZ(2px); background-image: url('03.PNG'); opacity: 0.2;"></div>
                <div class="layer" style="transform: translateZ(5px); background-image: url('04.PNG');"></div>
                <div class="layer" style="transform: translateZ(8px); background-image: url('03.PNG'); opacity: 0.4;"></div>
                <div class="layer" style="transform: translateZ(11px); background-image: url('03.PNG');"></div>
            </a>
            
            <div class="rarity-box">
                <span class="rarity-text mythic" data-text="MYTHIC">MYTHIC</span>
            </div>

            <div class="meta">
                <h2 class="title">KITSUNE</h2>
                <a href="primerka.html" class="btn-try">ПРИМІРЯТИ</a>
            </div>
        </div>

    </div>

    <script>
        // Матриця 11%
        const matrix = document.getElementById('matrix');
        const chars = "般若狐霊魂天人地龍神鬼";
        for (let i = 0; i < 12; i++) {
            const col = document.createElement('div');
            col.className = 'matrix-column';
            col.style.animationDuration = (12 + Math.random() * 8) + 's';
            let content = "";
            for (let j = 0; j < 60; j++) { content += chars[Math.floor(Math.random() * chars.length)] + "<br>"; }
            col.innerHTML = content + content;
            matrix.appendChild(col);
        }

        // Логіка меню
        const burger = document.getElementById('burger');
        const nav = document.getElementById('nav');
        burger.onclick = () => {
            burger.classList.toggle('active');
            nav.classList.toggle('active');
            document.body.style.overflow = nav.classList.contains('active') ? 'hidden' : 'auto';
        };
    </script>
</body>
</html>
