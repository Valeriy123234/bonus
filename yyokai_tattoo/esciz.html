<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yokai Archive — God Mode</title>
    <style>
        @import url('https://googleapis.com');

        :root {
            /* Епічні градієнти з переливом */
            --legendary-glow: linear-gradient(90deg, #ff0000, #ff7b7b, #ff0000);
            --mythic-glow: linear-gradient(90deg, #ffac00, #fff700, #ffac00);
            --rare-glow: linear-gradient(90deg, #0066ff, #00d4ff, #0066ff);
        }

        body { 
            background: #000; 
            margin: 0; 
            color: #fff;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            perspective: 2000px;
        }

        /* --- МИТТЄВА МАТРИЦЯ --- */
        .matrix-bg {
            position: fixed;
            inset: 0;
            font-family: 'Noto Sans JP';
            font-size: 22px;
            color: #fff;
            opacity: 0.2; /* 20% прозорості */
            display: flex;
            justify-content: space-around;
            z-index: -1;
            pointer-events: none;
        }

        .matrix-column {
            display: flex;
            flex-direction: column;
            animation: matrixDrop 12s linear infinite;
            white-space: nowrap;
        }

        @keyframes matrixDrop {
            from { transform: translateY(-50%); }
            to { transform: translateY(0%); }
        }

        /* --- HEADER --- */
        header {
            position: fixed; top: 0; width: 100%; padding: 45px 35px;
            display: flex; justify-content: flex-end; z-index: 5000;
        }
        .menu-btn { width: 30px; height: 18px; display: flex; flex-direction: column; justify-content: space-between; cursor: pointer; }
        .menu-btn span { height: 2px; width: 100%; background: #fff; box-shadow: 0 0 10px #fff; }

        /* --- GRID --- */
        .viewport { display: flex; flex-direction: column; gap: 200px; padding: 120px 0; width: 100%; }

        /* КАРТКА */
        .nft-item { 
            width: 320px; margin: 0 auto; transform-style: preserve-3d; 
            text-decoration: none; display: block; color: #fff;
        }

        .book-stack { width: 100%; height: 460px; position: relative; transform-style: preserve-3d; }
        
        .layer {
            position: absolute; inset: 0; background-size: contain; 
            background-repeat: no-repeat; background-position: center;
        }

        /* АНІМАЦІЇ */
        .anim-swing { animation: swing 8s infinite ease-in-out; }
        @keyframes swing { 0%, 100% { transform: rotateY(-14deg) rotateX(3deg); } 50% { transform: rotateY(14deg) rotateX(-2deg); } }

        .anim-float { animation: float 6s infinite ease-in-out; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-30px); } }

        /* --- ЕПІЧНА ПЛАШКА РІДКОСТІ --- */
        .rarity-badge {
            width: 100%;
            margin: -10px 0 35px;
            padding: 10px 0;
            font-family: 'Cinzel';
            font-size: 14px;
            letter-spacing: 12px;
            font-weight: 900;
            text-align: center;
            position: relative;
            background: rgba(255,255,255,0.05);
            border-top: 1px solid rgba(255,255,255,0.1);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            overflow: hidden;
            transform: translateZ(60px);
        }

        .rarity-badge::before {
            content: ''; position: absolute; inset: 0;
            background-size: 200% 100%;
            animation: foilMove 3s infinite linear;
            opacity: 0.8;
            z-index: -1;
        }

        @keyframes foilMove {
            0% { background-position: 100% 0; }
            100% { background-position: -100% 0; }
        }

        .legendary::before { background-image: var(--legendary-glow); }
        .mythic::before { background-image: var(--mythic-glow); }

        /* --- ТЕКСТ (БІЛЬШ ВИДИМИЙ) --- */
        .meta { text-align: center; transform: translateZ(40px); }
        .title { 
            font-size: 32px; font-weight: 900; letter-spacing: 6px; margin: 0; 
            text-shadow: 0 5px 15px rgba(0,0,0,1);
            color: #fff;
        }
        .sub { 
            font-family: 'Noto Sans JP'; font-size: 12px; color: rgba(255,255,255,0.4); 
            margin-top: 12px; display: block; letter-spacing: 8px;
        }

        /* --- КНОПКА (ЯСКРАВА) --- */
        .btn {
            margin-top: 40px; display: block; width: 100%; padding: 20px 0;
            background: #fff; color: #000; font-size: 12px; font-weight: 900;
            letter-spacing: 5px; text-transform: uppercase;
            box-shadow: 0 0 30px rgba(255,255,255,0.2);
            transition: 0.3s;
        }
        .btn:active { transform: scale(0.95); opacity: 0.8; }

    </style>
</head>
<body>

    <!-- МИТТЄВА МАТРИЦЯ -->
    <div class="matrix-bg" id="matrix"></div>

    <header>
        <div class="menu-btn">
            <span></span><span></span><span></span>
        </div>
    </header>

    <div class="viewport">

        <!-- КАРТКА 01 -->
        <a href="https://t.me" class="nft-item">
            <div class="book-stack anim-swing">
                <div class="layer" style="transform: translateZ(0px); background-image: url('01.PNG');"></div>
                <div class="layer" style="transform: translateZ(3px); background-image: url('01.PNG'); opacity: 0.3;"></div>
                <div class="layer" style="transform: translateZ(6px); background-image: url('02.PNG');"></div>
                <div class="layer" style="transform: translateZ(9px); background-image: url('01.PNG'); opacity: 0.5;"></div>
                <div class="layer" style="transform: translateZ(12px); background-image: url('01.PNG');"></div>
            </div>
            <div class="rarity-badge legendary">LEGENDARY</div>
            <div class="meta">
                <h2 class="title">ONI MASK</h2>
                <span class="sub">般若 № 001</span>
                <div class="btn">BOOK SESSION</div>
            </div>
        </a>

        <!-- КАРТКА 02 -->
        <a href="https://t.me" class="nft-item">
            <div class="book-stack anim-float">
                <div class="layer" style="transform: translateZ(0px); background-image: url('03.PNG');"></div>
                <div class="layer" style="transform: translateZ(3px); background-image: url('03.PNG'); opacity: 0.3;"></div>
                <div class="layer" style="transform: translateZ(6px); background-image: url('04.PNG');"></div>
                <div class="layer" style="transform: translateZ(9px); background-image: url('03.PNG'); opacity: 0.5;"></div>
                <div class="layer" style="transform: translateZ(12px); background-image: url('03.PNG');"></div>
            </div>
            <div class="rarity-badge mythic">MYTHIC</div>
            <div class="meta">
                <h2 class="title">KITSUNE</h2>
                <span class="sub">狐 № 042</span>
                <div class="btn">BOOK SESSION</div>
            </div>
        </a>

    </div>

    <script>
        // Скрипт для миттєвої матриці
        const matrixContainer = document.getElementById('matrix');
        const chars = "般若狐霊魂天人地龍神鬼";
        const columnCount = 12;

        for (let i = 0; i < columnCount; i++) {
            const col = document.createElement('div');
            col.className = 'matrix-column';
            col.style.animationDuration = (8 + Math.random() * 10) + 's';
            
            // Заповнюємо колонку так, щоб вона вже була повною
            let content = "";
            for (let j = 0; j < 100; j++) {
                content += chars[Math.floor(Math.random() * chars.length)] + "<br>";
            }
            col.innerHTML = content + content; // Подвійний контент для безшовності
            matrixContainer.appendChild(col);
        }
    </script>
</body>
</html>
