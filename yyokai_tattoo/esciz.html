<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yokai Premium NFT Archive</title>
    <style>
        /* Підключаємо преміальні шрифти */
        @import url('https://googleapis.com');

        body { 
            background: #000; 
            margin: 0; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            min-height: 100vh; 
            perspective: 2000px; 
            overflow-x: hidden;
            color: #fff;
            font-family: 'Inter', sans-serif;
        }

        /* --- UI: HEADER & MENU --- */
        header {
            position: fixed;
            top: 0; width: 100%;
            padding: 40px 30px; /* Преміальний відступ */
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 5000;
            box-sizing: border-box;
            mix-blend-mode: difference;
        }

        .logo-nft {
            font-family: 'Syncopate';
            font-size: 10px;
            letter-spacing: 6px;
            text-transform: uppercase;
        }

        /* Твій бутерброд з відступом */
        .menu-trigger {
            width: 30px;
            height: 12px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            cursor: pointer;
        }
        .menu-trigger span {
            display: block;
            height: 1px;
            width: 100%;
            background: #fff;
            transition: 0.4s cubic-bezier(0.8, 0, 0.2, 1);
        }

        /* --- NFT COLLECTION GRID --- */
        .nft-grid {
            display: flex;
            flex-direction: column;
            gap: 180px; /* Великий відступ для статусу */
            padding: 140px 0;
            width: 100%;
        }

        .nft-card {
            width: 340px;
            margin: 0 auto;
            transform-style: preserve-3d;
            position: relative;
        }

        /* ТВІЙ ОРИГІНАЛЬНИЙ БУТЕРБРОД З 5 ШАРІВ */
        .artifact-display {
            width: 100%;
            height: 480px;
            position: relative;
            transform-style: preserve-3d;
            transition: 0.3s;
        }

        .layer {
            position: absolute;
            inset: 0;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            pointer-events: none;
        }

        /* Естетичні анімації для НФТ (не кругові) */
        .anim-red { animation: nftTiltRed 8s infinite ease-in-out; }
        @keyframes nftTiltRed {
            0%, 100% { transform: rotateY(-15deg) rotateX(4deg); }
            50% { transform: rotateY(15deg) rotateX(-2deg); }
        }

        .anim-gold { animation: nftFloatGold 6s infinite ease-in-out; }
        @keyframes nftFloatGold {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-30px) scale(1.02); }
        }

        /* --- PREMIUM INFO PANEL --- */
        .nft-info {
            margin-top: 40px;
            padding: 0 10px;
            position: relative;
            z-index: 100;
        }

        .rarity-line {
            font-family: 'Syncopate';
            font-size: 8px;
            letter-spacing: 4px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .rarity-line::before {
            content: '';
            width: 30px;
            height: 1px;
            background: currentColor;
        }

        .neon-red .rarity-line { color: #ff0000; text-shadow: 0 0 10px #ff0000; }
        .neon-gold .rarity-line { color: #d4af37; text-shadow: 0 0 10px #d4af37; }

        .nft-title {
            font-size: 28px;
            font-weight: 900;
            letter-spacing: -1px;
            margin: 0;
            text-transform: uppercase;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nft-title span {
            font-size: 10px;
            font-weight: 100;
            opacity: 0.3;
            letter-spacing: 2px;
        }

        /* --- КНОПКА ЗАПИСАТИСЯ (NFT STYLE) --- */
        .action-button {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 55px;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.02);
            color: #fff;
            text-decoration: none;
            font-family: 'Syncopate';
            font-size: 10px;
            letter-spacing: 3px;
            transition: 0.4s;
            position: relative;
            overflow: hidden;
        }

        .action-button::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transition: 0.5s;
        }

        .action-button:active {
            background: #fff;
            color: #000;
        }

        .action-button:active::after {
            left: 100%;
        }

    </style>
</head>
<body>

    <header>
        <div class="logo-nft">Archive // Yokai</div>
        <div class="menu-trigger" id="menuBtn">
            <span></span>
            <span></span>
        </div>
    </header>

    <div class="nft-grid">

        <!-- КАРТКА 1: LEGENDARY RED (ТВОЇ 5 ШАРІВ) -->
        <div class="nft-card neon-red">
            <div class="artifact-display anim-red">
                <div class="layer" style="transform: translateZ(0px); background-image: url('01.PNG');"></div>
                <div class="layer" style="transform: translateZ(8px); background-image: url('01.PNG'); opacity: 0.4;"></div>
                <div class="layer" style="transform: translateZ(20px); background-image: url('02.PNG');"></div> <!-- ТВІЙ ЕСКІЗ -->
                <div class="layer" style="transform: translateZ(32px); background-image: url('01.PNG'); opacity: 0.6;"></div>
                <div class="layer" style="transform: translateZ(45px); background-image: url('01.PNG');"></div>
            </div>
            
            <div class="nft-info">
                <div class="rarity-line">LEGENDARY ARTIFACT</div>
                <h2 class="nft-title">ONI CORE <span>EDITION 001</span></h2>
                <a href="https://t.me" class="action-button">BOOKING SESSION</a>
            </div>
        </div>

        <!-- КАРТКА 2: MYTHIC GOLD (ТВОЇ 5 ШАРІВ) -->
        <div class="nft-card neon-gold">
            <div class="artifact-display anim-gold">
                <div class="layer" style="transform: translateZ(0px); background-image: url('03.PNG');"></div>
                <div class="layer" style="transform: translateZ(8px); background-image: url('03.PNG'); opacity: 0.4;"></div>
                <div class="layer" style="transform: translateZ(20px); background-image: url('04.PNG');"></div>
                <div class="layer" style="transform: translateZ(32px); background-image: url('03.PNG'); opacity: 0.6;"></div>
                <div class="layer" style="transform: translateZ(45px); background-image: url('03.PNG');"></div>
            </div>
            
            <div class="nft-info">
                <div class="rarity-line">MYTHIC POSSESSION</div>
                <h2 class="nft-title">KITSUNE <span>EDITION 042</span></h2>
                <a href="https://t.me" class="action-button">BOOKING SESSION</a>
            </div>
        </div>

    </div>

</body>
</html>
