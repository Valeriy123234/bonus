<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        @import url('https://googleapis.com');

        body { 
            background: #000; 
            margin: 0; 
            color: #fff;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* --- ОПТИМІЗОВАНА МАТРИЦЯ (GPU Accelerated) --- */
        .matrix-bg {
            position: fixed; inset: 0;
            color: #ff0000; opacity: 0.12; 
            z-index: -1; pointer-events: none;
            overflow: hidden;
            display: flex; justify-content: space-around;
        }
        .matrix-column {
            writing-mode: vertical-rl;
            text-orientation: upright;
            font-size: 18px;
            animation: matrixMove 20s linear infinite;
            will-change: transform;
        }
        @keyframes matrixMove {
            from { transform: translate3d(0, -50%, 0); }
            to { transform: translate3d(0, 0%, 0); }
        }

        /* --- МЕНЮ --- */
        header { position: fixed; top: 25px; right: 25px; z-index: 7000; }
        .burger { width: 28px; height: 16px; display: flex; flex-direction: column; justify-content: space-between; cursor: pointer; }
        .burger span { height: 2px; width: 100%; background: #fff; border-radius: 2px; }

        .nav-overlay {
            position: fixed; inset: 0; background: #000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            visibility: hidden; opacity: 0; transition: opacity 0.3s; z-index: 6000;
        }
        .nav-overlay.active { visibility: visible; opacity: 1; }
        .nav-overlay a { font-size: 30px; color: #fff; text-decoration: none; margin: 15px; font-weight: 900; letter-spacing: 5px; }

        /* --- КАРТКИ (ОПТИМІЗОВАНИЙ ОБ'ЄМ) --- */
        .container { display: flex; flex-direction: column; gap: 100px; padding: 100px 0; align-items: center; }

        .nft-card {
            width: 310px; height: 430px;
            position: relative; 
            transform-style: preserve-3d;
            will-change: transform;
            animation: fastSwing 8s infinite ease-in-out;
        }

        @keyframes fastSwing {
            0%, 100% { transform: rotateY(-12deg); }
            50% { transform: rotateY(12deg); }
        }

        .layer {
            position: absolute; inset: 0;
            background-size: contain; background-repeat: no-repeat; background-position: center;
            pointer-events: none;
            /* Force hardware acceleration */
            transform: translate3d(0,0,0);
        }

        /* --- INFO --- */
        .meta { margin-top: 25px; text-align: center; }
        .title { font-size: 24px; font-weight: 900; letter-spacing: 5px; margin-bottom: 20px; text-transform: uppercase; }
        
        .btn-try {
            display: block; width: 100%; padding: 20px 0;
            background: #fff; color: #000; font-size: 15px; font-weight: 900;
            letter-spacing: 5px; text-transform: uppercase; text-align: center;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="matrix-bg" id="matrix"></div>

    <header>
        <div class="burger" id="burgerBtn">
            <span></span><span></span><span></span>
        </div>
    </header>

    <nav class="nav-overlay" id="nav">
        <a href="index.html">ГОЛОВНА</a>
        <a href="https://t.me">ЗАПИСАТИСЬ</a>
    </nav>

    <div class="container">
        <!-- КАРТКА 1 -->
        <div style="width: 310px;">
            <a href="primerka.html" class="nft-card">
                <!-- Тільки 5 шарів для швидкості, але з правильним кроком для об'єму -->
                <div class="layer" style="transform: translate3d(0,0,0px); background-image: url('01.PNG');"></div>
                <div class="layer" style="transform: translate3d(0,0,3px); background-image: url('01.PNG'); opacity: 0.3;"></div>
                <div class="layer" style="transform: translate3d(0,0,8px); background-image: url('02.PNG');"></div> <!-- ЕСКІЗ -->
                <div class="layer" style="transform: translate3d(0,0,12px); background-image: url('01.PNG'); opacity: 0.5;"></div>
                <div class="layer" style="transform: translate3d(0,0,18px); background-image: url('01.PNG');"></div>
            </a>
            <div class="meta">
                <h2 class="title">ONI MASK</h2>
                <a href="primerka.html" class="btn-try">ПРИМІРЯТИ</a>
            </div>
        </div>

        <!-- КАРТКА 2 -->
        <div style="width: 310px;">
            <a href="primerka.html" class="nft-card" style="animation-delay: -4s;">
                <div class="layer" style="transform: translate3d(0,0,0px); background-image: url('03.PNG');"></div>
                <div class="layer" style="transform: translate3d(0,0,3px); background-image: url('03.PNG'); opacity: 0.3;"></div>
                <div class="layer" style="transform: translate3d(0,0,8px); background-image: url('04.PNG');"></div>
                <div class="layer" style="transform: translate3d(0,0,12px); background-image: url('03.PNG'); opacity: 0.5;"></div>
                <div class="layer" style="transform: translate3d(0,0,18px); background-image: url('03.PNG');"></div>
            </a>
            <div class="meta">
                <h2 class="title">KITSUNE</h2>
                <a href="primerka.html" class="btn-try">ПРИМІРЯТИ</a>
            </div>
        </div>
    </div>

    <script>
        // Легка генерація матриці без перевантаження DOM
        const matrix = document.getElementById('matrix');
        const chars = "般若狐霊魂天人地龍神鬼";
        for (let i = 0; i < 10; i++) {
            const col = document.createElement('div');
            col.className = 'matrix-column';
            col.style.animationDuration = (15 + Math.random() * 10) + 's';
            let str = "";
            for(let j=0; j<40; j++) str += chars[Math.floor(Math.random()*chars.length)];
            col.innerText = str + str;
            matrix.appendChild(col);
        }

        // Меню
        const burger = document.getElementById('burgerBtn');
        const nav = document.getElementById('nav');
        burger.onclick = () => {
            nav.classList.toggle('active');
            document.body.style.overflow = nav.classList.contains('active') ? 'hidden' : 'auto';
        };
    </script>
</body>
</html>
