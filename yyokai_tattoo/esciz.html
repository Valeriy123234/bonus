<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yokai Archive — Hearthstone Style</title>
    <style>
        @import url('https://googleapis.com');

        body { 
            background: #000; 
            margin: 0; 
            color: #fff;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            perspective: 2000px;
        }

        /* --- МАТРИЦЯ (12%) --- */
        .matrix-bg {
            position: fixed; inset: 0; font-family: 'Noto Sans JP';
            font-size: 15px; color: #fff; opacity: 0.12;
            display: flex; justify-content: space-around; z-index: -1;
        }
        .matrix-column { display: flex; flex-direction: column; animation: matrixDrop 18s linear infinite; white-space: nowrap; }
        @keyframes matrixDrop { from { transform: translateY(-50%); } to { transform: translateY(0%); } }

        /* --- РОБОЧЕ МЕНЮ --- */
        header { position: fixed; top: 25px; right: 25px; z-index: 5000; }
        .menu-btn { width: 30px; height: 18px; display: flex; flex-direction: column; justify-content: space-between; cursor: pointer; }
        .menu-btn span { height: 2px; width: 100%; background: #fff; transition: 0.3s; }
        
        .nav-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transform: translateX(100%); transition: 0.5s cubic-bezier(0.8, 0, 0.2, 1); z-index: 4500;
        }
        .nav-overlay.active { transform: translateX(0); }
        .nav-overlay a { font-size: 35px; color: #fff; text-decoration: none; margin: 20px; font-weight: 900; letter-spacing: 5px; }

        /* --- КАРТКИ --- */
        .viewport { display: flex; flex-direction: column; gap: 150px; padding: 100px 0; width: 100%; }
        .nft-item { width: 320px; margin: 0 auto; transform-style: preserve-3d; text-decoration: none; display: block; color: #fff; }

        .book-stack { width: 100%; height: 460px; position: relative; transform-style: preserve-3d; animation: swing 8s infinite ease-in-out; }
        .layer { position: absolute; inset: 0; background-size: contain; background-repeat: no-repeat; background-position: center; pointer-events: none;}
        @keyframes swing { 0%, 100% { transform: rotateY(-8deg); } 50% { transform: rotateY(8deg); } }

        /* --- HEARTHSTONE STYLE RARITY (ПЕРЕЛИВ) --- */
        .rarity-container {
            margin: 10px 0 30px;
            text-align: center;
            transform: translateZ(60px);
        }

        .rarity-magic {
            font-family: 'Cinzel';
            font-size: 20px;
            font-weight: 900;
            letter-spacing: 8px;
            text-transform: uppercase;
            background: linear-gradient(90deg, #ff0000, #ffbb00, #00ff00, #00ffff, #0022ff, #ff00ff, #ff0000);
            background-size: 300% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: hsShine 5s linear infinite;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.2));
        }

        @keyframes hsShine {
            0% { background-position: 0% 50%; }
            100% { background-position: 300% 50%; }
        }

        /* --- ТЕКСТ ТА КНОПКА --- */
        .meta { text-align: center; }
        .title { font-size: 26px; font-weight: 900; letter-spacing: 5px; margin: 0; }
        .btn {
            margin-top: 30px; display: block; width: 100%; padding: 20px 0;
            background: #fff; color: #000; font-size: 14px; font-weight: 900;
            letter-spacing: 5px; text-transform: uppercase; text-align: center;
            box-shadow: 0 0 20px rgba(255,255,255,0.3);
        }
    </style>
</head>
<body>

    <div class="matrix-bg" id="matrix"></div>

    <header>
        <div class="menu-btn" id="menuToggle">
            <span></span><span></span><span></span>
        </div>
    </header>

    <nav class="nav-overlay" id="navMenu">
        <a href="#">ГОЛОВНА</a>
        <a href="#">ЗАПИСАТИСЬ</a>
    </nav>

    <div class="viewport">

        <!-- КАРТКА 01 -->
        <a href="primerka.html" class="nft-item">
            <div class="book-stack">
                <div class="layer" style="transform: translateZ(0px); background-image: url('01.PNG');"></div>
                <div class="layer" style="transform: translateZ(3px); background-image: url('01.PNG'); opacity: 0.3;"></div>
                <div class="layer" style="transform: translateZ(6px); background-image: url('02.PNG');"></div>
                <div class="layer" style="transform: translateZ(9px); background-image: url('01.PNG'); opacity: 0.5;"></div>
                <div class="layer" style="transform: translateZ(12px); background-image: url('01.PNG');"></div>
            </div>
            
            <div class="rarity-container">
                <span class="rarity-magic">LEGENDARY</span>
            </div>

            <div class="meta">
                <h2 class="title">ONI MASK</h2>
                <div class="btn">ПРИМІРЯТИ</div>
            </div>
        </a>

        <!-- КАРТКА 02 -->
        <a href="primerka.html" class="nft-item">
            <div class="book-stack" style="animation-delay: -3s;">
                <div class="layer" style="transform: translateZ(0px); background-image: url('03.PNG');"></div>
                <div class="layer" style="transform: translateZ(3px); background-image: url('03.PNG'); opacity: 0.3;"></div>
                <div class="layer" style="transform: translateZ(6px); background-image: url('04.PNG');"></div>
                <div class="layer" style="transform: translateZ(9px); background-image: url('03.PNG'); opacity: 0.5;"></div>
                <div class="layer" style="transform: translateZ(12px); background-image: url('03.PNG');"></div>
            </div>

            <div class="rarity-container">
                <span class="rarity-magic">MYTHIC</span>
            </div>

            <div class="meta">
                <h2 class="title">KITSUNE</h2>
                <div class="btn">ПРИМІРЯТИ</div>
            </div>
        </a>

    </div>

    <script>
        // Матриця
        const matrixContainer = document.getElementById('matrix');
        const chars = "般若狐霊魂天人地龍神鬼";
        for (let i = 0; i < 15; i++) {
            const col = document.createElement('div');
            col.className = 'matrix-column';
            col.style.animationDuration = (15 + Math.random() * 10) + 's';
            let content = "";
            for (let j = 0; j < 70; j++) { content += chars[Math.floor(Math.random() * chars.length)] + "<br>"; }
            col.innerHTML = content + content;
            matrixContainer.appendChild(col);
        }

        // Логіка меню
        const btn = document.getElementById('menuToggle');
        const menu = document.getElementById('navMenu');
        btn.onclick = (e) => {
            e.preventDefault();
            menu.classList.toggle('active');
            btn.classList.toggle('open');
        }
    </script>
</body>
</html>
