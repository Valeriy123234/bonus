<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        @import url('https://googleapis.com');

        body { 
            background: #000; 
            margin: 0; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            min-height: 100vh; 
            perspective: 2000px; 
            overflow-x: hidden;
            font-family: 'Bebas Neue', cursive;
        }

        .collection-grid {
            display: flex;
            flex-direction: column;
            gap: 150px;
            padding: 100px 0;
            width: 100%;
        }

        .artifact-item {
            position: relative;
            width: 320px; /* ЗБІЛЬШЕНО */
            height: 460px; /* ЗБІЛЬШЕНО */
            margin: 0 auto;
            transform-style: preserve-3d;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* МАЯТНИК (Амплітуда для великої рамки) */
        .artifact-body {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            animation: swing 7s infinite ease-in-out;
            will-change: transform;
        }

        @keyframes swing {
            0%, 100% { transform: rotateY(-20deg) rotateX(6deg); }
            50% { transform: rotateY(20deg) rotateX(-3deg); }
        }

        .layer {
            position: absolute; inset: 0;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            pointer-events: none;
            /* СЯЙВО, ЩО ВИПРОМІНЮЄТЬСЯ ВІД РАМКИ */
            filter: drop-shadow(0 0 8px rgba(0, 242, 255, 0.4));
        }

        /* ТЕКСТ РІДКОСТІ */
        .rarity-box {
            margin-top: 30px;
            text-align: center;
            transform: translateZ(15px);
        }

        .rarity-text {
            color: #00f2ff;
            font-size: 24px; /* Трохи крупніше під нову рамку */
            letter-spacing: 7px;
            text-shadow: 0 0 15px rgba(0, 242, 255, 0.9);
            margin: 0;
        }

        .rarity-jp {
            font-family: 'Noto Sans JP', sans-serif;
            color: #555;
            font-size: 11px;
            letter-spacing: 3px;
            margin-top: -3px;
            display: block;
        }

        /* КНОПКА DETAILS */
        .details-btn {
            margin-top: 20px;
            padding: 8px 45px;
            background: rgba(0, 242, 255, 0.05);
            border: 1px solid #00f2ff;
            color: #00f2ff;
            font-size: 16px;
            letter-spacing: 4px;
            border-radius: 2px;
            animation: pulseBtn 3s infinite;
            box-shadow: 0 0 10px rgba(0, 242, 255, 0.3);
        }

        @keyframes pulseBtn {
            0%, 100% { opacity: 0.7; box-shadow: 0 0 5px rgba(0, 242, 255, 0.3); }
            50% { opacity: 1; box-shadow: 0 0 20px rgba(0, 242, 255, 0.6); }
        }

        /* СВІТЛОВА ПОДУШКА ПІД НИЗОМ */
        .glow-bottom {
            position: absolute;
            bottom: 80px;
            width: 240px;
            height: 40px;
            background: radial-gradient(circle, rgba(0, 242, 255, 0.3), transparent 75%);
            filter: blur(35px);
            z-index: -1;
        }
    </style>
</head>
<body>

    <div class="collection-grid">

        <!-- ПОЧАТОК КАРТКИ -->
        <a href="page_item_1.html" class="artifact-item">
            <div class="artifact-body">
                <!-- Об'ємні шари рамки 022 -->
                <div class="layer" style="transform: translateZ(0px); background-image: url('022.PNG');"></div>
                <div class="layer" style="transform: translateZ(3px); background-image: url('022.PNG');"></div>
                
                <!-- ЦЕНТР: Рамка + Ескіз 023 -->
                <div class="layer" style="transform: translateZ(6px); background-image: url('023.PNG');"></div>
                
                <!-- Передні шари для об'єму -->
                <div class="layer" style="transform: translateZ(9px); background-image: url('022.PNG');"></div>
                <div class="layer" style="transform: translateZ(12px); background-image: url('022.PNG');"></div>
            </div>

            <!-- Рідкість -->
            <div class="rarity-box">
                <p class="rarity-text">LEGENDARY</p>
                <span class="rarity-jp">伝説のアート</span>
            </div>

            <!-- Кнопка -->
            <div class="details-btn">DETAILS</div>
            
            <div class="glow-bottom"></div>
        </a>
        <!-- КІНЕЦЬ КАРТКИ -->

    </div>

</body>
</html>
