<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yokai Tattoo Studio</title>
    <style>
        @import url('https://googleapis.com');

        body { 
            background: #050505; 
            margin: 0; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            min-height: 100vh; 
            perspective: 2000px; 
            overflow-x: hidden;
            font-family: 'Bebas Neue', cursive;
            color: #fff;
        }

        /* --- МЕНЮ --- */
        .menu-overlay {
            position: fixed;
            top: 0;
            right: -100%;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: 0.6s cubic-bezier(0.85, 0, 0.15, 1);
        }
        .menu-overlay.active { right: 0; }
        .menu-overlay a {
            color: #fff;
            text-decoration: none;
            font-size: clamp(30px, 8vw, 50px);
            letter-spacing: 15px;
            margin: 15px 0;
            transition: 0.4s;
            opacity: 0.5;
        }
        .menu-overlay a:hover { opacity: 1; color: #ff0000; transform: scale(1.1); }

        .burger-menu {
            position: fixed;
            top: 40px;
            right: 40px;
            width: 32px;
            height: 22px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            cursor: pointer;
            z-index: 1000;
        }
        .burger-menu span { height: 2px; width: 100%; background: #fff; transition: 0.3s; }
        .burger-menu.open span:nth-child(1) { transform: translateY(10px) rotate(45deg); }
        .burger-menu.open span:nth-child(2) { opacity: 0; }
        .burger-menu.open span:nth-child(3) { transform: translateY(-10px) rotate(-45deg); }

        /* --- КАРТКИ --- */
        .collection-grid {
            display: flex;
            flex-direction: column;
            gap: 140px;
            padding: 120px 0;
        }

        .artifact-item {
            position: relative;
            width: 360px;
            height: 500px;
            margin: 0 auto;
            transform-style: preserve-3d;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
        }

        .artifact-body {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
        }

        .layer {
            position: absolute;
            inset: 0;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            pointer-events: none;
        }

        /* СКЛО ВПИСАНЕ В ЦЕНТР */
        .glass-layer {
            position: absolute;
            /* Вписуємо чітко під розмір середнього об'єкта */
            top: 15%;
            left: 15%;
            right: 15%;
            bottom: 15%;
            
            background: linear-gradient(135deg, 
                rgba(255, 255, 255, 0.15) 0%, 
                rgba(255, 255, 255, 0) 50%, 
                rgba(255, 255, 255, 0.05) 100%);
            
            border: 1px solid rgba(255, 255, 255, 0.1);
            transform: translateZ(8px);
            z-index: 5;
            /* Ефект грані скла */
            box-shadow: 
                0 0 15px rgba(0,0,0,0.5),
                inset 0 0 10px rgba(255,255,255,0.05);
        }

        /* Анімації */
        .neon-red .artifact-body { animation: swing-slow 10s infinite ease-in-out; }
        @keyframes swing-slow {
            0%, 100% { transform: rotateY(-10deg) rotateX(2deg); }
            50% { transform: rotateY(10deg) rotateX(-2deg); }
        }

        .neon-gold .artifact-body { animation: pulse-depth 7s infinite ease-in-out; }
        @keyframes pulse-depth {
            0%, 100% { transform: scale(1) translateZ(0); }
            50% { transform: scale(1.03) translateZ(30px); }
        }

        /* РІДКІСТЬ */
        .rarity-box { margin-top: 45px; text-align: center; z-index: 10; }
        .rarity-text { font-size: clamp(24px, 5vw, 30px); letter-spacing: 12px; margin: 0; }
        
        .neon-red .rarity-text { color: #ff0000; text-shadow: 0 0 20px rgba(255,0,0,0.4); }
        .neon-gold .rarity-text { color: #ffaa00; text-shadow: 0 0 20px rgba(255,170,0,0.4); }

        .rarity-jp {
            font-family: 'Noto Sans JP', sans-serif;
            color: #333;
            font-size: 10px;
            letter-spacing: 5px;
            margin-top: 10px;
            display: block;
        }

        /* КНОПКА DETAILS */
        .details-btn {
            margin-top: 30px;
            padding: 12px 50px;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.1);
            font-size: 13px;
            letter-spacing: 6px;
            color: #fff;
            transition: 0.3s;
            cursor: pointer;
        }
        .details-btn:hover {
            background: #fff;
            color: #000;
            border-color: #fff;
        }

    </style>
</head>
<body>

    <div class="menu-overlay" id="menuOverlay">
        <a href="#">ГОЛОВНА</a>
        <a href="#">ЗАПИСАТИСЯ</a>
        <a href="#">ЙОКАЇ</a>
        <a href="#">ПОРТФОЛІО</a>
    </div>

    <div class="burger-menu" id="burgerBtn">
        <span></span><span></span><span></span>
    </div>

    <div class="collection-grid">

        <!-- КАРТКА 1 -->
        <a href="#" class="artifact-item neon-red">
            <div class="artifact-body">
                <div class="layer" style="transform: translateZ(0px); background-image: url('01.PNG');"></div>
                <!-- СКЛО ВПИСАНЕ ПО ЦЕНТРУ -->
                <div class="glass-layer"></div>
                <div class="layer" style="transform: translateZ(12px); background-image: url('02.PNG');"></div>
                <div class="layer" style="transform: translateZ(20px); background-image: url('01.PNG'); opacity: 0.6;"></div>
            </div>
            <div class="rarity-box">
                <p class="rarity-text">LEGENDARY</p>
                <span class="rarity-jp">伝説の妖怪 — ONI MASK</span>
            </div>
            <div class="details-btn">ЗАПИСАТИСЯ</div>
        </a>

        <!-- КАРТКА 2 -->
        <a href="#" class="artifact-item neon-gold">
            <div class="artifact-body">
                <div class="layer" style="transform: translateZ(0px); background-image: url('03.PNG');"></div>
                <div class="glass-layer"></div>
                <div class="layer" style="transform: translateZ(12px); background-image: url('04.PNG');"></div>
                <div class="layer" style="transform: translateZ(20px); background-image: url('03.PNG'); opacity: 0.6;"></div>
            </div>
            <div class="rarity-box">
                <p class="rarity-text">MYTHIC</p>
                <span class="rarity-jp">神話の存在 — KITSUNE</span>
            </div>
            <div class="details-btn">ЗАПИСАТИСЯ</div>
        </a>

    </div>

    <script>
        const btn = document.getElementById('burgerBtn');
        const menu = document.getElementById('menuOverlay');
        btn.onclick = () => {
            btn.classList.toggle('open');
            menu.classList.toggle('active');
        };
    </script>
</body>
</html>
