<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            perspective: 2000px;
            overflow: hidden;
            font-family: 'Arial Black', sans-serif;
        }

        /* КОНТЕЙНЕР АРТЕФАКТУ */
        .artifact-card {
            width: 350px;
            height: 500px;
            position: relative;
            transform-style: preserve-3d;
            animation: rotateFull 12s infinite linear;
            cursor: pointer;
        }

        @keyframes rotateFull {
            from { transform: rotateY(0deg); }
            to { transform: rotateY(360deg); }
        }

        /* СИНЄ ДЕМОНІЧНЕ СЯЙВО */
        .blue-glow {
            position: absolute;
            inset: -30px;
            background: radial-gradient(circle, rgba(0, 242, 255, 0.5) 0%, transparent 75%);
            filter: blur(50px);
            transform: translateZ(-15px);
            animation: pulseBlue 3s infinite alternate ease-in-out;
        }

        @keyframes pulseBlue {
            from { opacity: 0.3; transform: scale(0.9) translateZ(-15px); }
            to { opacity: 0.8; transform: scale(1.1) translateZ(-15px); }
        }

        /* ПЕРЕДНЯ СТОРОНА */
        .card-front {
            position: absolute;
            inset: 0;
            backface-visibility: hidden;
            transform-style: preserve-3d;
        }

        /* ТВОЯ PNG РАМКА (HEARTHSTONE STYLE) */
      .frame-png {
    position: absolute;
    inset: 0;
    background: url('022.PNG') no-repeat center/contain; /* Ось тут твоя рамка */
    z-index: 10;
    transform: translateZ(45px);
    filter: drop-shadow(0 0 20px rgba(0, 242, 255, 0.4));
}


        /* ЕСКІЗ У ГЛИБИНІ */
        .sketch-layer {
            position: absolute;
            inset: 45px; /* Підганяй під дірку своєї рамки */
            background: #000;
            transform: translateZ(10px);
            overflow: hidden;
            border: 1px solid rgba(0, 242, 255, 0.2);
        }

        .sketch-layer img {
            width: 100%; height: 100%;
            object-fit: cover;
            filter: contrast(1.1) brightness(0.9);
        }

        /* БЛІК НА СКЛІ */
        .glass-shine {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 40%, rgba(0, 242, 255, 0.1) 100%);
            z-index: 5;
            pointer-events: none;
        }

        /* ЗАДНЯ СТОРОНА */
        .card-back {
            position: absolute;
            inset: 0;
            background: #050505;
            transform: rotateY(180deg);
            backface-visibility: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            border: 1px solid #111;
        }

        .blur-sketch {
            position: absolute;
            inset: 0;
            background: url('sketch.jpg') no-repeat center/cover;
            filter: blur(25px) grayscale(1) brightness(0.3);
            opacity: 0.6;
        }

        .logo-yokai {
            position: relative;
            color: #000; /* Чорне лого, як ти хотів */
            font-size: 55px;
            letter-spacing: 12px;
            text-transform: uppercase;
            font-weight: 900;
            /* Ефект гравірування на металі */
            text-shadow: 1px 1px 1px rgba(255,255,255,0.05), -1px -1px 1px rgba(0,0,0,0.9);
            z-index: 2;
        }

    </style>
</head>
<body>

    <div class="artifact-card">
        <!-- Синє магічне сяйво -->
        <div class="blue-glow"></div>

        <!-- ЛИЦЬОВА ЧАСТИНА -->
        <div class="card-front">
    <div class="frame-png"></div> <!-- Цей блок візьме картинку з CSS -->
    <div class="sketch-layer">
        <div class="glass-shine"></div>
        <img src="011.PNG" alt="Sketch">
    </div>
</div>


        <!-- ТИЛЬНА ЧАСТИНА -->
        <div class="card-back">
            <div class="blur-sketch"></div>
            <div class="logo-yokai">YYOKAI</div>
        </div>
    </div>

</body>
</html>
