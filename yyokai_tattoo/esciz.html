<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        @import url('https://googleapis.com');

        :root {
            --legendary-color: #ff003c;
            --mythic-color: #ffac00;
            --rare-color: #00d4ff;
        }

        body { 
            background: #000; 
            margin: 0; 
            color: #fff;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            perspective: 2000px;
        }

        /* --- МАТРИЦЯ (8%) --- */
        .matrix-bg {
            position: fixed; inset: 0; font-family: 'Noto Sans JP';
            font-size: 14px; color: #fff; opacity: 0.08;
            display: flex; justify-content: space-around; z-index: -1;
        }
        .matrix-column { display: flex; flex-direction: column; animation: matrixDrop 20s linear infinite; white-space: nowrap; }
        @keyframes matrixDrop { from { transform: translateY(-50%); } to { transform: translateY(0%); } }

        /* --- МЕНЮ У САМОМУ КYТY --- */
        header { position: fixed; top: 25px; right: 25px; z-index: 5000; }
        .menu-btn { width: 26px; height: 14px; display: flex; flex-direction: column; justify-content: space-between; cursor: pointer; }
        .menu-btn span { height: 1.5px; width: 100%; background: #fff; box-shadow: 0 0 5px #fff; }

        /* --- GRID --- */
        .viewport { display: flex; flex-direction: column; gap: 160px; padding: 100px 0; width: 100%; }

        .nft-item { width: 320px; margin: 0 auto; transform-style: preserve-3d; text-decoration: none; display: block; color: #fff; }

        .book-stack { width: 100%; height: 460px; position: relative; transform-style: preserve-3d; }
        .layer { position: absolute; inset: 0; background-size: contain; background-repeat: no-repeat; background-position: center; }

        /* АНІМАЦІЇ */
        .anim-swing { animation: swing 8s infinite ease-in-out; }
        @keyframes swing { 0%, 100% { transform: rotateY(-10deg); } 50% { transform: rotateY(10deg); } }

        /* --- ПРЕМІАЛЬНА ІКОНКА РІДКОСТІ (UI STYLE) --- */
        .rarity-ui {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin: -10px 0 30px;
            transform: translateZ(60px);
        }

        /* Геометричний значок */
        .rarity-icon {
            width: 24px;
            height: 24px;
            position: relative;
            background: currentColor;
            clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%); /* Форма ромба/кристала */
            animation: iconPulse 2s infinite ease-in-out;
        }

        .rarity-icon::after {
            content: '';
            position: absolute;
            inset: 2px;
            background: #000;
            clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
            z-index: 1;
        }

        .rarity-icon::before {
            content: '';
            position: absolute;
            inset: 0;
            background: inherit;
            filter: blur(8px);
            opacity: 0.8;
        }

        @keyframes iconPulse {
            0%, 100% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.2); filter: brightness(1.5); }
        }

        .rarity-tag {
            font-family: 'Cinzel';
            font-size: 14px;
            letter-spacing: 6px;
            font-weight: 900;
            text-transform: uppercase;
        }

        /* Кольори для UI елементів */
        .legendary { color: var(--legendary-color); }
        .mythic { color: var(--mythic-color); }

        /* --- ТЕКСТ --- */
        .meta { text-align: center; transform: translateZ(40px); }
        .title { font-size: 26px; font-weight: 900; letter-spacing: 5px; margin: 0; }
        .sub { font-family: 'Noto Sans JP'; font-size: 11px; color: rgba(255,255,255,0.3); margin-top: 8px; display: block; letter-spacing: 6px; }

        /* --- КНОПКА --- */
        .btn {
            margin-top: 35px; display: block; width: 100%; padding: 18px 0;
            background: #fff; color: #000; font-size: 11px; font-weight: 900;
            letter-spacing: 4px; text-transform: uppercase;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="matrix-bg" id="matrix"></div>

    <header>
        <div class="menu-btn"><span></span><span></span><span></span></div>
    </header>

    <div class="viewport">

        <!-- КАРТКА 01: LEGENDARY -->
        <a href="https://t.me" class="nft-item">
            <div class="book-stack anim-swing">
                <div class="layer" style="transform: translateZ(0px); background-image: url('01.PNG');"></div>
                <div class="layer" style="transform: translateZ(3px); background-image: url('01.PNG'); opacity: 0.3;"></div>
                <div class="layer" style="transform: translateZ(6px); background-image: url('02.PNG');"></div>
                <div class="layer" style="transform: translateZ(9px); background-image: url('01.PNG'); opacity: 0.5;"></div>
                <div class="layer" style="transform: translateZ(12px); background-image: url('01.PNG');"></div>
            </div>
            
            <!-- НОВА UI ІКОНКА ТА ТЕКСТ -->
            <div class="rarity-ui legendary">
                <div class="rarity-icon"></div>
                <span class="rarity-tag">Legendary</span>
                <div class="rarity-icon"></div>
            </div>

            <div class="meta">
                <h2 class="title">ONI MASK</h2>
                <span class="sub">般若 № 001</span>
                <div class="btn">BOOK SESSION</div>
            </div>
        </a>

        <!-- КАРТКА 02: MYTHIC -->
        <a href="https://t.me" class="nft-item">
            <div class="book-stack anim-swing" style="animation-delay: -2s;">
                <div class="layer" style="transform: translateZ(0px); background-image: url('03.PNG');"></div>
                <div class="layer" style="transform: translateZ(3px); background-image: url('03.PNG'); opacity: 0.3;"></div>
                <div class="layer" style="transform: translateZ(6px); background-image: url('04.PNG');"></div>
                <div class="layer" style="transform: translateZ(9px); background-image: url('03.PNG'); opacity: 0.5;"></div>
                <div class="layer" style="transform: translateZ(12px); background-image: url('03.PNG');"></div>
            </div>

            <div class="rarity-ui mythic">
                <div class="rarity-icon"></div>
                <span class="rarity-tag">Mythic</span>
                <div class="rarity-icon"></div>
            </div>

            <div class="meta">
                <h2 class="title">KITSUNE</h2>
                <span class="sub">狐 № 042</span>
                <div class="btn">BOOK SESSION</div>
            </div>
        </a>

    </div>

    <script>
        const matrixContainer = document.getElementById('matrix');
        const chars = "般若狐霊魂天人地龍神鬼";
        const columnCount = 14;

        for (let i = 0; i < columnCount; i++) {
            const col = document.createElement('div');
            col.className = 'matrix-column';
            col.style.animationDuration = (15 + Math.random() * 10) + 's';
            let content = "";
            for (let j = 0; j < 80; j++) {
                content += chars[Math.floor(Math.random() * chars.length)] + "<br>";
            }
            col.innerHTML = content + content;
            matrixContainer.appendChild(col);
        }
    </script>
</body>
</html>
