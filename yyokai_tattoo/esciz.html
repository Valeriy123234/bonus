<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yokai Archive — Grand Final</title>
    <style>
        @import url('https://googleapis.com');

        body { 
            background: #000; 
            margin: 0; 
            color: #fff;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* --- ЧЕРВОНА МАТРИЦЯ (14%) --- */
        .matrix-bg {
            position: fixed; inset: 0; font-family: 'Noto Sans JP';
            font-size: 16px; color: #ff0000; opacity: 0.14; 
            display: flex; justify-content: space-around; z-index: -1;
            pointer-events: none;
        }
        .matrix-column { display: flex; flex-direction: column; animation: matrixDrop 15s linear infinite; }
        @keyframes matrixDrop { from { transform: translateY(-50%); } to { transform: translateY(0%); } }

        /* --- HEADER (ABSOLUTE - УЇЖДЖАЄ ПРИ СКРОЛІ) --- */
                /* --- ОНОВЛЕНИЙ HEADER (ЗВУК ТА МЕНЮ ЗАВЖДИ ЗВЕРХУ) --- */
        header { 
            position: absolute; top: 0; width: 100%; 
            padding: 40px 25px; display: flex; 
            justify-content: center; align-items: center; 
            z-index: 9999; /* Вище за всі інші елементи */
            box-sizing: border-box;
        }

        .burger-wrapper { 
            position: absolute; right: 25px; 
            z-index: 10000; /* Максимальний пріоритет для бургера */
        }

        /* --- РАНДОМНИЙ ЕКВАЛАЙЗЕР --- */
        .sound-wrapper {
            position: relative;
            width: 50px; height: 40px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            z-index: 10000;
        }

        .speaker-icon {
            position: absolute; width: 22px; height: 22px;
            fill: #fff; opacity: 0.5; transition: 0.3s;
        }

        .equalizer {
            display: flex; align-items: flex-end; gap: 3px;
            height: 25px; opacity: 0; transform: scale(0.5); transition: 0.3s;
        }

        .bar { width: 3px; background: #ff0000; box-shadow: 0 0 10px #ff0000; }

        .sound-wrapper.active .speaker-icon { opacity: 0; transform: scale(0); }
        .sound-wrapper.active .equalizer { opacity: 1; transform: scale(1); }

        .sound-wrapper.active .bar:nth-child(1) { animation: eq1 0.6s infinite alternate; }
        .sound-wrapper.active .bar:nth-child(2) { animation: eq2 0.4s infinite alternate; }
        .sound-wrapper.active .bar:nth-child(3) { animation: eq3 0.7s infinite alternate; }
        .sound-wrapper.active .bar:nth-child(4) { animation: eq1 0.5s infinite alternate-reverse; }
        .sound-wrapper.active .bar:nth-child(5) { animation: eq2 0.8s infinite alternate; }
        .sound-wrapper.active .bar:nth-child(6) { animation: eq3 0.3s infinite alternate-reverse; }

        @keyframes eq1 { 0% { height: 4px; } 100% { height: 22px; } }
        @keyframes eq2 { 0% { height: 10px; } 100% { height: 25px; } }
        @keyframes eq3 { 0% { height: 6px; } 100% { height: 18px; } }

        /* --- МЕНЮ ТА ХРЕСТИК --- */
        .burger { width: 30px; height: 18px; display: flex; flex-direction: column; justify-content: space-between; cursor: pointer; }
        .burger span { display: block; height: 2px; width: 100%; background: #fff; transition: 0.4s; }
        
        /* Коли меню відкрите, робимо хрестик червоним, щоб не губився */
        .burger.active span { background: #ff0000; box-shadow: 0 0 10px #ff0000; }
        
        .burger.active span:nth-child(1) { transform: translateY(8px) rotate(45deg); }
        .burger.active span:nth-child(2) { opacity: 0; }
        .burger.active span:nth-child(3) { transform: translateY(-8px) rotate(-45deg); }

        .nav-overlay {
            position: fixed; inset: 0; 
            background: rgba(0,0,0,0.98);
            display: flex; flex-direction: column; 
            align-items: center; justify-content: center;
            opacity: 0; visibility: hidden; 
            transition: 0.4s; 
            z-index: 9000; /* Overlay тепер нижче за кнопку, тому її буде видно */
        }
        .nav-overlay.active { opacity: 1; visibility: visible; }
        .nav-overlay a { font-size: 32px; color: #fff; text-decoration: none; margin: 15px; font-weight: 900; letter-spacing: 5px; text-transform: uppercase; }


        /* --- КОНТЕЙНЕР КАРТОК --- */
        .container { display: flex; flex-direction: column; gap: 120px; padding: 140px 0 100px; align-items: center; }

        .nft-card {
            width: 320px; height: 450px;
            position: relative; transform-style: preserve-3d;
            display: block; text-decoration: none;
        }

        /* Різні анімації */
        .anim-oni { animation: swingOni 8s infinite ease-in-out; }
        @keyframes swingOni { 0%, 100% { transform: rotateY(-15deg) rotateX(4deg); } 50% { transform: rotateY(15deg) rotateX(-2deg); } }

        .anim-kitsune { animation: swingKitsune 6s infinite ease-in-out; }
        @keyframes swingKitsune { 0%, 100% { transform: translateZ(0) rotateY(10deg); } 50% { transform: translateZ(30px) rotateY(-10deg); } }

        .layer {
            position: absolute; inset: 0; background-size: contain; 
            background-repeat: no-repeat; background-position: center; pointer-events: none;
        }

        /* ТЕКСТ ТА КНОПКА */
        .meta { margin-top: 30px; text-align: center; }
        .title { font-size: 26px; font-weight: 900; letter-spacing: 6px; margin: 0; text-transform: uppercase; color: #fff; }
        
        .btn-try {
            margin-top: 25px; display: block; width: 100%; padding: 22px 0;
            background: #fff; color: #000; font-size: 16px; font-weight: 900;
            letter-spacing: 5px; text-transform: uppercase; text-align: center;
            text-decoration: none; position: relative; z-index: 10;
            box-shadow: 0 0 25px rgba(255,255,255,0.2);
            transition: 0.2s;
        }
        .btn-try:active { background: #ff0000; color: #fff; transform: scale(0.95); }
    </style>
</head>
<body>

    <div class="matrix-bg" id="matrix"></div>

    <audio id="bgMusic" loop>
        <source src="copy_28B6B8FE-C752-484D-825F-
BB890C30D3A6.mp3" type="audio/mpeg">
    </audio>

    <header>
        <!-- РАНДОМНИЙ ЕКВАЛАЙЗЕР -->
        <div class="sound-wrapper" id="soundBtn">
            <svg class="speaker-icon" viewBox="0 0 24 24"><path d="M3,9V15H7L12,20V4L7,9H3Z"/></svg>
            <div class="equalizer">
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
            </div>
        </div>
        
        <div class="burger-wrapper">
            <div class="burger" id="burgerBtn">
                <span></span><span></span><span></span>
            </div>
        </div>
    </header>

    <nav class="nav-overlay" id="navMenu">
        <div style="font-family:'Cinzel'; opacity:0.3; margin-bottom:40px; letter-spacing:10px;">MENU ARCHIVE</div>
        <a href="index.html">ГОЛОВНА</a>
        <a href="https://t.me">ЗАПИСАТИСЬ</a>
    </nav>

    <div class="container">

        <!-- КАРТКА 01 -->
        <div style="width: 320px;">
            <a href="primerka.html" class="nft-card anim-oni">
                <div class="layer" style="transform: translateZ(0px); background-image: url('01.webp');"></div>
                <div class="layer" style="transform: translateZ(2px); background-image: url('01.webp'); opacity: 0.2;"></div>
                <div class="layer" style="transform: translateZ(4px); background-image: url('02.webp');"></div> 
                <div class="layer" style="transform: translateZ(6px); background-image: url('01.webp'); opacity: 0.4;"></div>
                <div class="layer" style="transform: translateZ(8px); background-image: url('01.webp');"></div>
            </a>
            <div class="meta">
                <h2 class="title">Yokai Guardian</h2>
                <a href="primerka3.html" class="btn-try">ПРИМІРЯТИ</a>
            </div>
        </div>

        <!-- КАРТКА 02 -->
        <div style="width: 320px;">
            <a href="primerka.html" class="nft-card anim-kitsune" style="animation-delay: -3s;">
                <div class="layer" style="transform: translateZ(0px); background-image: url('06.webp');"></div>
                <div class="layer" style="transform: translateZ(2px); background-image: url('06.webp'); opacity: 0.2;"></div>
                <div class="layer" style="transform: translateZ(4px); background-image: url('07.webp');"></div>
                <div class="layer" style="transform: translateZ(6px); background-image: url('06.webp'); opacity: 0.4;"></div>
                <div class="layer" style="transform: translateZ(8px); background-image: url('06.webp');"></div>
            </a>
            <div class="meta">
                <h2 class="title">Yurei Tanuki</h2>
                <a href="primerka.html" class="btn-try">ПРИМІРЯТИ</a>
            </div>
        </div>

    </div>

    <script>
        // Матриця
        const matrix = document.getElementById('matrix');
        const chars = "般若狐霊魂天人地龍神鬼";
        for (let i = 0; i < 12; i++) {
            const col = document.createElement('div');
            col.className = 'matrix-column';
            col.style.animationDuration = (12 + Math.random() * 8) + 's';
            let content = "";
            for (let j = 0; j < 60; j++) { content += chars[Math.floor(Math.random() * chars.length)] + "<br>"; }
            col.innerHTML = content + content;
            matrix.appendChild(col);
        }

        // Меню
        const burger = document.getElementById('burgerBtn');
        const menu = document.getElementById('navMenu');
        burger.onclick = () => {
            burger.classList.toggle('active');
            menu.classList.toggle('active');
            document.body.style.overflow = menu.classList.contains('active') ? 'hidden' : 'auto';
        };

        // Звук
        const soundBtn = document.getElementById('soundBtn');
        const music = document.getElementById('bgMusic');
        soundBtn.onclick = () => {
            if (music.paused) {
                music.play();
                soundBtn.classList.add('active');
            } else {
                music.pause();
                soundBtn.classList.remove('active');
            }
        };
    </script>
</body>
</html>
