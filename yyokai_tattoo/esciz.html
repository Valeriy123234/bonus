<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yokai Digital Archive — Ultra Edition</title>
    <style>
        @import url('https://googleapis.com');

        :root {
            /* Градієнти для плашок рідкості */
            --legendary-foil: linear-gradient(110deg, #ff0000 0%, #4d0000 25%, #ff4d4d 50%, #4d0000 75%, #ff0000 100%);
            --mythic-foil: linear-gradient(110deg, #bf953f 0%, #aa771c 25%, #fcf6ba 50%, #b38728 75%, #bf953f 100%);
            --rare-foil: linear-gradient(110deg, #00d4ff 0%, #001a4d 25%, #0055ff 50%, #001a4d 75%, #00d4ff 100%);
        }

        body { 
            background: #000; 
            margin: 0; 
            color: #fff;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            perspective: 2000px;
        }

        /* --- ЯПОНСЬКА МАТРИЦЯ НА ФОНІ --- */
        .matrix-bg {
            position: fixed;
            inset: 0;
            font-family: 'Noto Sans JP';
            font-size: 20px;
            color: #fff;
            opacity: 0.15; /* Твоя прозорість 15-20% */
            display: flex;
            justify-content: space-around;
            overflow: hidden;
            z-index: -1;
            pointer-events: none;
            user-select: none;
        }

        .matrix-column {
            display: flex;
            flex-direction: column;
            animation: matrixDrop 15s linear infinite;
        }

        @keyframes matrixDrop {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(100%); }
        }

        /* --- UI: HEADER --- */
        header {
            position: fixed; top: 0; width: 100%; padding: 50px 35px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 5000; box-sizing: border-box;
        }
        .menu-btn { 
            width: 25px; height: 15px; display: flex; flex-direction: column; 
            justify-content: space-between; cursor: pointer; 
        }
        .menu-btn span { height: 1px; width: 100%; background: #fff; }

        /* --- COLLECTION GRID --- */
        .viewport { display: flex; flex-direction: column; gap: 200px; padding: 150px 0; width: 100%; }

        /* КЛІКАБЕЛЬНА КАРТКА */
        .nft-item { 
            width: 320px; margin: 0 auto; transform-style: preserve-3d; 
            text-decoration: none; display: block;
        }

        .book-stack { width: 100%; height: 460px; position: relative; transform-style: preserve-3d; }
        .layer {
            position: absolute; inset: 0; background-size: contain; 
            background-repeat: no-repeat; background-position: center;
        }

        /* --- БІБЛІОТЕКА АНІМАЦІЙ --- */
        .anim-1 { animation: a1 8s infinite ease-in-out; }
        @keyframes a1 { 0%, 100% { transform: rotateY(-12deg); } 50% { transform: rotateY(12deg) rotateX(4deg); } }
        
        .anim-2 { animation: a2 6s infinite ease-in-out; }
        @keyframes a2 { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-25px) translateZ(40px); } }

        /* --- ПЛАШКА РІДКОСТІ (Glow Foil) --- */
        .rarity-badge {
            width: fit-content;
            margin: -20px auto 30px;
            padding: 6px 20px;
            font-family: 'Cinzel';
            font-size: 10px;
            letter-spacing: 5px;
            font-weight: 900;
            color: #fff;
            position: relative;
            background-size: 200% auto;
            animation: foilShine 4s linear infinite;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            transform: translateZ(50px);
        }

        @keyframes foilShine {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        .legendary { background-image: var(--legendary-foil); }
        .mythic { background-image: var(--mythic-foil); }
        .rare { background-image: var(--rare-foil); }

        /* ТЕКСТ */
        .meta { text-align: center; }
        .title { font-size: 24px; font-weight: 800; letter-spacing: 4px; margin: 0; color: #fff; }
        .sub { font-family: 'Noto Sans JP'; font-size: 10px; color: rgba(255,255,255,0.2); margin-top: 10px; display: block; letter-spacing: 5px; }

        /* КНОПКА */
        .btn {
            margin-top: 40px; display: inline-block; padding: 15px 50px;
            border: 1px solid rgba(255,255,255,0.1); background: transparent;
            color: #fff; font-size: 9px; letter-spacing: 4px; text-transform: uppercase;
        }

    </style>
</head>
<body>

    <!-- ЯПОНСЬКА МАТРИЦЯ -->
    <div class="matrix-bg" id="matrix"></div>

    <header>
        <div style="font-size: 9px; letter-spacing: 5px; opacity: 0.5;">YOKAI / ARCHIVE</div>
        <div class="menu-btn"><span></span><span></span></div>
    </header>

    <div class="viewport">

        <!-- КАРТКА 01: LEGENDARY -->
        <a href="https://t.me" class="nft-item">
            <div class="book-stack anim-1">
                <div class="layer" style="transform: translateZ(0px); background-image: url('01.PNG');"></div>
                <div class="layer" style="transform: translateZ(3px); background-image: url('01.PNG'); opacity: 0.3;"></div>
                <div class="layer" style="transform: translateZ(6px); background-image: url('02.PNG');"></div>
                <div class="layer" style="transform: translateZ(9px); background-image: url('01.PNG'); opacity: 0.5;"></div>
                <div class="layer" style="transform: translateZ(12px); background-image: url('01.PNG');"></div>
            </div>
            <div class="rarity-badge legendary">LEGENDARY</div>
            <div class="meta">
                <h2 class="title">ONI MASK</h2>
                <span class="sub">般若 № 001</span>
                <div class="btn">REQUEST ACCESS</div>
            </div>
        </a>

        <!-- КАРТКА 02: MYTHIC -->
        <a href="https://t.me" class="nft-item">
            <div class="book-stack anim-2">
                <div class="layer" style="transform: translateZ(0px); background-image: url('03.PNG');"></div>
                <div class="layer" style="transform: translateZ(3px); background-image: url('03.PNG'); opacity: 0.3;"></div>
                <div class="layer" style="transform: translateZ(6px); background-image: url('04.PNG');"></div>
                <div class="layer" style="transform: translateZ(9px); background-image: url('03.PNG'); opacity: 0.5;"></div>
                <div class="layer" style="transform: translateZ(12px); background-image: url('03.PNG');"></div>
            </div>
            <div class="rarity-badge mythic">MYTHIC</div>
            <div class="meta">
                <h2 class="title">KITSUNE</h2>
                <span class="sub">狐 № 042</span>
                <div class="btn">REQUEST ACCESS</div>
            </div>
        </a>

    </div>

    <script>
        // Скрипт для генерації матричного фону
        const matrixContainer = document.getElementById('matrix');
        const chars = "般若狐霊魂天人地龍神鬼";
        const columnCount = 15;

        for (let i = 0; i < columnCount; i++) {
            const col = document.createElement('div');
            col.className = 'matrix-column';
            col.style.animationDelay = (Math.random() * 5) + 's';
            let content = "";
            for (let j = 0; j < 50; j++) {
                content += chars[Math.floor(Math.random() * chars.length)] + "<br>";
            }
            col.innerHTML = content;
            matrixContainer.appendChild(col);
        }
    </script>
</body>
</html>
