<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        @import url('https://googleapis.com');

        body { 
            background: #000; 
            margin: 0; 
            color: #fff;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* --- ЯПОНСЬКА МАТРИЦЯ (12%) --- */
        .matrix-bg {
            position: fixed; inset: 0; font-family: 'Noto Sans JP';
            font-size: 18px; color: #fff; opacity: 0.12;
            display: flex; justify-content: space-around; z-index: -1;
            pointer-events: none;
        }
        .matrix-column { display: flex; flex-direction: column; animation: matrixDrop 15s linear infinite; }
        @keyframes matrixDrop { from { transform: translateY(-50%); } to { transform: translateY(0%); } }

        /* --- МЕНЮ (БУТЕРБРОД) --- */
        header { position: fixed; top: 30px; right: 25px; z-index: 7000; }
        .burger { width: 30px; height: 18px; display: flex; flex-direction: column; justify-content: space-between; cursor: pointer; }
        .burger span { display: block; height: 2px; width: 100%; background: #fff; }

        .nav-overlay {
            position: fixed; inset: 0; background: #000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transform: translateY(-100%); transition: 0.5s ease-in-out; z-index: 6000;
        }
        .nav-overlay.active { transform: translateY(0); }
        .nav-overlay a { font-size: 30px; color: #fff; text-decoration: none; margin: 15px; letter-spacing: 5px; font-weight: 900; }

        /* --- КОНТЕЙНЕР --- */
        .container { display: flex; flex-direction: column; gap: 100px; padding: 100px 0; align-items: center; }

        /* ТВІЙ СТЕК (ФІКСОВАНІ РОЗМІРИ ЩОБ НЕ ЗНИКАЛО) */
        .artifact-card {
            width: 320px;
            height: 450px;
            position: relative;
            transform-style: preserve-3d;
            display: block;
            text-decoration: none;
            /* УНІКАЛЬНІ АНІМАЦІЇ */
        }

        .anim-1 { animation: swingOni 8s infinite ease-in-out; }
        @keyframes swingOni { 0%, 100% { transform: rotateY(-15deg); } 50% { transform: rotateY(15deg); } }

        .anim-2 { animation: driftKitsune 6s infinite ease-in-out; }
        @keyframes driftKitsune { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }

        .layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            pointer-events: none;
        }

        /* --- HEARTHSTONE РІДКІСТЬ --- */
        .rarity-ui {
            margin: 20px 0;
            text-align: center;
        }
        .rarity-text {
            font-family: 'Cinzel';
            font-size: 22px;
            font-weight: 900;
            letter-spacing: 8px;
            background: linear-gradient(90deg, #ff0000, #ffee00, #00ff00, #00ffff, #ff00ff, #ff0000);
            background-size: 300% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: hsColor 5s linear infinite;
        }
        @keyframes hsColor { to { background-position: 300% center; } }

        /* --- КНОПКА --- */
        .btn-try {
            margin-top: 20px;
            display: block; width: 100%; padding: 20px 0;
            background: #fff; color: #000;
            font-size: 16px; font-weight: 900; letter-spacing: 5px;
            text-align: center; text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="matrix-bg" id="matrix"></div>

    <header>
        <div class="burger" id="btnMenu">
            <span></span><span></span><span></span>
        </div>
    </header>

    <nav class="nav-overlay" id="menuFs">
        <div style="font-family:'Cinzel'; opacity:0.3; margin-bottom:40px;">MENU</div>
        <a href="#">ГОЛОВНА</a>
        <a href="#">ЗАПИСАТИСЬ</a>
    </nav>

    <div class="container">

        <!-- КАРТКА 01 -->
        <div style="width: 320px;">
            <a href="primerka.html" class="artifact-card anim-1">
                <div class="layer" style="transform: translateZ(0px); background-image: url('01.PNG');"></div>
                <div class="layer" style="transform: translateZ(3px); background-image: url('01.PNG'); opacity: 0.3;"></div>
                <div class="layer" style="transform: translateZ(6px); background-image: url('02.PNG');"></div> <!-- ЕСКІЗ -->
                <div class="layer" style="transform: translateZ(9px); background-image: url('01.PNG'); opacity: 0.5;"></div>
                <div class="layer" style="transform: translateZ(12px); background-image: url('01.PNG');"></div>
            </a>
            <div class="rarity-ui">
                <span class="rarity-text">LEGENDARY</span>
            </div>
            <h2 style="text-align:center; letter-spacing:5px; font-size:24px; margin:0;">ONI CORE</h2>
            <a href="primerka.html" class="btn-try">ПРИМІРЯТИ</a>
        </div>

        <!-- КАРТКА 02 -->
        <div style="width: 320px;">
            <a href="primerka.html" class="artifact-card anim-2">
                <div class="layer" style="transform: translateZ(0px); background-image: url('03.PNG');"></div>
                <div class="layer" style="transform: translateZ(3px); background-image: url('03.PNG'); opacity: 0.3;"></div>
                <div class="layer" style="transform: translateZ(6px); background-image: url('04.PNG');"></div>
                <div class="layer" style="transform: translateZ(9px); background-image: url('03.PNG'); opacity: 0.5;"></div>
                <div class="layer" style="transform: translateZ(12px); background-image: url('03.PNG');"></div>
            </a>
            <div class="rarity-ui">
                <span class="rarity-text" style="background: linear-gradient(90deg, #bf953f, #fcf6ba, #b38728, #bf953f); background-size: 200% auto;">MYTHIC</span>
            </div>
            <h2 style="text-align:center; letter-spacing:5px; font-size:24px; margin:0;">KITSUNE</h2>
            <a href="primerka.html" class="btn-try">ПРИМІРЯТИ</a>
        </div>

    </div>

    <script>
        // Матриця
        const matrix = document.getElementById('matrix');
        const chars = "般若狐霊魂天人地龍神鬼";
        for (let i = 0; i < 10; i++) {
            const col = document.createElement('div');
            col.className = 'matrix-column';
            col.style.animationDuration = (12 + Math.random() * 8) + 's';
            let content = "";
            for (let j = 0; j < 50; j++) { content += chars[Math.floor(Math.random() * chars.length)] + "<br>"; }
            col.innerHTML = content + content;
            matrix.appendChild(col);
        }

        // Меню
        const btn = document.getElementById('btnMenu');
        const menu = document.getElementById('menuFs');
        btn.onclick = () => {
            menu.classList.toggle('active');
            document.body.style.overflow = menu.classList.contains('active') ? 'hidden' : 'auto';
        }
    </script>
</body>
</html>
