<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; perspective: 1500px; overflow: hidden; }

        .artifact {
            width: 320px;
            height: 460px;
            position: relative;
            transform-style: preserve-3d;
            animation: rotate 10s infinite linear;
            will-change: transform;
        }

        @keyframes rotate {
            from { transform: rotateY(0deg) rotateX(5deg); }
            to { transform: rotateY(360deg) rotateX(5deg); }
        }

        /* ШАРИ РАМКИ (дуже щільно для об'єму) */
        .f {
            position: absolute;
            inset: 0;
            background: url('022.PNG') no-repeat center/contain;
            backface-visibility: visible;
            pointer-events: none;
        }

        /* ЕСКІЗ (фіксований посередині) */
        .sketch-layer {
            position: absolute;
            inset: 50px; /* Регулюй це значення, щоб ескіз вписався в дирку */
            background: url('011.PNG') no-repeat center/contain;
            transform: translateZ(7px);
            z-index: 5;
        }

        /* СКЛО З ЛОГОТИПОМ */
        .glass-back {
            position: absolute;
            inset: 20px;
            background: rgba(0, 242, 255, 0.05);
            backdrop-filter: blur(2px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transform: rotateY(180deg) translateZ(-1px);
            display: flex;
            justify-content: center;
            align-items: center;
            backface-visibility: hidden;
        }

        .logo {
            color: rgba(0, 0, 0, 0.9);
            font-size: 40px;
            font-family: sans-serif;
            font-weight: 900;
            letter-spacing: 6px;
            text-shadow: 0 1px 1px rgba(255,255,255,0.2);
            transform: scaleX(-1); /* Щоб читалося правильно ззаду */
        }

        .blue-glow {
            position: absolute;
            inset: -50px;
            background: radial-gradient(circle, rgba(0, 242, 255, 0.2), transparent 70%);
            transform: translateZ(-15px);
        }
    </style>
</head>
<body>

    <div class="artifact" id="box">
        <div class="blue-glow"></div>
        <!-- Ескіз -->
        <div class="sketch-layer"></div>
    </div>

    <script>
        const box = document.getElementById('box');
        const layers = 25; // Кількість шарів

        for (let i = 0; i < layers; i++) {
            const layer = document.createElement('div');
            layer.className = 'f';
            // Крок 0.5px створює щільний об'єм без щілин
            layer.style.transform = `translateZ(${i * 0.5}px)`;
            box.appendChild(layer);

            // На самому останньому шарі (задньому) додаємо скло з лого
            if (i === 0) {
                const glass = document.createElement('div');
                glass.className = 'glass-back';
                glass.innerHTML = '<div class="logo">YYOKAI</div>';
                layer.appendChild(glass);
            }
        }
    </script>
</body>
</html>
