<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { 
            background: #000; 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            perspective: 1000px; 
            overflow: hidden;
        }

        .artifact {
            width: 300px;
            height: 430px;
            position: relative;
            transform-style: preserve-3d;
            animation: rotate 15s infinite linear;
            will-change: transform;
        }

        @keyframes rotate {
            from { transform: rotateY(0deg); }
            to { transform: rotateY(360deg); }
        }

        /* ТІЛЬКИ 3 ШАРИ ДЛЯ ШВИДКОСТІ */
        .layer {
            position: absolute;
            inset: 0;
            background: url('022.PNG') no-repeat center/contain;
            pointer-events: none;
            backface-visibility: visible;
        }

        /* ЕСКІЗ - ЧІТКИЙ І ВСЕРЕДИНІ */
        .sketch-wrap {
            position: absolute;
            inset: 0;
            z-index: 5;
            -webkit-mask: url('022.PNG') no-repeat center/contain;
            mask: url('022.PNG') no-repeat center/contain;
            transform: translateZ(10px); /* Ескіз між шарами */
        }

        .sketch-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* ЗАДНЯ СТОРОНА (СКЛО З ЛОГО) */
        .back-glass {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            transform: rotateY(180deg);
            backface-visibility: hidden;
            -webkit-mask: url('022.PNG') no-repeat center/contain;
            mask: url('022.PNG') no-repeat center/contain;
        }

        .logo {
            color: #111;
            font-size: 40px;
            font-family: sans-serif;
            font-weight: 900;
            letter-spacing: 5px;
            transform: scaleX(-1);
            text-shadow: 0 1px 0 rgba(255,255,255,0.1);
        }

        /* М'ЯКЕ СЯЙВО ЗНИЗУ (ЛЕВІТАЦІЯ) */
        .bottom-glow {
            position: absolute;
            bottom: -40px;
            left: 50%;
            width: 180px;
            height: 30px;
            background: rgba(0, 242, 255, 0.4);
            filter: blur(35px);
            transform: translateX(-50%) translateZ(-30px);
            border-radius: 50%;
            animation: pulse 3s infinite alternate ease-in-out;
        }

        @keyframes pulse {
            from { opacity: 0.2; transform: translateX(-50%) scale(1); }
            to { opacity: 0.6; transform: translateX(-50%) scale(1.4); }
        }
    </style>
</head>
<body>

    <div class="artifact">
        <div class="bottom-glow"></div>

        <!-- Задній шар + скло з лого -->
        <div class="layer" style="transform: translateZ(0px)">
            <div class="back-glass">
                <div class="logo">YYOKAI</div>
            </div>
        </div>

        <!-- Середній шар (ескіз) -->
        <div class="sketch-wrap">
            <img src="011.PNG">
        </div>

        <!-- Передній шар (лицьова рамка) -->
        <div class="layer" style="transform: translateZ(20px)"></div>
    </div>

</body>
</html>
