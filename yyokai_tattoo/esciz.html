<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        @import url('https://googleapis.com');

        body { 
            background: #000; 
            margin: 0; 
            color: #fff;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* ЧЕРВОНА МАТРИЦЯ (11%) */
        .matrix-bg {
            position: fixed; inset: 0; font-family: 'Noto Sans JP';
            font-size: 16px; color: #ff0000; opacity: 0.11; 
            display: flex; justify-content: space-around; z-index: -1;
            pointer-events: none;
        }
        .matrix-column { display: flex; flex-direction: column; animation: matrixDrop 15s linear infinite; }
        @keyframes matrixDrop { from { transform: translateY(-50%); } to { transform: translateY(0%); } }

        /* МЕНЮ В КУТКУ */
        header { position: fixed; top: 25px; right: 25px; z-index: 7000; }
        .burger { width: 30px; height: 18px; display: flex; flex-direction: column; justify-content: space-between; cursor: pointer; }
        .burger span { display: block; height: 2px; width: 100%; background: #fff; transition: 0.4s; }
        .burger.active span:nth-child(1) { transform: translateY(8px) rotate(45deg); }
        .burger.active span:nth-child(2) { opacity: 0; }
        .burger.active span:nth-child(3) { transform: translateY(-8px) rotate(-45deg); }

        .nav-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.98);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            opacity: 0; visibility: hidden; transition: 0.4s; z-index: 6000;
        }
        .nav-overlay.active { opacity: 1; visibility: visible; }
        .nav-overlay a { font-size: 32px; color: #fff; text-decoration: none; margin: 15px; font-weight: 900; letter-spacing: 5px; }

        /* КАРТКИ */
        .container { display: flex; flex-direction: column; gap: 140px; padding: 100px 0; align-items: center; }

        .nft-card {
            width: 320px; height: 450px;
            position: relative; transform-style: preserve-3d;
            display: block; text-decoration: none;
        }

        .anim-oni { animation: moveOni 8s infinite ease-in-out; }
        @keyframes moveOni { 0%, 100% { transform: rotateY(-15deg) rotateX(4deg); } 50% { transform: rotateY(15deg) rotateX(-2deg); } }

        .layer {
            position: absolute; inset: 0; background-size: contain; 
            background-repeat: no-repeat; background-position: center;
        }

        /* --- НОВА ПРЕМІАЛЬНА ЛЕГЕНДАРНІСТЬ --- */
        .rarity-container {
            margin: 20px 0;
            display: flex;
            justify-content: center;
            transform: translateZ(60px);
        }

        .rarity-plate {
            position: relative;
            padding: 8px 35px;
            background: linear-gradient(180deg, #1a1a1a 0%, #000 100%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%); /* Скошені краї як в UI */
            overflow: hidden;
        }

        .rarity-text {
            font-family: 'Cinzel';
            font-size: 18px;
            font-weight: 900;
            letter-spacing: 8px;
            text-transform: uppercase;
            position: relative;
            z-index: 2;
        }

        /* Анімоване неонове підсвічування */
        .neon-glow {
            position: absolute;
            inset: 0;
            z-index: 1;
            opacity: 0.8;
            animation: flowGlow 3s infinite alternate;
        }

        .legendary .neon-glow { background: radial-gradient(circle, #ff0000 0%, transparent 70%); }
        .mythic .neon-glow { background: radial-gradient(circle, #ffcc00 0%, transparent 70%); }

        @keyframes flowGlow {
            from { transform: translateX(-50%) scale(1); opacity: 0.4; }
            to { transform: translateX(50%) scale(1.5); opacity: 0.9; }
        }

        /* ТЕКСТ ТА КНОПКА */
        .meta { text-align: center; }
        .title { font-size: 26px; font-weight: 900; letter-spacing: 4px; margin: 0; color: #fff; }
        
        .btn-try {
            margin-top: 30px; display: block; width: 100%; padding: 22px 0;
            background: #fff; color: #000; font-size: 15px; font-weight: 900;
            letter-spacing: 5px; text-transform: uppercase; text-align: center;
            text-decoration: none; box-shadow: 0 0 25px rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>

    <div class="matrix-bg" id="matrix"></div>

    <header>
        <div class="burger" id="burger">
            <span></span><span></span><span></span>
        </div>
    </header>

    <nav class="nav-overlay" id="nav">
        <a href="#">ГОЛОВНА</a>
        <a href="#">ЗАПИСАТИСЬ</a>
    </nav>

    <div class="container">

        <!-- КАРТКА 01: LEGENDARY -->
        <div style="width: 320px;">
            <a href="primerka.html" class="nft-card anim-oni">
                <div class="layer" style="transform: translateZ(0px); background-image: url('01.PNG');"></div>
                <div class="layer" style="transform: translateZ(2px); background-image: url('01.PNG'); opacity: 0.2;"></div>
                <div class="layer" style="transform: translateZ(4px); background-image: url('02.PNG');"></div> 
                <div class="layer" style="transform: translateZ(6px); background-image: url('01.PNG'); opacity: 0.4;"></div>
                <div class="layer" style="transform: translateZ(8px); background-image: url('01.PNG');"></div>
            </a>
            
            <div class="rarity-container">
                <div class="rarity-plate legendary">
                    <div class="neon-glow"></div>
                    <span class="rarity-text">LEGENDARY</span>
                </div>
            </div>

            <div class="meta">
                <h2 class="title">ONI MASK</h2>
                <a href="primerka.html" class="btn-try">ПРИМІРЯТИ</a>
            </div>
        </div>

        <!-- КАРТКА 02: MYTHIC -->
        <div style="width: 320px;">
            <a href="primerka.html" class="nft-card anim-oni" style="animation-delay: -3s;">
                <div class="layer" style="transform: translateZ(0px); background-image: url('03.PNG');"></div>
                <div class="layer" style="transform: translateZ(2px); background-image: url('03.PNG'); opacity: 0.2;"></div>
                <div class="layer" style="transform: translateZ(4px); background-image: url('04.PNG');"></div>
                <div class="layer" style="transform: translateZ(6px); background-image: url('03.PNG'); opacity: 0.4;"></div>
                <div class="layer" style="transform: translateZ(8px); background-image: url('03.PNG');"></div>
            </a>
            
            <div class="rarity-container">
                <div class="rarity-plate mythic">
                    <div class="neon-glow"></div>
                    <span class="rarity-text">MYTHIC</span>
                </div>
            </div>

            <div class="meta">
                <h2 class="title">KITSUNE</h2>
                <a href="primerka.html" class="btn-try">ПРИМІРЯТИ</a>
            </div>
        </div>

    </div>

    <script>
        // Матриця
        const matrix = document.getElementById('matrix');
        const chars = "般若狐霊魂天人地龍神鬼";
        for (let i = 0; i < 12; i++) {
            const col = document.createElement('div');
            col.className = 'matrix-column';
            col.style.animationDuration = (12 + Math.random() * 8) + 's';
            let content = "";
            for (let j = 0; j < 60; j++) { content += chars[Math.floor(Math.random() * chars.length)] + "<br>"; }
            col.innerHTML = content + content;
            matrix.appendChild(col);
        }

        // Меню
        const burger = document.getElementById('burger');
        const nav = document.getElementById('nav');
        burger.onclick = () => {
            burger.classList.toggle('active');
            nav.classList.toggle('active');
        };
    </script>
</body>
</html>
