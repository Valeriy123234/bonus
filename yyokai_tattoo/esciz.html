<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        @import url('https://googleapis.com');

        body { 
            background: #000; 
            margin: 0; 
            color: #fff;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* --- ЧЕРВОНА МАТРИЦЯ (13% ПРОЗОРІСТЬ) --- */
        .matrix-bg {
            position: fixed; inset: 0; font-family: 'Noto Sans JP';
            font-size: 16px; color: #ff0000; opacity: 0.13; 
            display: flex; justify-content: space-around; z-index: -1;
            pointer-events: none;
        }
        .matrix-column { display: flex; flex-direction: column; animation: matrixDrop 15s linear infinite; }
        @keyframes matrixDrop { from { transform: translateY(-50%); } to { transform: translateY(0%); } }

        /* --- МЕНЮ (БУТЕРБРОД З АНІМАЦІЄЮ) --- */
        header { position: fixed; top: 30px; right: 25px; z-index: 8000; }
        .burger { 
            width: 30px; height: 18px; 
            display: flex; flex-direction: column; justify-content: space-between; 
            cursor: pointer; 
        }
        .burger span { display: block; height: 2px; width: 100%; background: #fff; transition: 0.3s ease; }
        
        /* Анімація перетворення в Хрестик */
        .burger.active span:nth-child(1) { transform: translateY(8px) rotate(45deg); }
        .burger.active span:nth-child(2) { opacity: 0; }
        .burger.active span:nth-child(3) { transform: translateY(-8px) rotate(-45deg); }

        .nav-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.98);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            opacity: 0; visibility: hidden; transition: 0.4s; z-index: 7000;
        }
        .nav-overlay.active { opacity: 1; visibility: visible; }
        .nav-overlay a { font-size: 32px; color: #fff; text-decoration: none; margin: 15px; font-weight: 900; letter-spacing: 5px; }

        /* --- КАРТКИ (ТВОЯ СТРУКТУРА) --- */
        .container { display: flex; flex-direction: column; gap: 110px; padding: 100px 0; align-items: center; }

        .nft-card {
            width: 320px; height: 450px;
            position: relative; transform-style: preserve-3d;
            display: block; text-decoration: none;
        }

        .anim-oni { animation: swingOni 8s infinite ease-in-out; }
        @keyframes swingOni { 0%, 100% { transform: rotateY(-15deg); } 50% { transform: rotateY(15deg); } }

        .layer {
            position: absolute; inset: 0; 
            background-size: contain; background-repeat: no-repeat; background-position: center;
            pointer-events: none;
        }

        /* --- ІНФО ТА КНОПКИ --- */
        .meta { margin-top: 30px; text-align: center; }
        .title { font-size: 26px; font-weight: 900; letter-spacing: 5px; margin: 0; text-transform: uppercase; color: #fff; }
        
        .btn-try {
            margin-top: 25px; display: block; width: 100%; padding: 20px 0;
            background: #fff; color: #000; font-size: 16px; font-weight: 900;
            letter-spacing: 5px; text-transform: uppercase; text-align: center;
            text-decoration: none; position: relative; z-index: 10;
        }
        .btn-try:active { background: #ff0000; color: #fff; }

    </style>
</head>
<body>

    <div class="matrix-bg" id="matrix"></div>

    <header>
        <div class="burger" id="burgerBtn">
            <span></span><span></span><span></span>
        </div>
    </header>

    <nav class="nav-overlay" id="navMenu">
        <a href="index.html">ГОЛОВНА</a>
        <a href="https://t.me">ЗАПИСАТИСЬ</a>
    </nav>

    <div class="container">

        <!-- КАРТКА 01 -->
        <div style="width: 320px;">
            <a href="primerka.html" class="nft-card anim-oni">
                <div class="layer" style="transform: translateZ(0px); background-image: url('01.PNG');"></div>
                <div class="layer" style="transform: translateZ(2px); background-image: url('01.PNG'); opacity: 0.2;"></div>
                <div class="layer" style="transform: translateZ(5px); background-image: url('02.PNG');"></div> <!-- ТВІЙ ЕСКІЗ -->
                <div class="layer" style="transform: translateZ(8px); background-image: url('01.PNG'); opacity: 0.4;"></div>
                <div class="layer" style="transform: translateZ(11px); background-image: url('01.PNG');"></div>
            </a>
            <div class="meta">
                <h2 class="title">(Shugo Yōkai) 守護妖怪</h2>
                <a href="primerka.html" class="btn-try">ПРИМІРЯТИ</a>
            </div>
        </div>

        <!-- КАРТКА 02 -->
        <div style="width: 320px;">
            <a href="primerka.html" class="nft-card anim-oni" style="animation-delay: -3s;">
                <div class="layer" style="transform: translateZ(0px); background-image: url('03.PNG');"></div>
                <div class="layer" style="transform: translateZ(2px); background-image: url('03.PNG'); opacity: 0.2;"></div>
                <div class="layer" style="transform: translateZ(5px); background-image: url('04.PNG');"></div>
                <div class="layer" style="transform: translateZ(8px); background-image: url('03.PNG'); opacity: 0.4;"></div>
                <div class="layer" style="transform: translateZ(11px); background-image: url('03.PNG');"></div>
            </a>
            <div class="meta">
                <h2 class="title">KITSUNE</h2>
                <a href="primerka.html" class="btn-try">ПРИМІРЯТИ</a>
            </div>
        </div>

    </div>

    <script>
        // Матриця 13%
        const matrix = document.getElementById('matrix');
        const chars = "般若狐霊魂天人地龍神鬼";
        for (let i = 0; i < 12; i++) {
            const col = document.createElement('div');
            col.className = 'matrix-column';
            col.style.animationDuration = (12 + Math.random() * 8) + 's';
            let content = "";
            for (let j = 0; j < 60; j++) { content += chars[Math.floor(Math.random() * chars.length)] + "<br>"; }
            col.innerHTML = content + content;
            matrix.appendChild(col);
        }

        // Логіка Меню
        const burger = document.getElementById('burgerBtn');
        const menu = document.getElementById('navMenu');

        burger.addEventListener('click', function() {
            this.classList.toggle('active');
            menu.classList.toggle('active');
            // Щоб сайт не скролився при відкритому меню
            if(menu.classList.contains('active')) {
                document.body.style.overflow = 'hidden';
            } else {
                document.body.style.overflow = 'auto';
            }
        });
    </script>
</body>
</html>
