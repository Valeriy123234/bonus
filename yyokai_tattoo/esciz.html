<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yokai Archive — Premium Collection</title>
    <style>
        @import url('https://googleapis.com');

        :root {
            --accent-red: #ff1a1a;
            --accent-gold: #d4af37;
            --bg-dark: #030303;
        }

        body { 
            background: var(--bg-dark); 
            margin: 0; 
            color: #fff;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* --- LUXURY NAVIGATION --- */
        .header {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            box-sizing: border-box;
        }

        .logo {
            font-size: 14px;
            letter-spacing: 0.5em;
            font-weight: 300;
            text-transform: uppercase;
        }

        .burger-container {
            display: flex;
            align-items: center;
            gap: 20px;
            cursor: pointer;
        }

        .burger-label {
            font-size: 10px;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            opacity: 0.5;
        }

        .burger-icon {
            width: 25px;
            height: 10px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .burger-icon span {
            display: block;
            height: 1px;
            width: 100%;
            background: #fff;
            transition: 0.4s;
        }

        .open .burger-icon span:nth-child(1) { transform: translateY(4.5px) rotate(45deg); }
        .open .burger-icon span:nth-child(2) { transform: translateY(-4.5px) rotate(-45deg); }

        /* --- MENU OVERLAY --- */
        .menu-nav {
            position: fixed;
            top: 0;
            right: -100%;
            width: 100%;
            height: 100vh;
            background: #000;
            z-index: 998;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 10%;
            transition: transform 0.8s cubic-bezier(0.85, 0, 0.15, 1);
        }

        .menu-nav.active { transform: translateX(-100%); }

        .menu-nav a {
            font-size: clamp(40px, 10vw, 80px);
            font-weight: 100;
            color: #fff;
            text-decoration: none;
            margin: 10px 0;
            transition: 0.5s;
            text-transform: uppercase;
        }

        .menu-nav a:hover { padding-left: 30px; color: var(--accent-red); }

        /* --- NFT COLLECTION GRID --- */
        .container {
            padding: 150px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 200px;
        }

        .nft-card {
            position: relative;
            width: 380px;
            height: 520px;
            perspective: 1500px;
            text-decoration: none;
        }

        .card-wrapper {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .nft-card:hover .card-wrapper {
            transform: scale(1.02) rotateX(5deg);
        }

        /* ЕФЕКТ СКЛЯНОГО КЕЙСУ */
        .glass-case {
            position: absolute;
            inset: 0;
            border: 1px solid rgba(255,255,255,0.05);
            background: linear-gradient(135deg, rgba(255,255,255,0.03) 0%, transparent 100%);
            box-shadow: 0 50px 100px rgba(0,0,0,0.8);
            z-index: 5;
            transform: translateZ(30px);
            overflow: hidden;
        }

        /* Живий відблиск на склі */
        .glass-case::after {
            content: '';
            position: absolute;
            top: -100%; left: -100%;
            width: 300%; height: 300%;
            background: linear-gradient(45deg, transparent 45%, rgba(255,255,255,0.08) 50%, transparent 55%);
            animation: shine 8s infinite linear;
        }

        @keyframes shine {
            0% { transform: translate(-30%, -30%); }
            100% { transform: translate(30%, 30%); }
        }

        .visual-content {
            position: absolute;
            inset: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2;
        }

        .visual-content img {
            width: 85%;
            height: 85%;
            object-fit: contain;
            filter: drop-shadow(0 20px 30px rgba(0,0,0,0.5));
        }

        /* --- TYPOGRAPHY & INFO --- */
        .nft-info {
            position: absolute;
            bottom: -80px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .rarity-tag {
            font-size: 10px;
            letter-spacing: 0.3em;
            color: var(--accent-red);
            margin-bottom: 5px;
            display: block;
        }

        .item-name {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 2px;
            margin: 0;
        }

        .jp-title {
            font-family: 'Noto Sans JP';
            font-size: 12px;
            opacity: 0.2;
            margin-top: 5px;
        }

        .action-btn {
            font-size: 10px;
            letter-spacing: 0.2em;
            padding: 15px 30px;
            border: 1px solid rgba(255,255,255,0.1);
            background: transparent;
            color: #fff;
            transition: 0.4s;
        }

        .action-btn:hover {
            background: #fff;
            color: #000;
        }

        /* Анімації плавання */
        .float-1 { animation: float 10s infinite ease-in-out; }
        .float-2 { animation: float 12s infinite ease-in-out reverse; }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotateY(-5deg); }
            50% { transform: translateY(-20px) rotateY(5deg); }
        }

    </style>
</head>
<body>

    <header class="header">
        <div class="logo">YOKAI / ARCHIVE</div>
        <div class="burger-container" id="menuToggle">
            <span class="burger-label">Menu</span>
            <div class="burger-icon">
                <span></span>
                <span></span>
            </div>
        </div>
    </header>

    <nav class="menu-nav" id="mainMenu">
        <a href="#">Gallery</a>
        <a href="#">Reservation</a>
        <a href="#">Philosophy</a>
        <a href="#">Studio</a>
    </nav>

    <div class="container">

        <!-- КАРТКА 1 -->
        <div class="nft-card float-1">
            <div class="card-wrapper">
                <div class="glass-case"></div>
                <div class="visual-content">
                    <!-- Заміни на свої PNG -->
                    <img src="02.PNG" alt="Yokai Sketch">
                </div>
                <!-- Рамка як декоративний елемент на фоні -->
                <div class="layer" style="position:absolute; inset:0; border:20px solid #111; opacity:0.5;"></div>
            </div>
            <div class="nft-info">
                <div>
                    <span class="rarity-tag">// LEGENDARY</span>
                    <h2 class="item-name">HANNYA MASK</h2>
                    <div class="jp-title">般若の面 - ARCHIVE №001</div>
                </div>
                <button class="action-btn">BOOKING</button>
            </div>
        </div>

        <!-- КАРТКА 2 -->
        <div class="nft-card float-2" style="margin-top: 100px;">
            <div class="card-wrapper">
                <div class="glass-case"></div>
                <div class="visual-content">
                    <img src="04.PNG" alt="Yokai Sketch">
                </div>
                <div class="layer" style="position:absolute; inset:0; border:20px solid #111; opacity:0.5;"></div>
            </div>
            <div class="nft-info">
                <div>
                    <span class="rarity-tag" style="color:var(--accent-gold)">// MYTHIC</span>
                    <h2 class="item-name">KITSUNE SPIRIT</h2>
                    <div class="jp-title">狐の霊 - ARCHIVE №042</div>
                </div>
                <button class="action-btn">BOOKING</button>
            </div>
        </div>

    </div>

    <script>
        const toggle = document.getElementById('menuToggle');
        const menu = document.getElementById('mainMenu');
        
        toggle.onclick = () => {
            toggle.classList.toggle('open');
            menu.classList.toggle('active');
            document.body.style.overflow = menu.classList.contains('active') ? 'hidden' : 'auto';
        };
    </script>

</body>
</html>
