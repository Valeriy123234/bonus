<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        @import url('https://googleapis.com');

        body { 
            background: #000; 
            margin: 0; 
            color: #fff;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* --- ЧЕРВОНА МАТРИЦЯ (11%) --- */
        .matrix-bg {
            position: fixed; inset: 0; font-family: 'Noto Sans JP';
            font-size: 18px; color: #ff0000; opacity: 0.11; 
            display: flex; justify-content: space-around; z-index: -1;
            pointer-events: none;
        }
        .matrix-column { display: flex; flex-direction: column; animation: matrixDrop 12s linear infinite; }
        @keyframes matrixDrop { from { transform: translateY(-50%); } to { transform: translateY(0%); } }

        /* --- ФІКСОВАНА РІДКІСТЬ ПО ЦЕНТРУ --- */
        .fixed-rarity-center {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            pointer-events: none; /* Щоб не заважало клікати по кнопках */
            text-align: center;
            width: 100%;
        }

        .rarity-text-global {
            font-family: 'Cinzel';
            font-size: 45px;
            letter-spacing: 20px;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.05); /* Ледь помітна база */
            text-transform: uppercase;
            position: relative;
        }

        /* Ефект "спалаху" при скролі */
        .rarity-text-global::before {
            content: 'LEGENDARY';
            position: absolute; inset: 0;
            color: #ff0000;
            filter: blur(15px);
            animation: pulseAura 3s infinite ease-in-out;
            opacity: 0.3;
        }

        @keyframes pulseAura {
            0%, 100% { opacity: 0.1; transform: scale(0.95); }
            50% { opacity: 0.5; transform: scale(1.05); }
        }

        /* --- UI: MENU --- */
        header { position: fixed; top: 25px; right: 25px; z-index: 7000; }
        .burger { width: 30px; height: 18px; display: flex; flex-direction: column; justify-content: space-between; cursor: pointer; }
        .burger span { height: 2px; width: 100%; background: #fff; transition: 0.4s; }
        .burger.active span:nth-child(1) { transform: translateY(8px) rotate(45deg); }
        .burger.active span:nth-child(2) { opacity: 0; }
        .burger.active span:nth-child(3) { transform: translateY(-8px) rotate(-45deg); }

        .nav-overlay {
            position: fixed; inset: 0; background: #000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            opacity: 0; visibility: hidden; transition: 0.4s; z-index: 6000;
        }
        .nav-overlay.active { opacity: 1; visibility: visible; }
        .nav-overlay a { font-size: 32px; color: #fff; text-decoration: none; margin: 20px; font-weight: 900; letter-spacing: 5px; }

        /* --- КАРТКИ --- */
        .container { display: flex; flex-direction: column; gap: 250px; padding: 150px 0; align-items: center; }

        .nft-card {
            width: 320px; height: 450px;
            position: relative; transform-style: preserve-3d;
            display: block; text-decoration: none;
        }

        .anim-oni { animation: moveOni 8s infinite ease-in-out; }
        @keyframes moveOni { 0%, 100% { transform: rotateY(-20deg) rotateX(5deg); } 50% { transform: rotateY(20deg) rotateX(-3deg); } }

        .layer {
            position: absolute; inset: 0; background-size: contain; 
            background-repeat: no-repeat; background-position: center;
        }

        /* --- ІНФО ТА КНОПКА --- */
        .meta { margin-top: 40px; text-align: center; position: relative; z-index: 20; }
        .title { font-size: 28px; font-weight: 900; letter-spacing: 5px; margin-bottom: 20px; }

        .btn-try {
            display: block; width: 100%; padding: 22px 0;
            background: #fff; color: #000; font-size: 16px; font-weight: 900;
            letter-spacing: 6px; text-transform: uppercase; text-align: center;
            text-decoration: none; box-shadow: 0 0 30px rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>

    <div class="matrix-bg" id="matrix"></div>

    <!-- ФІКСОВАНИЙ ТЕКСТ ПО ЦЕНТРУ -->
    <div class="fixed-rarity-center">
        <div class="rarity-text-global">LEGENDARY</div>
    </div>

    <header>
        <div class="burger" id="burger">
            <span></span><span></span><span></span>
        </div>
    </header>

    <nav class="nav-overlay" id="nav">
        <a href="#">ГОЛОВНА</a>
        <a href="#">ЗАПИСАТИСЬ</a>
    </nav>

    <div class="container">

        <!-- КАРТКА 1 -->
        <div class="nft-card-wrapper">
            <a href="primerka.html" class="nft-card anim-oni">
                <div class="layer" style="transform: translateZ(0px); background-image: url('01.PNG');"></div>
                <div class="layer" style="transform: translateZ(5px); background-image: url('01.PNG'); opacity: 0.2;"></div>
                <div class="layer" style="transform: translateZ(12px); background-image: url('02.PNG');"></div>
                <div class="layer" style="transform: translateZ(18px); background-image: url('01.PNG'); opacity: 0.5;"></div>
                <div class="layer" style="transform: translateZ(25px); background-image: url('01.PNG');"></div>
            </a>
            <div class="meta">
                <h2 class="title">ONI MASK</h2>
                <a href="primerka.html" class="btn-try">ПРИМІРЯТИ</a>
            </div>
        </div>

        <!-- КАРТКА 2 -->
        <div class="nft-card-wrapper">
            <a href="primerka.html" class="nft-card anim-oni" style="animation-delay: -3s;">
                <div class="layer" style="transform: translateZ(0px); background-image: url('03.PNG');"></div>
                <div class="layer" style="transform: translateZ(5px); background-image: url('03.PNG'); opacity: 0.2;"></div>
                <div class="layer" style="transform: translateZ(12px); background-image: url('04.PNG');"></div>
                <div class="layer" style="transform: translateZ(18px); background-image: url('03.PNG'); opacity: 0.5;"></div>
                <div class="layer" style="transform: translateZ(25px); background-image: url('03.PNG');"></div>
            </a>
            <div class="meta">
                <h2 class="title">KITSUNE</h2>
                <a href="primerka.html" class="btn-try">ПРИМІРЯТИ</a>
            </div>
        </div>

    </div>

    <script>
        const matrix = document.getElementById('matrix');
        const chars = "般若狐霊魂天人地龍神鬼";
        for (let i = 0; i < 12; i++) {
            const col = document.createElement('div');
            col.className = 'matrix-column';
            col.style.animationDuration = (10 + Math.random() * 8) + 's';
            let content = "";
            for (let j = 0; j < 60; j++) { content += chars[Math.floor(Math.random() * chars.length)] + "<br>"; }
            col.innerHTML = content + content;
            matrix.appendChild(col);
        }

        const burger = document.getElementById('burger');
        const nav = document.getElementById('nav');
        burger.onclick = () => {
            burger.classList.toggle('active');
            nav.classList.toggle('active');
            document.body.style.overflow = nav.classList.contains('active') ? 'hidden' : 'auto';
        };
    </script>
</body>
</html>
