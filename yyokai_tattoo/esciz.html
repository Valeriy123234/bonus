<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>WoW Style NFT Card</title>
    <style>
        body { background: #050505; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; perspective: 1000px; }

        .scene { width: 300px; height: 300px; } /* Квадратна іконка як у WoW */

        .card {
            width: 100%; height: 100%;
            position: relative;
            transform-style: preserve-3d;
            animation: rotateCard 10s linear infinite;
        }

        @keyframes rotateCard {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(360deg); }
        }

        /* МАСИВНА РАМКА В СТИЛІ LEGENDARY (WoW) */
        .card-front {
            position: absolute;
            width: 100%; height: 100%;
            background: #111;
            /* Складний градієнт під коване золото */
            border: 12px solid;
            border-image: linear-gradient(135deg, #ff8000 0%, #331a00 50%, #ff8000 100%) 1;
            box-shadow: 0 0 30px #ff8000, inset 0 0 20px #000;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* Це важливо! Обрізає фото */
            z-index: 2;
        }

        /* ФОТО ТЕПЕР ПІДЛАШТОВУЄТЬСЯ */
        .sketch-img {
            width: 100%;
            height: 100%;
            /* 'contain' — фото повністю влізе всередину, 'cover' — заповнить без полів */
            object-fit: cover; 
            display: block;
        }

        /* Ефект внутрішньої тіні поверх фото */
        .inner-shadow {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.9);
            pointer-events: none;
        }

        .card-back {
            position: absolute;
            width: 100%; height: 100%;
            background: #1a1a1a;
            border: 12px solid #333;
            transform: rotateY(180deg) translateZ(1px);
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ff8000;
            font-weight: bold;
            font-family: serif;
        }
    </style>
</head>
<body>

    <div class="scene">
        <div class="card">
            <!-- Передня сторона -->
            <div class="card-front">
                <!-- ВСТАВ СВОЄ ПОСИЛАННЯ ТУТ -->
                <img src="https://placeholder.com" class="sketch-img" alt="Sketch">
                <div class="inner-shadow"></div>
            </div>

            <!-- Задня сторона -->
            <div class="card-face card-back">
                LEGENDARY
            </div>
        </div>
    </div>

</body>
</html>
