<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        @import url('https://googleapis.com');

        body { 
            background: #000; 
            margin: 0; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            min-height: 100vh; 
            perspective: 2000px; 
            overflow-x: hidden;
            font-family: 'Bebas Neue', cursive;
        }

        .collection-grid {
            display: flex;
            flex-direction: column;
            gap: 140px;
            padding: 80px 0;
            width: 100%;
        }

        .artifact-item {
            position: relative;
            width: 250px; 
            height: 360px;
            margin: 0 auto;
            transform-style: preserve-3d;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* МАЯТНИК */
        .artifact-body {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            animation: swing 6s infinite ease-in-out;
            will-change: transform;
        }

        @keyframes swing {
            0%, 100% { transform: rotateY(-18deg) rotateX(4deg); }
            50% { transform: rotateY(18deg) rotateX(-2deg); }
        }

        .layer {
            position: absolute; inset: 0;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            pointer-events: none;
        }

        /* ТЕКСТ РІДКОСТІ (CYBER-JAPAN) */
        .rarity-box {
            margin-top: 25px;
            text-align: center;
            transform: translateZ(10px);
        }

        .rarity-text {
            color: #00f2ff;
            font-size: 20px;
            letter-spacing: 6px;
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.8);
            margin: 0;
        }

        .rarity-jp {
            font-family: 'Noto Sans JP', sans-serif;
            color: #444;
            font-size: 10px;
            letter-spacing: 2px;
            margin-top: -5px;
            display: block;
        }

        /* ПУЛЬСУЮЧА КНОПКА */
        .details-btn {
            margin-top: 15px;
            padding: 6px 35px;
            background: rgba(0, 242, 255, 0.05);
            border: 1px solid #00f2ff;
            color: #00f2ff;
            font-size: 14px;
            letter-spacing: 3px;
            border-radius: 2px;
            animation: pulseBtn 2.5s infinite;
            box-shadow: 0 0 5px rgba(0, 242, 255, 0.2);
        }

        @keyframes pulseBtn {
            0%, 100% { opacity: 0.5; box-shadow: 0 0 5px rgba(0, 242, 255, 0.2); }
            50% { opacity: 1; box-shadow: 0 0 15px rgba(0, 242, 255, 0.5); }
        }

        .glow-bottom {
            position: absolute;
            bottom: 60px;
            width: 160px;
            height: 30px;
            background: rgba(0, 242, 255, 0.25);
            filter: blur(30px);
            z-index: -1;
        }
    </style>
</head>
<body>

    <div class="collection-grid">

        <!-- ПОЧАТОК КАРТКИ -->
        <a href="page_item_1.html" class="artifact-item">
            <div class="artifact-body">
                <!-- Глибина (022.PNG) -->
                <div class="layer" style="transform: translateZ(0px); background-image: url('022.PNG');"></div>
                <div class="layer" style="transform: translateZ(2px); background-image: url('022.PNG');"></div>
                
                <!-- Центр (023.PNG - Рамка + Ескіз) -->
                <div class="layer" style="transform: translateZ(4px); background-image: url('023.PNG');"></div>
                
                <!-- Перед (022.PNG) -->
                <div class="layer" style="transform: translateZ(6px); background-image: url('022.PNG');"></div>
                <div class="layer" style="transform: translateZ(8px); background-image: url('022.PNG');"></div>
            </div>

            <!-- Блок опису -->
            <div class="rarity-box">
                <p class="rarity-text">LEGENDARY</p>
                <span class="rarity-jp">伝説のアート</span>
            </div>

            <!-- Кнопка дії -->
            <div class="details-btn">DETAILS</div>
            
            <div class="glow-bottom"></div>
        </a>
        <!-- КІНЕЦЬ КАРТКИ -->

    </div>

</body>
</html>
