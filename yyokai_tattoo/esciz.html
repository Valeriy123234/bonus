<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        @import url('https://googleapis.com');

        body { 
            background: #050505; 
            margin: 0; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            min-height: 100vh; 
            perspective: 2000px; 
            overflow-x: hidden;
            font-family: 'Bebas Neue', cursive;
            color: #fff;
        }

        /* --- МЕНЮ (БУТЕРБРОД) --- */
        header {
            position: fixed;
            top: 0; width: 100%;
            padding: 45px 35px; /* Гарний відступ від кутів */
            display: flex;
            justify-content: flex-end; /* Бутерброд справа */
            z-index: 5000;
            box-sizing: border-box;
        }

        .menu-btn {
            width: 30px; height: 18px;
            display: flex; flex-direction: column; justify-content: space-between;
            cursor: pointer;
        }
        .menu-btn span { display: block; height: 2px; width: 100%; background: #fff; transition: 0.4s; }
        
        .open span:nth-child(1) { transform: translateY(8px) rotate(45deg); }
        .open span:nth-child(2) { opacity: 0; }
        .open span:nth-child(3) { transform: translateY(-8px) rotate(-45deg); }

        .nav-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.98); z-index: 4000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transform: translateX(100%); transition: 0.5s cubic-bezier(0.8, 0, 0.2, 1);
        }
        .nav-overlay.active { transform: translateX(0); }
        .nav-overlay a { font-size: 40px; color: #fff; text-decoration: none; margin: 15px; letter-spacing: 5px; }

        /* --- КОЛЕКЦІЯ --- */
        .collection-grid {
            display: flex; flex-direction: column;
            gap: 120px; padding: 120px 0;
            width: 100%;
        }

        .artifact-item {
            position: relative;
            width: 340px;
            height: 480px;
            margin: 0 auto;
            transform-style: preserve-3d;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: inherit;
        }

        /* ТВІЙ ОРИГІНАЛЬНИЙ БУТЕРБРОД З 5 ШАРІВ (01.PNG та 02.PNG) */
        .artifact-body {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            pointer-events: auto;
        }

        .layer {
            position: absolute;
            inset: 0;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            pointer-events: none;
        }

        /* АНІМАЦІЇ ЯК ТИ ПРОСИВ (НЕ КРУГОВІ) */
        .anim-swing { animation: swing 7s infinite ease-in-out; }
        @keyframes swing {
            0%, 100% { transform: rotateY(-15deg) rotateX(5deg); }
            50% { transform: rotateY(15deg) rotateX(-3deg); }
        }

        .anim-float { animation: float 6s infinite ease-in-out; }
        @keyframes float {
            0%, 100% { transform: translateZ(0) translateY(0); }
            50% { transform: translateZ(40px) translateY(-20px); }
        }

        /* --- UI ДЕТАЛІ --- */
        .rarity-box {
            margin-top: 35px;
            text-align: center;
            transform: translateZ(50px);
        }

        .rarity-text {
            font-size: 28px;
            letter-spacing: 8px;
            margin: 0;
            position: relative;
            display: inline-block;
        }

        .neon-red .rarity-text { color: #ff0000; text-shadow: 0 0 15px #ff0000; }
        .neon-gold .rarity-text { color: #ffac00; text-shadow: 0 0 15px #ffac00; }

        .rarity-text::after {
            content: ''; position: absolute; bottom: -5px; left: 0; width: 100%; height: 2px;
            background: currentColor; box-shadow: 0 0 10px currentColor;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 0.3; transform: scaleX(0.8); } 50% { opacity: 1; transform: scaleX(1.1); } }

        /* КНОПКА ЗАПИСУ */
        .details-btn {
            margin-top: 25px;
            padding: 12px 60px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            font-size: 16px;
            letter-spacing: 4px;
            text-align: center;
            text-decoration: none;
            transition: 0.3s;
            z-index: 100;
            position: relative;
        }
        .neon-red .details-btn { border-color: #ff0000; color: #ff0000; }
        .neon-gold .details-btn { border-color: #ffac00; color: #ffac00; }
        .details-btn:active { background: #fff; color: #000; }

    </style>
</head>
<body>

    <header>
        <div class="menu-btn" id="menuToggle">
            <span></span><span></span><span></span>
        </div>
    </header>

    <nav class="nav-overlay" id="navMenu">
        <a href="#">ГОЛОВНА</a>
        <a href="#">ЗАПИСАТИСЯ</a>
        <a href="#">ПОРТФОЛІО</a>
    </nav>

    <div class="collection-grid">

        <!-- КАРТКА 1: ВИКОРИСТОВУЄМО ТВОЇ 01.PNG ТА 02.PNG -->
        <div class="artifact-item neon-red">
            <a href="primerka.html" class="artifact-body anim-swing">
                <div class="layer" style="transform: translateZ(0px); background-image: url('01.PNG');"></div>
                <div class="layer" style="transform: translateZ(5px); background-image: url('01.PNG'); opacity: 0.4;"></div>
                <div class="layer" style="transform: translateZ(12px); background-image: url('02.PNG');"></div> <!-- ТВІЙ ЕСКІЗ -->
                <div class="layer" style="transform: translateZ(20px); background-image: url('01.PNG'); opacity: 0.6;"></div>
                <div class="layer" style="transform: translateZ(28px); background-image: url('01.PNG');"></div>
            </a>

            <div class="rarity-box">
                <p class="rarity-text">LEGENDARY</p>
                <a href="https://t.me" class="details-btn">ЗАПИСАТИСЯ</a>
            </div>
        </div>

        <!-- КАРТКА 2: ВИКОРИСТОВУЄМО ТВОЇ 03.PNG ТА 04.PNG -->
        <div class="artifact-item neon-gold">
            <a href="primerka.html" class="artifact-body anim-float">
                <div class="layer" style="transform: translateZ(0px); background-image: url('03.PNG');"></div>
                <div class="layer" style="transform: translateZ(5px); background-image: url('03.PNG'); opacity: 0.4;"></div>
                <div class="layer" style="transform: translateZ(12px); background-image: url('04.PNG');"></div>
                <div class="layer" style="transform: translateZ(20px); background-image: url('03.PNG'); opacity: 0.6;"></div>
                <div class="layer" style="transform: translateZ(28px); background-image: url('03.PNG');"></div>
            </a>

            <div class="rarity-box">
                <p class="rarity-text">MYTHIC</p>
                <a href="https://t.me" class="details-btn">ЗАПИСАТИСЯ</a>
            </div>
        </div>

    </div>

    <script>
        const btn = document.getElementById('menuToggle');
        const menu = document.getElementById('navMenu');
        btn.onclick = () => {
            btn.classList.toggle('open');
            menu.classList.toggle('active');
            document.body.style.overflow = menu.classList.contains('active') ? 'hidden' : 'auto';
        };
    </script>
</body>
</html>
