<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        @import url('https://googleapis.com');

        body { 
            background: #030303; 
            margin: 0; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            min-height: 100vh; 
            perspective: 2000px; 
            overflow-x: hidden;
            font-family: 'Inter', sans-serif;
            color: #fff;
        }

        /* --- UI: HEADER & MENU --- */
        header {
            position: fixed;
            top: 0; width: 100%;
            padding: 40px 30px; /* Преміальний відступ */
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 5000;
            box-sizing: border-box;
        }

        .logo { font-size: 10px; letter-spacing: 5px; font-weight: 200; opacity: 0.6; }

        .menu-btn {
            width: 25px; height: 14px;
            display: flex; flex-direction: column; justify-content: space-between;
            cursor: pointer;
        }
        .menu-btn span { display: block; height: 1px; width: 100%; background: #fff; transition: 0.4s; }
        .open span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
        .open span:nth-child(2) { opacity: 0; }
        .open span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }

        .nav-overlay {
            position: fixed; inset: 0; background: #000; z-index: 4000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transform: translateX(100%); transition: 0.6s cubic-bezier(0.8, 0, 0.2, 1);
        }
        .nav-overlay.active { transform: translateX(0); }
        .nav-overlay a { font-size: 32px; color: #fff; text-decoration: none; margin: 15px; letter-spacing: 8px; font-weight: 200; }

        /* --- NFT GALLERY --- */
        .nft-grid {
            display: flex; flex-direction: column;
            gap: 150px; padding: 120px 0;
            width: 100%;
        }

        .nft-card {
            width: 330px;
            margin: 0 auto;
            transform-style: preserve-3d;
            position: relative;
        }

        /* ТВІЙ БУТЕРБРОД З 5 ШАРІВ */
        .visual-block {
            width: 100%;
            height: 460px;
            position: relative;
            transform-style: preserve-3d;
            cursor: pointer;
        }

        .layer {
            position: absolute;
            inset: 0;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            pointer-events: none;
        }

        /* АНІМАЦІЇ */
        .anim-swing { animation: nftSwing 8s infinite ease-in-out; }
        @keyframes nftSwing {
            0%, 100% { transform: rotateY(-12deg) rotateX(3deg); }
            50% { transform: rotateY(12deg) rotateX(-3deg); }
        }

        .anim-float { animation: nftFloat 6s infinite ease-in-out; }
        @keyframes nftFloat {
            0%, 100% { transform: translateY(0) translateZ(0); }
            50% { transform: translateY(-20px) translateZ(40px); }
        }

        /* --- NFT INFO PANEL --- */
        .nft-meta {
            margin-top: 30px;
            padding: 0 10px;
            text-align: left;
        }

        .rarity {
            font-size: 9px;
            letter-spacing: 5px;
            font-weight: 700;
            margin-bottom: 8px;
            display: block;
        }
        .neon-red .rarity { color: #ff0000; text-shadow: 0 0 10px rgba(255,0,0,0.5); }
        .neon-gold .rarity { color: #d4af37; text-shadow: 0 0 10px rgba(212,175,55,0.5); }

        .nft-name {
            font-size: 24px;
            font-weight: 400;
            margin: 0;
            letter-spacing: 1px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nft-name span { font-size: 10px; opacity: 0.3; font-family: 'Noto Sans JP'; }

        /* КНОПКА ЗАПИСУ */
        .btn-booking {
            margin-top: 20px;
            display: block;
            width: 100%;
            padding: 15px 0;
            border: 1px solid rgba(255,255,255,0.1);
            background: transparent;
            color: #fff;
            text-align: center;
            text-decoration: none;
            font-size: 10px;
            letter-spacing: 3px;
            font-weight: 700;
            transition: 0.3s;
        }
        .btn-booking:active { background: #fff; color: #000; border-color: #fff; }

    </style>
</head>
<body>

    <header>
        <div class="logo">YOKAI / ARCHIVE</div>
        <div class="menu-btn" id="menuToggle">
            <span></span><span></span><span></span>
        </div>
    </header>

    <nav class="nav-overlay" id="navMenu">
        <a href="#">COLLECTION</a>
        <a href="#">BOOKING</a>
        <a href="#">STUDIO</a>
    </nav>

    <div class="nft-grid">

        <!-- NFT 01: RED -->
        <div class="nft-card neon-red">
            <a href="primerka.html" class="visual-block anim-swing">
                <div class="layer" style="transform: translateZ(0px); background-image: url('01.PNG');"></div>
                <div class="layer" style="transform: translateZ(8px); background-image: url('01.PNG'); opacity: 0.4;"></div>
                <div class="layer" style="transform: translateZ(18px); background-image: url('02.PNG');"></div> <!-- ЕСКІЗ -->
                <div class="layer" style="transform: translateZ(28px); background-image: url('01.PNG'); opacity: 0.7;"></div>
                <div class="layer" style="transform: translateZ(38px); background-image: url('01.PNG');"></div>
            </a>
            
            <div class="nft-meta">
                <span class="rarity">LEGENDARY</span>
                <h2 class="nft-name">HANNYA CORE <span>般若 №01</span></h2>
                <a href="https://t.me" class="btn-booking">BOOKING SESSION</a>
            </div>
        </div>

        <!-- NFT 02: GOLD -->
        <div class="nft-card neon-gold">
            <a href="primerka.html" class="visual-block anim-float">
                <div class="layer" style="transform: translateZ(0px); background-image: url('03.PNG');"></div>
                <div class="layer" style="transform: translateZ(8px); background-image: url('03.PNG'); opacity: 0.4;"></div>
                <div class="layer" style="transform: translateZ(18px); background-image: url('04.PNG');"></div>
                <div class="layer" style="transform: translateZ(28px); background-image: url('03.PNG'); opacity: 0.7;"></div>
                <div class="layer" style="transform: translateZ(38px); background-image: url('03.PNG');"></div>
            </a>
            
            <div class="nft-meta">
                <span class="rarity">MYTHIC</span>
                <h2 class="nft-name">KITSUNE SOUL <span>狐 №42</span></h2>
                <a href="https://t.me" class="btn-booking">BOOKING SESSION</a>
            </div>
        </div>

    </div>

    <script>
        const btn = document.getElementById('menuToggle');
        const nav = document.getElementById('navMenu');
        
        btn.onclick = () => {
            btn.classList.toggle('open');
            nav.classList.toggle('active');
            document.body.style.overflow = nav.classList.contains('active') ? 'hidden' : 'auto';
        };
    </script>
</body>
</html>
