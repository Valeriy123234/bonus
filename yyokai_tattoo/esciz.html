<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Premium NFT Frame</title>
    <style>
        body {
            background: #050505;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            perspective: 1200px;
            overflow: hidden;
        }

        .scene {
            width: 280px;
            height: 400px;
        }

        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            animation: rotateCard 10s linear infinite;
        }

        @keyframes rotateCard {
            0% { transform: rotateY(0deg) rotateX(5deg); }
            100% { transform: rotateY(360deg) rotateX(5deg); }
        }

        /* Ефект відблиску на склі */
        .card-front::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.2), transparent);
            transform: skewX(-25deg);
            animation: shine 3s infinite;
        }

        @keyframes shine {
            0% { left: -100%; }
            100% { left: 200%; }
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: visible;
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Головна рамка */
        .card-front {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(5px);
            border: 10px solid;
            /* Градієнт для Епічного рівня */
            border-image: linear-gradient(45deg, #7000ff, #ff007a, #7000ff) 1;
            box-shadow: 0 0 30px rgba(112, 0, 255, 0.3);
            transform: translateZ(15px);
            overflow: hidden;
            z-index: 2;
        }

        /* Внутрішній фон з ескізом */
        .sketch-area {
            width: 90%;
            height: 90%;
            background: radial-gradient(circle, #222 0%, #000 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* Задня стінка кейсу */
        .card-back {
            background: #111;
            border: 10px solid #1a1a1a;
            transform: rotateY(180deg) translateZ(15px);
            font-family: 'Courier New', monospace;
            color: #333;
        }

        /* Бокові грані для об'єму */
        .side {
            position: absolute;
            background: #1a1a1a;
            height: 380px; /* Трохи менше висоти */
            width: 30px;  /* Товщина кейсу */
            top: 10px;
        }
        .side-right { transform: rotateY(90deg) translateZ(140px); }
        .side-left  { transform: rotateY(-90deg) translateZ(140px); }

        .rarity-label {
            margin-top: 15px;
            font-size: 10px;
            letter-spacing: 4px;
            padding: 4px 12px;
            border: 1px solid #ff007a;
            color: #ff007a;
            text-shadow: 0 0 5px #ff007a;
        }
    </style>
</head>
<body>

    <div class="scene">
        <div class="card">
            <!-- Бокові грані -->
            <div class="side side-right"></div>
            <div class="side side-left"></div>
            
            <!-- Перед (Скло + Рамка) -->
            <div class="card-face card-front">
                <div class="sketch-area">
                    <div style="font-size: 60px; filter: drop-shadow(0 0 10px #7000ff);">👹</div>
                    <div class="rarity-label">EPIC QUALITY</div>
                </div>
            </div>

            <!-- Задня частина -->
            <div class="card-face card-back">
                <div style="transform: rotateZ(-45deg); opacity: 0.2; font-size: 80px;">ART</div>
            </div>
        </div>
    </div>

</body>
</html>
