<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yokai Archive Mobile</title>
    <style>
        @import url('https://googleapis.com');

        body { 
            background: #050505; 
            margin: 0; 
            color: #fff;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* --- МЕНЮ --- */
        header {
            position: fixed;
            top: 0; width: 100%;
            padding: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 2000;
            box-sizing: border-box;
        }

        .menu-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            z-index: 2001;
        }

        .burger-icon {
            width: 24px; height: 12px;
            display: flex; flex-direction: column; justify-content: space-between;
        }

        .burger-icon span { display: block; height: 1px; width: 100%; background: #fff; transition: 0.3s; }
        .open span:nth-child(1) { transform: translateY(5.5px) rotate(45deg); }
        .open span:nth-child(2) { transform: translateY(-5.5px) rotate(-45deg); }

        .nav-menu {
            position: fixed;
            top: 0; right: -100%;
            width: 100%; height: 100vh;
            background: #000;
            z-index: 1999;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; transition: 0.5s;
        }
        .nav-menu.active { right: 0; }
        .nav-menu a { font-size: 32px; color: #fff; text-decoration: none; margin: 15px; letter-spacing: 5px; }

        /* --- КАРТКИ --- */
        .container {
            padding: 100px 20px;
            display: flex; flex-direction: column; gap: 100px;
            align-items: center;
        }

        .nft-card {
            width: 320px;
            display: block;
            text-decoration: none;
            color: inherit;
            position: relative;
        }

        .visual-stack {
            width: 320px;
            height: 440px;
            position: relative;
            transform-style: preserve-3d;
            /* Всі шари клікабельні через батьківське посилання */
        }

        /* Універсальний клас для всіх 5 шарів однакового розміру */
        .layer {
            position: absolute;
            inset: 0; /* Всі шари 100% від батька */
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            pointer-events: none; /* Щоб не блокували кліки по кнопці під ними */
        }

        /* Анімації */
        .anim-swing { animation: swing 6s infinite ease-in-out; }
        .anim-float { animation: float 5s infinite ease-in-out; }

        @keyframes swing {
            0%, 100% { transform: rotateY(-10deg); }
            50% { transform: rotateY(10deg); }
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        /* --- ІНФО ТА КНОПКА --- */
        .card-footer {
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            z-index: 100; /* Вище всіх шарів для кліку */
        }

        .rarity { font-size: 10px; letter-spacing: 3px; font-weight: bold; margin-bottom: 5px; display: block; }
        .red .rarity { color: #ff0000; }
        .gold .rarity { color: #d4af37; }

        .title { font-size: 18px; margin: 0; letter-spacing: 1px; }

        .booking-btn {
            background: transparent;
            border: 1px solid #fff;
            color: #fff;
            padding: 10px 20px;
            font-size: 10px;
            letter-spacing: 2px;
            text-decoration: none;
            transition: 0.3s;
            pointer-events: auto; /* Повертаємо клікабельність кнопці */
        }

        .booking-btn:active { background: #fff; color: #000; }

    </style>
</head>
<body>

    <header>
        <div style="font-size: 10px; letter-spacing: 3px;">YOKAI / ARCHIVE</div>
        <div class="menu-btn" id="menuToggle">
            <span style="font-size: 10px; opacity: 0.5;">MENU</span>
            <div class="burger-icon">
                <span></span><span></span>
            </div>
        </div>
    </header>

    <nav class="nav-menu" id="navMenu">
        <a href="#">ГОЛОВНА</a>
        <a href="https://t.me" target="_blank">ЗАПИСАТИСЯ</a>
        <a href="#">АРХІВ</a>
    </nav>

    <div class="container">

        <!-- КАРТКА 1: ЧЕРВОНА (5 ШАРІВ ОДНАКОВОГО РОЗМІРУ) -->
        <div class="nft-card red">
            <!-- Посилання на сайт через всю обгортку -->
            <a href="https://your-website.com" class="visual-stack anim-swing">
                <div class="layer" style="transform: translateZ(0px); background-image: url('01.PNG');"></div>
                <div class="layer" style="transform: translateZ(5px); background-image: url('01.PNG'); opacity: 0.5;"></div>
                <div class="layer" style="transform: translateZ(10px); background-image: url('02.PNG');"></div>
                <div class="layer" style="transform: translateZ(15px); background-image: url('01.PNG');"></div>
                <div class="layer" style="transform: translateZ(20px); background-image: url('01.PNG');"></div>
            </a>
            
            <div class="card-footer">
                <div>
                    <span class="rarity">LEGENDARY</span>
                    <h3 class="title">ONI MASK</h3>
                </div>
                <!-- Окрема кнопка запису (наприклад в Телеграм) -->
                <a href="https://t.me" class="booking-btn">ЗАПИС</a>
            </div>
        </div>

        <!-- КАРТКА 2: ЗОЛОТА -->
        <div class="nft-card gold">
            <a href="https://your-website.com" class="visual-stack anim-float">
                <div class="layer" style="transform: translateZ(0px); background-image: url('03.PNG');"></div>
                <div class="layer" style="transform: translateZ(5px); background-image: url('03.PNG'); opacity: 0.5;"></div>
                <div class="layer" style="transform: translateZ(10px); background-image: url('04.PNG');"></div>
                <div class="layer" style="transform: translateZ(15px); background-image: url('03.PNG');"></div>
                <div class="layer" style="transform: translateZ(20px); background-image: url('03.PNG');"></div>
            </a>
            
            <div class="card-footer">
                <div>
                    <span class="rarity">MYTHIC</span>
                    <h3 class="title">KITSUNE</h3>
                </div>
                <a href="https://t.me" class="booking-btn">ЗАПИС</a>
            </div>
        </div>

    </div>

    <script>
        const toggle = document.getElementById('menuToggle');
        const menu = document.getElementById('navMenu');

        toggle.onclick = () => {
            toggle.classList.toggle('open');
            menu.classList.toggle('active');
            document.body.style.overflow = menu.classList.contains('active') ? 'hidden' : 'auto';
        };
    </script>

</body>
</html>
