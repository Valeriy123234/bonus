<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        @import url('https://googleapis.com');

        body { 
            background: #000; 
            margin: 0; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            min-height: 100vh; 
            perspective: 2000px; 
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* Контейнер для списку ескізів */
        .collection-grid {
            display: flex;
            flex-direction: column;
            gap: 150px; /* Відстань між ескізами при скролі */
            padding: 100px 0;
            width: 100%;
        }

        /* БАЗОВИЙ БЛОК КАРТКИ */
        .artifact-item {
            position: relative;
            width: 260px; 
            height: 380px;
            margin: 0 auto;
            transform-style: preserve-3d;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* МАЯТНИК (Анімація для всіх) */
        .artifact-body {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            animation: deepSwing 7s infinite ease-in-out;
            will-change: transform;
        }

        @keyframes deepSwing {
            0%, 100% { transform: rotateY(-22deg) rotateX(6deg); }
            50% { transform: rotateY(22deg) rotateX(-4deg); }
        }

        .layer {
            position: absolute; inset: 0;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            pointer-events: none;
        }

        /* ГОЛОГРАФІЧНЕ СКЛО */
        .holo {
            position: absolute;
            inset: 20px;
            background: linear-gradient(105deg, transparent 30%, rgba(0, 242, 255, 0.08) 45%, rgba(255, 0, 193, 0.08) 50%, transparent 70%);
            background-size: 200% 200%;
            animation: holoShift 4s infinite alternate;
            transform: translateZ(10px);
            z-index: 10;
        }

        @keyframes holoShift {
            from { background-position: 0% 0%; }
            to { background-position: 100% 100%; }
        }

        /* ПЛАШКА РІДКОСТІ (ВЕСЕЛКОВА) */
        .rarity-tag {
            margin-top: 30px;
            padding: 4px 20px;
            font-family: 'Bebas Neue', cursive;
            font-size: 16px;
            letter-spacing: 5px;
            color: #fff;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid;
            border-image: linear-gradient(45deg, #ff00c1, #00fff0, #ffcc00, #ff00c1) 1;
            animation: rainbow 3s linear infinite;
            text-align: center;
            white-space: nowrap;
        }

        @keyframes rainbow {
            0% { filter: hue-rotate(0deg); box-shadow: 0 0 15px rgba(0, 242, 255, 0.4); }
            100% { filter: hue-rotate(360deg); box-shadow: 0 0 15px rgba(0, 242, 255, 0.4); }
        }

        /* СЯЙВО ЛЕВІТАЦІЇ */
        .glow-floor {
            position: absolute;
            bottom: 60px;
            width: 200px;
            height: 40px;
            background: radial-gradient(circle, rgba(0, 242, 255, 0.35), transparent 70%);
            filter: blur(35px);
            z-index: -1;
        }
    </style>
</head>
<body>

    <div class="collection-grid">

        <!-- ================================================== -->
        <!-- КОПІЮЙ ЦЕЙ БЛОК ДЛЯ НОВОГО ЕСКІЗУ -->
        <a href="page_item_1.html" class="artifact-item">
            <div class="artifact-body">
                <div class="holo"></div>
                
                <!-- ШАР 1 (Задня рамка) -->
                <div class="layer" style="transform: translateZ(0px); background-image: url('022.PNG');"></div>
                <!-- ШАР 2 (Об'єм) -->
                <div class="layer" style="transform: translateZ(2px); background-image: url('022.PNG');"></div>
                
                <!-- ЦЕНТРАЛЬНИЙ ШАР (Твій ескіз у рамці) -->
                <div class="layer" style="transform: translateZ(4px); background-image: url('023.PNG');"></div>
                
                <!-- ШАР 3 (Об'єм) -->
                <div class="layer" style="transform: translateZ(6px); background-image: url('022.PNG');"></div>
                <!-- ШАР 4 (Передня рамка) -->
                <div class="layer" style="transform: translateZ(8px); background-image: url('022.PNG');"></div>
            </div>

            <div class="rarity-tag">LEGENDARY ARTIFACT</div>
            <div class="glow-floor"></div>
        </a>
        <!-- КІНЕЦЬ БЛОКУ -->
        <!-- ================================================== -->

        <!-- ТУТ ВСТАВЛЯЙ НАСТУПНИЙ БЛОК -->

    </div>

</body>
</html>
