<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; perspective: 1500px; overflow: hidden; }

        .artifact {
            width: 320px; height: 460px;
            position: relative;
            transform-style: preserve-3d;
            animation: rotate 18s infinite linear;
        }

        @keyframes rotate {
            from { transform: rotateY(0deg); }
            to { transform: rotateY(360deg); }
        }

        /* Щільні шари рамки */
        .layer-frame {
            position: absolute; inset: 0;
            background: url('022.PNG') no-repeat center/contain;
            pointer-events: none;
            backface-visibility: visible;
        }

        /* Ескіз (лежить під передньою рамкою) */
        .sketch-inside {
            position: absolute; 
            inset: 0;
            z-index: 2;
            background: url('011.PNG') no-repeat center/contain;
            transform: translateZ(3px); /* Трохи вище задньої стінки */
            pointer-events: none;
        }

        /* Чорне дно (щоб не було дірки наскрізь) */
        .vault-depth {
            position: absolute; 
            inset: 30px;
            background: #050505;
            transform: translateZ(1px);
            border-radius: 15px;
            box-shadow: inset 0 0 40px #000;
        }

        /* ЗАДНЯ СТОРОНА З ЛОГОТИПОМ */
        .back-plate {
            position: absolute; 
            inset: 0;
            background: rgba(0, 0, 0, 0.95);
            transform: rotateY(180deg) translateZ(1px);
            display: flex; 
            justify-content: center; 
            align-items: center;
            backface-visibility: hidden;
            /* Обрізаємо за формою твоєї рамки */
            -webkit-mask: url('022.PNG') no-repeat center/contain;
            mask: url('022.PNG') no-repeat center/contain;
        }

        .logo-text {
            color: #111; 
            font-size: 42px; 
            font-family: 'Arial Black', sans-serif; 
            font-weight: 900; 
            letter-spacing: 8px;
            /* Ефект гравірування: світла тінь зверху, темна знизу */
            text-shadow: 1px 1px 1px rgba(255,255,255,0.05), -1px -1px 1px rgba(0,0,0,0.8);
            transform: scaleX(-1); /* Дзеркально для зворотної сторони */
            text-align: center;
        }

        /* Сяйво левітації під низ */
        .bottom-glow {
            position: absolute; bottom: -50px; left: 50%;
            width: 220px; height: 40px;
            background: rgba(0, 242, 255, 0.35);
            filter: blur(45px);
            transform: translateX(-50%) translateZ(-30px);
            border-radius: 50%;
            animation: pulse 4s infinite alternate ease-in-out;
        }

        @keyframes pulse {
            from { opacity: 0.2; transform: translateX(-50%) scale(1); }
            to { opacity: 0.5; transform: translateX(-50%) scale(1.3); }
        }
    </style>
</head>
<body>

    <div class="artifact">
        <!-- Сяйво левітації -->
        <div class="bottom-glow"></div>

        <!-- ЗАДНІЙ ШАР (З написом YYOKAI) -->
        <div class="layer-frame" style="transform: translateZ(0px)">
            <div class="back-plate">
                <div class="logo-text">YYOKAI</div>
            </div>
        </div>

        <!-- Глибина та Ескіз -->
        <div class="vault-depth"></div>
        <div class="sketch-inside"></div>

        <!-- ПЕРЕДНІЙ ШАР (Рамка зверху) -->
        <div class="layer-frame" style="transform: translateZ(6px)"></div>
    </div>

</body>
</html>
