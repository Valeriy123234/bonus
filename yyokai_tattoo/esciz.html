<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yokai Tattoo Archive</title>
    <style>
        @import url('https://googleapis.com');

        :root {
            --accent-red: #ff1a1a;
            --accent-gold: #d4af37;
            --bg: #000000;
        }

        body { 
            background: var(--bg); 
            margin: 0; 
            color: #fff;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* --- HEADER & NAVIGATION --- */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 20px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            box-sizing: border-box;
            background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent);
        }

        .logo { font-size: 12px; letter-spacing: 4px; font-weight: 200; }

        .menu-trigger {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }

        .menu-trigger span { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; opacity: 0.6; }
        
        .burger { width: 22px; height: 8px; position: relative; }
        .burger::before, .burger::after {
            content: ''; width: 100%; height: 1px; background: #fff; position: absolute; transition: 0.3s;
        }
        .burger::before { top: 0; }
        .burger::after { bottom: 0; }
        .open .burger::before { transform: translateY(3.5px) rotate(45deg); }
        .open .burger::after { transform: translateY(-3.5px) rotate(-45deg); }

        /* --- FULLSCREEN MENU --- */
        .nav-overlay {
            position: fixed;
            top: 0; right: -100%;
            width: 100%; height: 100vh;
            background: #000;
            z-index: 999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 40px;
            box-sizing: border-box;
            transition: 0.5s cubic-bezier(0.8, 0, 0.2, 1);
        }
        .nav-overlay.active { right: 0; }
        .nav-overlay a {
            font-size: 40px; font-weight: 200; color: #fff; text-decoration: none;
            margin: 15px 0; text-transform: uppercase; letter-spacing: 5px;
        }

        /* --- COLLECTION GRID --- */
        .container {
            padding: 100px 20px;
            display: flex;
            flex-direction: column;
            gap: 120px; /* Відстань між картками на мобілці */
            align-items: center;
        }

        .nft-card {
            width: 100%;
            max-width: 340px;
            position: relative;
            text-decoration: none;
        }

        .visual-box {
            width: 100%;
            height: 450px;
            position: relative;
            transform-style: preserve-3d;
        }

        /* РАМКА (01.PNG / 03.PNG) */
        .frame-layer {
            position: absolute;
            inset: 0;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            z-index: 1;
            /* Можеш додати translateZ(0) для стабільності */
        }

        /* ЕСКІЗ (02.PNG / 04.PNG) */
        .sketch-layer {
            position: absolute;
            inset: 0;
            background-size: 75%; /* Щоб ескіз був точно всередині рамки */
            background-repeat: no-repeat;
            background-position: center;
            z-index: 2;
            transform: translateZ(30px); /* Ефект виходу ескізу вперед */
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.8));
        }

        /* --- INFO BLOCK --- */
        .item-meta {
            margin-top: 25px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .rarity-label {
            font-size: 9px; letter-spacing: 3px; font-weight: 800; display: block; margin-bottom: 5px;
        }
        .neon-red .rarity-label { color: var(--accent-red); }
        .neon-gold .rarity-label { color: var(--accent-gold); }

        .item-title { font-size: 20px; letter-spacing: 2px; margin: 0; font-weight: 500; }
        .item-id { font-family: 'Noto Sans JP'; font-size: 10px; opacity: 0.3; margin-top: 4px; }

        .book-btn {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            padding: 10px 20px;
            font-size: 10px;
            letter-spacing: 2px;
            transition: 0.3s;
        }
        .book-btn:active { background: #fff; color: #000; }

        /* --- ANIMATIONS (Більш динамічні для мобільних) --- */
        .anim-tilt { animation: tilt-mobile 6s infinite ease-in-out; }
        .anim-float { animation: float-mobile 5s infinite ease-in-out; }

        @keyframes tilt-mobile {
            0%, 100% { transform: rotateY(-8deg) rotateX(2deg); }
            50% { transform: rotateY(8deg) rotateX(-2deg); }
        }

        @keyframes float-mobile {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

    </style>
</head>
<body>

    <header>
        <div class="logo">YOKAI / STUDIO</div>
        <div class="menu-trigger" id="menuToggle">
            <span>Menu</span>
            <div class="burger"></div>
        </div>
    </header>

    <nav class="nav-overlay" id="navMenu">
        <a href="#">ГОЛОВНА</a>
        <a href="#">ЗАПИСАТИСЯ</a>
        <a href="#">АРХІВ ЕСКІЗІВ</a>
        <a href="#">КОНТАКТИ</a>
    </nav>

    <div class="container">

        <!-- КАРТКА 1: HANNYA (RED) -->
        <div class="nft-card neon-red">
            <div class="visual-box anim-tilt">
                <div class="frame-layer" style="background-image: url('01.PNG');"></div>
                <div class="sketch-layer" style="background-image: url('02.PNG');"></div>
            </div>
            <div class="item-meta">
                <div>
                    <span class="rarity-label">LEGENDARY</span>
                    <h2 class="item-title">ONI MASK</h2>
                    <div class="item-id">般若 - ARCHIVE №01</div>
                </div>
                <button class="book-btn">ЗАПИС</button>
            </div>
        </div>

        <!-- КАРТКА 2: KITSUNE (GOLD) -->
        <div class="nft-card neon-gold">
            <div class="visual-box anim-float">
                <div class="frame-layer" style="background-image: url('03.PNG');"></div>
                <div class="sketch-layer" style="background-image: url('04.PNG');"></div>
            </div>
            <div class="item-meta">
                <div>
                    <span class="rarity-label">MYTHIC</span>
                    <h2 class="item-title">KITSUNE</h2>
                    <div class="item-id">狐 - ARCHIVE №42</div>
                </div>
                <button class="book-btn">ЗАПИС</button>
            </div>
        </div>

    </div>

    <script>
        const toggle = document.getElementById('menuToggle');
        const menu = document.getElementById('navMenu');

        toggle.onclick = () => {
            toggle.classList.toggle('open');
            menu.classList.toggle('active');
            // Запобігаємо скролу при відкритому меню
            document.body.style.overflow = menu.classList.contains('active') ? 'hidden' : 'auto';
        };

        // Клік по посиланню закриває меню
        document.querySelectorAll('.nav-overlay a').forEach(link => {
            link.onclick = () => {
                toggle.classList.remove('open');
                menu.classList.remove('active');
                document.body.style.overflow = 'auto';
            };
        });
    </script>

</body>
</html>
