<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        @import url('https://googleapis.com');

        body { 
            background: #000; 
            margin: 0; 
            color: #fff;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* --- ЧЕРВОНА МАТРИЦЯ (13%) --- */
        .matrix-bg {
            position: fixed; inset: 0; font-family: 'Noto Sans JP';
            font-size: 16px; color: #ff0000; opacity: 0.13; 
            display: flex; justify-content: space-around; z-index: -1;
            pointer-events: none;
        }
        .matrix-column { display: flex; flex-direction: column; animation: matrixDrop 15s linear infinite; }
        @keyframes matrixDrop { from { transform: translateY(-50%); } to { transform: translateY(0%); } }

        /* --- UI: ВЕРХНЯ ПАНЕЛЬ (ЗВУК ТА МЕНЮ) --- */
        header { 
            position: fixed; top: 0; width: 100%; 
            padding: 30px 25px; display: flex; 
            justify-content: space-between; align-items: center; 
            z-index: 8000; box-sizing: border-box;
        }

        /* ІКОНКА ЗВУКУ */
        .sound-toggle {
            width: 20px; height: 20px;
            cursor: pointer;
            transition: all 0.4s ease;
            opacity: 0.4;
            display: flex; align-items: center; justify-content: center;
        }
        .sound-toggle svg { fill: #fff; width: 100%; height: 100%; transition: 0.4s; }

        /* Коли звук активний: горить червоним і збільшується */
        .sound-toggle.active {
            opacity: 1;
            transform: scale(1.3);
            filter: drop-shadow(0 0 10px #ff0000);
        }
        .sound-toggle.active svg { fill: #ff0000; }

        .burger { 
            width: 30px; height: 18px; 
            display: flex; flex-direction: column; justify-content: space-between; 
            cursor: pointer; 
        }
        .burger span { display: block; height: 2px; width: 100%; background: #fff; transition: 0.3s; }
        .burger.active span:nth-child(1) { transform: translateY(8px) rotate(45deg); }
        .burger.active span:nth-child(2) { opacity: 0; }
        .burger.active span:nth-child(3) { transform: translateY(-8px) rotate(-45deg); }

        .nav-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.98);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            opacity: 0; visibility: hidden; transition: 0.4s; z-index: 7000;
        }
        .nav-overlay.active { opacity: 1; visibility: visible; }
        .nav-overlay a { font-size: 32px; color: #fff; text-decoration: none; margin: 15px; font-weight: 900; letter-spacing: 5px; }

        /* --- КАРТКИ --- */
        .container { display: flex; flex-direction: column; gap: 110px; padding: 120px 0; align-items: center; }
        .nft-card { width: 320px; height: 450px; position: relative; transform-style: preserve-3d; display: block; text-decoration: none; }
        .anim-oni { animation: swingOni 8s infinite ease-in-out; }
        @keyframes swingOni { 0%, 100% { transform: rotateY(-15deg); } 50% { transform: rotateY(15deg); } }
        .layer { position: absolute; inset: 0; background-size: contain; background-repeat: no-repeat; background-position: center; pointer-events: none; }

        .meta { margin-top: 30px; text-align: center; }
        .title { font-size: 26px; font-weight: 900; letter-spacing: 5px; margin: 0; text-transform: uppercase; color: #fff; }
        .btn-try { margin-top: 25px; display: block; width: 100%; padding: 20px 0; background: #fff; color: #000; font-size: 16px; font-weight: 900; letter-spacing: 5px; text-transform: uppercase; text-align: center; text-decoration: none; position: relative; z-index: 10; }
    </style>
</head>
<body>

    <!-- МАТРИЦЯ -->
    <div class="matrix-bg" id="matrix"></div>

    <!-- АУДІО ТЕГ (Тут має бути твій файл music.mp3) -->
    <audio id="bgMusic" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <header>
        <!-- КНОПКА ЗВУКУ -->
        <div class="sound-toggle" id="soundBtn">
            <svg viewBox="0 0 24 24"><path d="M14,3.23V5.29C16.89,6.15 19,8.83 19,12C19,15.17 16.89,17.85 14,18.71V20.77C18,19.86 21,16.28 21,12C21,7.72 18,4.14 14,3.23M16.5,12C16.5,10.23 15.5,8.71 14,7.97V16.02C15.5,15.29 16.5,13.77 16.5,12M3,9V15H7L12,20V4L7,9H3Z"/></svg>
        </div>
        
        <div class="burger" id="burgerBtn">
            <span></span><span></span><span></span>
        </div>
    </header>

    <nav class="nav-overlay" id="navMenu">
        <a href="index.html">ГОЛОВНА</a>
        <a href="https://t.me">ЗАПИСАТИСЬ</a>
    </nav>

    <div class="container">
        <!-- КАРТКА 01 -->
        <div style="width: 320px;">
            <a href="primerka.html" class="nft-card anim-oni">
                <div class="layer" style="transform: translateZ(0px); background-image: url('01.PNG');"></div>
                <div class="layer" style="transform: translateZ(2px); background-image: url('01.PNG'); opacity: 0.2;"></div>
                <div class="layer" style="transform: translateZ(5px); background-image: url('02.PNG');"></div>
                <div class="layer" style="transform: translateZ(8px); background-image: url('01.PNG'); opacity: 0.4;"></div>
                <div class="layer" style="transform: translateZ(11px); background-image: url('01.PNG');"></div>
            </a>
            <div class="meta">
                <h2 class="title">ONI MASK</h2>
                <a href="primerka.html" class="btn-try">ПРИМІРЯТИ</a>
            </div>
        </div>
        
        <!-- КАРТКА 02 -->
        <div style="width: 320px;">
            <a href="primerka.html" class="nft-card anim-oni" style="animation-delay: -3s;">
                <div class="layer" style="transform: translateZ(0px); background-image: url('03.PNG');"></div>
                <div class="layer" style="transform: translateZ(2px); background-image: url('03.PNG'); opacity: 0.2;"></div>
                <div class="layer" style="transform: translateZ(5px); background-image: url('04.PNG');"></div>
                <div class="layer" style="transform: translateZ(8px); background-image: url('03.PNG'); opacity: 0.4;"></div>
                <div class="layer" style="transform: translateZ(11px); background-image: url('03.PNG');"></div>
            </a>
            <div class="meta">
                <h2 class="title">KITSUNE</h2>
                <a href="primerka.html" class="btn-try">ПРИМІРЯТИ</a>
            </div>
        </div>
    </div>

    <script>
        // Матриця 13%
        const matrix = document.getElementById('matrix');
        const chars = "般若狐霊魂天人地龍神鬼";
        for (let i = 0; i < 12; i++) {
            const col = document.createElement('div');
            col.className = 'matrix-column';
            col.style.animationDuration = (12 + Math.random() * 8) + 's';
            let content = "";
            for (let j = 0; j < 60; j++) { content += chars[Math.floor(Math.random() * chars.length)] + "<br>"; }
            col.innerHTML = content + content;
            matrix.appendChild(col);
        }

        // Логіка Меню
        const burger = document.getElementById('burgerBtn');
        const menu = document.getElementById('navMenu');
        burger.onclick = () => {
            burger.classList.toggle('active');
            menu.classList.toggle('active');
            document.body.style.overflow = menu.classList.contains('active') ? 'hidden' : 'auto';
        };

        // ЛОГІКА ЗВУКУ
        const soundBtn = document.getElementById('soundBtn');
        const music = document.getElementById('bgMusic');

        soundBtn.onclick = () => {
            if (music.paused) {
                music.play();
                soundBtn.classList.add('active');
            } else {
                music.pause();
                soundBtn.classList.remove('active');
            }
        };
    </script>
</body>
</html>
