<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        @import url('https://googleapis.com');

        body { 
            background: #000; 
            margin: 0; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            min-height: 100vh; 
            perspective: 2000px; 
            overflow-x: hidden;
            font-family: 'Bebas Neue', cursive;
        }

        /* Контейнер для списку - керує відступами між ескізами */
        .collection-grid {
            display: flex;
            flex-direction: column;
            gap: 120px; /* ФІКСОВАНА ВІДСТАНЬ МІЖ КАРТКАМИ */
            padding: 100px 0;
            width: 100%;
        }

      .artifact-item {
    position: relative;
    width: 360px;   /* Було 320px + 40px */
    height: 500px;  /* Було 460px + 40px */
    margin: 0 auto;
    transform-style: preserve-3d;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-decoration: none;
    -webkit-tap-highlight-color: transparent;
}


        /* Анімація маятника */
        .artifact-body {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            animation: swing 7s infinite ease-in-out;
            will-change: transform;
        }

        @keyframes swing {
            0%, 100% { transform: rotateY(-20deg) rotateX(6deg); }
            50% { transform: rotateY(20deg) rotateX(-3deg); }
        }

       /* Загальні налаштування (без кольору) */
/* 1. Загальні налаштування шарів (без кольору) */
.layer {
    position: absolute;
    inset: 0;
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
    pointer-events: none;
    /* Тут filter видалено, щоб він не був однаковим для всіх */
}

/* 2. Налаштування для кожної картки (батьківський елемент) */

/* 3. КОЛЬОРИ (Спрацьовують на всі шари всередині конкретної картки) */

/* Зелений неон */
.neon-green .layer {
    filter: drop-shadow(0 0 15px rgba(57, 255, 20, 0.1));
}

/* Червоний неон */
.neon-red .layer {
    filter: drop-shadow(0 0 15px rgba(255, 0, 0, 0.1));
}

/* Синій неон */
.neon-blue .layer {
    filter: drop-shadow(0 0 15px rgba(0, 191, 255, 0.1));
}

/* Фіолетовий/Маджента */
.neon-purple .layer {
    filter: drop-shadow(0 0 15px rgba(191, 0, 255, 0.1));
}

/* Золотий/Жовтий */
.neon-gold .layer {
    filter: drop-shadow(0 0 15px rgba(255, 215, 0, 0.1));
}

/* 4. Додатково: щоб при наведенні світіння ставало яскравішим (опціонально) */




        /* Блок рідкості */
        .rarity-box {
            margin-top: 35px;
            text-align: center;
            transform: translateZ(15px);
        }

        .rarity-text {
            color: #ff0000;
            font-size: 26px;
            letter-spacing: 8px;
            text-shadow: 0 0 15px rgba(255, 0, 0, 0.8);
            margin: 0;
            display: inline-block;
            position: relative;
        }

        /* Пулсуюче підкреслення */
        .rarity-text::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #ff0000, transparent);
            box-shadow: 0 0 10px #ff0000;
            animation: underlinePulse 2s infinite ease-in-out;
        }

        @keyframes underlinePulse {
            0%, 100% { opacity: 0.3; transform: scaleX(0.8); }
            50% { opacity: 1; transform: scaleX(1.1); }
        }

        .rarity-jp {
            font-family: 'Noto Sans JP', sans-serif;
            color: #331111;
            font-size: 11px;
            letter-spacing: 3px;
            margin-top: 8px;
            display: block;
        }

        /* Червона кнопка */
        .details-btn {
            margin-top: 25px;
            padding: 8px 45px;
            background: rgba(255, 0, 0, 0.05);
            border: 1px solid #ff0000;
            color: #ff0000;
            font-size: 16px;
            letter-spacing: 4px;
            border-radius: 2px;
            animation: pulseBtn 3s infinite;
            box-shadow: 0 0 10px rgba(255, 0, 0, 0.2);
        }

        @keyframes pulseBtn {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; box-shadow: 0 0 20px rgba(255, 0, 0, 0.5); }
        }

        .glow-bottom {
            position: absolute;
            bottom: 80px;
            width: 240px;
            height: 40px;
            background: radial-gradient(circle, rgba(255, 0, 0, 0.3), transparent 75%);
            filter: blur(40px);
            z-index: -1;
        }
    </style>
</head>

    <div class="collection-grid">
