<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        @import url('https://googleapis.com');

        body { 
            background: #080808; 
            margin: 0; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            min-height: 100vh; 
            perspective: 2000px; 
            overflow-x: hidden;
            font-family: 'Bebas Neue', cursive;
        }

        /* --- МЕНЮ ТА НАВІГАЦІЯ --- */
        .burger-menu {
            position: fixed;
            top: 30px;
            right: 30px;
            width: 30px;
            height: 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            cursor: pointer;
            z-index: 5000; /* Найвищий пріоритет */
        }
        .burger-menu span { display: block; height: 2px; width: 100%; background: #fff; transition: 0.3s; }
        .burger-menu.open span:nth-child(1) { transform: translateY(9px) rotate(45deg); }
        .burger-menu.open span:nth-child(2) { opacity: 0; }
        .burger-menu.open span:nth-child(3) { transform: translateY(-9px) rotate(-45deg); }

        .nav-overlay {
            position: fixed;
            top: 0; right: -100%;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 4000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: 0.5s;
        }
        .nav-overlay.active { right: 0; }
        .nav-overlay a { color: #fff; font-size: 35px; text-decoration: none; margin: 15px; letter-spacing: 5px; }

        /* --- КОНТЕЙНЕР --- */
        .collection-grid {
            display: flex;
            flex-direction: column;
            gap: 140px;
            padding: 100px 0;
            width: 100%;
        }

        .artifact-item {
            position: relative;
            width: 320px;
            height: 460px;
            margin: 0 auto;
            transform-style: preserve-3d;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: #fff;
        }

        /* ТІЛО КАРТКИ */
        .artifact-body {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            pointer-events: auto; /* Щоб рамка була клікабельною */
        }

        .layer {
            position: absolute;
            inset: 0;
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            pointer-events: none; /* Щоб шари не блокували кліки */
        }

        /* АНІМАЦІЯ 1: МАЯТНИК (SWING) */
        .anim-swing { animation: swing 7s infinite ease-in-out; }
        @keyframes swing {
            0%, 100% { transform: rotateY(-18deg) rotateX(5deg); }
            50% { transform: rotateY(18deg) rotateX(-3deg); }
        }

        /* АНІМАЦІЯ 2: ДИХАННЯ (BREATH) */
        .anim-breath { animation: breath 5s infinite ease-in-out; }
        @keyframes breath {
            0%, 100% { transform: translateZ(0px) scale(1); }
            50% { transform: translateZ(50px) scale(1.05); }
        }

        /* РІДКІСТЬ (Твій оригінальний стиль) */
        .rarity-box {
            margin-top: 40px;
            text-align: center;
            transform: translateZ(30px);
        }
        .rarity-text {
            font-size: 28px;
            letter-spacing: 8px;
            margin: 0;
            position: relative;
        }
        .rarity-text::after {
            content: '';
            position: absolute;
            bottom: -5px; left: 0; width: 100%; height: 2px;
            animation: underlinePulse 2s infinite ease-in-out;
        }
        @keyframes underlinePulse {
            0%, 100% { opacity: 0.3; transform: scaleX(0.8); }
            50% { opacity: 1; transform: scaleX(1.1); }
        }

        /* КОЛЬОРИ */
        .neon-red .rarity-text { color: #ff0000; text-shadow: 0 0 15px rgba(255,0,0,0.8); }
        .neon-red .rarity-text::after { background: linear-gradient(90deg, transparent, #ff0000, transparent); }
        .neon-gold .rarity-text { color: #ffcc00; text-shadow: 0 0 15px rgba(255,204,0,0.8); }
        .neon-gold .rarity-text::after { background: linear-gradient(90deg, transparent, #ffcc00, transparent); }

        .rarity-jp { font-family: 'Noto Sans JP'; font-size: 11px; color: #444; margin-top: 10px; display: block; }

        /* КНОПКА ДЕТАЛЬНІШЕ (Виправлена) */
        .details-btn {
            margin-top: 25px;
            padding: 12px 45px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            font-size: 14px;
            letter-spacing: 4px;
            cursor: pointer;
            z-index: 100; /* Кнопка поверх усього */
            position: relative;
            transition: 0.3s;
        }
        .neon-red .details-btn { border-color: #ff0000; color: #ff0000; }
        .neon-gold .details-btn { border-color: #ffcc00; color: #ffcc00; }
        
        .details-btn:active { background: #fff; color: #000; }

        .glow-bottom {
            position: absolute;
            bottom: 40px; width: 240px; height: 2px;
            filter: blur(30px); z-index: -1;
        }
        .neon-red .glow-bottom { background: #ff0000; }
        .neon-gold .glow-bottom { background: #ffcc00; }
    </style>
</head>
<body>

    <div class="burger-menu" id="burgerBtn">
        <span></span><span></span><span></span>
    </div>

    <nav class="nav-overlay" id="navMenu">
        <a href="#">ГОЛОВНА</a>
        <a href="#">ЗАПИСАТИСЯ</a>
        <a href="#">ПОРТФОЛІО</a>
    </nav>

    <div class="collection-grid">

        <!-- КАРТКА 1: LEGENDARY RED (5 ШАРІВ + АНІМАЦІЯ МАЯТНИК) -->
        <div class="artifact-item neon-red">
            <a href="primerka.html" class="artifact-body anim-swing">
                <div class="layer" style="transform: translateZ(0px); background-image: url('01.PNG');"></div>
                <div class="layer" style="transform: translateZ(5px); background-image: url('01.PNG');"></div>
                <div class="layer" style="transform: translateZ(10px); background-image: url('02.PNG');"></div>
                <div class="layer" style="transform: translateZ(15px); background-image: url('01.PNG');"></div>
                <div class="layer" style="transform: translateZ(20px); background-image: url('01.PNG');"></div>
            </a>

            <div class="rarity-box">
                <p class="rarity-text">LEGENDARY</p>
                <span class="rarity-jp">伝説の妖怪</span>
            </div>

            <a href="https://t.me" class="details-btn">ДЕТАЛЬНІШЕ</a>
            <div class="glow-bottom"></div>
        </div>

        <!-- КАРТКА 2: LEGENDARY GOLD (5 ШАРІВ + АНІМАЦІЯ ДИХАННЯ) -->
        <div class="artifact-item neon-gold">
            <a href="primerka.html" class="artifact-body anim-breath">
                <div class="layer" style="transform: translateZ(0px); background-image: url('03.PNG');"></div>
                <div class="layer" style="transform: translateZ(5px); background-image: url('03.PNG');"></div>
                <div class="layer" style="transform: translateZ(10px); background-image: url('04.PNG');"></div>
                <div class="layer" style="transform: translateZ(15px); background-image: url('03.PNG');"></div>
                <div class="layer" style="transform: translateZ(20px); background-image: url('03.PNG');"></div>
            </a>

            <div class="rarity-box">
                <p class="rarity-text">LEGENDARY</p>
                <span class="rarity-jp">伝説の妖怪</span>
            </div>

            <a href="https://t.me" class="details-btn">ДЕТАЛЬНІШЕ</a>
            <div class="glow-bottom"></div>
        </div>

    </div>

    <script>
        const burgerBtn = document.getElementById('burgerBtn');
        const navMenu = document.getElementById('navMenu');

        burgerBtn.onclick = () => {
            burgerBtn.classList.toggle('open');
            navMenu.classList.toggle('active');
            document.body.style.overflow = navMenu.classList.contains('active') ? 'hidden' : 'auto';
        };
    </script>

</body>
</html>
