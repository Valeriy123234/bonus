<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAIN PROTOCOL | YYOKAI</title>
    <style>
        :root { --red: #ff0000; --bg: #000; --white: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { background: var(--bg); color: var(--white); font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; }

        /* --- ІНТЕРФЕЙС ПАНЕЛІ --- */
        .header { position: fixed; top: 30px; width: 100%; padding: 0 40px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; }
        .sound-btn { cursor: pointer; display: flex; align-items: center; gap: 10px; font-size: 10px; letter-spacing: 2px; opacity: 0.5; transition: 0.3s; }
        .sound-btn.active { opacity: 1; color: var(--red); }
        .sound-btn svg { width: 18px; fill: currentColor; }
        .back-btn { text-decoration: none; color: #fff; font-size: 10px; letter-spacing: 2px; border: 1px solid #222; padding: 8px 16px; border-radius: 4px; transition: 0.3s; }
        .back-btn:hover { border-color: var(--red); color: var(--red); }

        /* --- ОСНОВНИЙ БЛОК КАРТИ --- */
        .main-ui { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .map-wrapper { display: flex; align-items: center; gap: 60px; max-width: 1200px; width: 100%; padding: 20px; }
        
        /* Контейнер для твого реального фото */
        .body-visual { flex: 1; display: flex; justify-content: center; align-items: center; position: relative; }
        
        .image-container {
            position: relative;
            height: 75vh;
            aspect-ratio: 1 / 1; /* Зберігає квадратні пропорції твого EPS/SVG */
        }

        /* Твоє реальне векторне фото силуетів на фоні */
        .body-image-svg {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none; /* Щоб фото не заважало клікам */
        }
        
        /* Оновлюємо колір твого силуету через CSS, щоб він вписався в дарк-стиль */
        .body-image-svg path { fill: #111 !important; stroke: #222 !important; stroke-width: 5px; }

        /* НЕВИДИМІ КЛІКАБЕЛЬНІ МАСКИ ПОВЕРХ ФОТО */
        .click-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; }
        .hit-zone { fill: transparent; stroke: transparent; cursor: pointer; transition: 0.3s; }
        
        /* Ефект червоного неонового спалаху при наведенні */
        .hit-zone:hover { fill: rgba(255, 0, 0, 0.15); stroke: var(--red); stroke-width: 4px; filter: drop-shadow(0 0 10px var(--red)); }

        /* ІНФО ПАНЕЛЬ */
        .side-panel { width: 350px; border-left: 1px solid #111; padding-left: 40px; }
        .label { font-size: 9px; color: #444; letter-spacing: 4px; margin-bottom: 10px; }
        #pain-title { font-family: 'Unbounded', sans-serif; font-size: 32px; color: var(--red); margin-bottom: 20px; text-transform: uppercase; }
        #pain-text { font-size: 12px; color: #666; line-height: 1.8; text-transform: uppercase; letter-spacing: 1px; }

        .btn-book { margin-top: 40px; display: inline-block; padding: 20px 50px; border: 1px solid var(--red); color: #fff; text-decoration: none; font-family: 'Unbounded', sans-serif; font-size: 10px; border-radius: 100px; transition: 0.4s; }
        .btn-book:hover { background: var(--red); box-shadow: 0 0 30px rgba(255,0,0,0.4); }

        @media (max-width: 900px) {
            .map-wrapper { flex-direction: column; text-align: center; }
            .side-panel { border: none; padding: 0; width: 100%; }
            .image-container { height: 50vh; }
        }
    </style>
</head>
<body>

<audio id="bg-amb" loop src="ambient.mp3"></audio>
<audio id="click-sfx" src="click.mp3"></audio>

<div class="header">
    <div class="sound-btn" id="sToggle" onclick="toggleSnd()">
        <svg viewBox="0 0 24 24"><path d="M12 3v18l-6-6h-4v-6h4l6-6zm7 9c0-2.21-1.29-4.11-3.13-5l-1.46 1.46c.92.51 1.59 1.48 1.59 2.54s-.67 2.03-1.59 2.54l1.46 1.46c1.84-.89 3.13-2.79 3.13-5z"/></svg>
        <span id="sText">AUDIO: OFF</span>
    </div>
    <a href="index.html" class="back-btn">ГОЛОВНА</a>
</div>

<div class="main-ui">
    <div class="map-wrapper">
        <div class="body-visual">
            <div class="image-container">
                
                <!-- 1. Твоє реальне детальне фото (хлопець + дівчина) з твого файлу -->

                    </g>
                </svg>

                <!-- 2. ТОЧНІ НЕВИДИМІ КНОПКИ ДЛЯ КЛІКІВ ПОВЕРХ ТВОГО СИЛУЕТУ -->
                <svg class="click-layer" viewBox="0 0 400 400">
                    <!-- ЗОНИ ХЛОПЦЯ (Зліва) -->
                    <circle class="hit-zone" cx="130" cy="55" r="22" data-l="ГОЛОВА (M)" data-d="Біль 8/10. Сильна вібрація, близько до кістки." />
                    <path class="hit-zone" d="M105,85 L155,85 L150,180 L110,180 Z" data-l="ТОРС / РЕБРА (M)" data-d="Біль 7-10/10. Центр грудей та ребра — найбільш стресові ділянки." />
                    <path class="hit-zone" d="M80,95 L105,95 L105,210 L85,210 Z M155,95 L180,95 L175,210 L155,210 Z" data-l="РУКИ (M)" data-d="Біль 3/10. Зовнішня частина плеча — найкомфортніше місце для старту." />
                    <path class="hit-zone" d="M110,185 L150,185 L145,350 L115,350 Z" data-l="НОГИ (M)" data-d="Біль 5-9/10. Стегна терпимо, коліна та кісточки — екстремально." />

                    <!-- ЗОНИ ДІВЧИНИ (Справа) -->
                    <circle class="hit-zone" cx="270" cy="55" r="20" data-l="ГОЛОВА (F)" data-d="Біль 8/10. Тонка шкіра, висока больова амплітуда." />
                    <path class="hit-zone" d="M245,85 L295,85 L290,180 L250,180 Z" data-l="ТОРС / ЖИВІТ (F)" data-d="Біль 6-9/10. Ребра та низ живота вимагають правильного дихання." />
                    <path class="hit-zone" d="M220,95 L245,95 L245,210 L225,210 Z M295,95 L320,95 L315,210 L295,210 Z" data-l="РУКИ (F)" data-d="Біль 2-4/10. Передпліччя та передня частина рук — повністю контрольований біль." />
                    <path class="hit-zone" d="M250,185 L290,185 L285,350 L255,350 Z" data-l="НОГИ (F)" data-d="Біль 4-9/10. Стегна переносяться легко, підколінна западина — критично." />
                </svg>

            </div>
        </div>

        <div class="side-panel">
            <div class="label">// SENSOR STATUS: READY</div>
            <div id="pain-title">SCANNING...</div>
            <div id="pain-text">Натисніть на будь-яку ділянку тіла силуетів для запуску біометричного аналізу YYOKAI.</div>
            <a href="t.me" class="btn-book">ЗАПИСАТИСЯ</a>
        </div>
    </div>
</div>

<script>
    const amb = document.getElementById('bg-amb');
    const clk = document.getElementById('click-sfx');

    function toggleSnd() {
        if (amb.paused) {
            amb.play(); amb.muted = false;
            document.getElementById('sToggle').classList.add('active');
            document.getElementById('sText').innerText = "AUDIO: ON";
        } else {
            amb.pause();
            document.getElementById('sToggle').classList.remove('active');
            document.getElementById('sText').innerText = "AUDIO: OFF";
        }
    }

    document.querySelectorAll('.hit-zone').forEach(z => {
        z.addEventListener('click', function() {
            clk.currentTime = 0; clk.play();
            document.getElementById('pain-title').innerText = this.dataset.l;
            document.getElementById('pain-text').innerText = this.dataset.d;
        });
    });
</script>
</body>
</html>
