<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Трансфер-Конвертер Ескізів | Tattoo Studio</title>
    <style>
        :root {
            --bg-color: #0b0b0c;
            --panel-color: #141416;
            --accent-color: #00ffcc; /* Фірмовий неоновий бірюзовий */
            --accent-hover: #00cca3;
            --text-color: #ffffff;
            --border-radius: 16px;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            max-width: 900px;
            width: 100%;
            background: var(--panel-color);
            padding: 25px;
            border-radius: var(--border-radius);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5), 0 0 20px rgba(0, 255, 204, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.03);
            box-sizing: border-box;
            backdrop-filter: blur(10px);
        }

        h1 {
            text-align: center;
            color: var(--text-color);
            font-size: 26px;
            margin: 0 0 8px 0;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 800;
            background: linear-gradient(45deg, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            text-align: center;
            color: #71717a;
            font-size: 14px;
            margin: 0 0 25px 0;
            line-height: 1.5;
        }

        .upload-zone {
            border: 2px dashed #27272a;
            padding: 35px 20px;
            text-align: center;
            border-radius: var(--border-radius);
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            background: rgba(255, 255, 255, 0.01);
            position: relative;
            overflow: hidden;
        }

        .upload-zone:hover {
            border-color: var(--accent-color);
            background: rgba(0, 255, 204, 0.02);
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.05);
        }

        .upload-zone p {
            margin: 0;
            font-size: 15px;
            color: #a1a1aa;
            font-weight: 500;
        }

        #file-input {
            display: none;
        }

        .controls {
            margin-top: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            background: #18181b;
            padding: 20px;
            border-radius: var(--border-radius);
            border: 1px solid #27272a;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        label {
            font-size: 13px;
            color: #a1a1aa;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            justify-content: space-between;
        }

        label span {
            color: var(--accent-color);
            font-family: monospace;
            font-size: 14px;
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            background: #27272a;
            height: 6px;
            border-radius: 3px;
            outline: none;
            transition: all 0.2s;
        }

        input[type="range"]:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: var(--accent-color);
            cursor: pointer;
            box-shadow: 0 0 10px var(--accent-color);
            transition: transform 0.1s;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        .workspace {
            margin-top: 20px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        @media (max-width: 650px) {
            .workspace {
                grid-template-columns: 1fr;
            }
            .controls {
                grid-template-columns: 1fr;
            }
        }

        .preview-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #18181b;
            padding: 12px;
            border-radius: var(--border-radius);
            border: 1px solid #27272a;
            box-sizing: border-box;
        }

        .preview-box h3 {
            margin: 0 0 12px 0;
            font-size: 12px;
            color: #71717a;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 700;
        }

        img, canvas {
            width: 100%;
            height: auto;
            max-height: 380px;
            border-radius: 8px;
            object-fit: contain;
            background: #09090b;
            border: 1px solid #27272a;
        }

        /* Контрастне біле поле для трансферного паперу */
        canvas {
            background: #ffffff; 
            border-color: #e4e4e7;
        }

        .btn-container {
            margin-top: 25px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
        }

        .btn {
            border: none;
            padding: 14px 35px;
            font-size: 15px;
            font-weight: 700;
            border-radius: var(--border-radius);
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            width: 100%;
            max-width: 320px;
            text-align: center;
            box-sizing: border-box;
        }

        .btn-download {
            background: var(--accent-color);
            color: #0b0b0c;
            box-shadow: 0 4px 20px rgba(0, 255, 204, 0.2);
        }

        .btn-download:hover:not(:disabled) {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(0, 255, 204, 0.4);
        }

        .btn-download:disabled {
            background: #27272a;
            color: #71717a;
            box-shadow: none;
            cursor: not-allowed;
        }

        .btn-booking {
            background: transparent;
            color: #fff;
            border: 2px solid #27272a;
            margin-top: 5px;
        }

        .btn-booking:hover {
            border-color: #fff;
            background: rgba(255, 255, 255, 0.03);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Генератор Контуру для Трансферу</h1>
    <p class="subtitle">Інтерактивний модуль підготовки ескізу. Перетворіть будь-яке зображення на чіткі лінії для татуювання.</p>

    <!-- Зона кліку/дропу файлу -->
    <div class="upload-zone" id="drop-zone">
        <p id="upload-text">📸 Завантажити ескіз (натисніть або перетягніть фото)</p>
        <input type="file" id="file-input" accept="image/*">
    </div>

    <!-- Регулятори контурів -->
    <div class="controls">
        <div class="control-group">
            <label for="threshold-slider">Деталізація контуру <span id="threshold-val">60</span></label>
            <input type="range" id="threshold-slider" min="15" max="140" value="60" disabled>
        </div>
        <div class="control-group">
            <label for="thickness-slider">Товщина ліній трафарету <span id="thickness-val">1</span></label>
            <input type="range" id="thickness-slider" min="1" max="3" value="1" step="1" disabled>
        </div>
    </div>

    <!-- Порівняння результату -->
    <div class="workspace">
        <div class="preview-box">
            <h3>Початкове зображення</h3>
            <!-- Прозора SVG заглушка на старт -->
            <img id="source-img" src="data:image/svg+xml;utf8,<svg xmlns='w3.org' width='100' height='100'></svg>" alt="Оригінал">
        </div>
        <div class="preview-box">
            <h3>Готовий трафарет</h3>
            <canvas id="output-canvas"></canvas>
        </div>
    </div>

    <!-- Кнопки дій -->
    <div class="btn-container">
        <button class="btn btn-download" id="btn-download" disabled>Завантажити контур</button>
        <button class="btn btn-booking" id="btn-booking" onclick="goToBooking()">🎯 Онлайн-Запис на сеанс</button>
    </div>
</div>

<script>
    // Аудіо-ефекти інтерфейсу (працюють без додаткових файлів)
    const soundUpload = new Audio('mixkit.co');
    const soundProcess = new Audio('mixkit.co');
    const soundClick = new Audio('mixkit.co');
    
    // Налаштування гучності звуків, щоб не били по вухах
    soundUpload.volume = 0.3;
    soundProcess.volume = 0.2;
    soundClick.volume = 0.4;

    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const sourceImg = document.getElementById('source-img');
    const outputCanvas = document.getElementById('output-canvas');
    const ctx = outputCanvas.getContext('2d');
    
    const thresholdSlider = document.getElementById('threshold-slider');
    const thicknessSlider = document.getElementById('thickness-slider');
    const thresholdVal = document.getElementById('threshold-val');
    const thicknessVal = document.getElementById('thickness-val');
    const btnDownload = document.getElementById('btn-download');
    const uploadText = document.getElementById('upload-text');

    let originalData = null;

    // Взаємодія з інтерфейсом
    dropZone.addEventListener('click', () => fileInput.click());

    dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.style.borderColor = 'var(--accent-color)';
    });

    dropZone.addEventListener('dragleave', () => {
        dropZone.style.borderColor = '#27272a';
    });

    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.style.borderColor = '#27272a';
        if (e.dataTransfer.files.length > 0) {
            handleFile(e.dataTransfer.files[0]);
        }
    });

    fileInput.addEventListener('change', (e) => {
        if (e.target.files.length > 0) {
            handleFile(e.target.files[0]);
        }
    });

    function handleFile(file) {
        if (!file.type.startsWith('image/')) return;
        
        // Звук успішного вибору файлу
        soundUpload.play().catch(() => {});
        
        const reader = new FileReader();
        reader.onload = function(event) {
            sourceImg.src = event.target.result;
            uploadText.textContent = "🔄 Змінити зображення ескізу";
        };
        reader.readAsDataURL(file);
    }

    // Обробка зображення після завантаження в тег IMG
    sourceImg.onload = function() {
        if (sourceImg.src.startsWith('data:image/svg+xml')) return;

        // Звук початку генерації контурів
        soundProcess.play().catch(() => {});

        // Масштабуємо canvas під завантажене фото
        outputCanvas.width = sourceImg.naturalWidth;
        outputCanvas.height = sourceImg.naturalHeight;

        // Отримуємо масив пікселів
        ctx.drawImage(sourceImg, 0, 0);
        originalData = ctx.getImageData(0, 0, outputCanvas.width, outputCanvas.height);

        // Вмикаємо інтерфейс
        thresholdSlider.disabled = false;
        thicknessSlider.disabled = false;
        btnDownload.disabled = false;

        // Рендеримо контур
        processImage();
    };

    thresholdSlider.addEventListener('input', (e) => {
        thresholdVal.textContent = e.target.value;
        processImage();
    });

    thicknessSlider.addEventListener('input', (e) => {
        thicknessVal.textContent = e.target.value;
        processImage();
    });

    // Швидкий алгоритм Sobel Edge Detection для промальовки ліній трансферу
    function processImage() {
        if (!originalData) return;

        const width = outputCanvas.width;
        const height = outputCanvas.height;
        const threshold = parseInt(thresholdSlider.value);
        const thickness = parseInt(thicknessSlider.value);

        const imgDataOut = ctx.createImageData(width, height);
        const src = originalData.data;
        const dst = imgDataOut.data;

        // Швидкий перевід в Grayscale (чорно-білий масив)
        const gray = new Uint8Array(width * height);
        for (let i = 0; i < src.length; i += 4) {
            gray[i / 4] = 0.299 * src[i] + 0.587 * src[i + 1] + 0.114 * src[i + 2];
        }

        const step = thickness;

        for (let y = step; y < height - step; y++) {
            for (let x = step; x < width - step; x++) {
                
                // Матриця точок навколо поточного пікселя
                const idxTopLeft  = (y - step) * width + (x - step);
                const idxTopRight = (y - step) * width + (x + step);
                const idxBotLeft  = (y + step) * width + (x - step);
                const idxBotRight = (y + step) * width + (x + step);
                const idxLeft     = y * width + (x - step);
                const idxRight    = y * width + (x + step);
                const idxTop      = (y - step) * width + x;
                const idxBot      = (y + step) * width + x;

                // Градієнти змін кольору
                const gx = (gray[idxTopRight] + (2 * gray[idxRight]) + gray[idxBotRight]) - 
                           (gray[idxTopLeft] + (2 * gray[idxLeft]) + gray[idxBotLeft]);
                
                const gy = (gray[idxBotLeft] + (2 * gray[idxBot]) + gray[idxBotRight]) - 
                           (gray[idxTopLeft] + (2 * gray[idxTop]) + gray[idxTopRight]);

                const magnitude = Math.sqrt(gx * gx + gy * gy);
                const pos = (y * width + x) * 4;

                // Формування ліній: якщо градієнт вище порогу — малюємо чорний колір, інакше — чисто білий
                if (magnitude > threshold) {
                    dst[pos]     = 0;   // R
                    dst[pos + 1] = 0;   // G
                    dst[pos + 2] = 0;   // B
                    dst[pos + 3] = 255; // Опція альфа-каналу (видимий)
                } else {
                    dst[pos]     = 255; // R
                    dst[pos + 1] = 255; // G
                    dst[pos + 2] = 255; // B
                    dst[pos + 3] = 255; 
                }
            }
        }
        ctx.putImageData(imgDataOut, 0, 0);
    }

    // Скачування картинки контуру
    btnDownload.addEventListener('click', () => {
        soundClick.play().catch(() => {});
        const link = document.createElement('a');
        link.download = 'tattoo-stencil-contour.png';
        link.href = outputCanvas.toDataURL('image/png');
        link.click();
    });

    // Кнопка запису на сеанс
    function goToBooking() {
        soundClick.play().catch(() => {});
        
        // Сюди впиши посилання на свою основну сторінку або інстаграм
        window.open('instagram.com', '_blank'); 
    }
</script>

</body>
</html>
