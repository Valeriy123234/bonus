<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PAIN PROTOCOL | YYOKAI</title>
    <style>
        :root { --red: #ff0000; --bg: #000; --white: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { background: var(--bg); color: var(--white); font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; }

        /* --- ВЕРХНЯ ПАНЕЛЬ --- */
        .header { position: fixed; top: 30px; width: 100%; padding: 0 40px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; }
        .sound-btn { cursor: pointer; display: flex; align-items: center; gap: 10px; font-size: 10px; letter-spacing: 2px; opacity: 0.5; transition: 0.3s; }
        .sound-btn.active { opacity: 1; color: var(--red); }
        .sound-btn svg { width: 18px; fill: currentColor; }
        .back-btn { text-decoration: none; color: #fff; font-size: 10px; letter-spacing: 2px; border: 1px solid #222; padding: 8px 16px; border-radius: 4px; transition: 0.3s; font-family: 'Unbounded', sans-serif; }
        .back-btn:hover { border-color: var(--red); color: var(--red); }

        /* --- ОСНОВНИЙ БЛОК КАРТИ --- */
        .main-ui { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .map-wrapper { display: flex; align-items: center; justify-content: center; gap: 60px; max-width: 1200px; width: 100%; padding: 20px; }
        
        .body-visual { flex: 1; display: flex; justify-content: center; align-items: center; position: relative; }
        
        /* Фіксований контейнер для карти */
        .image-container {
            position: relative;
            width: 500px;
            height: 600px;
            background: #000;
        }

        /* Зображення силуетів */
        .body-image {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: contain;
            filter: brightness(0.6) contrast(1.1);
        }

        /* Теги area прозорі за замовчуванням */
        area {
            cursor: pointer;
            outline: none;
        }

        /* ІНФО ПАНЕЛЬ */
        .side-panel { width: 350px; border-left: 1px solid #111; padding-left: 40px; display: flex; flex-direction: column; justify-content: center; }
        .label { font-size: 9px; color: #444; letter-spacing: 4px; margin-bottom: 10px; }
        #pain-title { font-family: 'Unbounded', sans-serif; font-size: 32px; color: var(--red); margin-bottom: 20px; text-transform: uppercase; }
        #pain-text { font-size: 12px; color: #666; line-height: 1.8; text-transform: uppercase; letter-spacing: 1px; }

        .btn-book { margin-top: 40px; display: inline-block; padding: 20px 50px; border: 1px solid var(--red); color: #fff; text-decoration: none; font-family: 'Unbounded', sans-serif; font-size: 10px; border-radius: 100px; transition: 0.4s; text-align: center; }
        .btn-book:hover { background: var(--red); box-shadow: 0 0 30px rgba(255,0,0,0.4); }

        @media (max-width: 900px) {
            body { overflow-y: auto; height: auto; }
            .main-ui { height: auto; padding: 100px 0; }
            .map-wrapper { flex-direction: column; text-align: center; gap: 40px; }
            .side-panel { border: none; padding: 0; width: 100%; align-items: center; }
            .image-container { width: 320px; height: 384px; }
        }
    </style>
</head>
<body>

<audio id="bg-amb" loop src="ambient.mp3"></audio>
<audio id="click-sfx" src="click.mp3"></audio>

<div class="header">
    <div class="sound-btn" id="sToggle" onclick="toggleSnd()">
        <svg viewBox="0 0 24 24"><path d="M12 3v18l-6-6h-4v-6h4l6-6zm7 9c0-2.21-1.29-4.11-3.13-5l-1.46 1.46c.92.51 1.59 1.48 1.59 2.54s-.67 2.03-1.59 2.54l1.46 1.46c1.84-.89 3.13-2.79 3.13-5z"/></svg>
        <span id="sText">AUDIO: OFF</span>
    </div>
    <a href="index.html" class="back-btn">ГОЛОВНА</a>
</div>

<div class="main-ui">
    <div class="map-wrapper">
        <div class="body-visual">
            <div class="image-container">
                
                <!-- Зображення з картою координат -->
                <img src="silhouette.jpg" usemap="#image-map" class="body-image" id="map-img">

                <!-- Точні координати для кліків під розмір 500x600 -->
                <map name="image-map">
                    <!-- ЧОЛОВІК (Ліва фігура) -->
                    <area shape="circle" coords="145,55,20" data-l="ГОЛОВА (M)" data-d="Біль 8/10. Сильна вібрація, близько до кістки черепа.">
                    <area shape="rect" coords="110,90,180,180" data-l="ТОРС / РЕБРА (M)" data-d="Біль 7-10/10. Центр грудей та ребра — найбільш стресові ділянки під великі проекти.">
                    <area shape="rect" coords="75,95,110,240" data-l="ЛІВА РУКА (M)" data-d="Біль 3/10. Зовнішня частина плеча та передпліччя — найкраще місце для першого тату.">
                    <area shape="rect" coords="180,95,215,240" data-l="ПРАВА РУКА (M)" data-d="Біль 3/10. Зовнішня частина, м'яз згладжує больові імпульси.">
                    <area shape="rect" coords="115,180,175,340" data-l="ЖИВІТ / СТЕГНА (M)" data-d="Біль 5-8/10. Живіт вимагає контролю дихання, передня частина стегна терпима.">
                    <area shape="rect" coords="110,340,180,550" data-l="КОЛІНА / ІКРИ (M)" data-d="Біль 9/10. Суглоби та гомілка — дуже гострий дискомфорт системи.">

                    <!-- ЖІНКА (Права фігура) -->
                    <area shape="circle" coords="355,65,18" data-l="ГОЛОВА (F)" data-d="Біль 8/10. Тонка шкіра, висока чутливість нервових закінчень.">
                    <area shape="rect" coords="320,100,390,190" data-l="ТОРС / ЖИВІТ (F)" data-d="Біль 6-9/10. Ребра та низ живота вимагають максимальної концентрації.">
                    <area shape="rect" coords="285,105,320,240" data-l="ЛІВА РУКА (F)" data-d="Біль 2-4/10. Передпліччя — повністю контрольований та м'який рівень болю.">
                    <area shape="rect" coords="390,105,425,240" data-l="ПРАВА РУКА (F)" data-d="Біль 2-4/10. Ідеально під тонкий деталізований японський надпис.">
                    <area shape="rect" coords="325,190,385,340" data-l="СТЕГНА (F)" data-d="Біль 4/10. Переноситься легко, велика м'язова маса мінімізує стрес.">
                    <area shape="rect" coords="320,340,390,550" data-l="КОЛІНА / ГОМІЛКА (F)" data-d="Біль 8/10. Підколінна западина та кістка — критичний рівень за протоколом YYOKAI.">
                </map>

            </div>
        </div>

        <div class="side-panel">
            <div class="label">// SENSOR STATUS: READY</div>
            <div id="pain-title">SCANNING...</div>
            <div id="pain-text">Натисніть на будь-яку ділянку тіла силуетів для запуску біометричного аналізу YYOKAI SYSTEM.</div>
            <a href="t.me" class="btn-book">ЗАПИСАТИСЯ</a>
        </div>
    </div>
</div>

<script>
    const amb = document.getElementById('bg-amb');
    const clk = document.getElementById('click-sfx');
    const sToggle = document.getElementById('sToggle');
    const sText = document.getElementById('sText');

    // Логіка стабільного перемикача звуку
    function toggleSnd() {
        if (amb.paused) {
            amb.play().then(() => {
                amb.muted = false;
                sToggle.classList.add('active');
                sText.innerText = "AUDIO: ON";
            }).catch(e => console.log("Потрібна взаємодія"));
        } else {
            amb.pause();
            sToggle.classList.remove('active');
            sText.innerText = "AUDIO: OFF";
        }
    }

    // Обробка кліків по зонах карти
    document.querySelectorAll('area').forEach(zone => {
        zone.addEventListener('click', function(e) {
            e.preventDefault(); // Вимикає стандартний перехід по href
            clk.currentTime = 0; 
            clk.play();
            document.getElementById('pain-title').innerText = this.dataset.l;
            document.getElementById('pain-text').innerText = this.dataset.d;
        });
    });

    // Адаптація координат під мобільні екрани
    window.addEventListener('resize', respondCanvas);
    function respondCanvas() {
        const img = document.getElementById('map-img');
        const map = document.getElementsByName('image-map')[0];
        const areas = map.getElementsByTagName('area');
        const w = img.clientWidth;
        const h = img.clientHeight;
        
        // Базові розміри, під які писалися координати (500x600)
        const baseW = 500;
        const baseH = 600;

        // Масштабуємо кожну координату динамічно
        for (let i = 0; i < areas.length; i++) {
            if (!areas[i].dataset.coords) {
                areas[i].dataset.coords = areas[i].getAttribute('coords');
            }
            let c = areas[i].dataset.coords.split(',');
            let cN = [];
            for (let j = 0; j < c.length; j++) {
                if (j % 2 === 0) {
                    cN[j] = Math.round((c[j] / baseW) * w);
                } else {
                    cN[j] = Math.round((c[j] / baseH) * h);
                }
            }
            areas[i].setAttribute('coords', cN.join(','));
        }
    }
    img.addEventListener('load', respondCanvas);
</script>
</body>
</html>
