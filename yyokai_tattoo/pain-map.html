<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YYO KAI | 妖怪 Ultimate Tattoo Stencil Studio</title>
    <style>
        :root {
            --bg-color: #000000; /* Абсолютний глибокий чорний */
            --panel-color: #050508;
            --control-bg: #0b0b10;
            --accent-color: #ff003c; /* Безкомпромісний неоновий червоний */
            --accent-hover: #ff3366;
            --text-color: #ffffff;
            --text-muted: #6e6e82;
            --border-radius: 0px; /* Квадратний кіберпанк стиль */
            --neon-glow: 0 0 20px rgba(255, 0, 60, 0.6), inset 0 0 10px rgba(255, 0, 60, 0.2);
            --border-neon: 1px solid #ff003c;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-sizing: border-box;
            overflow-x: hidden;
            touch-action: manipulation;
            background-image: linear-gradient(180deg, #0f0005 0%, #000000 100%);
        }

        header {
            width: 100%;
            max-width: 900px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 20px;
            box-sizing: border-box;
            position: relative;
            z-index: 100;
        }

        /* Оновлена контрастна кнопка звуку */
        .music-container {
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 102;
            background: var(--control-bg);
            border: 1px solid rgba(255, 0, 60, 0.4);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .music-container:hover {
            border-color: var(--accent-color);
            box-shadow: var(--neon-glow);
        }

        .music-icon { font-size: 18px; color: #fff; transition: all 0.3s ease; }
        
        /* Еквалайзер строго з 6 прямокутників із повністю рандомним рухом */
        .equalizer { display: none; align-items: flex-end; justify-content: space-between; width: 24px; height: 18px; }
        .eq-bar { width: 3px; height: 3px; background-color: var(--accent-color); box-shadow: 0 0 8px var(--accent-color); }
        
        .music-container.playing .music-icon { display: none; }
        .music-container.playing .equalizer { display: flex; }
        
        /* Рандомні таймінги та швидкості для кожного з 6 прямокутників */
        .music-container.playing .eq-bar:nth-child(1) { animation: eq-rise 0.4s ease-in-out infinite alternate; }
        .music-container.playing .eq-bar:nth-child(2) { animation: eq-rise 0.25s ease-in-out infinite alternate 0.15s; }
        .music-container.playing .eq-bar:nth-child(3) { animation: eq-rise 0.55s ease-in-out infinite alternate 0.05s; }
        .music-container.playing .eq-bar:nth-child(4) { animation: eq-rise 0.35s ease-in-out infinite alternate 0.2s; }
        .music-container.playing .eq-bar:nth-child(5) { animation: eq-rise 0.48s ease-in-out infinite alternate 0.1s; }
        .music-container.playing .eq-bar:nth-child(6) { animation: eq-rise 0.3s ease-in-out infinite alternate 0.25s; }

        @keyframes eq-rise { 
            0% { height: 3px; } 
            100% { height: 18px; } 
        }

        /* Центрований бренд YYO KAI */
        .brand-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
        }

        .glitch-logo {
            font-size: 32px;
            font-weight: 900;
            letter-spacing: 6px;
            text-transform: uppercase;
            position: relative;
            color: #fff;
            line-height: 0.9;
        }

        .glitch-logo.sub { font-size: 24px; color: var(--accent-color); letter-spacing: 10px; margin-top: 5px; text-shadow: var(--neon-glow); }
        .glitch-logo::before, .glitch-logo::after { content: attr(data-text); position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000000; }
        .glitch-logo::before { left: 2px; text-shadow: -2px 0 var(--accent-color); clip: rect(10px, 450px, 30px, 0); animation: glitch-anim 3s infinite linear alternate-reverse; }
        .glitch-logo::after { left: -2px; text-shadow: -2px 0 #00fff0, 0 2px var(--accent-color); clip: rect(25px, 450px, 55px, 0); animation: glitch-anim2 3s infinite linear alternate-reverse; }

        @keyframes glitch-anim {
            0% { clip: rect(4px, 9999px, 18px, 0); transform: skew(0.3deg); }
            50% { clip: rect(12px, 9999px, 30px, 0); transform: skew(0.5deg); }
            100% { clip: rect(2px, 9999px, 12px, 0); transform: skew(0.1deg); }
        }

        @keyframes glitch-anim2 {
            0% { clip: rect(18px, 9999px, 40px, 0); transform: skew(-0.2deg); }
            50% { clip: rect(6px, 9999px, 22px, 0); transform: skew(0.7deg); }
            100% { clip: rect(25px, 9999px, 45px, 0); transform: skew(-0.3deg); }
        }

        .burger-menu { width: 30px; height: 18px; display: flex; flex-direction: column; justify-content: space-between; cursor: pointer; z-index: 101; }
        .burger-bar { width: 100%; height: 2px; background-color: #fff; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); }
        .burger-menu.active .burger-bar:nth-child(1) { transform: translateY(8px) rotate(45deg); background-color: var(--accent-color); }
        .burger-menu.active .burger-bar:nth-child(2) { opacity: 0; transform: translateX(10px); }
        .burger-menu.active .burger-bar:nth-child(3) { transform: translateY(-8px) rotate(-45deg); background-color: var(--accent-color); }

        .nav-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.99);
            z-index: 99;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 30px;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease;
            border-left: 3px solid var(--accent-color);
        }

        .nav-overlay.active { opacity: 1; pointer-events: auto; }
        .nav-link { font-size: 24px; color: #fff; text-decoration: none; font-weight: 700; text-transform: uppercase; letter-spacing: 3px; transition: all 0.2s; }
        .nav-link:hover { color: var(--accent-color); text-shadow: var(--neon-glow); }

        .container {
            max-width: 900px;
            width: 100%;
            background: var(--panel-color);
            padding: 30px 25px;
            border-radius: var(--border-radius);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 1);
            border: 1px solid rgba(255, 0, 60, 0.15);
            box-sizing: border-box;
            margin-top: 15px;
            margin-bottom: 40px;
        }

        .upload-zone {
            border: 1px dashed rgba(255, 0, 60, 0.4);
            padding: 40px 20px;
            text-align: center;
            border-radius: var(--border-radius);
            cursor: pointer;
            transition: all 0.25s ease;
            background: rgba(255, 0, 60, 0.005);
        }

        .upload-zone:hover { border-color: var(--accent-color); background: rgba(255, 0, 60, 0.02); box-shadow: var(--neon-glow); }
        .upload-zone p { margin: 0; font-size: 14px; color: #a5a5b5; font-weight: 600; letter-spacing: 1px; }
        #file-input { display: none; }

        /* Контрастні преміум-контролери */
        .controls {
            margin-top: 25px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 25px;
            background: var(--control-bg);
            padding: 25px;
            border: 1px solid rgba(255, 0, 60, 0.2);
            box-shadow: 0 5px 25px rgba(0,0,0,0.5);
        }

        .control-group { display: flex; flex-direction: column; gap: 12px; }
        label { font-size: 11px; color: #858595; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; display: flex; justify-content: space-between; }
        label span { color: var(--accent-color); font-family: monospace; font-size: 15px; font-weight: 900; text-shadow: var(--neon-glow); }

        /* Кастомний кіберпанк трек слайдера */
        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            background: #111116;
            height: 8px;
            border: 1px solid rgba(255, 0, 60, 0.2);
            outline: none;
            cursor: pointer;
            touch-action: none;
        }

        /* Квадратні неонові бігунки слайдера */
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 22px;
            height: 22px;
            border-radius: 0px; 
            background: var(--accent-color);
            cursor: grab;
            box-shadow: var(--neon-glow);
            transition: all 0.1s ease;
        }

        input[type="range"]::-webkit-slider-thumb:active {
            cursor: grabbing;
            transform: scale(1.2);
            background-color: #ffffff;
            box-shadow: 0 0 25px #ffffff;
        }

        input[type="range"]::-moz-range-thumb {
            width: 22px;
            height: 22px;
            border: none;
            border-radius: 0px;
            background: var(--accent-color);
            cursor: grab;
            box-shadow: var(--neon-glow);
        }
        input[type="range"]:disabled { opacity: 0.05; cursor: not-allowed; }

        .workspace { margin-top: 25px; display: grid; grid-template-columns: 1fr; gap: 25px; }

        .preview-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: var(--control-bg);
            padding: 20px;
            border-radius: var(--border-radius);
            border: 1px solid rgba(255, 0, 60, 0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
            box-sizing: border-box;
            width: 100%;
        }

        .preview-box h3 { margin: 0 0 15px 0; font-size: 11px; color: #858595; text-transform: uppercase; letter-spacing: 2px; font-weight: 800; }
        img, canvas { width: 100%; height: auto; max-height: 500px; border-radius: 4px; object-fit: contain; background: #000000; }
        canvas { background: #ffffff; border: 2px solid #111116; }

        .btn-container { margin-top: 30px; display: flex; flex-direction: column; gap: 14px; align-items: center; }
        .btn { border: none; padding: 16px 45px; font-size: 13px; font-weight: 800; border-radius: 0px; cursor: pointer; transition: all 0.2s ease; text-transform: uppercase; letter-spacing: 2px; width: 100%; max-width: 360px; text-align: center; box-sizing: border-box; }
        
        .btn-download { background: var(--accent-color); color: #ffffff; box-shadow: var(--neon-glow); font-weight: 900; }
        .btn-download:hover:not(:disabled) { background: #ff1a4a; transform: translateY(-2px); box-shadow: 0 0 30px rgba(255, 0, 60, 0.8); }
        .btn-download:disabled { background: #111116; color: #333344; box-shadow: none; border: 1px solid rgba(255,255,255,0.02); cursor: not-allowed; }
        
        .btn-booking { background: transparent; color: #fff; border: 1px solid rgba(255, 255, 255, 0.15); }
        .btn-booking:hover { border-color: var(--accent-color); background: rgba(255, 0, 60, 0.03); transform: translateY(-2px); box-shadow: var(--neon-glow); }
    </style>
</head>
<body>

    <header>
        <!-- Кнопка музики (Toggle) -->
        <div class="music-container" id="music-btn" onclick="toggleMusic()">
            <div class="music-icon">🎵</div>
            <!-- Живий еквалайзер строго з 6 прямокутників -->
            <div class="equalizer">
                <div class="eq-bar"></div>
                <div class="eq-bar"></div>
                <div class="eq-bar"></div>
                <div class="eq-bar"></div>
                <div class="eq-bar"></div>
                <div class="eq-bar"></div>
            </div>
        </div>

        <div class="brand-block" onclick="location.reload()">
            <div class="glitch-logo" data-text="YYO">YYO</div>
            <div class="glitch-logo sub" data-text="KAI">KAI</div>
        </div>

        <div class="burger-menu" id="burger-menu" onclick="toggleMenu()">
            <div class="burger-bar"></div>
            <div class="burger-bar"></div>
            <div class="burger-bar"></div>
        </div>
    </header>

    <div class="nav-overlay" id="nav-overlay">
        <a href="#" class="nav-link" onclick="toggleMenu()">Головна // HOME</a>
        <a href="#" class="nav-link" onclick="toggleMenu()">Трансфер // STENCIL</a>
        <a href="https://instagram.com" target="_blank" class="nav-link" onclick="toggleMenu()">Запис // BOOKING</a>
    </div>

    <div class="container">
        <div class="upload-zone" id="drop-zone">
            <p id="upload-text">🏮 Завантажте ескіз // アップロード</p>
            <input type="file" id="file-input" accept="image/*">
        </div>

        <div class="controls">
            <div class="control-group">
                <label>Пошук мікро-ліній та деталей // ЧУТЛИВІСТЬ: <span id="detail-val">50%</span></label>
                <input type="range" id="detail-slider" min="1" max="100" value="50" step="1" disabled>
            </div>
            <div class="control-group">
                <label>Придушення шуму та тіней // ОЧИЩЕННЯ ФОНУ: <span id="noise-val">50%</span></label>
                <input type="range" id="noise-slider" min="1" max="100" value="50" step="1" disabled>
            </div>
            <div class="control-group">
                <label>Глибина чорного контуру // МНОЖЕННЯ ШАРІВ: <span id="layers-val">2 шари</span></label>
                <input type="range" id="layers-slider" min="1" max="3" value="2" step="1" disabled>
            </div>
        </div>

        <div class="workspace">
            <div class="preview-box">
                <h3>Преміум Трафарет // 線画スタンプ</h3>
                <canvas id="output-canvas"></canvas>
            </div>
            <div class="preview-box">
                <h3>Оригінальний ескіз // 原画</h3>
                <img id="source-img" src="data:image/svg+xml;utf8,<svg xmlns='w3.org' width='100' height='100'></svg>" alt="Оригінал">
            </div>
        </div>

        <div class="btn-container">
            <button class="btn btn-download" id="btn-download" disabled>Скачати готовий трафарет // DOWNLOAD</button>
            <button class="btn btn-booking" onclick="window.open('https://instagram.com', '_blank')">🎯 Записатись до майстра // APPOINTMENT</button>
        </div>
    </div>

<script>
    // Ініціалізація твого аудіофайлу
    const bgMusic = new Audio('track.mp3'); 
    bgMusic.loop = true; 
    bgMusic.volume = 0.3; 
    
    let isMusicPlaying = false; // Прапорець стану треку

    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const sourceImg = document.getElementById('source-img');
    const outputCanvas = document.getElementById('output-canvas');
    const ctx = outputCanvas.getContext('2d');
    
    const detailSlider = document.getElementById('detail-slider');
    const noiseSlider = document.getElementById('noise-slider');
    const layersSlider = document.getElementById('layers-slider');
    
    const detailVal = document.getElementById('detail-val');
    const noiseVal = document.getElementById('noise-val');
    const layersVal = document.getElementById('layers-val');
    const btnDownload = document.getElementById('btn-download');
    const uploadText = document.getElementById('upload-text');

    let originalData = null;
    let isProcessing = false;

    // Бездоганний двосторонній перемикач музики On/Off та еквалайзера
    function toggleMusic() {
        const musicBtn = document.getElementById('music-btn');
        if (!isMusicPlaying) {
            bgMusic.play().then(() => {
                isMusicPlaying = true;
                musicBtn.classList.add('playing');
            }).catch((err) => { console.log("Файл track.mp3 не знайдено в папці сайту:", err); });
        } else {
            bgMusic.pause();
            isMusicPlaying = false;
            musicBtn.classList.remove('playing');
        }
    }

    function toggleMenu() {
        document.getElementById('burger-menu').classList.toggle('active');
        document.getElementById('nav-overlay').classList.toggle('active');
    }

    dropZone.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', (e) => { if (e.target.files && e.target.files.length > 0) handleFile(e.target.files); });

    function handleFile(files) {
        const file = files[0];
        if (!file || !file.type.startsWith('image/')) return;
        const reader = new FileReader();
        reader.onload = (e) => { sourceImg.src = e.target.result; uploadText.textContent = "🔄 Змінити ескіз // EDIT"; };
        reader.readAsDataURL(file);
    }

    sourceImg.onload = function() {
        if (sourceImg.src.startsWith('data:image/svg+xml')) return;
        
        outputCanvas.width = sourceImg.naturalWidth;
        outputCanvas.height = sourceImg.naturalHeight;
        ctx.drawImage(sourceImg, 0, 0);
        originalData = ctx.getImageData(0, 0, outputCanvas.width, outputCanvas.height);

        detailSlider.disabled = false;
        noiseSlider.disabled = false;
        layersSlider.disabled = false;
        btnDownload.disabled = false;

        updateSliderLabels();
        requestProcess();
    };

    detailSlider.addEventListener('input', () => { updateSliderLabels(); requestProcess(); });
    noiseSlider.addEventListener('input', () => { updateSliderLabels(); requestProcess(); });
    layersSlider.addEventListener('input', () => { updateSliderLabels(); requestProcess(); });

    detailSlider.addEventListener('touchmove', () => { updateSliderLabels(); requestProcess(); }, { passive: true });
    noiseSlider.addEventListener('touchmove', () => { updateSliderLabels(); requestProcess(); }, { passive: true });
    layersSlider.addEventListener('touchmove', () => { updateSliderLabels(); requestProcess(); }, { passive: true });

    function updateSliderLabels() {
        detailVal.textContent = detailSlider.value + "%";
        noiseVal.textContent = noiseSlider.value + "%";
        layersVal.textContent = layersSlider.value + (layersSlider.value == 1 ? " шар" : " шари");
    }

    function requestProcess() {
        if (!isProcessing) {
            isProcessing = true;
            window.requestAnimationFrame(() => {
                processPremiumPureLineTransfer();
                isProcessing = false;
            });
        }
    }

    function processPremiumPureLineTransfer() {
        if (!originalData) return;

        const w = outputCanvas.width;
        const h = outputCanvas.height;
        
        const detailSliderVal = parseInt(detailSlider.value); 
        const noiseSliderVal = parseInt(noiseSlider.value);   
        const layerCount = parseInt(layersSlider.value);       

        const sensitivity = 1.0 + ((100 - detailSliderVal) / 15); 
        const backgroundBurn = 255 - (noiseSliderVal * 1.3); 

        const imgData = ctx.createImageData(w, h);
        const src = originalData.data;
        const dst = imgData.data;

        const gray = new Uint8Array(w * h);
        for (let i = 0; i < src.length; i += 4) {
            gray[i/4] = (src[i] + src[i+1] + src[i+2]) / 3;
        }

        const finalBuffer = new Uint8Array(w * h);
        finalBuffer.fill(255);

        const maskSize = 3; 

        for (let l = 0; l < layerCount; l++) {
            const shiftX = (l === 1) ? 1 : (l === 2) ? -1 : 0;
            const shiftY = (l === 2) ? 1 : 0;

            for (let y = maskSize + 2; y < h - maskSize - 2; y++) {
                const rowIdx = y * w;
                const shiftedRowIdx = (y + shiftY) * w;

                for (let x = maskSize + 2; x < w - maskSize - 2; x++) {
                    const currentPx = gray[shiftedRowIdx + x + shiftX];
                    const bufferIdx = rowIdx + x;

                    let maxVal = 0;
                    let minVal = 255;

                    for (let ky = -maskSize; ky <= maskSize; ky++) {
                        const kernelRow = (y + ky + shiftY) * w;
                        for (let kx = -maskSize; kx <= maskSize; kx++) {
                            const px = gray[kernelRow + x + kx + shiftX];
                            if (px > maxVal) maxVal = px;
                            if (px < minVal) minVal = px;
                        }
                    }

                    const localContrast = maxVal - minVal;
                    const midThreshold = (maxVal + minVal) / 2;

                    if (localContrast >= sensitivity * 4.0 && currentPx < midThreshold) {
                        if (currentPx < backgroundBurn) {
                            finalBuffer[bufferIdx] = 0; 
                        }
                    }
                }
            }
        }

        for (let i = 0; i < finalBuffer.length; i++) {
            const color = finalBuffer[i];
            const pos = i * 4;
            dst[pos]     = color;
            dst[pos + 1] = color;
            dst[pos + 2] = color;
            dst[pos + 3] = 255;
        }
        
        ctx.putImageData(imgData, 0, 0);
    }

    btnDownload.addEventListener('click', () => {
        outputCanvas.toBlob((blob) => {
            if (!blob) return;
            const blobUrl = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.download = 'yyokai-premium-stencil.png';
            link.href = blobUrl;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(blobUrl);
        }, 'image/png');
    });
</script>
</body>
</html>
