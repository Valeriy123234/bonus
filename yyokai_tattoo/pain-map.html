<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAIN PROTOCOL | YYOKAI</title>
    <style>
        :root { --red: #ff0000; --bg: #000; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; }

        .header { position: fixed; top: 30px; width: 100%; padding: 0 40px; display: flex; justify-content: space-between; z-index: 1000; }
        .sound-btn { cursor: pointer; display: flex; align-items: center; gap: 10px; font-size: 10px; letter-spacing: 2px; opacity: 0.5; transition: 0.3s; }
        .sound-btn.active { opacity: 1; color: var(--red); }

        .main-ui { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .map-wrapper { display: flex; align-items: center; gap: 60px; max-width: 1100px; width: 100%; padding: 20px; }
        
        .body-visual { flex: 1; display: flex; justify-content: center; }
        .body-svg { height: 70vh; width: auto; }
        
        /* СТИЛЬ ЗОН */
        .zone { fill: #151515; stroke: #333; stroke-width: 1; cursor: pointer; transition: 0.3s; }
        .zone:hover { fill: var(--red); filter: drop-shadow(0 0 15px var(--red)); stroke: var(--red); }

        .side-panel { width: 350px; border-left: 1px solid #222; padding-left: 30px; }
        .label { font-size: 9px; color: #444; letter-spacing: 4px; margin-bottom: 10px; }
        #pain-title { font-family: 'Unbounded', sans-serif; font-size: 32px; color: var(--red); margin-bottom: 15px; text-transform: uppercase; }
        #pain-text { font-size: 12px; color: #666; line-height: 1.8; text-transform: uppercase; letter-spacing: 1px; }

        .btn-book { margin-top: 40px; display: inline-block; padding: 20px 50px; border: 1px solid var(--red); color: #fff; text-decoration: none; font-family: 'Unbounded', sans-serif; font-size: 10px; border-radius: 100px; transition: 0.4s; }
        .btn-book:hover { background: var(--red); box-shadow: 0 0 30px rgba(255,0,0,0.4); }

        @media (max-width: 900px) {
            .map-wrapper { flex-direction: column; text-align: center; }
            .side-panel { border: none; padding: 0; width: 100%; }
            .body-svg { height: 50vh; }
        }
    </style>
</head>
<body>

<audio id="bg-amb" loop src="ambient.mp3"></audio>
<audio id="click-sfx" src="click.mp3"></audio>

<div class="header">
    <div class="sound-btn" id="sToggle" onclick="toggleSnd()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3v18l-6-6h-4v-6h4l6-6zm7 9c0-2.21-1.29-4.11-3.13-5l-1.46 1.46c.92.51 1.59 1.48 1.59 2.54s-.67 2.03-1.59 2.54l1.46 1.46c1.84-.89 3.13-2.79 3.13-5z"/></svg>
        <span id="sText">AUDIO: OFF</span>
    </div>
    <div class="menu-btn" onclick="window.location.href='index.html'" style="cursor:pointer; color: #fff; font-size: 10px; letter-spacing: 2px;">BACK TO MENU</div>
</div>

<div class="main-ui">
    <div class="map-wrapper">
        <div class="body-visual">
            <svg class="body-svg" viewBox="0 0 400 600" xmlns="http://w3.org">
                <!-- ЧОЛОВІЧИЙ СИЛУЕТ (M) -->
                <g class="man">
                    <path class="zone" data-l="ГОЛОВА" data-d="Біль 8/10. Висока чутливість через тонку шкіру та вібрацію." d="M85,50 Q100,30 115,50 L115,80 Q100,90 85,80 Z" />
                    <path class="zone" data-l="ТОРС / РЕБРА" data-d="Біль 7-10/10. Ребра та сонячне сплетіння — найскладніші ділянки." d="M70,100 L130,100 L125,230 L75,230 Z" />
                    <path class="zone" data-l="РУКИ" data-d="Біль 3/10. Зовнішня частина плеча — найкомфортніше місце для першого тату." d="M65,105 L40,230 L55,240 L70,140 M135,105 L160,230 L145,240 L130,140 Z" />
                    <path class="zone" data-l="НОГИ" data-d="Біль 5/10. Стегна терпимо, коліна та литки — болючі зони." d="M80,240 L65,480 L95,480 L105,240 M120,240 L135,480 L105,480 L95,240 Z" />
                </g>
                <!-- ЖІНОЧИЙ СИЛУЕТ (F) -->
                <g class="woman" transform="translate(180, 0)">
                    <path class="zone" data-l="ГОЛОВА" data-d="Біль 8/10. Черепна зона має високий рівень стресу." d="M85,50 Q100,30 115,50 L115,80 Q100,90 85,80 Z" />
                    <path class="zone" data-l="ТОРС / ЖИВІТ" data-d="Біль 6-9/10. Живіт та ребра вимагають максимального контролю дихання." d="M75,100 L125,100 L120,230 L80,230 Z" />
                    <path class="zone" data-l="РУКИ" data-d="Біль 2-4/10. Передпліччя — ідеально для деталізованих ескізів." d="M70,105 L50,230 L60,240 L75,140 M130,105 L150,230 L140,240 L125,140 Z" />
                    <path class="zone" data-l="НОГИ" data-d="Біль 5/10. Стегна та гомілки — стандартний рівень дискомфорту." d="M85,240 L75,480 L95,480 L105,240 M115,240 L125,480 L105,480 L95,240 Z" />
                </g>
            </svg>
        </div>

        <div class="side-panel">
            <div class="label">// SYSTEM ANALYSIS</div>
            <div id="pain-title">READY</div>
            <div id="pain-text">Натисніть на частину тіла для аналізу рівня болю за протоколом YYOKAI SYSTEM.</div>
            <a href="https://t.me" class="btn-book">ЗАПИСАТИСЯ</a>
        </div>
    </div>
</div>

<script>
    const amb = document.getElementById('bg-amb');
    const clk = document.getElementById('click-sfx');

    function toggleSnd() {
        if (amb.paused) {
            amb.play(); amb.muted = false;
            document.getElementById('sToggle').classList.add('active');
            document.getElementById('sText').innerText = "AUDIO: ON";
        } else {
            amb.pause();
            document.getElementById('sToggle').classList.remove('active');
            document.getElementById('sText').innerText = "AUDIO: OFF";
        }
    }

    document.querySelectorAll('.zone').forEach(z => {
        z.addEventListener('click', function() {
            clk.currentTime = 0; clk.play();
            document.getElementById('pain-title').innerText = this.dataset.l;
            document.getElementById('pain-text').innerText = this.dataset.d;
        });
    });
</script>
</body>
</html>
