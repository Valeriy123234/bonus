<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YYO KAI | Premium Tattoo Stencil Engine</title>
    <style>
        :root {
            --bg-color: #060608;
            --panel-color: #0e0e11;
            --accent-color: #00ffcc;
            --accent-hover: #00cca3;
            --text-color: #ffffff;
            --border-radius: 16px;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-sizing: border-box;
            overflow-x: hidden;
            touch-action: manipulation;
        }

        header {
            width: 100%;
            max-width: 900px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
            position: relative;
            z-index: 100;
        }

        .music-container {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 102;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .music-icon { font-size: 16px; color: #fff; transition: all 0.3s ease; }
        .equalizer { display: none; align-items: flex-end; justify-content: space-between; width: 20px; height: 16px; }
        .eq-bar { width: 2px; height: 3px; background-color: var(--accent-color); border-radius: 1px; }
        .music-container.playing .music-icon { display: none; }
        .music-container.playing .equalizer { display: flex; }
        .music-container.playing .eq-bar:nth-child(1) { animation: eq-rise 0.5s ease-in-out infinite alternate; }
        .music-container.playing .eq-bar:nth-child(2) { animation: eq-rise 0.3s ease-in-out infinite alternate 0.1s; }
        .music-container.playing .eq-bar:nth-child(3) { animation: eq-rise 0.6s ease-in-out infinite alternate 0.2s; }
        .music-container.playing .eq-bar:nth-child(4) { animation: eq-rise 0.4s ease-in-out infinite alternate 0.05s; }
        .music-container.playing .eq-bar:nth-child(5) { animation: eq-rise 0.7s ease-in-out infinite alternate 0.15s; }
        .music-container.playing .eq-bar:nth-child(6) { animation: eq-rise 0.2s ease-in-out infinite alternate 0.25s; }

        @keyframes eq-rise { 0% { height: 2px; } 100% { height: 16px; } }

        .brand-block {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
        }

        .glitch-logo {
            font-size: 30px;
            font-weight: 900;
            letter-spacing: 5px;
            text-transform: uppercase;
            position: relative;
            color: #fff;
            line-height: 0.9;
        }

        .glitch-logo.sub { font-size: 22px; color: var(--accent-color); letter-spacing: 8px; margin-top: 3px; }
        .glitch-logo::before, .glitch-logo::after { content: attr(data-text); position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-color); }
        .glitch-logo::before { left: 2px; text-shadow: -2px 0 #ff00c1; clip: rect(10px, 450px, 30px, 0); animation: glitch-anim 4s infinite linear alternate-reverse; }
        .glitch-logo::after { left: -2px; text-shadow: -2px 0 #00fff0, 0 2px #ff00c1; clip: rect(25px, 450px, 55px, 0); animation: glitch-anim2 4s infinite linear alternate-reverse; }

        @keyframes glitch-anim {
            0% { clip: rect(5px, 9999px, 20px, 0); transform: skew(0.2deg); }
            50% { clip: rect(15px, 9999px, 35px, 0); transform: skew(0.4deg); }
            100% { clip: rect(2px, 9999px, 15px, 0); transform: skew(0.1deg); }
        }

        @keyframes glitch-anim2 {
            0% { clip: rect(20px, 9999px, 45px, 0); transform: skew(-0.1deg); }
            50% { clip: rect(8px, 9999px, 25px, 0); transform: skew(0.6deg); }
            100% { clip: rect(30px, 9999px, 50px, 0); transform: skew(-0.2deg); }
        }

        .burger-menu { width: 30px; height: 20px; display: flex; flex-direction: column; justify-content: space-between; cursor: pointer; z-index: 101; }
        .burger-bar { width: 100%; height: 3px; background-color: #fff; border-radius: 2px; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .burger-menu.active .burger-bar:nth-child(1) { transform: translateY(8px) rotate(45deg); background-color: var(--accent-color); }
        .burger-menu.active .burger-bar:nth-child(2) { opacity: 0; transform: translateX(10px); }
        .burger-menu.active .burger-bar:nth-child(3) { transform: translateY(-9px) rotate(-45deg); background-color: var(--accent-color); }

        .nav-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(6, 6, 8, 0.98);
            z-index: 99;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 25px;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s ease;
        }

        .nav-overlay.active { opacity: 1; pointer-events: auto; }
        .nav-link { font-size: 24px; color: #fff; text-decoration: none; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; transition: color 0.2s; }
        .nav-link:hover { color: var(--accent-color); }

        .container {
            max-width: 900px;
            width: 100%;
            background: var(--panel-color);
            padding: 25px;
            border-radius: var(--border-radius);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.01);
            box-sizing: border-box;
            margin-top: 20px;
            margin-bottom: 40px;
        }

        .upload-zone {
            border: 2px dashed #1c1c22;
            padding: 30px 20px;
            text-align: center;
            border-radius: var(--border-radius);
            cursor: pointer;
            transition: all 0.2s ease;
            background: rgba(255, 255, 255, 0.005);
        }

        .upload-zone:hover { border-color: var(--accent-color); background: rgba(0, 255, 204, 0.01); }
        .upload-zone p { margin: 0; font-size: 15px; color: #6e6e77; font-weight: 500; }
        #file-input { display: none; }

        .controls {
            margin-top: 20px;
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            background: #121216;
            padding: 20px;
            border-radius: var(--border-radius);
            border: 1px solid #1c1c22;
        }

        .control-group { display: flex; flex-direction: column; gap: 10px; }
        label { font-size: 12px; color: #6e6e77; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; display: flex; justify-content: space-between; }
        label span { color: var(--accent-color); font-family: monospace; font-size: 14px; }

        input[type="range"] {
            -webkit-appearance: none;
            appearance: none;
            width: 100%;
            background: #1c1c22;
            height: 12px;
            border-radius: 50px;
            outline: none;
            cursor: pointer;
            touch-action: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: var(--accent-color);
            cursor: grab;
            box-shadow: 0 0 12px var(--accent-color), 0 2px 6px rgba(0,0,0,0.5);
            transition: transform 0.1s, background-color 0.2s;
        }

        input[type="range"]::-webkit-slider-thumb:active {
            cursor: grabbing;
            transform: scale(1.15);
            background-color: #ffffff;
        }

        input[type="range"]::-moz-range-thumb {
            width: 28px;
            height: 28px;
            border: none;
            border-radius: 50%;
            background: var(--accent-color);
            cursor: grab;
            box-shadow: 0 0 12px var(--accent-color), 0 2px 6px rgba(0,0,0,0.5);
        }
        input[type="range"]::-moz-range-thumb:active { cursor: grabbing; transform: scale(1.15); }
        input[type="range"]:disabled { opacity: 0.15; cursor: not-allowed; }

        .workspace { margin-top: 20px; display: grid; grid-template-columns: 1fr; gap: 20px; }

        .preview-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: #121216;
            padding: 15px;
            border-radius: var(--border-radius);
            border: 1px solid #1c1c22;
            box-sizing: border-box;
            width: 100%;
        }

        .preview-box h3 { margin: 0 0 12px 0; font-size: 11px; color: #4b4b54; text-transform: uppercase; letter-spacing: 1px; }
        img, canvas { width: 100%; height: auto; max-height: 480px; border-radius: 8px; object-fit: contain; background: #060608; }
        canvas { background: #ffffff; border: 1px solid #e4e4e7; }

        .btn-container { margin-top: 25px; display: flex; flex-direction: column; gap: 12px; align-items: center; }
        .btn { border: none; padding: 14px 35px; font-size: 14px; font-weight: 700; border-radius: var(--border-radius); cursor: pointer; transition: all 0.2s ease; text-transform: uppercase; letter-spacing: 1px; width: 100%; max-width: 340px; text-align: center; box-sizing: border-box; }
        .btn-download { background: var(--accent-color); color: #060608; box-shadow: 0 4px 20px rgba(0, 255, 204, 0.15); }
        .btn-download:hover:not(:disabled) { background: var(--accent-hover); transform: translateY(-2px); box-shadow: 0 6px 25px rgba(0, 255, 204, 0.3); }
        .btn-download:disabled { background: #1c1c22; color: #4b4b54; box-shadow: none; cursor: not-allowed; }
        .btn-booking { background: transparent; color: #fff; border: 2px solid #1c1c22; }
        .btn-booking:hover { border-color: #fff; background: rgba(255, 255, 255, 0.01); transform: translateY(-2px); }
    </style>
</head>
<body>

    <header>
        <div class="music-container" id="music-btn" onclick="toggleMusic()">
            <div class="music-icon">🎵</div>
            <div class="equalizer">
                <div class="eq-bar"></div>
                <div class="eq-bar"></div>
                <div class="eq-bar"></div>
                <div class="eq-bar"></div>
                <div class="eq-bar"></div>
                <div class="eq-bar"></div>
            </div>
        </div>

        <div class="brand-block" onclick="location.reload()">
            <div class="glitch-logo" data-text="YYO">YYO</div>
            <div class="glitch-logo sub" data-text="KAI">KAI</div>
        </div>

        <div class="burger-menu" id="burger-menu" onclick="toggleMenu()">
            <div class="burger-bar"></div>
            <div class="burger-bar"></div>
            <div class="burger-bar"></div>
        </div>
    </header>

    <div class="nav-overlay" id="nav-overlay">
        <a href="#" class="nav-link" onclick="toggleMenu()">Головна</a>
        <a href="#" class="nav-link" onclick="toggleMenu()">Трансфер-модуль</a>
        <a href="https://instagram.com" target="_blank" class="nav-link" onclick="toggleMenu()">Записатись на сеанс</a>
    </div>

    <div class="container">
        <div class="upload-zone" id="drop-zone">
            <p id="upload-text">📸 Завантажте ескіз для преміум-обробки контурів</p>
            <input type="file" id="file-input" accept="image/*">
        </div>

        <div class="controls">
            <div class="control-group">
                <label>Пошук мікро-ліній та деталей: <span id="detail-val">50%</span></label>
                <input type="range" id="detail-slider" min="1" max="100" value="50" step="1" disabled>
            </div>
            <div class="control-group">
                <label>Придушення шуму та тіней (Очищення): <span id="noise-val">50%</span></label>
                <input type="range" id="noise-slider" min="1" max="100" value="50" step="1" disabled>
            </div>
            <div class="control-group">
                <label>Глибина чорного (Multiply): <span id="layers-val">2 шари</span></label>
                <input type="range" id="layers-slider" min="1" max="3" value="2" step="1" disabled>
            </div>
        </div>

        <div class="workspace">
            <div class="preview-box">
                <h3>Преміум Трафарет (Лише Лінії)</h3>
                <canvas id="output-canvas"></canvas>
            </div>
            <div class="preview-box">
                <h3>Оригінальний ескіз</h3>
                <img id="source-img" src="data:image/svg+xml;utf8,<svg xmlns='w3.org' width='100' height='100'></svg>" alt="Оригінал">
            </div>
        </div>

        <div class="btn-container">
            <button class="btn btn-download" id="btn-download" disabled>Скачати готовий трафарет</button>
            <button class="btn btn-booking" onclick="window.open('https://instagram.com', '_blank')">🎯 Записатись до майстра</button>
        </div>
    </div>

<script>
    let audioCtx = null;
    let synthInterval = null;

    function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }

    function playClickSound() {
        initAudio(); if (!audioCtx) return;
        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
        osc.type = 'sine'; osc.frequency.setValueAtTime(800, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(150, audioCtx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.1);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.1);
    }

    function startMusicSynth() {
        initAudio(); if (!audioCtx) return;
        let step = 0;
        synthInterval = setInterval(() => {
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            if (step % 4 === 0) { osc.frequency.setValueAtTime(55, audioCtx.currentTime); gain.gain.setValueAtTime(0.25, audioCtx.currentTime); }
            else { osc.frequency.setValueAtTime(130, audioCtx.currentTime); gain.gain.setValueAtTime(0.06, audioCtx.currentTime); }
            osc.type = 'triangle'; gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.2);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.2); step++;
        }, 260);
    }

    function stopMusicSynth() { if (synthInterval) { clearInterval(synthInterval); synthInterval = null; } }

    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const sourceImg = document.getElementById('source-img');
    const outputCanvas = document.getElementById('output-canvas');
    const ctx = outputCanvas.getContext('2d');
    
    const detailSlider = document.getElementById('detail-slider');
    const noiseSlider = document.getElementById('noise-slider');
    const layersSlider = document.getElementById('layers-slider');
    
    const detailVal = document.getElementById('detail-val');
    const noiseVal = document.getElementById('noise-val');
    const layersVal = document.getElementById('layers-val');
    const btnDownload = document.getElementById('btn-download');
    const uploadText = document.getElementById('upload-text');

    let originalData = null;
    let isProcessing = false;

    function toggleMusic() {
        const musicBtn = document.getElementById('music-btn'); initAudio();
        if (!synthInterval) { startMusicSynth(); musicBtn.classList.add('playing'); }
        else { stopMusicSynth(); musicBtn.classList.remove('playing'); }
    }

    function toggleMenu() {
        playClickSound();
        document.getElementById('burger-menu').classList.toggle('active');
        document.getElementById('nav-overlay').classList.toggle('active');
    }

    dropZone.addEventListener('click', () => fileInput.click());
    
    fileInput.addEventListener('change', (e) => { 
        if (e.target.files && e.target.files.length > 0) {
            handleFile(e.target.files); 
        }
    });

    function handleFile(files) {
        const file = files[0];
        if (!file || !file.type.startsWith('image/')) return;
        playClickSound();
        const reader = new FileReader();
        reader.onload = (e) => { sourceImg.src = e.target.result; uploadText.textContent = "🔄 Змінити ескіз"; };
        reader.readAsDataURL(file);
    }

    sourceImg.onload = function() {
        if (sourceImg.src.startsWith('data:image/svg+xml')) return;
        
        outputCanvas.width = sourceImg.naturalWidth;
        outputCanvas.height = sourceImg.naturalHeight;
        ctx.drawImage(sourceImg, 0, 0);
        originalData = ctx.getImageData(0, 0, outputCanvas.width, outputCanvas.height);

        detailSlider.disabled = false;
        noiseSlider.disabled = false;
        layersSlider.disabled = false;
        btnDownload.disabled = false;

        updateSliderLabels();
        requestProcess();
    };

    detailSlider.addEventListener('input', () => { updateSliderLabels(); requestProcess(); });
    noiseSlider.addEventListener('input', () => { updateSliderLabels(); requestProcess(); });
    layersSlider.addEventListener('input', () => { updateSliderLabels(); requestProcess(); });

    detailSlider.addEventListener('touchmove', () => { updateSliderLabels(); requestProcess(); }, { passive: true });
    noiseSlider.addEventListener('touchmove', () => { updateSliderLabels(); requestProcess(); }, { passive: true });
    layersSlider.addEventListener('touchmove', () => { updateSliderLabels(); requestProcess(); }, { passive: true });

    function updateSliderLabels() {
        detailVal.textContent = detailSlider.value + "%";
        noiseVal.textContent = noiseSlider.value + "%";
        layersVal.textContent = layersSlider.value + (layersSlider.value == 1 ? " шар" : " шари");
    }

    function requestProcess() {
        if (!isProcessing) {
            isProcessing = true;
            window.requestAnimationFrame(() => {
                processPremiumPureLineTransfer();
                isProcessing = false;
            });
        }
    }

    function processPremiumPureLineTransfer() {
        if (!originalData) return;

        const w = outputCanvas.width;
        const h = outputCanvas.height;
        
        const detailSliderVal = parseInt(detailSlider.value); 
        const noiseSliderVal = parseInt(noiseSlider.value);   
        const layerCount = parseInt(layersSlider.value);       

        const sensitivity = 1.0 + ((100 - detailSliderVal) / 15); 
        const backgroundBurn = 255 - (noiseSliderVal * 1.3); 

        const imgData = ctx.createImageData(w, h);
        const src = originalData.data;
        const dst = imgData.data;

        const gray = new Uint8Array(w * h);
        for (let i = 0; i < src.length; i += 4) {
            gray[i/4] = (src[i] + src[i+1] + src[i+2]) / 3;
        }

        const finalBuffer = new Uint8Array(w * h);
        finalBuffer.fill(255);

        const maskSize = 3; 

        for (let l = 0; l < layerCount; l++) {
            const shiftX = (l === 1) ? 1 : (l === 2) ? -1 : 0;
            const shiftY = (l === 2) ? 1 : 0;

            for (let y = maskSize + 2; y < h - maskSize - 2; y++) {
                const rowIdx = y * w;
                const shiftedRowIdx = (y + shiftY) * w;

                for (let x = maskSize + 2; x < w - maskSize - 2; x++) {
                    const currentPx = gray[shiftedRowIdx + x + shiftX];
                    const bufferIdx = rowIdx + x;

                    let maxVal = 0;
                    let minVal = 255;

                    for (let ky = -maskSize; ky <= maskSize; ky++) {
                        const kernelRow = (y + ky + shiftY) * w;
                        for (let kx = -maskSize; kx <= maskSize; kx++) {
                            const px = gray[kernelRow + x + kx + shiftX];
                            if (px > maxVal) maxVal = px;
                            if (px < minVal) minVal = px;
                        }
                    }

                    const localContrast = maxVal - minVal;
                    const midThreshold = (maxVal + minVal) / 2;

                    if (localContrast >= sensitivity * 4.0 && currentPx < midThreshold) {
                        if (currentPx < backgroundBurn) {
                            finalBuffer[bufferIdx] = 0; 
                        }
                    }
                }
            }
        }

        for (let i = 0; i < finalBuffer.length; i++) {
            const color = finalBuffer[i];
            const pos = i * 4;
            dst[pos]     = color;
            dst[pos + 1] = color;
            dst[pos + 2] = color;
            dst[pos + 3] = 255;
        }
        
        ctx.putImageData(imgData, 0, 0);
    }

    // НОВА ПРЕМІУМ-ЛОГІКА ЗАВАНТАЖЕННЯ ЧЕРЕЗ HTML5 BLOB (ПРАЦЮЄ ВСЮДИ)
    btnDownload.addEventListener('click', () => {
        playClickSound();
        
        // Конвертуємо поточний стан полотна (Canvas) у фізичний двійковий файл (Blob)
        outputCanvas.toBlob((blob) => {
            if (!blob) return;
            
            // Створюємо безпечне локальне ізольоване посилання на файл в пам'яті пристрою
            const blobUrl = URL.createObjectURL(blob);
            
            const link = document.createElement('a');
            link.download = 'yyokai-premium-stencil.png';
            link.href = blobUrl;
            
            // Додаємо в тіло документа, щоб мобільний Safari не блокував клік
            document.body.appendChild(link);
            link.click();
            
            // Очищаємо оперативну пам'ять телефону після скачування
            document.body.removeChild(link);
            URL.revokeObjectURL(blobUrl);
        }, 'image/png');
    });
</script>
</body>
</html>
