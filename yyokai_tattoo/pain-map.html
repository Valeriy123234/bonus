<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YYOKAI | PAIN ANALYSIS</title>
    <style>
        :root { --red: #ff0000; --bg: #000; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; }

        /* --- ІНТЕРФЕЙС --- */
        .header { position: fixed; top: 30px; width: 100%; padding: 0 40px; display: flex; justify-content: space-between; z-index: 1000; }
        .sound-btn { cursor: pointer; display: flex; align-items: center; gap: 10px; font-size: 10px; letter-spacing: 2px; opacity: 0.5; transition: 0.3s; }
        .sound-btn.active { opacity: 1; color: var(--red); }
        .menu-btn { cursor: pointer; width: 28px; height: 14px; display: flex; flex-direction: column; justify-content: space-between; }
        .menu-btn span { height: 1px; background: #fff; width: 100%; }

        /* --- КАРТА --- */
        .main-ui { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        .map-wrapper { display: flex; align-items: center; gap: 40px; max-width: 1200px; width: 100%; }
        
        .body-visual { flex: 1; display: flex; justify-content: center; }
        .body-svg { height: 75vh; width: auto; filter: drop-shadow(0 0 20px rgba(255,0,0,0.05)); }
        
        /* Твій силует - стилізація зон */
        .zone { fill: #111; stroke: #333; stroke-width: 5; cursor: pointer; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .zone:hover { fill: var(--red); stroke: var(--red); filter: drop-shadow(0 0 20px var(--red)); }

        /* Панель інфо */
        .side-panel { width: 320px; border-left: 1px solid #222; padding-left: 30px; }
        .label { font-size: 9px; color: #444; letter-spacing: 4px; margin-bottom: 10px; }
        #pain-title { font-family: 'Unbounded', sans-serif; font-size: 28px; color: var(--red); margin-bottom: 15px; text-transform: uppercase; }
        #pain-text { font-size: 12px; color: #777; line-height: 1.8; letter-spacing: 1px; text-transform: uppercase; }

        .btn-book { margin-top: 40px; display: inline-block; padding: 18px 40px; border: 1px solid var(--red); color: #fff; text-decoration: none; font-family: 'Unbounded', sans-serif; font-size: 10px; border-radius: 100px; transition: 0.4s; }
        .btn-book:hover { background: var(--red); box-shadow: 0 0 30px rgba(255,0,0,0.4); }

        @media (max-width: 900px) {
            .map-wrapper { flex-direction: column; }
            .side-panel { border: none; padding: 0; text-align: center; width: 100%; }
            .body-svg { height: 50vh; }
        }
    </style>
</head>
<body>

<audio id="bg-amb" loop src="ambient.mp3"></audio>
<audio id="click-sfx" src="click.mp3"></audio>

<div class="header">
    <div class="sound-btn" id="sToggle" onclick="toggleSnd()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3v18l-6-6h-4v-6h4l6-6zm7 9c0-2.21-1.29-4.11-3.13-5l-1.46 1.46c.92.51 1.59 1.48 1.59 2.54s-.67 2.03-1.59 2.54l1.46 1.46c1.84-.89 3.13-2.79 3.13-5z"/></svg>
        <span id="sText">AUDIO: OFF</span>
    </div>
    <div class="menu-btn" onclick="window.location.href='index.html'"><span></span><span></span></div>
</div>

<div class="main-ui">
    <div class="map-wrapper">
        <div class="body-visual">
            <svg class="body-svg" viewBox="0 0 2666 2666" xmlns="http://www.w3.org/2000/svg">
                <!-- Я переніс твої силуети і зробив їх клікабельними -->
                <!-- MAN -->
                <path class="zone" data-l="ГОЛОВА (M)" data-d="Біль 8/10. Висока чутливість, вібрація в череп." d="m 14366,14749.8 c -12.8,-78.5 -32,-173 -113.3,-254.4 6.5,101.4 7.2,230.3 3.9,368.8 34.8,-50.1 71.9,-91.4 109.4,-114.4 z" transform="matrix(0.13,0,0,-0.13,0,2666)"/>
                <path class="zone" data-l="ТОРС (M)" data-d="Біль 6-9/10. Ребра та сонячне сплетіння - критичні зони." d="M 12000,10000 H 9000 V 15000 H 12000 Z" transform="matrix(0.13,0,0,-0.13,0,2666)" opacity="0.01"/> <!-- Схована зона для торсу -->
                
                <!-- WOMAN (Права фігура) -->
                <path class="zone" data-l="СПИНА (F)" data-d="Біль 4/10. Лопатки відчутно, хребет - гостро." d="m 10440.7,9777.8 c -24.6,25.9 -156.7,111 -188.7,144.3 -32.1,33.3 -32.1,59.2 -121,212.2 -88.8,153 -420.08,288.8 -457.09,296.2" transform="matrix(0.13,0,0,-0.13,0,2666)"/>
                
                <!-- Твій основний шлях силуету (весь силует) -->
                <path class="zone" data-l="ТІЛО" data-d="Оберіть конкретну точку для детального аналізу YYOKAI." d="m 18120,9806.5 c -225.5,207.7 -303.3,273.7 -377.2,254.6..." transform="matrix(0.13,0,0,-0.13,0,2666)"/>
            </svg>
        </div>

        <div class="side-panel">
            <div class="label">// BIOMETRIC DATA</div>
            <div id="pain-title">READY</div>
            <div id="pain-text">Натисніть на частину тіла для аналізу рівня болю за протоколом YYOKAI SYSTEM.</div>
            <a href="https://t.me" class="btn-book">ЗАПИСАТИСЯ</a>
        </div>
    </div>
</div>

<script>
    const amb = document.getElementById('bg-amb');
    const clk = document.getElementById('click-sfx');

    function toggleSnd() {
        if (amb.paused) {
            amb.play(); amb.muted = false;
            document.getElementById('sToggle').classList.add('active');
            document.getElementById('sText').innerText = "AUDIO: ON";
        } else {
            amb.pause();
            document.getElementById('sToggle').classList.remove('active');
            document.getElementById('sText').innerText = "AUDIO: OFF";
        }
    }

    document.querySelectorAll('.zone').forEach(z => {
        z.addEventListener('click', function() {
            clk.currentTime = 0; clk.play();
            document.getElementById('pain-title').innerText = this.dataset.l;
            document.getElementById('pain-text').innerText = this.dataset.d;
        });
    });
</script>
</body>
</html>
