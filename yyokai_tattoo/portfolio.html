<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YYOKAI | PORTFOLIO</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --red: #ff0000; --bg: #000; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Unbounded', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; overflow-x: hidden; }

        /* --- HERO СЕКЦІЯ --- */
        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        
        /* Гігантське лого з вертикальним розтягуванням */
        .hero-logo { 
            font-size: 22vw; font-weight: 900; transform: translateY(100vh);
            animation: verticalStretch 1.1s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }
        @keyframes verticalStretch {
            0% { transform: translateY(100vh) scaleY(3); opacity: 0; }
            70% { transform: translateY(-30px) scaleY(0.7); opacity: 1; }
            100% { transform: translateY(0) scaleY(1); opacity: 1; }
        }

        .port-title { margin-top: 20px; font-size: 10px; letter-spacing: 5px; opacity: 0; animation: fadeIn 0.8s forwards 1.2s; }
        
        /* Вузька стрілка */
        .arrow { 
            margin-top: 30px; background: none; border: none; opacity: 0; 
            animation: fadeIn 0.8s forwards 1.8s, arrowMove 2s infinite 1.8s; 
        }
        @keyframes fadeIn { to { opacity: 0.6; } }
        @keyframes arrowMove { 0%, 100% { transform: translateY(0); opacity: 0.3; } 50% { transform: translateY(10px); opacity: 1; } }

        /* --- ПЛЕЄР --- */
     .gallery-container { 
    position: relative; 
    width: 100vw; 
    display: flex; 
    flex-direction: column; /* Ставить навігацію ПІД фото */
    align-items: center; 
    justify-content: center; 
    margin: 50px 0 150px; 
}

.gallery-viewer { 
    width: 95%; 
    height: 70vh; /* Висота самого фото */
    display: flex; 
    align-items: center; 
    justify-content: center; 
    position: relative; 
}

.gallery-viewer img { 
    max-width: 100%; 
    max-height: 100%; 
    object-fit: contain; 
}

/* Навігація в рядок ПІД фото */
.bottom-nav {
    display: flex;
    flex-direction: row; /* Стрілки та цифри в один рядок */
    align-items: center;
    justify-content: center;
    gap: 30px;
    margin-top: 30px; /* Відступ від низу фото */
    width: 100%;
}

.arrow-wrapper { cursor: pointer; display: flex; align-items: center; }

/* Твоя анімація: розліт в сторони */
.left-anim { animation: moveLeft 1.5s infinite ease-in-out; }
@keyframes moveLeft {
    0% { transform: translateX(0); opacity: 1; }
    100% { transform: translateX(-20px); opacity: 0.5; }
}

.right-anim { animation: moveRight 1.5s infinite ease-in-out; }
@keyframes moveRight {
    0% { transform: translateX(0); opacity: 1; }
    100% { transform: translateX(20px); opacity: 0.5; }
}

.counter {
    font-size: 11px;
    letter-spacing: 3px;
    opacity: 0.7;
    min-width: 90px;
    text-align: center;
    font-weight: 900;
}


    </style>
</head>
<body>

    <section class="hero">
        <div class="hero-logo">YYO<br>KAI</div>
        <div class="port-title">ПОРТФОЛІО</div>
        <button class="arrow" onclick="document.getElementById('gallery').scrollIntoView({behavior: 'smooth'})">
            <svg width="25" height="25" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.2" stroke-linecap="round"><path d="M7 13l5 5 5-5M7 6l5 5 5-5""")/>></svg>
        </button>
    </section>

    <!-- КНОПКИ -->
    <a href="index.html" class="btn-top" id="topBtn">ДО МЕНЮ</a>
    <a href="booking.html" class="btn-bottom" id="bottomBtn">ЗАПИСАТИСЬ</a>

    <!-- ПЛЕЄР -->
 <section class="gallery-container" id="gallery">
    <!-- Зони кліку на фото -->
    <div class="nav-zone left-zone" onclick="prevImg()"></div>
    <div class="nav-zone right-zone" onclick="nextImg()"></div>

    <div class="gallery-viewer">
        <img id="mainImg" src="" alt="YYOKAI TATTOO">
    </div>

    <!-- БЛОК НАВІГАЦІЇ СТРОГО ПО ЦЕНТРУ -->
    <div class="bottom-nav">
        <div class="arrow-wrapper left-anim" onclick="prevImg()">
            <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6""")/>></svg>
        </div>
        
        <div class="counter" id="imgCounter">1 / 83</div>

        <div class="arrow-wrapper right-anim" onclick="nextImg()">
            <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6""")/>></svg>
        </div>

</section>

        // Наповнюємо масив (заміни на реальні посилання)
        

        let currentIdx = 0;
        const mainImg = document.getElementById('mainImg');
        const counter = document.getElementById('imgCounter');

        function updateImg() {
            mainImg.style.opacity = '0.4';
            setTimeout(() => {
                mainImg.src = photos[currentIdx];
                counter.innerText = `${currentIdx + 1} / ${photos.length}`;
                mainImg.style.opacity = '1';
            }, 100);
        }

        function nextImg() { currentIdx = (currentIdx + 1) % photos.length; updateImg(); }
        function prevImg() { currentIdx = (currentIdx - 1 + photos.length) % photos.length; updateImg(); }

        window.onscroll = function() {
            const top = document.getElementById('topBtn');
            const bottom = document.getElementById('bottomBtn');
            if (window.scrollY > 300) {
                top.classList.add('btn-visible');
                bottom.classList.add('btn-visible');
            } else {
                top.classList.remove('btn-visible');
                bottom.classList.remove('btn-visible');
            }
        };

        // Свайпи
        let startX = 0;
        document.addEventListener('touchstart', e => startX = e.touches.clientX);
        document.addEventListener('touchend', e => {
            let endX = e.changedTouches.clientX;
            if (startX - endX > 50) nextImg();
            if (endX - startX > 50) prevImg();
        });

        updateImg();
    </script>
</body>
</html>
