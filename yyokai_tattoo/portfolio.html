<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YYOKAI | PORTFOLIO</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --red: #ff0000; --bg: #000; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Unbounded', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; overflow-x: hidden; }

        /* --- HERO СЕКЦІЯ --- */
        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        
        /* Складний стрибок з викривленням */
        .hero-logo { 
            font-size: 15vw; font-weight: 900; transform: translateY(100vh);
            animation: glitchJump 1.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes glitchJump {
            0% { transform: translateY(100vh) scaleY(2) skewX(10deg); opacity: 0; }
            50% { transform: translateY(-30px) scaleY(0.8) skewX(-5deg); opacity: 1; }
            70% { transform: translateY(15px) scaleY(1.1); }
            100% { transform: translateY(0) scaleY(1) skewX(0); opacity: 1; }
        }

        .port-title { margin-top: 15px; font-size: 10px; letter-spacing: 5px; opacity: 0; animation: fadeIn 0.8s forwards 1.4s; }
        .arrow { 
            margin-top: 25px; background: none; border: none; opacity: 0; 
            animation: fadeIn 0.8s forwards 2s, arrowMove 2s infinite 2s; 
        }
        @keyframes fadeIn { to { opacity: 0.6; } }
        @keyframes arrowMove { 0%, 100% { transform: translateY(0); opacity: 0.4; } 50% { transform: translateY(10px); opacity: 1; } }

        /* --- ВЕЛИКИЙ ПЛЕЄР ФОТО --- */
        .gallery-container { position: relative; width: 100vw; height: 85vh; display: flex; align-items: center; justify-content: center; margin: 50px 0 150px; }
        .gallery-viewer { width: 95%; height: 100%; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; }
        
        /* Фото на 85% висоти екрану */
        .gallery-viewer img { max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 5px; transition: opacity 0.2s ease-in-out; }
        
        .nav-zone { position: absolute; top: 0; width: 50%; height: 100%; z-index: 10; cursor: pointer; }
        .left-zone { left: 0; }
        .right-zone { right: 0; }
        
        .nav-arrow { position: absolute; top: 50%; transform: translateY(-50%); font-size: 24px; opacity: 0.2; pointer-events: none; z-index: 11; font-weight: 100; }
        .left-arrow { left: 10px; }
        .right-arrow { right: 10px; }
        
        .counter { position: absolute; bottom: -30px; font-size: 9px; opacity: 0.3; letter-spacing: 2px; }

        /* --- ПЛАВАЮЧІ КНОПКИ --- */
        .btn-top {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.8); color: #fff; border: 1px solid var(--red);
            padding: 10px 25px; border-radius: 50px; font-weight: 900; font-size: 9px;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.4); z-index: 1000;
            text-decoration: none; transition: 0.4s; opacity: 0; visibility: hidden;
        }

        .btn-bottom {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: var(--red); color: #fff; border: none;
            padding: 18px 45px; border-radius: 50px; font-weight: 900; font-size: 11px;
            box-shadow: 0 0 20px var(--red), 0 0 40px rgba(255, 0, 0, 0.5);
            z-index: 1000; text-decoration: none; transition: 0.4s; opacity: 0; visibility: hidden;
        }

        .btn-visible { opacity: 1; visibility: visible; }
    </style>
</head>
<body>

    <section class="hero">
        <div class="hero-logo">YYO<br>KAI</div>
        <div class="port-title">ПОРТФОЛІО</div>
        <button class="arrow" onclick="document.getElementById('gallery').scrollIntoView({behavior: 'smooth'})">
            <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.2" stroke-linecap="round"><path d="M7 13l5 5 5-5M7 6l5 5 5-5""")/>></svg>
        </button>
    </section>

    <!-- КНОПКИ -->
    <a href="index.html" class="btn-top" id="topBtn">ДО МЕНЮ</a>
    <a href="booking.html" class="btn-bottom" id="bottomBtn">ЗАПИСАТИСЬ</a>

    <!-- ПЛЕЄР -->
    <section class="gallery-container" id="gallery">
        <div class="nav-zone left-zone" onclick="prevImg()"></div>
        <div class="nav-zone right-zone" onclick="nextImg()"></div>
        
        <div class="nav-arrow left-arrow">←</div>
        <div class="nav-arrow right-arrow">→</div>

        <div class="gallery-viewer">
            <img id="mainImg" src="" alt="YYOKAI TATTOO">
        </div>
        <div class="counter" id="imgCounter">1 / 120</div>
    </section>

    <script>
        // Масив для твоїх 120 фото
        const photos = [];
        // Заглушка (заміни на реальні посилання)
        for(let i=1; i<=120; i++) photos.push(`https://placeholder.com{i}`);

        let currentIdx = 0;
        const mainImg = document.getElementById('mainImg');
        const counter = document.getElementById('imgCounter');

        function updateImg() {
            mainImg.style.opacity = '0.5';
            setTimeout(() => {
                mainImg.src = photos[currentIdx];
                counter.innerText = `${currentIdx + 1} / ${photos.length}`;
                mainImg.style.opacity = '1';
            }, 100);
        }

        function nextImg() { currentIdx = (currentIdx + 1) % photos.length; updateImg(); }
        function prevImg() { currentIdx = (currentIdx - 1 + photos.length) % photos.length; updateImg(); }

        // Поява кнопок при скролі
        window.onscroll = function() {
            const top = document.getElementById('topBtn');
            const bottom = document.getElementById('bottomBtn');
            if (window.scrollY > 300) {
                top.classList.add('btn-visible');
                bottom.classList.add('btn-visible');
            } else {
                top.classList.remove('btn-visible');
                bottom.classList.remove('btn-visible');
            }
        };

        // Свайпи
        let startX = 0;
        document.addEventListener('touchstart', e => startX = e.touches.clientX);
        document.addEventListener('touchend', e => {
            let endX = e.changedTouches.clientX;
            if (startX - endX > 50) nextImg();
            if (endX - startX > 50) prevImg();
        });

        updateImg();
    </script>
</body>
</html>
