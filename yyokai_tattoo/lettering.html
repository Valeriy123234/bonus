<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>YOKAI OS // RED_PROTOCOL</title>
    <link id="dynamic-fonts" rel="stylesheet">
    <style>
        :root { 
            --red: #ff0000; 
            --glitch-cyan: #00fff0;
        }

        * { -webkit-user-select: none; user-select: none; box-sizing: border-box; outline: none; }
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%; 
            background: #000; font-family: 'Montserrat', sans-serif; 
            color: white; overflow: hidden; 
        }

        #matrix-canvas { position: fixed; inset: 0; opacity: 0.25; z-index: 1; pointer-events: none; }

        /* TOP BAR */
        .top-bar { 
            position: fixed; top: 35px; width: 100%; padding: 0 30px; 
            display: flex; justify-content: space-between; align-items: center; 
            z-index: 5000; pointer-events: none;
        }
        
        .sound-container, .menu-trigger { pointer-events: auto; cursor: pointer; }

        .sound-container { display: flex; align-items: center; gap: 10px; height: 24px; }
        .eq { display: none; align-items: flex-end; gap: 2px; height: 18px; }
        .eq-bar { width: 2px; background: var(--red); height: 2px; }
        .playing .eq { display: flex; }
        .playing #sound-icon { display: none; }
        .playing .eq-bar { animation: eq-anim 0.5s infinite alternate ease-in-out; }
        @keyframes eq-anim { from { height: 2px; } to { height: 18px; } }

        .menu-trigger { width: 30px; height: 22px; display: flex; flex-direction: column; justify-content: space-between; }
        .menu-trigger span { display: block; width: 100%; height: 2px; background: var(--red); transition: 0.4s; }
        .menu-trigger.open span:nth-child(1) { transform: translateY(10px) rotate(45deg); }
        .menu-trigger.open span:nth-child(2) { opacity: 0; }
        .menu-trigger.open span:nth-child(3) { transform: translateY(-10px) rotate(-45deg); }

        /* LOGO SECTION */
        .header { position: absolute; top: 70px; width: 100%; text-align: center; z-index: 10; }
        .logo-main {
            font-weight: 900; font-size: 64px; letter-spacing: 12px; color: #fff;
            position: relative; display: inline-block; line-height: 0.8; padding-left: 12px;
        }
        .logo-kai { display: block; font-size: 28px; letter-spacing: 20px; color: var(--red); margin-top: 5px; }

        .logo-main::before, .logo-main::after {
            content: "YYO\A KAI"; white-space: pre; position: absolute; top: 0; left: 12px;
            width: 100%; height: 100%; opacity: 0; pointer-events: none;
        }
        .logo-main::before { text-shadow: -4px 0 var(--red); animation: glitch-1 3s infinite; }
        .logo-main::after { text-shadow: 4px 0 var(--glitch-cyan); animation: glitch-2 4s infinite; }

        @keyframes glitch-1 { 
            0%, 18%, 100% { opacity: 0; } 
            1% { opacity: 1; clip-path: inset(10% 0 70% 0); transform: translate(-5px, -2px); } 
            5% { opacity: 0; } 
        }
        @keyframes glitch-2 { 
            0%, 25%, 100% { opacity: 0; } 
            1% { opacity: 1; clip-path: inset(60% 0 5% 0); transform: translate(5px, 2px); } 
            5% { opacity: 0; } 
        }

        /* DISPLAY */
        #main-display {
            position: absolute; top: 220px; width: 100%; max-height: 140px;
            font-size: 32px; text-align: center; font-weight: 900; z-index: 10; 
            padding: 0 25px; overflow-y: auto; word-wrap: break-word; cursor: pointer;
        }
        #main-display::-webkit-scrollbar { width: 0; }

        .input-wrap { position: absolute; top: 360px; width: 100%; padding: 0 45px; z-index: 10; }
        #user-input { 
            width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--red); 
            color: #fff; padding: 10px; text-align: center; font-size: 16px;
        }

        .font-selector-wrap { position: absolute; top: 420px; bottom: 110px; width: 100%; padding: 0 30px; z-index: 10; }
        .scroll-area { height: 100%; overflow-y: auto; }
        .font-node { display: flex; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.1); cursor: pointer; }
        .font-node.active { color: var(--red); border-left: 2px solid var(--red); padding-left: 10px; }

        .btn-action {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: calc(100% - 60px); padding: 18px; background: transparent;
            border: 1px solid var(--red); color: var(--red); font-weight: 900; 
            text-transform: uppercase; letter-spacing: 4px; z-index: 10; text-align: center; text-decoration: none;
        }

        .nav-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.98);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transform: translateY(-100%); transition: 0.5s cubic-bezier(0.7, 0, 0.3, 1); z-index: 4000;
        }
        .nav-overlay.active { transform: translateY(0); }
        .nav-link { font-size: 22px; color: #fff; text-decoration: none; margin: 15px; font-weight: 900; text-transform: uppercase; }

        #copy-toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--red); color: #000; padding: 8px 20px; font-weight: 900; display: none; z-index: 6000; font-size: 12px; }
    </style>
</head>
<body>

<canvas id="matrix-canvas"></canvas>
<div id="copy-toast">EXTRACTED</div>

<div class="top-bar">
    <div class="sound-container" id="sound-btn" onclick="toggleMusic()">
        <span id="sound-icon" style="font-size: 18px; color: var(--red);">🔈</span>
        <div class="eq">
            <div class="eq-bar" style="animation-duration: 0.4s"></div>
            <div class="eq-bar" style="animation-duration: 0.6s"></div>
            <div class="eq-bar" style="animation-duration: 0.3s"></div>
            <div class="eq-bar" style="animation-duration: 0.7s"></div>
            <div class="eq-bar" style="animation-duration: 0.5s"></div>
            <div class="eq-bar" style="animation-duration: 0.8s"></div>
        </div>
    </div>
    <div class="menu-trigger" id="burger" onclick="toggleMenu()">
        <span></span><span></span><span></span>
    </div>
</div>

<nav class="nav-overlay" id="nav">
    <a href="#" class="nav-link" onclick="toggleMenu()">власні ескізи</a>
    <a href="#" class="nav-link" onclick="toggleMenu()">портфоліо</a>
    <a href="https://t.me" class="nav-link" style="color:var(--red)">записатись</a>
    <a href="#" class="nav-link" onclick="toggleMenu()">консультація</a>
</nav>

<div class="header">
    <div class="logo-main">
        YYO
        <span class="logo-kai">KAI</span>
    </div>
</div>

<div id="main-display" onclick="copyText()">MEMENTO MORI</div>

<div class="input-wrap">
    <input type="text" id="user-input" placeholder="ВВЕДІТЬ ТЕКСТ..." oninput="syncText()" maxlength="100">
</div>

<div class="font-selector-wrap">
    <div class="scroll-area" id="font-list"></div>
</div>

<a href="https://t.me" class="btn-action">Записатись</a>

<audio id="bg-music" loop><source src="RED_AMBIENT.mp3" type="audio/mpeg"></audio>

<script>
    // ВСТАВ СЮДИ СВІЙ ПОВНИЙ СПИСОК (79 ШРИФТІВ)
    const tattooFonts = [
        {id: 'UnifrakturMaguntia', tag: 'GOTHIC'},
        {id: 'Pinyon Script', tag: 'SCRIPT'},
        {id: 'Creepster', tag: 'HORROR'},
        {id: 'Rampart One', tag: 'DISPLAY'}
    ];

    // Завантаження прев'ю (chunking)
    function loadPreviews(fonts) {
        const chunkSize = 20;
        for (let i = 0; i < fonts.length; i += chunkSize) {
            const chunk = fonts.slice(i, i + chunkSize);
            const names = chunk.map(f => f.id.replace(/ /g, '+')).join('|');
            const link = document.createElement('link');
            link.rel = 'stylesheet';
            link.href = `https://googleapis.com{names}&display=swap`;
            document.head.appendChild(link);
        }
    }
    loadPreviews(tattooFonts);

    const list = document.getElementById('font-list');
    tattooFonts.forEach(f => {
        const node = document.createElement('div');
        node.className = 'font-node';
        node.innerHTML = `<span class="f-preview" style="font-family:'${f.id}'">Style</span><span>${f.tag}</span>`;
        node.onclick = () => {
            const fontUrl = `https://googleapis.com{f.id.replace(/ /g, '+')}&display=swap`;
            document.getElementById('dynamic-fonts').href = fontUrl;
            document.getElementById('main-display').style.fontFamily = `'${f.id}', sans-serif`;
            document.querySelectorAll('.font-node').forEach(n => n.classList.remove('active'));
            node.classList.add('active');
        };
        list.appendChild(node);
    });

    function syncText() {
        const val = document.getElementById('user-input').value;
        const display = document.getElementById('main-display');
        display.innerText = val || "MEMENTO MORI";
        display.style.fontSize = val.length > 20 ? "22px" : "32px";
    }

    function toggleMenu() {
        document.getElementById('burger').classList.toggle('open');
        document.getElementById('nav').classList.toggle('active');
    }

    function toggleMusic() {
        const m = document.getElementById('bg-music');
        const b = document.getElementById('sound-btn');
        if(m.paused) { m.play(); b.classList.add('playing'); }
        else { m.pause(); b.classList.remove('playing'); }
    }

    function copyText() {
        const display = document.getElementById('main-display');
        navigator.clipboard.writeText(display.innerText);
        const toast = document.getElementById('copy-toast');
        toast.innerText = `EXTRACTED: ${display.style.fontFamily.split(',')[0]}`;
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 1500);
    }

    // Матриця з темнішим фоном (0.17)
    const canvas = document.getElementById('matrix-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    const drops = Array(Math.floor(canvas.width/20)).fill(1);
    function draw() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.17)"; 
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#f00";
        ctx.font = "12px monospace";
        drops.forEach((y, i) => {
            const char = Math.random() > 0.5 ? "0" : "1";
            ctx.fillText(char, i*20, y*20);
            if(y*20 > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        });
    }
    setInterval(draw, 50);
</script>
</body>
</html>
