<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>YOKAI OS // RED_PROTOCOL</title>
    
    <link href="https://googleapis.com" rel="stylesheet">
    <link id="dynamic-fonts" rel="stylesheet">

    <style>
        :root { --red: #ff0000; --ui-bg: #000; }

        * { -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; box-sizing: border-box; outline: none; }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: #000; font-family: 'Montserrat', sans-serif;
            color: white; overflow: hidden;
        }

        #matrix-canvas { position: fixed; inset: 0; opacity: 0.25; z-index: 1; pointer-events: none; }

        .ui-wrapper {
            position: relative; z-index: 10; height: 100vh;
            display: flex; flex-direction: column; 
            padding: env(safe-area-inset-top) 25px calc(env(safe-area-inset-bottom) + 40px);
            justify-content: space-between;
        }

        /* TOP BAR */
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; width: 100%; position: relative; z-index: 1001; }
        
        .sound-wrap { display: flex; align-items: center; cursor: pointer; height: 30px; min-width: 40px; }
        .sound-icon { font-size: 18px; color: var(--red); }
        .eq { display: none; align-items: flex-end; gap: 2px; height: 18px; }
        .eq-bar { width: 2px; background: var(--red); height: 4px; }
        .eq-active .eq { display: flex; }
        .eq-active .sound-icon { display: none; }
        .eq-active .eq-bar { animation: eq-play 0.6s infinite alternate; }
        @keyframes eq-play { from { height: 4px; } to { height: 18px; } }

        /* BURGER TO CROSS ANIMATION */
        .menu-trigger { width: 30px; height: 20px; position: relative; cursor: pointer; }
        .menu-trigger span { display: block; position: absolute; height: 2px; width: 100%; background: var(--red); transition: .25s ease-in-out; }
        .menu-trigger span:nth-child(1) { top: 0px; }
        .menu-trigger span:nth-child(2) { top: 9px; }
        .menu-trigger span:nth-child(3) { top: 18px; }
        .menu-trigger.open span:nth-child(1) { top: 9px; transform: rotate(135deg); }
        .menu-trigger.open span:nth-child(2) { opacity: 0; left: -60px; }
        .menu-trigger.open span:nth-child(3) { top: 9px; transform: rotate(-135deg); }

        /* LOGO WITH GLITCH */
        .header { text-align: center; margin-top: 10px; }
        .logo-main { 
            font-weight: 900; font-size: 48px; letter-spacing: 12px; color: #fff; 
            line-height: 1; position: relative; 
            text-shadow: 0.05em 0 0 rgba(255,0,0,.75), -0.025em -0.05em 0 rgba(0,255,255,.75);
            animation: glitch 500ms infinite;
        }
        .logo-sub { display: block; font-size: 18px; color: var(--red); letter-spacing: 15px; margin-top: 5px; font-weight: 900; }

        @keyframes glitch {
            0% { text-shadow: 0.05em 0 0 rgba(255,0,0,.75), -0.05em -0.025em 0 rgba(0,255,255,.75); }
            14% { text-shadow: 0.05em 0 0 rgba(255,0,0,.75), -0.05em -0.025em 0 rgba(0,255,255,.75); }
            15% { text-shadow: -0.05em -0.025em 0 rgba(255,0,0,.75), 0.025em 0.025em 0 rgba(0,255,255,.75); }
            49% { text-shadow: -0.05em -0.025em 0 rgba(255,0,0,.75), 0.025em 0.025em 0 rgba(0,255,255,.75); }
            50% { text-shadow: 0.025em 0.05em 0 rgba(255,0,0,.75), 0.05em 0 0 rgba(0,255,255,.75); }
            99% { text-shadow: 0.025em 0.05em 0 rgba(255,0,0,.75), 0.05em 0 0 rgba(0,255,255,.75); }
            100% { text-shadow: -0.025em 0 0 rgba(255,0,0,.75), -0.025em -0.025em 0 rgba(0,255,255,.75); }
        }

        /* DISPLAY */
        #main-display { font-size: 34px; text-align: center; color: #fff; font-weight: 900; min-height: 80px; display: flex; align-items: center; justify-content: center; }

        /* INPUT */
        #user-input {
            width: 100%; background: transparent; border: none; border-bottom: 1px solid rgba(255,0,0,0.3);
            color: #fff; padding: 15px; font-size: 15px; letter-spacing: 3px; text-transform: uppercase; text-align: center;
        }

        /* FONT NODES CENTERED */
        .font-selector-wrap { flex: 1; overflow: hidden; margin: 20px 0; }
        .scroll-area { height: 100%; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .scroll-area::-webkit-scrollbar { width: 0px; }
        .font-node { display: flex; justify-content: center; align-items: center; gap: 15px; padding: 20px 0; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .font-node.active { color: var(--red); }
        .f-preview { font-size: 22px; }
        .f-name { font-size: 9px; font-weight: 900; opacity: 0.5; margin-top: 4px; }

        /* BUTTON */
        .btn-init { width: 100%; padding: 22px; background: var(--red); border: none; color: #000; font-weight: 900; letter-spacing: 5px; text-transform: uppercase; font-size: 14px; margin-bottom: 40px; }

        /* NAV - NO BOTTOM LINE */
        .nav-overlay { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; transform: translateX(100%); transition: 0.4s; z-index: 900; }
        .nav-overlay.active { transform: translateX(0); }
        .nav-link { font-size: 22px; font-weight: 900; color: white; text-decoration: none; margin: 15px 0; text-transform: uppercase; border: none; }

        #copy-notice { position: fixed; top: 30px; left: 50%; transform: translateX(-50%); background: var(--red); color: black; padding: 8px 20px; font-weight: 900; font-size: 10px; z-index: 2000; display: none; }
    </style>
</head>
<body id="main-body">

    <canvas id="matrix-canvas"></canvas>
    <div id="copy-notice">[ DATA_EXTRACTED ]</div>

    <div class="ui-wrapper">
        <div class="top-bar">
            <div class="sound-wrap" id="sound-trigger" onclick="toggleBgMusic()">
                <div class="sound-icon">🔈</div>
                <div class="eq">
                    <div class="eq-bar" style="animation-duration: 0.4s;"></div>
                    <div class="eq-bar" style="animation-duration: 0.7s;"></div>
                    <div class="eq-bar" style="animation-duration: 0.5s;"></div>
                    <div class="eq-bar" style="animation-duration: 0.4s;"></div>
                </div>
            </div>
            <div class="menu-trigger" onclick="toggleMenu(this)">
                <span></span><span></span><span></span>
            </div>
        </div>

        <div class="header">
            <div class="logo-main">YYO</div>
            <div class="logo-sub">KAI</div>
        </div>

        <div onclick="copyText()">
            <div id="main-display">MEMENTO MORI</div>
        </div>

        <div class="input-section">
            <input type="text" id="user-input" placeholder="Впиши свій текст..." oninput="syncText()" maxlength="20">
        </div>

        <div class="font-selector-wrap">
            <div class="scroll-area" id="font-list"></div>
        </div>

        <button class="btn-init" onclick="window.location.href='https://t.me'">Записатись</button>
    </div>

    <nav class="nav-overlay" id="nav">
        <a href="index.html" class="nav-link">Sketches</a>
        <a href="#" class="nav-link">Archive</a>
        <a href="https://instagram.com" class="nav-link">Instagram</a>
        <a href="https://t.me" class="nav-link" style="color:var(--red);">Reserve</a>
    </nav>

    <audio id="bg-music" loop><source src="RED_AMBIENT.mp3" type="audio/mpeg"></audio>
    <audio id="ui-click"><source src="RED_CLICK.mp3" type="audio/mpeg"></audio>

    <script>
        const uiClick = document.getElementById('ui-click');
        const bgMusic = document.getElementById('bg-music');
        let musicPlaying = false;

        function playClick() { uiClick.currentTime = 0; uiClick.play().catch(()=>{}); }

        function copyText() {
            const text = document.getElementById('main-display').innerText;
            navigator.clipboard.writeText(text).then(() => {
                playClick();
                const notice = document.getElementById('copy-notice');
                notice.style.display = 'block';
                setTimeout(() => notice.style.display = 'none', 1500);
            });
        }

        const tattooFonts = [
            {id: 'UnifrakturMaguntia', tag: 'Gothic'}, {id: 'Great Vibes', tag: 'Script'},
            {id: 'Cinzel', tag: 'Roman'}, {id: 'Noto Sans JP', tag: 'Japan'},
            {id: 'MedievalSharp', tag: 'Metal'}, {id: 'Charm', tag: 'Hand'}
        ];

        const listContainer = document.getElementById('font-list');
        tattooFonts.forEach(font => {
            const node = document.createElement('div');
            node.className = 'font-node';
            node.innerHTML = `<span class="f-preview" style="font-family:'${font.id}'">Style</span><span class="f-name">[${font.tag}]</span>`;
            node.onclick = () => {
                playClick();
                document.getElementById('dynamic-fonts').href = `https://googleapis.com{font.id.replace(/ /g, '+')}&display=swap`;
                document.getElementById('main-display').style.fontFamily = font.id;
                document.querySelectorAll('.font-node').forEach(n => n.classList.remove('active'));
                node.classList.add('active');
            };
            listContainer.appendChild(node);
        });

        function syncText() { document.getElementById('main-display').innerText = document.getElementById('user-input').value || "MEMENTO MORI"; }

        function toggleBgMusic() {
            const btn = document.getElementById('sound-trigger');
            if(!musicPlaying){ bgMusic.play(); btn.classList.add('eq-active'); musicPlaying = true; }
            else { bgMusic.pause(); btn.classList.remove('eq-active'); musicPlaying = false; }
            playClick();
        }

        function toggleMenu(x) { playClick(); x.classList.toggle("open"); document.getElementById('nav').classList.toggle('active'); }

        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const chars = "01ヨカイ";
        const drops = Array(Math.floor(canvas.width/15)).fill(1);
        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.1)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#ff0000"; ctx.font = "14px monospace";
            drops.forEach((y, i) => {
                const text = chars[Math.floor(Math.random()*chars.length)];
                ctx.fillText(text, i*15, y*15);
                if(y*15 > canvas.height && Math.random() > 0.98) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(drawMatrix, 60);

        // ЖОРСТКИЙ ЗАХИСТ ВІД СКРІНШОТІВ (При згортанні або зміні фокусу сторінка зникає)
        window.onblur = function() { document.getElementById('main-body').style.opacity = "0"; };
        window.onfocus = function() { document.getElementById('main-body').style.opacity = "1"; };
        document.addEventListener('visibilitychange', () => {
            document.getElementById('main-body').style.opacity = document.hidden ? "0" : "1";
        });
    </script>
</body>
</html>
