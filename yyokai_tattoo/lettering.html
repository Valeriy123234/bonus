<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YOKAI OS // RED_PROTOCOL</title>
    
    <!-- ШРИФТИ -->
    <link href="https://googleapis.com" rel="stylesheet">
    <link id="dynamic-fonts" rel="stylesheet">

    <style>
        :root {
            --neon: #ff0000;
            --glass: rgba(255, 0, 0, 0.03);
            --border: rgba(255, 0, 0, 0.15);
            --glitch-blue: #00f0ff;
        }

        /* ЗАХИСТ ТА БАЗОВІ СТИЛІ */
        * { -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; box-sizing: border-box; }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: #050000; font-family: 'Montserrat', sans-serif;
            color: white; overflow: hidden; transition: filter 0.3s;
        }

        /* CRT ЕФЕКТИ */
        body::before {
            content: " "; position: fixed; inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(20, 0, 0, 0.2) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(255, 0, 0, 0.01), rgba(255, 0, 0, 0.03));
            z-index: 999; background-size: 100% 2px, 3px 100%; pointer-events: none;
        }
        body::after {
            content: " "; position: fixed; inset: 0;
            background: radial-gradient(circle, transparent 40%, rgba(30,0,0,0.9) 150%);
            z-index: 998; pointer-events: none;
        }

        #matrix-canvas { position: fixed; inset: 0; opacity: 0.15; z-index: 1; pointer-events: none; }

        .watermark {
            position: absolute; font-size: 10px; color: var(--neon); opacity: 0.1;
            white-space: nowrap; pointer-events: none; z-index: 5;
            text-transform: uppercase; letter-spacing: 2px;
            animation: float-watermark 12s infinite linear;
        }
        @keyframes float-watermark {
            0% { transform: translate(-100%, -100%) rotate(-45deg); }
            100% { transform: translate(100vw, 100vh) rotate(-45deg); }
        }

        /* UI WRAPPER */
        .ui-wrapper {
            position: relative; z-index: 10; height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            justify-content: space-between; padding: 20px;
        }

        /* TOP BAR */
        .top-bar {
            position: fixed; top: 25px; width: 100%;
            display: flex; justify-content: space-between;
            padding: 0 25px; box-sizing: border-box; z-index: 1000;
        }
        .sound-toggle { width: 35px; height: 35px; display: flex; align-items: center; cursor: pointer; }
        .eq-container { display: flex; align-items: flex-end; justify-content: space-between; width: 22px; height: 16px; display: none; }
        .eq-bar { width: 2px; background: var(--neon); animation: eq-anim 0.5s infinite ease-in-out; }
        @keyframes eq-anim { 0%, 100% { height: 4px; } 50% { height: 16px; } }

        .menu-trigger { width: 30px; height: 30px; cursor: pointer; }
        .bar { width: 30px; height: 2px; background: var(--neon); margin: 6px 0; transition: 0.4s; }
        .open .bar:nth-child(1) { transform: translateY(8px) rotate(45deg); }
        .open .bar:nth-child(2) { opacity: 0; }
        .open .bar:nth-child(3) { transform: translateY(-8px) rotate(-45deg); }

        /* LOGO */
        .header { text-align: center; margin-top: 55px; }
        .glitch {
            font-size: 44px; font-weight: 900; letter-spacing: 12px;
            text-transform: uppercase; position: relative; color: white;
        }
        .glitch::before, .glitch::after {
            content: attr(data-text); position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0.8;
        }
        .glitch::before { color: var(--neon); z-index: -1; animation: glitch-anim 0.3s infinite; }
        .glitch::after { color: var(--glitch-blue); z-index: -2; animation: glitch-anim 0.3s infinite reverse; }
        @keyframes glitch-anim {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            100% { transform: translate(0); }
        }
        .sub-logo { display: block; font-size: 18px; letter-spacing: 14px; color: var(--neon); opacity: 0.9; text-align: center; margin-top: 5px; }

        /* DISPLAY */
        #main-display {
            font-size: 38px; min-height: 100px; width: 100%;
            display: flex; align-items: center; justify-content: center;
            text-shadow: 0 0 20px rgba(255,0,0,0.4); text-align: center; cursor: copy;
        }

        /* CONTROLS (ADAPTIVE) */
        .controls-wrap { 
            width: 100%; max-width: 360px; flex: 1; 
            display: flex; flex-direction: column; justify-content: flex-start; 
            gap: 15px; margin-top: -10px;
        }

        .input-box { width: 100%; }
        #user-input {
            width: 100%; background: transparent; border: none;
            color: var(--neon); font-family: 'Montserrat'; font-size: 14px;
            text-align: center; padding: 12px; outline: none; letter-spacing: 3px;
            text-transform: uppercase;
        }
        .input-line { height: 1px; background: linear-gradient(90deg, transparent, var(--neon), transparent); }

        .font-library {
            width: 100%; flex-grow: 1; min-height: 140px; max-height: 22vh;
            background: var(--glass); border: 1px solid var(--border);
            border-radius: 4px; overflow-y: auto; backdrop-filter: blur(10px);
        }
        .font-library::-webkit-scrollbar { width: 0px; }

        .font-item {
            padding: 15px; border-bottom: 1px solid rgba(255,0,0,0.05);
            cursor: pointer; display: flex; justify-content: space-between; align-items: center;
        }
        .font-item.active { border-left: 3px solid var(--neon); background: rgba(255, 0, 0, 0.1); color: var(--neon); }

        /* BUTTON */
        .book-btn {
            width: 100%; padding: 18px; background: transparent; 
            border: 1px solid var(--neon); color: var(--neon);
            font-weight: 900; letter-spacing: 4px; text-transform: uppercase;
            cursor: pointer; margin-bottom: 10px; transition: 0.3s;
            font-size: 13px; box-shadow: 0 0 15px rgba(255, 0, 0, 0.2);
            animation: pulse-btn 2s infinite;
        }
        @keyframes pulse-btn { 0%, 100% { opacity: 0.8; box-shadow: 0 0 10px var(--neon); } 50% { opacity: 1; box-shadow: 0 0 25px var(--neon); } }

        /* NOTICES & NAV */
        #copy-notice {
            position: fixed; top: 125px; background: var(--neon); color: black;
            padding: 5px 15px; font-size: 9px; font-weight: 900;
            letter-spacing: 2px; display: none; z-index: 1000; box-shadow: 0 0 15px var(--neon);
        }
        .nav-overlay {
            position: fixed; inset: 0; background: rgba(10,0,0,0.98);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transform: translateY(-100%); transition: 0.6s cubic-bezier(0.77, 0, 0.175, 1);
            z-index: 900; backdrop-filter: blur(30px);
        }
        .nav-overlay.active { transform: translateY(0); }
        .nav-link { font-size: 22px; font-weight: 900; letter-spacing: 5px; color: white; text-decoration: none; margin: 15px 0; text-transform: uppercase; }
    </style>
</head>
<body id="main-body">

    <canvas id="matrix-canvas"></canvas>
    <div class="watermark">YOKAI SYSTEM // NO COPY // DATA ENCRYPTED</div>
    <div id="copy-notice">[ COPIED_TO_CLIPBOARD ]</div>

    <div class="top-bar">
        <div class="sound-toggle" onclick="toggleBgMusic()">
            <span id="sound-icon" style="color: var(--neon); font-size: 18px;">🔈</span>
            <div id="eq" class="eq-container">
                <div class="eq-bar" style="animation-duration: 0.4s;"></div>
                <div class="eq-bar" style="animation-duration: 0.6s;"></div>
                <div class="eq-bar" style="animation-duration: 0.3s;"></div>
                <div class="eq-bar" style="animation-duration: 0.5s;"></div>
            </div>
        </div>
        <div class="menu-trigger" onclick="toggleMenu(this)">
            <div class="bar"></div><div class="bar"></div><div class="bar"></div>
        </div>
    </div>

    <div class="ui-wrapper">
        <div class="header">
            <div class="glitch" data-text="YYO">YYO</div>
            <div class="sub-logo">KAI</div>
        </div>

        <div id="main-display">MEMENTO MORI</div>

        <div class="controls-wrap">
            <div class="input-box">
                <input type="text" id="user-input" placeholder="ВПИШИ СВІЙ ТЕКСТ..." maxlength="22" oninput="syncText()">
                <div class="input-line"></div>
            </div>

            <div class="font-library" id="font-list"></div>

            <button class="book-btn" onclick="window.location.href='https://t.me'">ЗАПИСАТИСЬ НА СЕАНС</button>
        </div>
    </div>

    <nav class="nav-overlay" id="nav">
        <a href="index.html" class="nav-link">SKETCH_VOID</a>
        <a href="#" class="nav-link">MISS_ARCHIVE</a>
        <a href="https://instagram.com" class="nav-link">INSTAGRAM</a>
        <a href="https://t.me" class="nav-link" style="color:var(--neon);">INIT_RESERVE</a>
    </nav>

    <audio id="bg-music" loop><source src="RED_AMBIENT.mp3" type="audio/mpeg"></audio>
    <audio id="ui-click"><source src="RED_CLICK.mp3" type="audio/mpeg"></audio>

    <script>
        const uiClick = document.getElementById('ui-click');
        const bgMusic = document.getElementById('bg-music');
        let musicPlaying = false;

        function playClick() { uiClick.currentTime = 0; uiClick.play().catch(()=>{}); }

        const tattooFonts = [
            {id: 'UnifrakturMaguntia', type: 'Gothic'}, {id: 'Great Vibes', type: 'Script'},
            {id: 'Cinzel', type: 'Roman'}, {id: 'Noto Sans JP', type: 'Asian'},
            {id: 'MedievalSharp', type: 'Dark'}, {id: 'Charm', type: 'Calligraphy'},
            {id: 'Pirata One', type: 'Vintage'}, {id: 'Kelly Slab', type: 'Tech'},
            {id: 'Metal Mania', type: 'Hardcore'}, {id: 'Montserrat', type: 'Minimal'}
        ];

        const listContainer = document.getElementById('font-list');
        tattooFonts.forEach(font => {
            const item = document.createElement('div');
            item.className = 'font-item';
            item.innerHTML = `<span style="font-family:'${font.id}'; font-size: 20px;">Style</span>
                              <span style="font-size: 8px; opacity: 0.5;">${font.id}</span>`;
            item.onclick = () => {
                playClick();
                document.getElementById('dynamic-fonts').href = `https://googleapis.com{font.id.replace(/ /g, '+')}&display=swap`;
                document.getElementById('main-display').style.fontFamily = font.id;
                document.querySelectorAll('.font-item').forEach(i => i.classList.remove('active'));
                item.classList.add('active');
            };
            listContainer.appendChild(item);
        });

        function syncText() { document.getElementById('main-display').innerText = document.getElementById('user-input').value || "MEMENTO MORI"; }

        document.getElementById('main-display').addEventListener('click', function() {
            navigator.clipboard.writeText(this.innerText).then(() => {
                playClick();
                const n = document.getElementById('copy-notice');
                n.style.display = 'block'; setTimeout(() => n.style.display = 'none', 2000);
            });
        });

        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const chars = "ヨカイ0123456789";
        const drops = Array(Math.floor(canvas.width/14)).fill(1);
        function drawMatrix() {
            ctx.fillStyle = "rgba(5, 0, 0, 0.05)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#ff0000"; ctx.font = "14px monospace";
            drops.forEach((y, i) => {
                const text = chars[Math.floor(Math.random()*chars.length)];
                ctx.fillText(text, i*14, y*14);
                if(y*14 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(drawMatrix, 50);

        document.addEventListener('contextmenu', e => e.preventDefault());
        window.addEventListener('blur', () => document.getElementById('main-body').style.filter = "blur(15px) grayscale(1)");
        window.addEventListener('focus', () => document.getElementById('main-body').style.filter = "none");

        function toggleMenu(x) { playClick(); x.classList.toggle("open"); document.getElementById('nav').classList.toggle('active'); }
        function toggleBgMusic() {
            const icon = document.getElementById('sound-icon');
            const eq = document.getElementById('eq');
            if(!musicPlaying){ bgMusic.play(); icon.style.display="none"; eq.style.display="flex"; musicPlaying=true; }
            else { bgMusic.pause(); icon.style.display="block"; eq.style.display="none"; musicPlaying=false; }
            playClick();
        }
    </script>
</body>
</html>
