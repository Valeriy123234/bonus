<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YOKAI OS // LETTERING_UNIT</title>
    
    <!-- БАЗОВІ ТА ДИНАМІЧНІ ШРИФТИ -->
    <link href="https://googleapis.com" rel="stylesheet">
    <link id="dynamic-fonts" rel="stylesheet">

    <style>
        :root {
            --neon: #00ff64;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
            --glitch-pink: #ff00c1;
            --glitch-cyan: #00fff0;
        }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: #000; font-family: 'Montserrat', sans-serif;
            color: white; overflow: hidden;
        }

        /* CRT ЕФЕКТ (ЛІНІЇ ТА ВІНЬЄТКА) */
        body::before {
            content: " "; position: fixed; inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.05), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.05));
            z-index: 999; background-size: 100% 2px, 3px 100%; pointer-events: none;
        }
        body::after {
            content: " "; position: fixed; inset: 0;
            background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.9) 150%);
            z-index: 998; pointer-events: none;
        }

        #matrix-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0.13; z-index: 1; pointer-events: none;
        }

        /* UI WRAPPER */
        .ui-wrapper {
            position: relative; z-index: 10; height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            justify-content: space-between; padding: 40px 20px; box-sizing: border-box;
        }

        /* GLITCH LOGO YYO KAI */
        .logo-container { cursor: pointer; line-height: 0.8; text-align: center; margin-bottom: 10px; }
        .glitch {
            font-size: 44px; font-weight: 900; letter-spacing: 12px;
            text-transform: uppercase; position: relative; color: white;
        }
        .glitch::before, .glitch::after {
            content: attr(data-text); position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0.8;
        }
        .glitch::before { color: var(--glitch-pink); z-index: -1; animation: glitch-anim 0.3s infinite; }
        .glitch::after { color: var(--glitch-cyan); z-index: -2; animation: glitch-anim 0.3s infinite reverse; }

        @keyframes glitch-anim {
            0% { transform: translate(0); }
            20% { transform: translate(-3px, 2px); }
            40% { transform: translate(-3px, -2px); }
            60% { transform: translate(3px, 2px); }
            80% { transform: translate(3px, -2px); }
            100% { transform: translate(0); }
        }
        .sub-logo { display: block; font-size: 16px; letter-spacing: 14px; color: var(--neon); opacity: 0.8; margin-top: 5px; }

        /* PREVIEW DISPLAY */
        #main-display {
            font-size: 42px; min-height: 120px; width: 100%;
            display: flex; align-items: center; justify-content: center;
            text-shadow: 0 0 15px rgba(255,255,255,0.2);
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center; word-break: break-all;
        }

        /* INPUT AREA */
        .input-box { width: 100%; max-width: 340px; position: relative; margin-bottom: 20px; }
        #user-input {
            width: 100%; background: transparent; border: none;
            color: var(--neon); font-family: 'Montserrat'; font-size: 14px;
            text-align: center; padding: 10px; outline: none; letter-spacing: 3px;
        }
        .input-line { height: 1px; background: linear-gradient(90deg, transparent, var(--neon), transparent); width: 100%; }

        /* FONT LIBRARY (SCROLL BOX) */
        .font-library-container {
            width: 100%; max-width: 360px; height: 260px;
            background: var(--glass); border: 1px solid var(--border);
            border-radius: 8px; overflow: hidden; display: flex; flex-direction: column;
            backdrop-filter: blur(15px);
        }
        .lib-header { font-size: 8px; padding: 10px; background: rgba(255,255,255,0.05); color: #555; letter-spacing: 2px; }
        .font-scroll-list { overflow-y: auto; flex: 1; padding: 5px; scrollbar-width: thin; scrollbar-color: var(--neon) transparent; }
        .font-scroll-list::-webkit-scrollbar { width: 3px; }
        .font-scroll-list::-webkit-scrollbar-thumb { background: var(--neon); }

        .font-item {
            padding: 15px; margin-bottom: 5px; background: rgba(255,255,255,0.02);
            border-radius: 4px; cursor: pointer; display: flex; justify-content: space-between; align-items: center;
            transition: 0.2s;
        }
        .font-item:hover { background: rgba(0, 255, 100, 0.05); }
        .font-item.active { border-left: 3px solid var(--neon); color: var(--neon); background: rgba(0, 255, 100, 0.1); }
        .font-style-preview { font-size: 22px; }
        .font-meta { font-size: 8px; opacity: 0.4; text-transform: uppercase; }

        /* MENU & NAVIGATION */
        .menu-trigger { position: fixed; top: 30px; right: 30px; z-index: 1000; cursor: pointer; }
        .bar { width: 30px; height: 2px; background: white; margin: 6px 0; transition: 0.4s; }
        .open .bar:nth-child(1) { transform: translateY(8px) rotate(45deg); }
        .open .bar:nth-child(2) { opacity: 0; }
        .open .bar:nth-child(3) { transform: translateY(-8px) rotate(-45deg); }

        .nav-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.97);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transform: translateY(-100%); transition: 0.6s cubic-bezier(0.77, 0, 0.175, 1);
            z-index: 900; backdrop-filter: blur(20px);
        }
        .nav-overlay.active { transform: translateY(0); }
        .nav-link { font-size: 22px; font-weight: 900; letter-spacing: 5px; color: white; text-decoration: none; margin: 15px 0; text-transform: uppercase; }
        .nav-link:hover { color: var(--neon); }

        /* SOUND & EQUALIZER */
        .sound-toggle {
            position: fixed; bottom: 30px; left: 30px; 
            width: 50px; height: 50px;
            background: var(--glass); border: 1px solid var(--border);
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; z-index: 100; border-radius: 8px;
        }
        #sound-icon { font-size: 20px; color: #555; }
        .eq-container {
            display: flex; align-items: flex-end; justify-content: space-between;
            width: 22px; height: 16px; display: none;
        }
        .eq-bar { width: 2px; background: var(--neon); animation: eq-anim 0.5s infinite ease-in-out; }
        @keyframes eq-anim { 0%, 100% { height: 4px; } 50% { height: 16px; } }
        .eq-bar:nth-child(1) { animation-duration: 0.4s; }
        .eq-bar:nth-child(2) { animation-duration: 0.6s; }
        .eq-bar:nth-child(3) { animation-duration: 0.3s; }
        .eq-bar:nth-child(4) { animation-duration: 0.7s; }
        .eq-bar:nth-child(5) { animation-duration: 0.5s; }
        .eq-bar:nth-child(6) { animation-duration: 0.4s; }
    </style>
</head>
<body>

    <canvas id="matrix-canvas"></canvas>

    <div class="ui-wrapper">
        <div class="header">
            <div class="logo-container" onclick="playClick()">
                <span class="glitch" data-text="YYO">YYO</span>
                <span class="sub-logo">KAI</span>
            </div>
        </div>

        <div id="main-display">MEMENTO MORI</div>

        <div class="input-box">
            <input type="text" id="user-input" placeholder="ВВЕДІТЬ ТЕКСТ..." maxlength="22" oninput="syncText()">
            <div class="input-line"></div>
        </div>

        <div class="font-library-container">
            <div class="lib-header">SELECT STYLE // ARCHIVE_01</div>
            <div class="font-scroll-list" id="font-list"></div>
        </div>
    </div>

    <!-- МЕНЮ -->
    <div class="menu-trigger" onclick="toggleMenu(this)">
        <div class="bar"></div><div class="bar"></div><div class="bar"></div>
    </div>

    <nav class="nav-overlay" id="nav">
        <a href="index.html" class="nav-link">SKETCH BOX</a>
        <a href="#" class="nav-link">COMPLETED MISSIONS</a>
        <a href="#" class="nav-link">INSTAGRAM</a>
        <a href="#" class="nav-link" style="color:var(--neon);">RESERVE NOW</a>
    </nav>

    <!-- ЗВУКОВА ПАНЕЛЬ -->
    <div class="sound-toggle" onclick="toggleBgMusic()">
        <span id="sound-icon">🔈</span>
        <div id="eq" class="eq-container">
            <div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div>
            <div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div>
        </div>
    </div>

    <audio id="bg-music" loop><source src="BG_MUSIC.mp3" type="audio/mpeg"></audio>
    <audio id="ui-click"><source src="CLICK_SOUND.mp3" type="audio/mpeg"></audio>

    <script>
        const uiClick = document.getElementById('ui-click');
        const bgMusic = document.getElementById('bg-music');
        let musicPlaying = false;

        function playClick() { uiClick.currentTime = 0; uiClick.play().catch(()=>{}); }

        // БІБЛІОТЕКА ШРИФТІВ (Google Fonts)
        const tattooFonts = [
            {id: 'UnifrakturMaguntia', type: 'Gothic'}, {id: 'Great Vibes', type: 'Script'},
            {id: 'Cinzel', type: 'Roman'}, {id: 'Noto Sans JP', type: 'Japanese'},
            {id: 'MedievalSharp', type: 'Medieval'}, {id: 'Charm', type: 'Calligraphy'},
            {id: 'Pirata One', type: 'Old School'}, {id: 'Kelly Slab', type: 'Futuristic'},
            {id: 'Special Elite', type: 'Typewriter'}, {id: 'Metal Mania', type: 'Metal'},
            {id: 'Alex Brush', type: 'Soft'}, {id: 'Pinyon Script', type: 'Royal'},
            {id: 'Montserrat', type: 'Modern'}
        ];

        const listContainer = document.getElementById('font-list');
        tattooFonts.forEach(font => {
            const item = document.createElement('div');
            item.className = 'font-item';
            item.innerHTML = `<span class="font-style-preview" style="font-family:'${font.id}'">Style</span>
                              <span class="font-meta">${font.id} // ${font.type}</span>`;
            item.onclick = () => selectFont(font.id, item);
            listContainer.appendChild(item);
        });

        function selectFont(name, el) {
            playClick();
            document.getElementById('dynamic-fonts').href = `https://googleapis.com{name.replace(/ /g, '+')}&display=swap`;
            document.getElementById('main-display').style.fontFamily = name;
            document.querySelectorAll('.font-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
        }

        function syncText() {
            document.getElementById('main-display').innerText = document.getElementById('user-input').value || "MEMENTO MORI";
        }

        // МАТРИЦЯ (Canvas)
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const chars = "ヨカイ0123456789";
        const drops = Array(Math.floor(canvas.width/14)).fill(1);

        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#00ff64";
            ctx.font = "14px monospace";
            drops.forEach((y, i) => {
                const text = chars[Math.floor(Math.random()*chars.length)];
                ctx.fillText(text, i*14, y*14);
                if(y*14 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(drawMatrix, 50);

        // UI ЛОГІКА
        function toggleMenu(x) { playClick(); x.classList.toggle("open"); document.getElementById('nav').classList.toggle('active'); }

        function toggleBgMusic() {
            const icon = document.getElementById('sound-icon');
            const eq = document.getElementById('eq');
            if(!musicPlaying){
                bgMusic.play(); icon.style.display = "none"; eq.style.display = "flex"; musicPlaying = true;
            } else {
                bgMusic.pause(); icon.style.display = "block"; eq.style.display = "none"; musicPlaying = false;
            }
            playClick();
        }
    </script>
</body>
</html>
