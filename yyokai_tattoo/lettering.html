<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>YOKAI OS // RED_PROTOCOL</title>
    <link id="dynamic-fonts" rel="stylesheet">
    <style>
        :root { --red: #ff0000; --glitch-cyan: #00fff0; }
        * { -webkit-user-select: none; user-select: none; box-sizing: border-box; outline: none; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; font-family: 'Montserrat', sans-serif; color: white; overflow: hidden; }

        #matrix-canvas { position: fixed; inset: 0; opacity: 0.25; z-index: 1; pointer-events: none; }

        /* HEADER & LOGO */
     .header { 
    position: absolute; 
    top: 75px; /* Трохи підняв для балансу */
    width: 100%; 
    text-align: center; 
    z-index: 10; 
}

.logo-main {
    font-weight: 900; 
    font-size: 54px; 
    letter-spacing: 14px; 
    color: #fff;
    position: relative; 
    display: inline-block; 
    line-height: 0.85; /* Зближуємо YYO та KAI */
    padding-left: 14px;
    text-transform: uppercase;
}

/* Додаємо KAI як підрядок */
.logo-main::after {
    content: 'KAI';
    display: block;
    font-size: 22px;
    letter-spacing: 18px;
    color: var(--red);
    margin-top: 5px;
    animation: flicker 5s infinite; /* Твоє мерехтіння */
}

/* ГЛІТЧ-ШАРИ (тепер вони покривають весь логотип) */
.logo-main::before, 
.glitch-layer {
    content: 'YYO';
    position: absolute;
    top: 0;
    left: 14px;
    width: 100%;
    height: 100%;
    background: transparent;
    opacity: 0;
    pointer-events: none;
}

/* Окремі шари для глітча, щоб вони не перекривали основний текст */
.logo-main::before { 
    text-shadow: -3px 0 var(--red); 
    animation: glitch-1 3s infinite; 
}

/* Створюємо другий шар через псевдоелемент або окремий клас */
/* Але щоб не міняти HTML, використаємо тінь для переднього шару */
.logo-main::before {
    box-shadow: 3px 0 var(--glitch-cyan); /* Додатковий ефект */
}

@keyframes glitch-1 { 
    0%, 18%, 100% { opacity:0; transform: translate(0); } 
    1% { opacity:1; clip-path:inset(10% 0 80% 0); transform:translate(-5px,-2px); } 
    2% { clip-path:inset(40% 0 40% 0); transform:translate(5px, 2px); }
    4% { opacity:1; clip-path:inset(70% 0 5% 0); transform:translate(-2px, -1px); }
    5% { opacity:0; } 
}

@keyframes glitch-2 { 
    0%, 25%, 100% { opacity:0; transform: translate(0); } 
    1% { opacity:1; clip-path:inset(70% 0 5% 0); transform:translate(4px,1px); } 
    3% { clip-path:inset(10% 0 60% 0); transform:translate(-4px, -1px); }
    5% { opacity:0; } 
}

        /* TOP BAR: SOUND & BURGER */
        .top-bar { position: fixed; top: 35px; width: 100%; padding: 0 30px; display: flex; justify-content: space-between; align-items: center; z-index: 3000; }
        
        .sound-container { display: flex; align-items: center; gap: 8px; cursor: pointer; height: 24px; }
        .eq { display: flex; align-items: flex-end; gap: 2px; height: 15px; width: 22px; }
        .eq-bar { width: 2px; background: var(--red); height: 2px; }
        .playing .eq-bar { animation: eq-anim 0.5s infinite alternate ease-in-out; }
        @keyframes eq-anim { from { height: 2px; } to { height: 15px; } }

        .menu-trigger { width: 30px; height: 20px; display: flex; flex-direction: column; justify-content: space-between; cursor: pointer; }
        .menu-trigger span { display: block; width: 100%; height: 2px; background: var(--red); transition: 0.4s; }
        .menu-trigger.open span:nth-child(1) { transform: translateY(9px) rotate(45deg); }
        .menu-trigger.open span:nth-child(2) { opacity: 0; }
        .menu-trigger.open span:nth-child(3) { transform: translateY(-9px) rotate(-45deg); }

        /* MAIN ELEMENTS */
        #main-display {
            position: absolute; top: 220px; width: 100%; font-size: 32px; text-align: center; 
            font-weight: 900; z-index: 10; padding: 0 30px; cursor: pointer; transition: 0.2s;
        }
        #main-display:active { transform: scale(0.95); opacity: 0.7; }

        .input-wrap { position: absolute; top: 340px; width: 100%; padding: 0 45px; z-index: 10; }
        #user-input { 
            width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--red); 
            color: #fff; padding: 10px; text-align: center; font-size: 16px;
            /* Прибираємо примусовий Caps Lock */
        }

        .font-selector-wrap { position: absolute; top: 400px; bottom: 100px; width: 100%; padding: 0 30px; z-index: 10; }
        .scroll-area { height: 100%; overflow-y: auto; }
        .font-node { display: flex; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.1); cursor: pointer; }
        .font-node.active { color: var(--red); }

        .btn-action {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: calc(100% - 60px); padding: 18px; background: transparent;
            border: 1px solid var(--red); color: var(--red); font-weight: 900; 
            text-transform: uppercase; letter-spacing: 4px; z-index: 10; cursor: pointer;
        }

        .nav-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.98);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transform: translateX(100%); transition: 0.5s; z-index: 2500;
        }
        .nav-overlay.active { transform: translateX(0); }
        .nav-link { font-size: 22px; color: #fff; text-decoration: none; margin: 15px; font-weight: 900; text-transform: uppercase; }

        #copy-toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--red); color: #000; padding: 8px 20px; font-weight: 900; display: none; z-index: 4000; }
    </style>
</head>
<body>

<div class="top-bar">

            <div class="eq-bar" style="animation-duration: 0.6s"></div>
            <div class="eq-bar" style="animation-duration: 0.3s"></div>
            <div class="eq-bar" style="animation-duration: 0.7s"></div>
            <div class="eq-bar" style="animation-duration: 0.5s"></div>
            <div class="eq-bar" style="animation-duration: 0.8s"></div>
        </div>
        <span style="font-size: 10px; font-weight: 900; color: var(--red)">AUDIO</span>
    </div>
    <div class="menu-trigger" id="burger" onclick="toggleMenu()">
        <span></span><span></span><span></span>
    </div>
</div>

<nav class="nav-overlay" id="nav">
    <a href="#" class="nav-link">Власні ескізи</a>
    <a href="#" class="nav-link">Портфоліо</a>
    <a href="#" class="nav-link" style="color:var(--red)">Записатись</a>
    <a href="#" class="nav-link">Консультація</a>
</nav>

<div class="header">
    <div class="logo-container">
        <div class="logo-main" data-text="YYOKAI">
            YYO<br><span class="logo-kai">KAI</span>
        </div>
    </div>
</div>


<div id="main-display" onclick="copyText()">MEMENTO MORI</div>

<div class="input-wrap">

<button class="btn-action" onclick="window.location.href='https://t.me'">Записатись</button>

    // 1. ЗАВАНТАЖЕННЯ ПРЕВ'Ю (РОЗБИВАЄМО НА ЧАСТИНИ, ЩОБ ПРАЦЮВАЛО)
function loadPreviews(fonts) {
    const CHUNK_SIZE = 20; // Google не приймає більше ~25-30 шрифтів за раз
    for (let i = 0; i < fonts.length; i += CHUNK_SIZE) {
        const chunk = fonts.slice(i, i + CHUNK_SIZE);
        const fontNames = chunk.map(f => f.id.replace(/ /g, '+')).join('|');
        const link = document.createElement('link');
        link.rel = 'stylesheet';
        link.href = `https://fonts.googleapis.com/css?family=${fontNames}&display=swap`;
        document.head.appendChild(link);
    }
}

// Запускаємо завантаження всіх прев'ю
loadPreviews(tattooFonts);

// 2. ГЕНЕРАЦІЯ СПИСКУ
const listContainer = document.getElementById('font-list');

tattooFonts.forEach(font => {
    const node = document.createElement('div');
    node.className = 'font-node';
    node.innerHTML = `
        <span class="f-preview" style="font-family: '${font.id}';">Style</span>
        <span class="f-name">${font.tag}</span>
    `;

    node.onclick = () => {
        // Програємо звук, якщо функція playClick існує
        if (typeof playClick === 'function') playClick();

        // Формуємо правильне посилання для обраного шрифту
        const fontUrl = `https://fonts.googleapis.com/css2?family=${font.id.replace(/ /g, '+')}&display=swap`;
        
        // Оновлюємо лінк у head (id="dynamic-fonts" має бути в HTML)
        const dynamicLink = document.getElementById('dynamic-fonts');
        if (dynamicLink) dynamicLink.href = fontUrl;

        // Застосовуємо шрифт до головного дисплею
        const mainDisplay = document.getElementById('main-display');
        if (mainDisplay) {
            mainDisplay.style.fontFamily = `'${font.id}', sans-serif`;
        }

        // Візуальна активація в списку
        document.querySelectorAll('.font-node').forEach(n => n.classList.remove('active'));
        node.classList.add('active');
    };

    listContainer.appendChild(node);
});

// 3. СИНХРОНІЗАЦІЯ ТЕКСТУ (ЗБЕРІГАЄМО РЕГІСТР)
function syncText() {
    const input = document.getElementById('user-input');
    const display = document.getElementById('main-display');
    if (input && display) {
        display.innerText = input.value || "MEMENTO MORI";
    }
}

// 4. КОПІЮВАННЯ
function copyText() {
    const display = document.getElementById('main-display');
    if (display) {
        navigator.clipboard.writeText(display.innerText).then(() => {
            if (typeof playClick === 'function') playClick();
            const notice = document.getElementById('copy-notice') || document.getElementById('copy-toast');
            if (notice) {
                notice.style.display = 'block';
                setTimeout(() => notice.style.display = 'none', 1500);
            }
        });
    }
}


    // Матриця
    const canvas = document.getElementById('matrix-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    const drops = Array(Math.floor(canvas.width/20)).fill(1);
    function draw() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.14)"; 
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#f00";
        ctx.font = "12px monospace";
        drops.forEach((y, i) => {
            ctx.fillText("01", i*20, y*20);
            if(y*20 > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        });
    }
    setInterval(draw, 50);
</script>
