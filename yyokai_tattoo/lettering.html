<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YOKAI OS // RED_PROTOCOL</title>
    
    <link href="https://googleapis.com" rel="stylesheet">
    <link id="dynamic-fonts" rel="stylesheet">

    <style>
        :root {
            --neon: #ff0000;
            --glass: rgba(15, 0, 0, 0.8);
            --border: rgba(255, 0, 0, 0.4);
            --glitch-blue: #00f0ff;
        }

        /* ПОВНИЙ ЗАХИСТ ТА БАЗОВІ НАЛАШТУВАННЯ */
        * { 
            -webkit-user-select: none; 
            user-select: none; 
            -webkit-touch-callout: none; 
            box-sizing: border-box; 
            outline: none; 
        }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: #000; font-family: 'Montserrat', sans-serif;
            color: white; overflow: hidden; transition: filter 0.4s, opacity 0.4s;
        }

        /* CRT ТА SCANLINES */
        body::before {
            content: " "; position: fixed; inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 999; background-size: 100% 2px, 3px 100%; pointer-events: none;
        }
        body::after {
            content: " "; position: fixed; inset: 0;
            background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.9) 150%);
            z-index: 998; pointer-events: none;
        }

        #matrix-canvas { position: fixed; inset: 0; opacity: 0.12; z-index: 1; pointer-events: none; }

        /* ВОДЯНИЙ ЗНАК */
        .watermark {
            position: absolute; font-size: 10px; color: var(--neon); opacity: 0.08;
            white-space: nowrap; pointer-events: none; z-index: 5;
            text-transform: uppercase; letter-spacing: 2px;
            animation: float-watermark 15s infinite linear;
        }
        @keyframes float-watermark {
            0% { transform: translate(-100%, -100%) rotate(-45deg); }
            100% { transform: translate(100vw, 100vh) rotate(-45deg); }
        }

        .ui-wrapper {
            position: relative; z-index: 10; height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            padding: 20px; justify-content: space-between;
        }

        /* TOP PANEL */
        .top-bar {
            position: fixed; top: 25px; width: 100%;
            display: flex; justify-content: space-between;
            padding: 0 25px; box-sizing: border-box; z-index: 1000;
        }
        .sound-toggle { width: 40px; height: 40px; display: flex; align-items: center; cursor: pointer; }
        .eq-container { display: flex; align-items: flex-end; justify-content: space-between; width: 22px; height: 16px; display: none; }
        .eq-bar { width: 2px; background: var(--neon); animation: eq-anim 0.5s infinite ease-in-out; }
        @keyframes eq-anim { 0%, 100% { height: 4px; } 50% { height: 16px; } }

        .menu-trigger { width: 30px; height: 30px; cursor: pointer; }
        .bar { width: 30px; height: 2px; background: var(--neon); margin: 6px 0; transition: 0.4s; }
        .open .bar:nth-child(1) { transform: translateY(8px) rotate(45deg); }
        .open .bar:nth-child(2) { opacity: 0; }
        .open .bar:nth-child(3) { transform: translateY(-8px) rotate(-45deg); }

        /* HEADER & GLITCH LOGO */
        .header { text-align: center; margin-top: 60px; margin-bottom: 25px; }
        .glitch {
            font-size: 50px; font-weight: 900; letter-spacing: 14px;
            text-transform: uppercase; position: relative; color: white;
        }
        .glitch::before, .glitch::after {
            content: attr(data-text); position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        }
        .glitch::before { color: var(--neon); z-index: -1; animation: glitch-anim 0.3s infinite; }
        .glitch::after { color: var(--glitch-blue); z-index: -2; animation: glitch-anim 0.3s infinite reverse; }
        @keyframes glitch-anim {
            0% { transform: translate(0); }
            20% { transform: translate(-3px, 2px); }
            40% { transform: translate(-3px, -2px); }
            100% { transform: translate(0); }
        }
        .sub-logo { display: block; font-size: 18px; letter-spacing: 16px; color: var(--neon); text-align: center; margin-top: 8px; font-weight: 900; }

        /* MAIN DISPLAY */
        #main-display {
            font-size: 36px; min-height: 110px; width: 100%;
            display: flex; align-items: center; justify-content: center;
            color: #fff; text-align: center; cursor: copy; padding: 0 15px;
            border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
            margin-bottom: 20px;
        }

        /* CONTROLS AREA */
        .controls-wrap { 
            width: 100%; max-width: 370px; flex: 1; 
            display: flex; flex-direction: column; gap: 15px;
        }

        .input-box { width: 100%; }
        #user-input {
            width: 100%; background: #0a0000; border: 1px solid var(--border);
            color: #fff; font-family: 'Montserrat'; font-size: 14px;
            text-align: center; padding: 15px; border-radius: 2px;
            letter-spacing: 3px; text-transform: uppercase; transition: 0.3s;
        }
        #user-input:focus { border-color: #fff; background: #111; }

        /* SCROLLABLE LIBRARY */
        .font-library {
            width: 100%; flex-grow: 1; min-height: 150px; max-height: 24vh;
            background: var(--glass); border: 1px solid var(--border);
            overflow-y: auto; -webkit-overflow-scrolling: touch; pointer-events: all;
        }
        .font-library::-webkit-scrollbar { width: 2px; }
        .font-library::-webkit-scrollbar-thumb { background: var(--neon); }

        .font-item {
            padding: 16px; border-bottom: 1px solid rgba(255,0,0,0.1);
            cursor: pointer; display: flex; justify-content: space-between; align-items: center;
            pointer-events: all;
        }
        .font-item.active { background: var(--neon); color: black; }
        .font-item.active .font-meta { color: black; }

        .font-style-preview { font-size: 20px; }
        .font-meta { font-size: 8px; color: var(--neon); font-weight: 900; }

        /* FINAL ACTION BUTTON */
        .book-btn {
            width: 100%; padding: 20px; background: var(--neon); 
            border: none; color: black; font-weight: 900; 
            letter-spacing: 4px; text-transform: uppercase;
            cursor: pointer; font-size: 14px; margin-bottom: 10px;
        }

        #copy-notice {
            position: fixed; top: 130px; background: #fff; color: black;
            padding: 6px 18px; font-size: 10px; font-weight: 900;
            letter-spacing: 2px; display: none; z-index: 1000;
        }

        .nav-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.98);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transform: translateY(-100%); transition: 0.5s cubic-bezier(0.77, 0, 0.175, 1);
            z-index: 900;
        }
        .nav-overlay.active { transform: translateY(0); }
        .nav-link { font-size: 24px; font-weight: 900; letter-spacing: 6px; color: white; text-decoration: none; margin: 18px 0; text-transform: uppercase; }
    </style>
</head>
<body id="main-body">

    <canvas id="matrix-canvas"></canvas>
    <div class="watermark">YOKAI SYSTEM // NO COPY // DATA ENCRYPTED</div>
    <div id="copy-notice">[ COPIED_TO_CLIPBOARD ]</div>

    <div class="top-bar">
        <div class="sound-toggle" onclick="toggleBgMusic()">
            <span id="sound-icon" style="color: var(--neon); font-size: 20px;">🔈</span>
            <div id="eq" class="eq-container">
                <div class="eq-bar" style="animation-duration: 0.4s;"></div>
                <div class="eq-bar" style="animation-duration: 0.6s;"></div>
                <div class="eq-bar" style="animation-duration: 0.3s;"></div>
                <div class="eq-bar" style="animation-duration: 0.5s;"></div>
            </div>
        </div>
        <div class="menu-trigger" onclick="toggleMenu(this)">
            <div class="bar"></div><div class="bar"></div><div class="bar"></div>
        </div>
    </div>

    <div class="ui-wrapper">
        <div class="header">
            <div class="glitch" data-text="YYO">YYO</div>
            <div class="sub-logo">KAI</div>
        </div>

        <div id="main-display">MEMENTO MORI</div>

        <div class="controls-wrap">
            <div class="input-box">
                <input type="text" id="user-input" placeholder="ВПИШИ СВІЙ ТЕКСТ..." maxlength="22" oninput="syncText()">
            </div>

            <div class="font-library" id="font-list"></div>

            <button class="book-btn" onclick="window.location.href='https://t.me'">ЗАПИСАТИСЬ НА СЕАНС</button>
        </div>
    </div>

    <nav class="nav-overlay" id="nav">
        <a href="index.html" class="nav-link">SKETCH_VOID</a>
        <a href="#" class="nav-link">MISS_ARCHIVE</a>
        <a href="https://instagram.com" class="nav-link">INSTAGRAM</a>
        <a href="https://t.me" class="nav-link" style="color:var(--neon);">INIT_RESERVE</a>
    </nav>

    <audio id="bg-music" loop><source src="RED_AMBIENT.mp3" type="audio/mpeg"></audio>
    <audio id="ui-click"><source src="RED_CLICK.mp3" type="audio/mpeg"></audio>

    <script>
        const uiClick = document.getElementById('ui-click');
        const bgMusic = document.getElementById('bg-music');
        let musicPlaying = false;

        function playClick() { uiClick.currentTime = 0; uiClick.play().catch(()=>{}); }

        // ШРИФТИ (БАЗА)
        const tattooFonts = [
            {id: 'UnifrakturMaguntia', type: 'Gothic'}, {id: 'Great Vibes', type: 'Script'},
            {id: 'Cinzel', type: 'Roman'}, {id: 'Noto Sans JP', type: 'Asian'},
            {id: 'MedievalSharp', type: 'Dark'}, {id: 'Charm', type: 'Calligraphy'},
            {id: 'Pirata One', type: 'Vintage'}, {id: 'Kelly Slab', type: 'Tech'},
            {id: 'Metal Mania', type: 'Metal'}, {id: 'Montserrat', type: 'Minimal'}
        ];

        const listContainer = document.getElementById('font-list');
        tattooFonts.forEach(font => {
            const item = document.createElement('div');
            item.className = 'font-item';
            item.innerHTML = `<span style="font-family:'${font.id}'; font-size: 20px;">Style</span>
                              <span class="font-meta">${font.id.toUpperCase()}</span>`;
            item.onclick = (e) => {
                e.stopPropagation();
                playClick();
                document.getElementById('dynamic-fonts').href = `https://googleapis.com{font.id.replace(/ /g, '+')}&display=swap`;
                document.getElementById('main-display').style.fontFamily = font.id;
                document.querySelectorAll('.font-item').forEach(i => i.classList.remove('active'));
                item.classList.add('active');
            };
            listContainer.appendChild(item);
        });

        function syncText() { document.getElementById('main-display').innerText = document.getElementById('user-input').value || "MEMENTO MORI"; }

        // КОПІЮВАННЯ ТЕКСТУ ПРИ КЛІКУ
        document.getElementById('main-display').addEventListener('click', function() {
            navigator.clipboard.writeText(this.innerText).then(() => {
                playClick();
                const n = document.getElementById('copy-notice');
                n.style.display = 'block'; setTimeout(() => n.style.display = 'none', 2000);
            });
        });

        // MATRIX BACKGROUND
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const chars = "ヨカイ0123456789";
        const drops = Array(Math.floor(canvas.width/14)).fill(1);
        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#ff0000"; ctx.font = "14px monospace";
            drops.forEach((y, i) => {
                const text = chars[Math.floor(Math.random()*chars.length)];
                ctx.fillText(text, i*14, y*14);
                if(y*14 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(drawMatrix, 50);

        // ЗАХИСТ ВІД СКРІНШОТІВ ТА ЗГОРТАННЯ
        document.addEventListener('visibilitychange', () => {
            const body = document.getElementById('main-body');
            if (document.hidden) {
                body.style.opacity = "0";
                body.style.filter = "blur(50px) grayscale(1)";
            } else {
                setTimeout(() => {
                    body.style.opacity = "1";
                    body.style.filter = "none";
                }, 300);
            }
        });

        document.addEventListener('contextmenu', e => e.preventDefault());

        function toggleMenu(x) { playClick(); x.classList.toggle("open"); document.getElementById('nav').classList.toggle('active'); }
        
        function toggleBgMusic() {
            const icon = document.getElementById('sound-icon');
            const eq = document.getElementById('eq');
            if(!musicPlaying){
                bgMusic.play(); icon.style.display="none"; eq.style.display="flex"; musicPlaying=true;
            } else {
                bgMusic.pause(); icon.style.display="block"; eq.style.display="none"; musicPlaying=false;
            }
            playClick();
        }
    </script>
</body>
</html>
