<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>YOKAI OS // RED_PROTOCOL_FULL</title>
    
    <!-- ШРИФТИ -->
    <link href="https://googleapis.com" rel="stylesheet">
    <link id="dynamic-fonts" rel="stylesheet">

    <style>
        :root { 
            --red: #ff0000; 
            --glitch-pink: #ff00c1;
            --glitch-cyan: #00fff0;
        }

        /* ПОВНИЙ ЗАХИСТ ТА БАЗОВІ НАЛАШТУВАННЯ */
        * { 
            -webkit-user-select: none; 
            user-select: none; 
            -webkit-touch-callout: none; 
            box-sizing: border-box; 
            outline: none; 
        }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: #000; font-family: 'Montserrat', sans-serif;
            color: white; overflow: hidden;
            transition: opacity 0.5s ease, filter 0.5s ease;
        }

        /* МАТРИЧНИЙ ФОН */
        #matrix-canvas { position: fixed; inset: 0; opacity: 0.25; z-index: 1; pointer-events: none; }

        /* CRT ТА SCANLINES */
        body::before {
            content: " "; position: fixed; inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(255, 0, 0, 0.01), rgba(255, 0, 0, 0.03));
            z-index: 999; background-size: 100% 2px, 3px 100%; pointer-events: none;
        }
        body::after {
            content: " "; position: fixed; inset: 0;
            background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.9) 150%);
            z-index: 998; pointer-events: none;
        }

        /* ЛІТАЮЧИЙ ВОДЯНИЙ ЗНАК (ЗАХИСТ) */
        .watermark {
            position: absolute; font-size: 10px; color: var(--red); opacity: 0.08;
            white-space: nowrap; pointer-events: none; z-index: 5;
            text-transform: uppercase; letter-spacing: 2px;
            animation: float-watermark 15s infinite linear;
        }
        @keyframes float-watermark {
            0% { transform: translate(-100%, -100%) rotate(-45deg); }
            100% { transform: translate(100vw, 100vh) rotate(-45deg); }
        }

        /* ЗАХИСНИЙ ШАР ПРИ ЗГОРТАННІ */
        #protection-layer {
            position: fixed; inset: 0; background: #000; z-index: 9999; display: none;
        }

        /* ОСНОВНА ОБОРТКА */
        .ui-wrapper {
            position: relative; z-index: 10; height: 100vh;
            display: flex; flex-direction: column; 
            padding: env(safe-area-inset-top) 25px calc(env(safe-area-inset-bottom) + 35px);
            justify-content: space-between;
        }

        /* ВЕРХНЯ ПАНЕЛЬ */
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; width: 100%; position: relative; z-index: 1001; }
        
        .sound-wrap { display: flex; align-items: center; cursor: pointer; height: 30px; min-width: 50px; }
        .sound-icon { font-size: 18px; color: var(--red); }
        .eq { display: none; align-items: flex-end; gap: 2px; height: 18px; }
        .eq-bar { width: 2px; background: var(--red); height: 4px; }
        .eq-active .eq { display: flex; }
        .eq-active .sound-icon { display: none; }
        .eq-active .eq-bar { animation: eq-play 0.6s infinite alternate; }
        @keyframes eq-play { from { height: 4px; } to { height: 18px; } }

        /* ГАМБУРГЕР -> ХРЕСТИК */
        .menu-trigger { width: 30px; height: 24px; position: relative; cursor: pointer; }
        .menu-trigger span { 
            display: block; position: absolute; height: 2px; width: 100%; 
            background: var(--red); transition: transform .3s ease, top .3s ease, opacity .3s ease; left: 0;
        }
        .menu-trigger span:nth-child(1) { top: 2px; }
        .menu-trigger span:nth-child(2) { top: 11px; }
        .menu-trigger span:nth-child(3) { top: 20px; }

        .menu-trigger.open span:nth-child(1) { top: 11px; transform: rotate(45deg); }
        .menu-trigger.open span:nth-child(2) { opacity: 0; transform: translateX(-20px); }
        .menu-trigger.open span:nth-child(3) { top: 11px; transform: rotate(-45deg); }

        /* СКЛАДНИЙ ГЛІТЧ ЛОГОТИП */
        .header { text-align: center; margin-top: 10px; }
        .logo-main { 
            font-weight: 900; font-size: 52px; letter-spacing: 14px; color: #fff; 
            line-height: 1; position: relative; display: inline-block;
        }
        .logo-main::before, .logo-main::after {
            content: 'YYO'; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: black;
        }
        .logo-main::before { left: 2px; text-shadow: -2px 0 var(--glitch-pink); animation: glitch-1 2s infinite linear alternate-reverse; }
        .logo-main::after { left: -2px; text-shadow: -2px 0 var(--glitch-cyan); animation: glitch-2 3s infinite linear alternate-reverse; }

        @keyframes glitch-1 { 0% { clip: rect(20px, 9999px, 10px, 0); } 20% { clip: rect(80px, 9999px, 30px, 0); } 100% { clip: rect(10px, 9999px, 90px, 0); } }
        @keyframes glitch-2 { 0% { clip: rect(60px, 9999px, 50px, 0); } 30% { clip: rect(10px, 9999px, 80px, 0); } 100% { clip: rect(90px, 9999px, 20px, 0); } }
        .logo-sub { display: block; font-size: 20px; color: var(--red); letter-spacing: 18px; margin-top: 5px; font-weight: 900; }

        /* ПРЕВ'Ю ТЕКСТУ (+30px відступ) */
        #main-display { 
            font-size: 36px; text-align: center; color: #fff; font-weight: 900; 
            min-height: 100px; display: flex; align-items: center; justify-content: center; 
            margin-top: 30px; text-shadow: 0 0 15px rgba(255,255,255,0.3);
            cursor: copy;
        }

        /* ПОЛЕ ВВОДУ (+30px відступ) */
        #user-input {
            width: 100%; background: rgba(255,0,0,0.05); border: none; border-bottom: 1px solid rgba(255,0,0,0.3);
            color: #fff; padding: 15px; font-size: 15px; letter-spacing: 3px; 
            text-transform: uppercase; text-align: center;
            margin-top: 30px; border-radius: 0;
        }

        /* СПИСОК ШРИФТІВ */
        .font-selector-wrap { flex: 1; overflow: hidden; margin: 20px 0; }
        .scroll-area { height: 100%; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .scroll-area::-webkit-scrollbar { width: 0px; }
        
        .font-node { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 12px 15px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); 
        }
        .font-node.active { color: var(--red); border-left: 2px solid var(--red); background: rgba(255,0,0,0.05); }
        .f-preview { font-size: 22px; }
        .f-name { font-size: 9px; font-weight: 900; opacity: 0.5; letter-spacing: 2px; }

        /* КНОПКА ЗАПИСУ (опущена на 35px від краю) */
        .btn-init { 
            width: 100%; padding: 22px; background: rgba(255, 0, 0, 0.02); 
            border: 1px solid var(--red); color: var(--red); 
            font-weight: 900; letter-spacing: 6px; 
            text-transform: uppercase; font-size: 14px; margin-bottom: 35px;
            transition: .3s;
        }
        .btn-init:active { background: var(--red); color: #000; }

        /* МЕНЮ НАВІГАЦІЇ */
        .nav-overlay { 
            position: fixed; inset: 0; background: #000; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            transform: translateX(100%); transition: 0.4s cubic-bezier(0.77, 0, 0.175, 1); z-index: 900; 
        }
        .nav-overlay.active { transform: translateX(0); }
        .nav-link { font-size: 22px; font-weight: 900; color: white; text-decoration: none; margin: 15px 0; text-transform: uppercase; }

        /* СПОВІЩЕННЯ */
        #copy-notice { 
            position: fixed; top: 30px; left: 50%; transform: translateX(-50%); 
            background: var(--red); color: black; padding: 8px 20px; 
            font-weight: 900; font-size: 10px; z-index: 2000; display: none; box-shadow: 0 0 20px var(--red); 
        }
    </style>
</head>
<body id="main-body">

    <div id="protection-layer"></div>
    <canvas id="matrix-canvas"></canvas>
    <div class="watermark">YOKAI SYSTEM // NO COPY // DATA ENCRYPTED</div>
    <div id="copy-notice">[ DATA_EXTRACTED ]</div>

    <div class="ui-wrapper">
        <div class="top-bar">
            <div class="sound-wrap" id="sound-trigger" onclick="toggleBgMusic()">
                <div class="sound-icon">🔈</div>
                <div class="eq">
                    <div class="eq-bar" style="animation-duration: 0.4s;"></div>
                    <div class="eq-bar" style="animation-duration: 0.7s;"></div>
                    <div class="eq-bar" style="animation-duration: 0.5s;"></div>
                    <div class="eq-bar" style="animation-duration: 0.4s;"></div>
                </div>
            </div>
            <div class="menu-trigger" onclick="toggleMenu(this)">
                <span></span><span></span><span></span>
            </div>
        </div>

        <div class="header">
            <div class="logo-main">YYO</div>
            <div class="logo-sub">KAI</div>
        </div>

        <div onclick="copyText()">
            <div id="main-display">MEMENTO MORI</div>
        </div>

        <div class="input-section">
            <input type="text" id="user-input" placeholder="Впиши свій текст..." oninput="syncText()" maxlength="20">
        </div>

        <div class="font-selector-wrap">
            <div class="scroll-area" id="font-list"></div>
        </div>

        <button class="btn-init" onclick="window.location.href='https://t.me'">Записатись</button>
    </div>

    <nav class="nav-overlay" id="nav">
        <a href="index.html" class="nav-link" onclick="toggleMenu(document.querySelector('.menu-trigger'))">Sketches</a>
        <a href="#" class="nav-link" onclick="toggleMenu(document.querySelector('.menu-trigger'))">Archive</a>
        <a href="https://instagram.com" class="nav-link">Instagram</a>
        <a href="https://t.me" class="nav-link" style="color:var(--red);">Reserve</a>
    </nav>

    <audio id="bg-music" loop><source src="RED_AMBIENT.mp3" type="audio/mpeg"></audio>
    <audio id="ui-click"><source src="RED_CLICK.mp3" type="audio/mpeg"></audio>

    <script>
        const uiClick = document.getElementById('ui-click');
        const bgMusic = document.getElementById('bg-music');
        let musicPlaying = false;

        function playClick() { uiClick.currentTime = 0; uiClick.play().catch(()=>{}); }

        function copyText() {
            const text = document.getElementById('main-display').innerText;
            navigator.clipboard.writeText(text).then(() => {
                playClick();
                const notice = document.getElementById('copy-notice');
                notice.style.display = 'block';
                setTimeout(() => notice.style.display = 'none', 1500);
            });
        }

        const tattooFonts = [
            {id: 'UnifrakturMaguntia', tag: 'GOTH'}, {id: 'Great Vibes', tag: 'LETTER'},
            {id: 'Cinzel', tag: 'ROMAN'}, {id: 'Noto Sans JP', tag: 'ASIA'},
            {id: 'MedievalSharp', tag: 'METAL'}, {id: 'Charm', tag: 'HAND'}
        ];

        const listContainer = document.getElementById('font-list');
        tattooFonts.forEach(font => {
            const node = document.createElement('div');
            node.className = 'font-node';
            node.innerHTML = `<span class="f-preview" style="font-family:'${font.id}'">Style</span><span class="f-name">${font.tag}</span>`;
            node.onclick = () => {
                playClick();
                document.getElementById('dynamic-fonts').href = `https://googleapis.com{font.id.replace(/ /g, '+')}&display=swap`;
                document.getElementById('main-display').style.fontFamily = font.id;
                document.querySelectorAll('.font-node').forEach(n => n.classList.remove('active'));
                node.classList.add('active');
            };
            listContainer.appendChild(node);
        });

        function syncText() { document.getElementById('main-display').innerText = document.getElementById('user-input').value || "MEMENTO MORI"; }

        function toggleBgMusic() {
            const btn = document.getElementById('sound-trigger');
            if(!musicPlaying){ bgMusic.play(); btn.classList.add('eq-active'); musicPlaying = true; }
            else { bgMusic.pause(); btn.classList.remove('eq-active'); musicPlaying = false; }
            playClick();
        }

        function toggleMenu(x) { playClick(); x.classList.toggle("open"); document.getElementById('nav').classList.toggle('active'); }

        // МАТРИЦЯ
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const chars = "01ヨカイ";
        const drops = Array(Math.floor(canvas.width/15)).fill(1);
        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.1)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#ff0000"; ctx.font = "12px monospace";
            drops.forEach((y, i) => {
                const text = chars[Math.floor(Math.random()*chars.length)];
                ctx.fillText(text, i*15, y*15);
                if(y*14 > canvas.height && Math.random() > 0.98) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(drawMatrix, 60);

        // ЗАХИСТ ПРИ ЗГОРТАННІ
        document.addEventListener('visibilitychange', () => {
            const prot = document.getElementById('protection-layer');
            const body = document.getElementById('main-body');
            if (document.hidden) { 
                prot.style.display = "block"; 
                body.style.opacity = "0";
            } else { 
                setTimeout(() => {
                    prot.style.display = "none";
                    body.style.opacity = "1";
                }, 300);
            }
        });
        document.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>
