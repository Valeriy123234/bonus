<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>YOKAI OS // RED_PROTOCOL</title>
    
    <link href="https://googleapis.com" rel="stylesheet">
    <link id="dynamic-fonts" rel="stylesheet">

    <style>
        :root {
            --red: #ff0015;
            --ui-bg: rgba(10, 0, 0, 0.95);
            --line: rgba(255, 0, 21, 0.4);
        }

        /* ЗАХИСТ ВІД ВИДІЛЕННЯ */
        * { -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; box-sizing: border-box; outline: none; }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: #000; font-family: 'Montserrat', sans-serif;
            color: white; overflow: hidden;
        }

        #matrix-canvas { position: fixed; inset: 0; opacity: 0.15; z-index: 1; pointer-events: none; }

        /* ЕФЕКТ CRT ТА ЗАХИСТ */
        .screen-overlay {
            position: fixed; inset: 0; pointer-events: none; z-index: 999;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%),
                        radial-gradient(circle, transparent 30%, rgba(0,0,0,0.5) 100%);
            background-size: 100% 3px, 100% 100%;
            transition: 0.3s;
        }

        .ui-wrapper {
            position: relative; z-index: 10; height: 100vh;
            display: flex; flex-direction: column; 
            padding: env(safe-area-inset-top) 25px env(safe-area-inset-bottom);
            justify-content: space-between;
        }

        /* HEADER */
        .top-bar {
            display: flex; justify-content: space-between; align-items: center; padding: 20px 0;
        }
        .system-id { font-size: 9px; letter-spacing: 4px; color: var(--red); font-weight: 900; }

        .logo-wrap { text-align: center; padding: 10px 0; }
        .logo-main { font-weight: 900; font-size: 52px; letter-spacing: 12px; color: #fff; text-shadow: 0 0 20px var(--red); }
        .logo-main::after { content: 'KAI'; display: block; font-size: 16px; letter-spacing: 15px; color: var(--red); margin-top: -5px; text-shadow: none; }

        /* PREVIEW UNIT */
        .preview-unit {
            position: relative; width: 100%; height: 25vh;
            display: flex; align-items: center; justify-content: center;
            background: var(--ui-bg); border: 1px solid var(--line);
            overflow: hidden; cursor: copy;
        }
        .preview-unit::before { content: ''; position: absolute; top: 0; left: 0; width: 10px; height: 10px; border-top: 3px solid var(--red); border-left: 3px solid var(--red); }
        .preview-unit::after { content: ''; position: absolute; bottom: 0; right: 0; width: 10px; height: 10px; border-bottom: 3px solid var(--red); border-right: 3px solid var(--red); }

        #main-display {
            font-size: 38px; text-align: center; color: #fff;
            max-width: 90%; word-break: break-all; font-weight: 900;
        }

        /* INPUT BLOCK */
        .input-section { padding: 10px 0; }
        .label { font-size: 8px; letter-spacing: 3px; color: var(--red); margin-bottom: 10px; text-transform: uppercase; font-weight: 900; }
        #user-input {
            width: 100%; background: rgba(255, 0, 0, 0.05); border: 1px solid var(--line);
            color: #fff; padding: 15px; font-size: 14px; letter-spacing: 2px; text-transform: uppercase; text-align: center;
        }

        /* FONT SELECTOR */
        .font-selector-wrap { flex: 1; overflow: hidden; display: flex; flex-direction: column; margin-top: 10px; }
        .scroll-area { overflow-y: auto; flex: 1; -webkit-overflow-scrolling: touch; }
        .scroll-area::-webkit-scrollbar { width: 0px; }

        .font-node {
            display: flex; justify-content: space-between; align-items: center;
            padding: 22px 15px; border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            transition: 0.2s;
        }
        .font-node.active { background: var(--red); color: #000; }
        .f-preview { font-size: 24px; }
        .f-name { font-size: 10px; font-weight: 900; letter-spacing: 1px; }

        /* BUTTONS */
        .btn-init {
            width: 100%; padding: 25px; margin: 15px 0;
            background: var(--red); border: none; color: #000;
            font-weight: 900; letter-spacing: 6px; text-transform: uppercase;
            font-size: 16px; clip-path: polygon(0 0, 100% 0, 100% 75%, 95% 100%, 0 100%);
        }

        /* NOTICE */
        #copy-notice {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: var(--red); color: black; padding: 10px 20px;
            font-weight: 900; font-size: 12px; letter-spacing: 3px;
            z-index: 1001; display: none;
        }

        /* SOUND */
        .eq-btn { width: 40px; height: 30px; cursor: pointer; display: flex; align-items: flex-end; gap: 3px; }
        .eq-bar { width: 4px; height: 6px; background: var(--red); transition: 0.3s; }
        .eq-active .eq-bar { animation: eq-play 0.6s infinite alternate; }
        @keyframes eq-play { from { height: 6px; } to { height: 22px; } }
    </style>
</head>
<body id="main-body">

    <div class="screen-overlay"></div>
    <canvas id="matrix-canvas"></canvas>
    <div id="copy-notice">[ DATA_EXTRACTED ]</div>

    <div class="ui-wrapper">
        <div class="top-bar">
            <div class="eq-btn" id="sound-trigger" onclick="toggleBgMusic()">
                <div class="eq-bar" style="animation-delay: 0.1s;"></div>
                <div class="eq-bar" style="animation-delay: 0.3s;"></div>
                <div class="eq-bar" style="animation-delay: 0.2s;"></div>
            </div>
            <div class="system-id">YOKAI_OS // SECURE_MODE</div>
        </div>

        <div class="logo-wrap">
            <div class="logo-main">YYO</div>
        </div>

        <div class="preview-unit" onclick="copyText()">
            <div id="main-display">MEMENTO MORI</div>
        </div>

        <div class="input-section">
            <div class="label">> USER_INPUT_FIELD</div>
            <input type="text" id="user-input" placeholder="Впиши свій текст..." oninput="syncText()" maxlength="20">
        </div>

        <div class="font-selector-wrap">
            <div class="label">> STYLE_DATABASE</div>
            <div class="scroll-area" id="font-list"></div>
        </div>

        <button class="btn-init" onclick="window.location.href='https://t.me'">ЗАПИСАТИСЬ</button>
    </div>

    <audio id="bg-music" loop><source src="RED_AMBIENT.mp3" type="audio/mpeg"></audio>
    <audio id="ui-click"><source src="RED_CLICK.mp3" type="audio/mpeg"></audio>

    <script>
        const uiClick = document.getElementById('ui-click');
        const bgMusic = document.getElementById('bg-music');
        let musicPlaying = false;

        function playClick() { uiClick.currentTime = 0; uiClick.play().catch(()=>{}); }

        // КОПІЮВАННЯ
        function copyText() {
            const text = document.getElementById('main-display').innerText;
            navigator.clipboard.writeText(text).then(() => {
                playClick();
                const notice = document.getElementById('copy-notice');
                notice.style.display = 'block';
                setTimeout(() => notice.style.display = 'none', 1500);
            });
        }

        const tattooFonts = [
            {id: 'UnifrakturMaguntia', tag: 'GOTHIC_01'}, 
            {id: 'Great Vibes', tag: 'SCRIPT_02'},
            {id: 'Cinzel', tag: 'ROMAN_03'}, 
            {id: 'Noto Sans JP', tag: 'ASIA_04'},
            {id: 'MedievalSharp', tag: 'DARK_05'},
            {id: 'Charm', tag: 'HAND_06'},
            {id: 'Metal Mania', tag: 'CORE_07'},
            {id: 'Pirata One', tag: 'OLD_08'}
        ];

        const listContainer = document.getElementById('font-list');
        tattooFonts.forEach(font => {
            const node = document.createElement('div');
            node.className = 'font-node';
            node.innerHTML = `
                <span class="f-preview" style="font-family:'${font.id}'">Style</span>
                <span class="f-name">${font.tag}</span>
            `;
            node.onclick = () => {
                playClick();
                document.getElementById('dynamic-fonts').href = `https://googleapis.com{font.id.replace(/ /g, '+')}&display=swap`;
                document.getElementById('main-display').style.fontFamily = font.id;
                document.querySelectorAll('.font-node').forEach(n => n.classList.remove('active'));
                node.classList.add('active');
            };
            listContainer.appendChild(node);
        });

        function syncText() {
            document.getElementById('main-display').innerText = document.getElementById('user-input').value || "MEMENTO MORI";
        }

        function toggleBgMusic() {
            const btn = document.getElementById('sound-trigger');
            if(!musicPlaying){
                bgMusic.play(); btn.classList.add('eq-active'); musicPlaying = true;
            } else {
                bgMusic.pause(); btn.classList.remove('eq-active'); musicPlaying = false;
            }
            playClick();
        }

        // ЗАХИСТ ВІД СКРІНУ (BLUR)
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                document.getElementById('main-body').style.filter = "brightness(0) blur(100px)";
            } else {
                document.getElementById('main-body').style.filter = "none";
            }
        });

        // MATRIX CANVAS
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const chars = "01ヨカイ";
        const drops = Array(Math.floor(canvas.width/15)).fill(1);
        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.1)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#ff0000"; ctx.font = "12px monospace";
            drops.forEach((y, i) => {
                const text = chars[Math.floor(Math.random()*chars.length)];
                ctx.fillText(text, i*15, y*15);
                if(y*15 > canvas.height && Math.random() > 0.98) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(drawMatrix, 60);
    </script>
</body>
</html>
