<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>YOKAI OS // RED_PROTOCOL_MAX</title>
    
    <!-- ПІДКЛЮЧЕННЯ ШРИФТІВ -->
    <link href="https://googleapis.com" rel="stylesheet">

    <style>
        :root { 
            --red: #ff0000; 
            --glitch-pink: #ff00c1;
            --glitch-cyan: #00fff0;
        }

        /* 1. БАЗОВИЙ ЗАХИСТ */
        * { 
            -webkit-user-select: none; 
            user-select: none; 
            -webkit-touch-callout: none; 
            box-sizing: border-box; 
            outline: none; 
        }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: #000; font-family: 'Montserrat', sans-serif;
            color: white; overflow: hidden;
        }

        /* 2. ЕФЕКТИ ЕКРАНА */
        #matrix-canvas { position: fixed; inset: 0; opacity: 0.25; z-index: 1; pointer-events: none; }
        
        body::before {
            content: ""; position: fixed; inset: 0;
            background: linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.2) 50%), 
                        linear-gradient(90deg, rgba(255,0,0,0.03), rgba(0,255,0,0.01), rgba(0,0,255,0.03));
            z-index: 999; background-size: 100% 3px, 3px 100%; pointer-events: none;
        }

        /* 3. ЛІТАЮЧИЙ ВОДЯНИЙ ЗНАК (ЗАХИСТ ВІД СКРІНІВ) */
        .watermark {
            position: absolute; font-size: 10px; color: var(--red); opacity: 0.08;
            white-space: nowrap; pointer-events: none; z-index: 5;
            text-transform: uppercase; letter-spacing: 2px;
            animation: float-watermark 15s infinite linear;
        }
        @keyframes float-watermark {
            0% { transform: translate(-100%, -100%) rotate(-45deg); }
            100% { transform: translate(100vw, 100vh) rotate(-45deg); }
        }

        /* 4. ШАР ЗАХИСТУ ПРИ ЗГОРТАННІ */
        #protection-layer {
            position: fixed; inset: 0; background: #000; z-index: 9999; display: none;
        }

        /* 5. TOP BAR (ЗВУК ТА МЕНЮ) */
        .top-bar {
            position: absolute; top: 30px; width: 100%;
            display: flex; justify-content: space-between;
            padding: 0 30px; z-index: 1002;
        }

        .sound-wrap { display: flex; align-items: center; cursor: pointer; min-width: 60px; height: 30px; }
        .sound-icon { font-size: 18px; color: var(--red); }
        .eq { display: none; align-items: flex-end; gap: 2px; height: 18px; }
        .eq-bar { width: 2px; background: var(--red); height: 4px; animation: eq-play 0.6s infinite alternate; }
        .eq-active .eq { display: flex; }
        .eq-active .sound-icon { display: none; }
        @keyframes eq-play { from { height: 4px; } to { height: 18px; } }

        /* ХРЕСТИК (ВИПРАВЛЕНО) */
        .menu-trigger { width: 30px; height: 30px; position: relative; cursor: pointer; }
        .menu-trigger span {
            position: absolute; left: 0; width: 100%; height: 2px;
            background: var(--red); transition: all 0.3s ease-in-out; top: 14px;
        }
        .menu-trigger span:nth-child(1) { transform: translateY(-10px); }
        .menu-trigger span:nth-child(2) { opacity: 1; }
        .menu-trigger span:nth-child(3) { transform: translateY(10px); }

        .menu-trigger.open span:nth-child(1) { transform: translateY(0) rotate(45deg); }
        .menu-trigger.open span:nth-child(2) { opacity: 0; transform: translateX(-20px); }
        .menu-trigger.open span:nth-child(3) { transform: translateY(0) rotate(-45deg); }

        /* 6. LOGO SECTION */
      /* ПОТУЖНИЙ СМИКАНИЙ ГЛІТЧ */
.logo-main {
  font-weight: 900;
  font-size: 54px;
  letter-spacing: 14px;
  color: #fff;
  position: relative;
  display: inline-block;
  line-height: 1;
  text-shadow: 0.5px 0.5px 2px rgba(255,255,255,0.2); /* Легке світіння бази */
}

.logo-main::before, .logo-main::after {
  content: 'YYO';
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: transparent;
  opacity: 0; /* Ховаємо в спокої */
}

/* Перша лінія глитча - трохи швидша */
.logo-main::before {
  text-shadow: -2px 0 var(--red);
  animation: glitch-random-1 3.1s infinite; 
}

/* Друга лінія глитча - повільніша */
.logo-main::after {
  text-shadow: 2px 0 var(--glitch-cyan);
  animation: glitch-random-2 4.3s infinite;
}

@keyframes glitch-random-1 {
  0%, 15%, 100% { opacity: 0; clip-path: inset(100% 0 0 0); transform: translate(0); }
  1% { opacity: 1; clip-path: inset(10% 0 85% 0); transform: translate(-4px, -1px); }
  2% { clip-path: inset(60% 0 20% 0); transform: translate(4px, 1px); }
  3% { clip-path: inset(30% 0 30% 0); transform: translate(-2px, 0); }
  4% { opacity: 0; } /* Коротка вспишка і затухання */
}

@keyframes glitch-random-2 {
  0%, 20%, 100% { opacity: 0; clip-path: inset(100% 0 0 0); transform: translate(0); }
  1% { opacity: 0.8; clip-path: inset(80% 0 5% 0); transform: translate(3px, 2px); }
  2% { clip-path: inset(40% 0 45% 0); transform: translate(-3px, -2px); }
  4% { opacity: 0; }
}

.logo-sub {
  display: block;
  font-size: 20px;
  color: var(--red);
  letter-spacing: 18px;
  margin-top: 5px;
  font-weight: 900;
  /* Замість тряски — легке мерехтіння (як стара лампа) */
  animation: flicker 5s infinite;
}

@keyframes flicker {
  0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { opacity: 1; }
  20%, 24%, 55% { opacity: 0.6; }
}


        /* 7. ПРЕВ'Ю ТЕКСТУ (30px НИЖЧЕ) */
        #main-display {

            position: absolute; top: 430px; bottom: 120px;

        .scroll-area { height: 100%; overflow-y: auto; -webkit-overflow-scrolling: touch; }

        .font-node {
            display: flex; 
            justify-content: space-between; /* Максимальна відстань 80-100px */
            align-items: center; 
            padding: 10px 10px; /* Вузька строка */
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            transition: 0.3s;

        .font-node.active { color: var(--red); border-left: 2px solid var(--red); padding-left: 15px; background: rgba(255,0,0,0.05); }
        .f-preview { font-size: 20px; }

        /* 10. КНОПКА ЗАПИСУ */

            font-weight: 900; letter-spacing: 6px;
            text-transform: uppercase; font-size: 14px; z-index: 10;
            transition: 0.3s;

        .btn-init:active { background: var(--red); color: #000; box-shadow: 0 0 30px var(--red); }

        /* 11. НАВІГАЦІЯ */
        .nav-overlay {
            position: fixed; inset: 0; background: #000;

            justify-content: center; transform: translateX(100%);
            transition: 0.5s cubic-bezier(0.77, 0, 0.175, 1); z-index: 1001;

        .nav-overlay.active { transform: translateX(0); }
        .nav-link { font-size: 24px; font-weight: 900; color: white; text-decoration: none; margin: 18px 0; text-transform: uppercase; }

        /* 12. ПОВІДОМЛЕННЯ */
        #copy-notice {

            background: var(--red); color: black; padding: 10px 20px;
            font-weight: 900; font-size: 10px; z-index: 2000; display: none;
            box-shadow: 0 0 20px var(--red);
        }
    </style>

        // 4. СИНХРОНІЗАЦІЯ ТЕКСТУ
        function syncText() {
            const val = document.getElementById('user-input').value;
            document.getElementById('main-display').innerText = val || "MEMENTO MORI";
        }

        // 5. МУЗИКА ТА ЕКВАЛАЙЗЕР
        function toggleBgMusic() {
            const trigger = document.getElementById('sound-trigger');
            if(!musicPlaying){
                bgMusic.play(); trigger.classList.add('eq-active'); musicPlaying = true;
            } else {
                bgMusic.pause(); trigger.classList.remove('eq-active'); musicPlaying = false;
            }
            playClick();
        }

        // 6. МАТРИЦЯ
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const chars = "01ヨカイシステム";
        const drops = Array(Math.floor(canvas.width/15)).fill(1);
        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.1)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#ff0000"; ctx.font = "12px monospace";
            drops.forEach((y, i) => {
                const text = chars[Math.floor(Math.random()*chars.length)];
                ctx.fillText(text, i*15, y*15);
                if(y*14 > canvas.height && Math.random() > 0.98) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(drawMatrix, 60);

        // 7. ЗАХИСТ (BLACK SCREEN)
        document.addEventListener('visibilitychange', () => {
            const prot = document.getElementById('protection-layer');
            const body = document.getElementById('main-body');
            if (document.hidden) {
                prot.style.display = "block";
                body.style.opacity = "0";
            } else {
                setTimeout(() => {
                    prot.style.display = "none";
                    body.style.opacity = "1";
                }, 300);
            }
        });
        document.addEventListener('contextmenu', e => e.preventDefault());
