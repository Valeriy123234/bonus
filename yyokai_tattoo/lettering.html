<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YOKAI OS // RED_PROTOCOL</title>
    
    <link href="https://googleapis.com" rel="stylesheet">
    <link id="dynamic-fonts" rel="stylesheet">

    <style>
        :root {
            --neon: #ff0000;
            --glass: rgba(20, 0, 0, 0.6);
            --border: rgba(255, 0, 0, 0.4);
        }

        * { -webkit-user-select: none; user-select: none; -webkit-touch-callout: none; box-sizing: border-box; outline: none; }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: #000; font-family: 'Montserrat', sans-serif;
            color: white; overflow: hidden;
        }

        /* МАТРИЦЯ */
        #matrix-canvas { position: fixed; inset: 0; opacity: 0.12; z-index: 1; pointer-events: none; }

        .ui-wrapper {
            position: relative; z-index: 10; height: 100vh;
            display: flex; flex-direction: column; align-items: center;
            padding: 20px; justify-content: flex-start;
        }

        /* TOP BAR */
        .top-bar {
            position: absolute; top: 25px; width: 100%;
            display: flex; justify-content: space-between;
            padding: 0 25px; z-index: 1000;
        }
        .sound-toggle { width: 35px; height: 35px; display: flex; align-items: center; cursor: pointer; }
        .eq-container { display: flex; align-items: flex-end; justify-content: space-between; width: 20px; height: 14px; display: none; }
        .eq-bar { width: 2px; background: var(--neon); animation: eq-anim 0.5s infinite ease-in-out; }
        @keyframes eq-anim { 0%, 100% { height: 3px; } 50% { height: 14px; } }

        .menu-trigger { width: 30px; height: 30px; cursor: pointer; }
        .bar { width: 30px; height: 2px; background: var(--neon); margin: 6px 0; transition: 0.4s; }

        /* LOGO - ЧИСТИЙ ГЛІТЧ */
        .header { text-align: center; margin-top: 60px; margin-bottom: 20px; }
        .glitch {
            font-size: 48px; font-weight: 900; letter-spacing: 12px;
            text-transform: uppercase; position: relative; color: white;
        }
        .glitch::before, .glitch::after {
            content: attr(data-text); position: absolute; top: 0; left: 0; width: 100%; height: 100%;
        }
        .glitch::before { color: var(--neon); z-index: -1; animation: glitch-anim 0.3s infinite; }
        .glitch::after { color: #00f0ff; z-index: -2; animation: glitch-anim 0.3s infinite reverse; }
        @keyframes glitch-anim {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            100% { transform: translate(0); }
        }
        .sub-logo { display: block; font-size: 16px; letter-spacing: 14px; color: var(--neon); text-align: center; margin-top: 5px; font-weight: 900; }

        /* DISPLAY - БЕЗ СВІТІННЯ */
        #main-display {
            font-size: 34px; min-height: 80px; width: 100%;
            display: flex; align-items: center; justify-content: center;
            color: #fff; text-align: center; padding: 0 15px; margin-bottom: 15px;
            border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
        }

        /* CONTROLS */
        .controls-wrap { 
            width: 100%; max-width: 360px;
            display: flex; flex-direction: column; gap: 15px;
        }

        .input-box { width: 100%; }
        #user-input {
            width: 100%; background: #111; border: 1px solid var(--border);
            color: #fff; font-family: 'Montserrat'; font-size: 13px;
            text-align: center; padding: 12px; border-radius: 2px;
            letter-spacing: 2px; text-transform: uppercase;
        }

        /* СКРОЛ СПИСКУ (ВИПРАВЛЕНО) */
        .font-library {
            width: 100%; height: 180px; /* Обмежена висота щоб кнопка влізла */
            background: rgba(10, 10, 10, 0.8); border: 1px solid var(--border);
            overflow-y: auto; -webkit-overflow-scrolling: touch;
            pointer-events: all; /* Дозволяє свайп */
        }
        .font-library::-webkit-scrollbar { width: 2px; }
        .font-library::-webkit-scrollbar-thumb { background: var(--neon); }

        .font-item {
            padding: 14px; border-bottom: 1px solid rgba(255,0,0,0.1);
            cursor: pointer; display: flex; justify-content: space-between; align-items: center;
            pointer-events: all;
        }
        .font-item.active { background: var(--neon); color: black; }
        .font-item.active .font-meta { color: black; }

        .font-style-preview { font-size: 18px; }
        .font-meta { font-size: 8px; color: var(--neon); opacity: 0.7; }

        /* КНОПКА ЗАПИСУ */
        .book-btn {
            width: 100%; padding: 18px; background: var(--neon); 
            border: none; color: black;
            font-weight: 900; letter-spacing: 3px; text-transform: uppercase;
            cursor: pointer; font-size: 13px; transition: 0.2s;
        }
        .book-btn:active { transform: scale(0.98); opacity: 0.8; }

        /* NAV */
        .nav-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.98);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transform: translateY(-100%); transition: 0.5s cubic-bezier(0.77, 0, 0.175, 1);
            z-index: 900;
        }
        .nav-overlay.active { transform: translateY(0); }
        .nav-link { font-size: 20px; font-weight: 900; letter-spacing: 5px; color: white; text-decoration: none; margin: 15px 0; text-transform: uppercase; }
    </style>
</head>
<body id="main-body">

    <canvas id="matrix-canvas"></canvas>

    <div class="top-bar">
        <div class="sound-toggle" onclick="toggleBgMusic()">
            <span id="sound-icon" style="color: var(--neon); font-size: 18px;">🔈</span>
            <div id="eq" class="eq-container">
                <div class="eq-bar" style="animation-duration: 0.4s;"></div>
                <div class="eq-bar" style="animation-duration: 0.6s;"></div>
                <div class="eq-bar" style="animation-duration: 0.3s;"></div>
                <div class="eq-bar" style="animation-duration: 0.5s;"></div>
            </div>
        </div>
        <div class="menu-trigger" onclick="toggleMenu(this)">
            <div class="bar"></div><div class="bar"></div><div class="bar"></div>
        </div>
    </div>

    <div class="ui-wrapper">
        <div class="header">
            <div class="glitch" data-text="YYO">YYO</div>
            <div class="sub-logo">KAI</div>
        </div>

        <div id="main-display">MEMENTO MORI</div>

        <div class="controls-wrap">
            <div class="input-box">
                <input type="text" id="user-input" placeholder="ВПИШИ СВІЙ ТЕКСТ..." maxlength="22" oninput="syncText()">
            </div>

            <div class="font-library" id="font-list"></div>

            <button class="book-btn" onclick="window.location.href='https://t.me'">ЗАПИСАТИСЬ НА СЕАНС</button>
        </div>
    </div>

    <nav class="nav-overlay" id="nav">
        <a href="index.html" class="nav-link">SKETCH_VOID</a>
        <a href="#" class="nav-link">ARCHIVE</a>
        <a href="https://instagram.com" class="nav-link">INSTAGRAM</a>
        <a href="https://t.me" class="nav-link" style="color:var(--neon);">INIT_RESERVE</a>
    </nav>

    <audio id="bg-music" loop><source src="RED_AMBIENT.mp3" type="audio/mpeg"></audio>
    <audio id="ui-click"><source src="RED_CLICK.mp3" type="audio/mpeg"></audio>

    <script>
        const uiClick = document.getElementById('ui-click');
        const bgMusic = document.getElementById('bg-music');
        let musicPlaying = false;

        function playClick() { uiClick.currentTime = 0; uiClick.play().catch(()=>{}); }

        const tattooFonts = [
            {id: 'UnifrakturMaguntia', type: 'Gothic'}, {id: 'Great Vibes', type: 'Script'},
            {id: 'Cinzel', type: 'Roman'}, {id: 'Noto Sans JP', type: 'Asian'},
            {id: 'MedievalSharp', type: 'Dark'}, {id: 'Charm', type: 'Calligraphy'},
            {id: 'Pirata One', type: 'Vintage'}, {id: 'Metal Mania', type: 'Metal'},
            {id: 'Montserrat', type: 'Minimal'}
        ];

        const listContainer = document.getElementById('font-list');
        tattooFonts.forEach(font => {
            const item = document.createElement('div');
            item.className = 'font-item';
            item.innerHTML = `<span style="font-family:'${font.id}'; font-size: 18px;">Style</span>
                              <span class="font-meta">${font.id}</span>`;
            item.onclick = (e) => {
                e.stopPropagation();
                playClick();
                document.getElementById('dynamic-fonts').href = `https://googleapis.com{font.id.replace(/ /g, '+')}&display=swap`;
                document.getElementById('main-display').style.fontFamily = font.id;
                document.querySelectorAll('.font-item').forEach(i => i.classList.remove('active'));
                item.classList.add('active');
            };
            listContainer.appendChild(item);
        });

        function syncText() { document.getElementById('main-display').innerText = document.getElementById('user-input').value || "MEMENTO MORI"; }

        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const chars = "ヨカイ0123456789";
        const drops = Array(Math.floor(canvas.width/14)).fill(1);
        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#ff0000"; ctx.font = "14px monospace";
            drops.forEach((y, i) => {
                const text = chars[Math.floor(Math.random()*chars.length)];
                ctx.fillText(text, i*14, y*14);
                if(y*14 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(drawMatrix, 50);

        function toggleMenu(x) { playClick(); x.classList.toggle("open"); document.getElementById('nav').classList.toggle('active'); }
        function toggleBgMusic() {
            const icon = document.getElementById('sound-icon');
            const eq = document.getElementById('eq');
            if(!musicPlaying){ bgMusic.play(); icon.style.display="none"; eq.style.display="flex"; musicPlaying=true; }
            else { bgMusic.pause(); icon.style.display="block"; eq.style.display="none"; musicPlaying=false; }
            playClick();
        }
    </script>
</body>
</html>
