<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>YOKAI OS // RED_PROTOCOL_MAX</title>
    
    <!-- ДИНАМІЧНІ ШРИФТИ -->
    <link id="dynamic-fonts" rel="stylesheet">

    <style>
        :root { 
            --red: #ff0000; 
            --glitch-pink: #ff00c1;
            --glitch-cyan: #00fff0;
        }

        * { 
            -webkit-user-select: none; 
            user-select: none; 
            box-sizing: border-box; 
            outline: none; 
        }

        body, html {
            margin: 0; padding: 0; height: 100%; width: 100%;
            background: #000; font-family: 'Montserrat', sans-serif;
            color: white; overflow: hidden;
        }

        #matrix-canvas { position: fixed; inset: 0; opacity: 0.25; z-index: 1; pointer-events: none; }
        
        body::before {
            content: ""; position: fixed; inset: 0;
            background: linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.2) 50%), 
                        linear-gradient(90deg, rgba(255,0,0,0.03), rgba(0,255,0,0.01), rgba(0,0,255,0.03));
            z-index: 999; background-size: 100% 3px, 3px 100%; pointer-events: none;
        }

        .header { position: absolute; top: 85px; width: 100%; text-align: center; z-index: 10; }

        .logo-main {
            font-weight: 900; font-size: 54px; letter-spacing: 14px;
            color: #fff; position: relative; display: inline-block;
            line-height: 1; text-shadow: 0.5px 0.5px 2px rgba(255,255,255,0.2);
            padding-left: 14px; /* Корекція центрування */
        }

        .logo-main::before, .logo-main::after {
            content: 'YYO'; position: absolute; top: 0; left: 14px;
            width: 100%; height: 100%; background: transparent; opacity: 0;
        }

        .logo-main::before { text-shadow: -2px 0 var(--red); animation: glitch-1 3.1s infinite; }
        .logo-main::after { text-shadow: 2px 0 var(--glitch-cyan); animation: glitch-2 4.3s infinite; }

        @keyframes glitch-1 {
            0%, 15%, 100% { opacity: 0; clip-path: inset(100% 0 0 0); transform: translate(0); }
            1% { opacity: 1; clip-path: inset(10% 0 85% 0); transform: translate(-4px, -1px); }
            2% { clip-path: inset(60% 0 20% 0); transform: translate(4px, 1px); }
            4% { opacity: 0; }
        }

        @keyframes glitch-2 {
            0%, 20%, 100% { opacity: 0; clip-path: inset(100% 0 0 0); transform: translate(0); }
            1% { opacity: 0.8; clip-path: inset(80% 0 5% 0); transform: translate(3px, 2px); }
            2% { clip-path: inset(40% 0 45% 0); transform: translate(-3px, -2px); }
            4% { opacity: 0; }
        }

        .logo-sub {
            display: block; font-size: 20px; color: var(--red);
            letter-spacing: 18px; padding-left: 18px; margin-top: 5px;
            font-weight: 900; animation: flicker 5s infinite;
        }

        @keyframes flicker {
            0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { opacity: 1; }
            20%, 24%, 55% { opacity: 0.6; }
        }

        #main-display {
            position: absolute; top: 240px; width: 100%;
            font-size: 34px; text-align: center; font-weight: 900;
            z-index: 10; padding: 0 25px; word-break: break-all;
        }

        .input-wrap { position: absolute; top: 350px; width: 100%; padding: 0 45px; z-index: 10; }
        #user-input {
            width: 100%; background: rgba(255,0,0,0.03); border: none;
            border-bottom: 1px solid rgba(255,0,0,0.4); color: #fff;
            padding: 12px; font-size: 15px; letter-spacing: 3px;
            text-transform: uppercase; text-align: center;
        }

        .font-selector-wrap {
            position: absolute; top: 430px; bottom: 120px;
            width: 100%; overflow: hidden; padding: 0 30px; z-index: 10;
        }
        .scroll-area { height: 100%; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .font-node {
            display: flex; justify-content: space-between; align-items: center; 
            padding: 12px 10px; border-bottom: 1px solid rgba(255, 255, 255, 0.05); transition: 0.3s;
        }
        .font-node.active { color: var(--red); background: rgba(255,0,0,0.05); border-left: 2px solid var(--red); }
        .f-preview { font-size: 18px; }
        .f-name { font-size: 9px; opacity: 0.5; letter-spacing: 1px; }

        .btn-init {
            position: absolute; bottom: 35px; left: 50%; transform: translateX(-50%);
            width: calc(100% - 60px); padding: 20px; background: none;
            border: 1px solid var(--red); color: var(--red); font-weight: 900;
            letter-spacing: 4px; text-transform: uppercase; z-index: 10;
        }

        /* Тимчасовий фікс для меню та іншого */
        .top-bar { position: absolute; top: 30px; width: 100%; display: flex; justify-content: space-between; padding: 0 30px; z-index: 1002; }
        #protection-layer { position: fixed; inset: 0; background: #000; z-index: 9999; display: none; }
    </style>
</head>
<body id="main-body">

    <div id="protection-layer"></div>
    <canvas id="matrix-canvas"></canvas>
    <div id="copy-notice" style="display:none; position:fixed; top:20px; left:50%; transform:translateX(-50%); background:var(--red); color:#000; padding:10px; z-index:10000;">DATA COPIED</div>

    <div class="top-bar">
        <div id="sound-trigger" onclick="toggleBgMusic()" style="cursor:pointer; color:var(--red);">SOUND: OFF</div>
        <div id="burger" onclick="toggleMenu()" style="cursor:pointer; color:var(--red);">MENU</div>
    </div>

    <div class="header">
        <div class="logo-main">YYO</div>
        <div class="logo-sub">KAI</div>
    </div>

    <div id="main-display" onclick="copyText()">MEMENTO MORI</div>

    <div class="input-wrap">
        <input type="text" id="user-input" placeholder="Впиши текст..." oninput="syncText()" maxlength="20">
    </div>

    <div class="font-selector-wrap">
        <div class="scroll-area" id="font-list"></div>
    </div>

    <button class="btn-init" onclick="window.open('https://t.me', '_blank')">Записатись</button>

    <audio id="bg-music" loop><source src="RED_AMBIENT.mp3" type="audio/mpeg"></audio>

    <script>
        const tattooFonts = [
            {id: 'UnifrakturMaguntia', tag: 'GOTHIC'}, {id: 'MedievalSharp', tag: 'GOTHIC'},
            {id: 'Ponomar', tag: 'GOTHIC'}, {id: 'Monomakh', tag: 'GOTHIC'},
            {id: 'Ballet', tag: 'SCRIPT'}, {id: 'Great Vibes', tag: 'SCRIPT'},
            {id: 'Pinyon Script', tag: 'SCRIPT'}, {id: 'Monsieur La Doulaise', tag: 'SCRIPT'},
            {id: 'Whisper', tag: 'SCRIPT'}, {id: 'Creepster', tag: 'HORROR'},
            {id: 'Rampart One', tag: 'DISPLAY'}, {id: 'Bangers', tag: 'COMIC'},
            {id: 'Press Start 2P', tag: 'PIXEL'}, {id: 'Silkscreen', tag: 'PIXEL'}
            // ... можна додати решту з твого списку
        ];

        // 1. ЗАВАНТАЖЕННЯ ПРЕВ'Ю ДЛЯ ВСІХ ШРИФТІВ
        const allNames = tattooFonts.map(f => f.id.replace(/ /g, '+')).join('|');
        const link = document.createElement('link');
        link.rel = 'stylesheet';
        link.href = `https://fonts.googleapis.com/css?family=${allNames}&display=swap`;
        document.head.appendChild(link);

        // 2. ГЕНЕРАЦІЯ СПИСКУ
        const listContainer = document.getElementById('font-list');
        tattooFonts.forEach(font => {
            const node = document.createElement('div');
            node.className = 'font-node';
            node.innerHTML = `
                <span class="f-preview" style="font-family:'${font.id}'">Style</span>
                <span class="f-name">${font.tag}</span>
            `;
            node.onclick = () => {
                const fontUrl = `https://fonts.googleapis.com/css2?family=${font.id.replace(/ /g, '+')}&display=swap`;
                document.getElementById('dynamic-fonts').href = fontUrl;
                document.getElementById('main-display').style.fontFamily = `'${font.id}', sans-serif`;
                document.querySelectorAll('.font-node').forEach(n => n.classList.remove('active'));
                node.classList.add('active');
            };
            listContainer.appendChild(node);
        });

        function syncText() {
            document.getElementById('main-display').innerText = document.getElementById('user-input').value || "MEMENTO MORI";
        }

        function copyText() {
            navigator.clipboard.writeText(document.getElementById('main-display').innerText);
            const n = document.getElementById('copy-notice');
            n.style.display = 'block'; setTimeout(() => n.style.display='none', 1000);
        }

        // МАТРИЦЯ (Спрощено)
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const drops = Array(Math.floor(canvas.width/20)).fill(1);
        function draw() {
            ctx.fillStyle = "rgba(0,0,0,0.1)"; ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = "#f00";
            drops.forEach((y, i) => {
                ctx.fillText("01", i*20, y*20);
                if(y*20 > canvas.height && Math.random() > 0.95) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(draw, 50);
        
        let musicPlaying = false;
        function toggleBgMusic() {
            const m = document.getElementById('bg-music');
            const t = document.getElementById('sound-trigger');
            if(!musicPlaying) { m.play(); t.innerText = "SOUND: ON"; }
            else { m.pause(); t.innerText = "SOUND: OFF"; }
            musicPlaying = !musicPlaying;
        }
        function toggleMenu() { alert("Меню в розробці"); }
    </script>
</body>
</html>
