<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>YOKAI OS // RED_PROTOCOL</title>
    <link id="dynamic-fonts" rel="stylesheet">
    <style>
        :root { --red: #ff0000; --glitch-cyan: #00fff0; }
        * { -webkit-user-select: none; user-select: none; box-sizing: border-box; outline: none; }
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; font-family: 'Montserrat', sans-serif; color: white; overflow: hidden; }

        #matrix-canvas { position: fixed; inset: 0; opacity: 0.25; z-index: 1; pointer-events: none; }

        /* HEADER & LOGO */
        .header { position: absolute; top: 85px; width: 100%; text-align: center; z-index: 10; }
        .logo-main {
            font-weight: 900; font-size: 54px; letter-spacing: 14px; color: #fff;
            position: relative; display: inline-block; line-height: 1; padding-left: 14px;
        }
        .logo-main::before, .logo-main::after { content: 'YYO'; position: absolute; top: 0; left: 14px; width: 100%; height: 100%; opacity: 0; }
        .logo-main::before { text-shadow: -3px 0 var(--red); animation: glitch-1 3s infinite; }
        .logo-main::after { text-shadow: 3px 0 var(--glitch-cyan); animation: glitch-2 4s infinite; }

        @keyframes glitch-1 { 0%, 18%, 100% { opacity:0; } 1% { opacity:1; clip-path:inset(10% 0 80% 0); transform:translate(-5px,-2px); } 5% { opacity:0; } }
        @keyframes glitch-2 { 0%, 25%, 100% { opacity:0; } 1% { opacity:1; clip-path:inset(70% 0 5% 0); transform:translate(4px,1px); } 5% { opacity:0; } }

        /* TOP BAR: SOUND & BURGER */
        .top-bar { position: fixed; top: 35px; width: 100%; padding: 0 30px; display: flex; justify-content: space-between; align-items: center; z-index: 3000; }
        
        .sound-container { display: flex; align-items: center; gap: 8px; cursor: pointer; height: 24px; }
        .eq { display: flex; align-items: flex-end; gap: 2px; height: 15px; width: 22px; }
        .eq-bar { width: 2px; background: var(--red); height: 2px; }
        .playing .eq-bar { animation: eq-anim 0.5s infinite alternate ease-in-out; }
        @keyframes eq-anim { from { height: 2px; } to { height: 15px; } }

        .menu-trigger { width: 30px; height: 20px; display: flex; flex-direction: column; justify-content: space-between; cursor: pointer; }
        .menu-trigger span { display: block; width: 100%; height: 2px; background: var(--red); transition: 0.4s; }
        .menu-trigger.open span:nth-child(1) { transform: translateY(9px) rotate(45deg); }
        .menu-trigger.open span:nth-child(2) { opacity: 0; }
        .menu-trigger.open span:nth-child(3) { transform: translateY(-9px) rotate(-45deg); }

        /* MAIN ELEMENTS */
        #main-display {
            position: absolute; top: 220px; width: 100%; font-size: 32px; text-align: center; 
            font-weight: 900; z-index: 10; padding: 0 30px; cursor: pointer; transition: 0.2s;
        }
        #main-display:active { transform: scale(0.95); opacity: 0.7; }

        .input-wrap { position: absolute; top: 340px; width: 100%; padding: 0 45px; z-index: 10; }
        #user-input { 
            width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--red); 
            color: #fff; padding: 10px; text-align: center; font-size: 16px;
            /* Прибираємо примусовий Caps Lock */
        }

        .font-selector-wrap { position: absolute; top: 400px; bottom: 100px; width: 100%; padding: 0 30px; z-index: 10; }
        .scroll-area { height: 100%; overflow-y: auto; }
        .font-node { display: flex; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.1); cursor: pointer; }
        .font-node.active { color: var(--red); }

        .btn-action {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: calc(100% - 60px); padding: 18px; background: transparent;
            border: 1px solid var(--red); color: var(--red); font-weight: 900; 
            text-transform: uppercase; letter-spacing: 4px; z-index: 10; cursor: pointer;
        }

        .nav-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.98);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transform: translateX(100%); transition: 0.5s; z-index: 2500;
        }
        .nav-overlay.active { transform: translateX(0); }
        .nav-link { font-size: 22px; color: #fff; text-decoration: none; margin: 15px; font-weight: 900; text-transform: uppercase; }

        #copy-toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--red); color: #000; padding: 8px 20px; font-weight: 900; display: none; z-index: 4000; }
    </style>
</head>
<body>

<canvas id="matrix-canvas"></canvas>
<div id="copy-toast">EXTRACTED</div>

<div class="top-bar">
    <div class="sound-container" id="sound-btn" onclick="toggleMusic()">
        <div class="eq">
            <div class="eq-bar" style="animation-duration: 0.4s"></div>
            <div class="eq-bar" style="animation-duration: 0.6s"></div>
            <div class="eq-bar" style="animation-duration: 0.3s"></div>
            <div class="eq-bar" style="animation-duration: 0.7s"></div>
            <div class="eq-bar" style="animation-duration: 0.5s"></div>
            <div class="eq-bar" style="animation-duration: 0.8s"></div>
        </div>
        <span style="font-size: 10px; font-weight: 900; color: var(--red)">AUDIO</span>
    </div>
    <div class="menu-trigger" id="burger" onclick="toggleMenu()">
        <span></span><span></span><span></span>
    </div>
</div>

<nav class="nav-overlay" id="nav">
    <a href="#" class="nav-link">Власні ескізи</a>
    <a href="#" class="nav-link">Портфоліо</a>
    <a href="#" class="nav-link" style="color:var(--red)">Записатись</a>
    <a href="#" class="nav-link">Консультація</a>
</nav>

<div class="header">
    <div class="logo-main">YYO</div>
</div>

<div id="main-display" onclick="copyText()">MEMENTO MORI</div>

<div class="input-wrap">
    <input type="text" id="user-input" placeholder="Введіть текст..." oninput="syncText()">
</div>

<div class="font-selector-wrap">
    <div class="scroll-area" id="font-list"></div>
</div>

<button class="btn-action" onclick="window.location.href='https://t.me'">Записатись</button>

<audio id="bg-music" loop><source src="RED_AMBIENT.mp3" type="audio/mpeg"></audio>

<script>
    // Назви шрифтів
    const fonts = [
        {id: 'UnifrakturMaguntia', tag: 'GOTHIC'},
        {id: 'Pinyon Script', tag: 'SCRIPT'},
        {id: 'Creepster', tag: 'HORROR'},
        {id: 'Rampart One', tag: 'DISPLAY'},
        {id: 'Bangers', tag: 'COMIC'}
    ];

    const list = document.getElementById('font-list');
    fonts.forEach(f => {
        const node = document.createElement('div');
        node.className = 'font-node';
        node.innerHTML = `<span style="font-family:'${f.id}'">Style</span><span>${f.tag}</span>`;
        node.onclick = () => {
            document.getElementById('main-display').style.fontFamily = f.id;
            document.querySelectorAll('.font-node').forEach(n => n.classList.remove('active'));
            node.classList.add('active');
            const l = document.createElement('link');
            l.rel = 'stylesheet';
            l.href = `https://googleapis.com{f.id.replace(/ /g, '+')}&display=swap`;
            document.head.appendChild(l);
        };
        list.appendChild(node);
    });

    function syncText() {
        const val = document.getElementById('user-input').value;
        document.getElementById('main-display').innerText = val || "MEMENTO MORI";
    }

    function toggleMenu() {
        document.getElementById('burger').classList.toggle('open');
        document.getElementById('nav').classList.toggle('active');
    }

    function toggleMusic() {
        const m = document.getElementById('bg-music');
        const b = document.getElementById('sound-btn');
        if(m.paused) { m.play(); b.classList.add('playing'); }
        else { m.pause(); b.classList.remove('playing'); }
    }

    function copyText() {
        const t = document.getElementById('main-display').innerText;
        navigator.clipboard.writeText(t);
        const toast = document.getElementById('copy-toast');
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 1000);
    }

    // Матриця
    const canvas = document.getElementById('matrix-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    const drops = Array(Math.floor(canvas.width/20)).fill(1);
    function draw() {
        ctx.fillStyle = "rgba(0, 0, 0, 0.14)"; 
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#f00";
        ctx.font = "12px monospace";
        drops.forEach((y, i) => {
            ctx.fillText("01", i*20, y*20);
            if(y*20 > canvas.height && Math.random() > 0.975) drops[i] = 0;
            drops[i]++;
        });
    }
    setInterval(draw, 50);
</script>

</body>
</html>
