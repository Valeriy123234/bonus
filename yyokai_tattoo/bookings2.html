<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YYOKAI | Tattoo CRM</title>

<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--accent:#e5092f;--text:#f6f1ef;--line:rgba(255,255,255,.15);--custom-bg:none}
html,body{min-height:100%;background:#000;color:var(--text);font-family:Arial,sans-serif}
body{overflow-x:hidden;background:linear-gradient(rgba(0,0,0,.70),rgba(0,0,0,.94)),var(--custom-bg),radial-gradient(circle at 50% -10%,color-mix(in srgb,var(--accent) 42%,transparent),transparent 35%),linear-gradient(180deg,#050505 0%,#100206 45%,#000 100%);background-size:cover;background-position:center;background-attachment:fixed}
body.has-custom-bg{background:linear-gradient(rgba(0,0,0,.72),rgba(0,0,0,.94)),var(--custom-bg) center/cover fixed no-repeat,#000}
body::before{content:"妖 鬼 狐 墨 夜 予約";position:fixed;inset:0;z-index:0;pointer-events:none;color:rgba(255,255,255,.022);font-size:78px;letter-spacing:30px;line-height:1.5;transform:rotate(-12deg) scale(1.15)}
.loader-screen{position:fixed;inset:0;z-index:999999;display:flex;align-items:center;justify-content:center;background:#000;color:#fff;font-size:34px;font-weight:950;letter-spacing:.12em;transition:.45s ease}
.loader-screen.hide{opacity:0;visibility:hidden;pointer-events:none}
button,input,textarea,select{font-family:inherit}
button{cursor:pointer;transition:.15s}
button:active{transform:scale(.96);opacity:.88}
.app{position:relative;z-index:2;min-height:100vh;padding:18px 18px 44px}

.topbar{position:sticky;top:12px;z-index:90;height:76px;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:14px;padding:10px 14px;border-radius:30px;background:rgba(0,0,0,.78);border:1px solid var(--line);backdrop-filter:blur(28px);box-shadow:0 24px 80px rgba(0,0,0,.78)}
.lang{justify-self:start;display:flex;gap:5px;padding:5px;border-radius:999px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1)}
.lang button{border:0;background:transparent;color:#888;padding:8px 12px;border-radius:999px;font-weight:950}
.lang button.active{background:#fff;color:#000}
.logo{grid-column:2;position:relative;font-size:27px;font-weight:950;letter-spacing:.08em;color:#fff;text-shadow:0 0 24px color-mix(in srgb,var(--accent) 50%,transparent)}
.logo::before,.logo::after{content:"YYOKAI";position:absolute;inset:0;opacity:.34;pointer-events:none}
.logo::before{color:var(--accent);animation:glitchA 2.8s infinite}
.logo::after{color:#fff;animation:glitchB 3.3s infinite reverse}
@keyframes glitchA{0%,92%,100%{clip-path:inset(0 0 0 0);transform:translate(0,0)}93%{clip-path:inset(12% 0 64% 0);transform:translate(-2px,1px)}95%{clip-path:inset(60% 0 18% 0);transform:translate(2px,-1px)}97%{clip-path:inset(30% 0 38% 0);transform:translate(-1px,0)}}
@keyframes glitchB{0%,94%,100%{clip-path:inset(0 0 0 0);transform:translate(0,0)}95%{clip-path:inset(44% 0 30% 0);transform:translate(1px,0)}97%{clip-path:inset(15% 0 58% 0);transform:translate(-1px,0)}}

.profile{justify-self:end;position:relative;z-index:120}
.avatar{width:54px;height:54px;border-radius:50%;overflow:hidden;display:grid;place-items:center;font-size:26px;font-weight:950;color:var(--accent);background:linear-gradient(135deg,#130005,#050505);border:1px solid rgba(255,255,255,.18);box-shadow:0 0 30px color-mix(in srgb,var(--accent) 45%,transparent);text-shadow:0 0 18px var(--accent)}
.avatar img{width:100%;height:100%;object-fit:cover}
.profile-menu{position:fixed;top:110px;left:50%;transform:translateX(-50%);width:min(360px,calc(100vw - 30px));display:none;padding:18px;border-radius:28px;background:rgba(0,0,0,.9);border:1px solid rgba(255,255,255,.14);backdrop-filter:blur(30px);box-shadow:0 35px 100px rgba(0,0,0,.88)}
.profile-menu.open{display:block}
.profile-name{font-size:22px;font-weight:950}
.profile-email{margin-top:4px;color:#aaa;font-size:13px}
.balance{margin-top:12px;color:#aaa}.balance strong{color:#fff;font-size:20px}
.menu-line{width:100%;margin-top:8px;padding:14px;border:0;border-radius:16px;background:rgba(255,255,255,.06);color:#ddd;text-align:left;font-weight:900}

.hero{margin-top:20px;padding:30px;border-radius:38px;background:radial-gradient(circle at 80% 0%,color-mix(in srgb,var(--accent) 44%,transparent),transparent 36%),linear-gradient(180deg,rgba(255,255,255,.13),rgba(255,255,255,.04));border:1px solid rgba(255,255,255,.2);backdrop-filter:blur(20px);box-shadow:0 0 55px color-mix(in srgb,var(--accent) 12%,transparent)}
.hero h1{font-size:clamp(42px,9vw,82px);line-height:.95;letter-spacing:-.05em}
.hero p{margin-top:18px;max-width:760px;color:#d8d0cd;line-height:1.6;font-size:19px}

.crm-grid{margin-top:18px;display:grid;grid-template-columns:.9fr 1.1fr;gap:14px}
.card{padding:20px;border-radius:34px;background:radial-gradient(circle at 85% 0%,color-mix(in srgb,var(--accent) 25%,transparent),transparent 34%),linear-gradient(180deg,rgba(255,255,255,.12),rgba(255,255,255,.035));border:1px solid rgba(255,255,255,.18);backdrop-filter:blur(22px);box-shadow:0 0 42px color-mix(in srgb,var(--accent) 10%,transparent)}
.card h2{font-size:24px;margin-bottom:14px}

.calendar-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:16px}
.month-title{font-size:22px;font-weight:950;text-transform:capitalize}
.nav-btn{width:44px;height:44px;border-radius:16px;border:1px solid rgba(255,255,255,.13);background:rgba(255,255,255,.07);color:#fff;font-size:22px}
.week,.days{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.week span{text-align:center;color:#888;font-size:12px;font-weight:950;margin-bottom:8px}
.day{position:relative;aspect-ratio:1/1;border:1px solid rgba(255,255,255,.09);border-radius:18px;background:rgba(255,255,255,.045);color:#fff;font-weight:950;display:grid;place-items:center}
.day.muted{opacity:.25}
.day.today{border-color:color-mix(in srgb,var(--accent) 70%,transparent)}
.day.active{background:color-mix(in srgb,var(--accent) 42%,rgba(255,255,255,.05));box-shadow:0 0 25px color-mix(in srgb,var(--accent) 35%,transparent)}
.day .count{position:absolute;right:5px;top:5px;min-width:17px;height:17px;padding:0 5px;border-radius:999px;display:grid;place-items:center;background:rgba(0,0,0,.68);border:1px solid rgba(255,255,255,.12);font-size:10px}
.day .dot{position:absolute;bottom:7px;width:6px;height:6px;border-radius:50%;background:var(--accent);box-shadow:0 0 12px var(--accent)}

.day-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px}
.day-title{font-size:22px;font-weight:950}
.add-btn{border:0;border-radius:999px;padding:14px 16px;background:#fff;color:#050505;font-weight:950}
.timeline{display:flex;flex-direction:column;gap:10px;max-height:500px;overflow:auto;padding-right:4px}
.slot{width:100%;text-align:left;padding:14px;border-radius:22px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.055);color:#fff}
.slot-top{display:flex;justify-content:space-between;gap:12px;align-items:center}
.slot-time{font-size:20px;font-weight:950}
.slot-status{font-size:11px;font-weight:950;padding:6px 9px;border-radius:999px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1)}
.slot-name{margin-top:8px;font-weight:950;font-size:17px}
.slot-idea{margin-top:4px;color:#aaa;font-size:13px;line-height:1.4}
.empty{padding:24px;border-radius:22px;background:rgba(255,255,255,.045);border:1px dashed rgba(255,255,255,.13);color:#999;text-align:center}

.modal-wrap{position:fixed;inset:0;z-index:250;display:none;place-items:center;padding:18px;background:rgba(0,0,0,.82);backdrop-filter:blur(16px)}
.modal-wrap.open{display:grid}
.modal{width:100%;max-width:760px;max-height:90vh;overflow:auto;padding:24px;border-radius:34px;background:#050505;border:1px solid rgba(255,255,255,.14);box-shadow:0 30px 110px rgba(0,0,0,.9)}
.modal-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px}
.modal-head h2{font-size:26px}
.close{width:42px;height:42px;border-radius:14px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.06);color:#fff;font-size:22px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.field.full{grid-column:1/-1}
label{display:block;color:#aaa;font-size:12px;font-weight:950;margin-bottom:7px}
input,textarea,select{width:100%;border-radius:16px;padding:14px;border:1px solid rgba(255,255,255,.12);background:rgba(0,0,0,.42);color:#fff;outline:none;font-size:15px}
textarea{min-height:100px;resize:vertical}
input:focus,textarea:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 3px color-mix(in srgb,var(--accent) 15%,transparent)}
.modal-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}
.delete-btn,.confirm-btn{border:0;border-radius:999px;padding:16px;font-weight:950}
.delete-btn{background:rgba(255,255,255,.07);color:#ff8a9a;border:1px solid rgba(255,255,255,.12)}
.confirm-btn{background:#fff;color:#050505}
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);z-index:300;width:min(430px,calc(100vw - 30px));padding:16px 18px;border-radius:22px;background:rgba(0,0,0,.94);border:1px solid color-mix(in srgb,var(--accent) 45%,transparent);color:#fff;opacity:0;pointer-events:none;transition:.22s}
.toast.open{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:820px){
  .crm-grid{grid-template-columns:1fr}
  .hero{padding:28px 22px}
  .hero p{font-size:17px}
  .form-grid{grid-template-columns:1fr}
}
</style>
</head>

<body>
<div class="loader-screen" id="loaderScreen">YYOKAI</div>

<main class="app">
<header class="topbar">
  <div class="lang">
    <button class="active" onclick="setLang('uk',this)">UA</button>
    <button onclick="setLang('en',this)">EN</button>
  </div>

  <div class="logo">YYOKAI</div>

  <div class="profile">
    <div class="avatar" id="avatar" onclick="toggleProfile()">妖</div>

    <div class="profile-menu" id="profileMenu">
      <div class="profile-name" id="artistName">Guest Artist</div>
      <div class="profile-email" id="artistEmail">artist@email.com</div>
      <div class="balance"><span data-i18n="balance">Баланс</span>: <strong id="balanceValue">$0.00</strong></div>
      <button class="menu-line" onclick="goDashboard()">← <span data-i18n="back">На головну</span></button>
    </div>
  </div>
</header>

<section class="hero">
  <h1 data-i18n="title">Tattoo CRM</h1>
  <p data-i18n="lead">Календар, записи, клієнти, передоплати, контакти та нотатки майстра в одному просторі.</p>
</section>

<section class="crm-grid">
  <div class="card">
    <div class="calendar-head">
      <button class="nav-btn" onclick="prevMonth()">‹</button>
      <div class="month-title" id="monthTitle">Month</div>
      <button class="nav-btn" onclick="nextMonth()">›</button>
    </div>

    <div class="week">
      <span data-i18n="w1">Пн</span><span data-i18n="w2">Вт</span><span data-i18n="w3">Ср</span>
      <span data-i18n="w4">Чт</span><span data-i18n="w5">Пт</span><span data-i18n="w6">Сб</span><span data-i18n="w7">Нд</span>
    </div>

    <div class="days" id="days"></div>
  </div>

  <div class="card">
    <div class="day-head">
      <div>
        <div class="day-title" id="selectedDateTitle">—</div>
        <div style="color:#aaa;font-size:13px;margin-top:5px" id="dayCount">0 bookings</div>
      </div>
      <button class="add-btn" onclick="openCreateModal()" data-i18n="addBooking">+ Запис</button>
    </div>

    <div class="timeline" id="timeline"></div>
  </div>
</section>
</main>

<section class="modal-wrap" id="bookingModal">
  <div class="modal">
    <div class="modal-head">
      <h2 id="modalTitle" data-i18n="modalTitle">Новий запис</h2>
      <button class="close" onclick="closeBookingModal()">×</button>
    </div>

    <div class="form-grid">
      <div class="field">
        <label data-i18n="clientName">Імʼя клієнта</label>
        <input id="clientName" placeholder="Alex">
      </div>

      <div class="field">
        <label data-i18n="time">Час</label>
        <input id="clientTime" type="time">
      </div>

      <div class="field">
        <label>Phone</label>
        <input id="clientPhone" placeholder="+380...">
      </div>

      <div class="field">
        <label>Telegram</label>
        <input id="clientTelegram" placeholder="@username">
      </div>

      <div class="field">
        <label>Instagram</label>
        <input id="clientInstagram" placeholder="@instagram">
      </div>

      <div class="field">
        <label data-i18n="placement">Місце на тілі</label>
        <input id="clientPlacement" placeholder="Arm / neck / back">
      </div>

      <div class="field">
        <label data-i18n="size">Розмір</label>
        <input id="clientSize" placeholder="10x15 cm">
      </div>

      <div class="field">
        <label data-i18n="duration">Тривалість</label>
        <input id="clientDuration" placeholder="2 hours">
      </div>

      <div class="field">
        <label data-i18n="price">Ціна</label>
        <input id="clientPrice" placeholder="$ / ₴">
      </div>

      <div class="field">
        <label data-i18n="deposit">Передоплата</label>
        <input id="clientDeposit" placeholder="$ / ₴">
      </div>

      <div class="field">
        <label data-i18n="status">Статус</label>
        <select id="clientStatus">
          <option value="waiting">Waiting deposit</option>
          <option value="confirmed">Confirmed</option>
          <option value="in_progress">In progress</option>
          <option value="done">Done</option>
          <option value="cancelled">Cancelled</option>
        </select>
      </div>

      <div class="field full">
        <label data-i18n="idea">Ідея тату</label>
        <textarea id="clientIdea" placeholder="Tattoo idea, style, mood, references..."></textarea>
      </div>

      <div class="field full">
        <label data-i18n="notes">Нотатки до запису</label>
        <textarea id="clientNotes" placeholder="Important notes, skin, allergies, client details..."></textarea>
      </div>
    </div>

    <div class="modal-actions">
      <button class="delete-btn" id="deleteBtn" onclick="deleteBooking()" data-i18n="delete">Видалити</button>
      <button class="confirm-btn" onclick="confirmBooking()" data-i18n="confirm">Підтвердити запис</button>
    </div>
  </div>
</section>

<div class="toast" id="toast"></div>

<script>
const BASE_PATH="/yyokai/yyokai_tattoo/";

const firebaseConfig={
  apiKey:"AIzaSyALs-ZgFX7auGxRQ2EeQnVngjnejimPLV4",
  authDomain:"yyokai-tattoo-system.firebaseapp.com",
  databaseURL:"https://yyokai-tattoo-system-default-rtdb.europe-west1.firebasedatabase.app/",
  projectId:"yyokai-tattoo-system",
  storageBucket:"yyokai-tattoo-system.firebasestorage.app",
  messagingSenderId:"995298614954",
  appId:"1:995298614954:web:e4039c69fcb0541a95fad3"
};

firebase.initializeApp(firebaseConfig);

const auth=firebase.auth();
const db=firebase.database();

let currentUser=null;
let currentLang="uk";
let currentMonth=new Date();
let selectedDate=formatDate(new Date());
let bookings={};
let editingId=null;

const t={
  uk:{
    balance:"Баланс",
    back:"На головну",
    title:"Tattoo CRM",
    lead:"Календар, записи, клієнти, передоплати, контакти та нотатки майстра в одному просторі.",
    w1:"Пн",w2:"Вт",w3:"Ср",w4:"Чт",w5:"Пт",w6:"Сб",w7:"Нд",
    addBooking:"+ Запис",
    bookings:"записів",
    noBookings:"На цю дату ще немає записів.",
    modalTitle:"Новий запис",
    editTitle:"Картка запису",
    clientName:"Імʼя клієнта",
    time:"Час",
    placement:"Місце на тілі",
    size:"Розмір",
    duration:"Тривалість",
    price:"Ціна",
    deposit:"Передоплата",
    status:"Статус",
    idea:"Ідея тату",
    notes:"Нотатки до запису",
    delete:"Видалити",
    confirm:"Підтвердити запис",
    saved:"Запис збережено.",
    deleted:"Запис видалено.",
    nameRequired:"Вкажи імʼя клієнта.",
    timeRequired:"Вкажи час запису."
  },
  en:{
    balance:"Balance",
    back:"Dashboard",
    title:"Tattoo CRM",
    lead:"Calendar, bookings, clients, deposits, contacts and artist notes in one workspace.",
    w1:"Mon",w2:"Tue",w3:"Wed",w4:"Thu",w5:"Fri",w6:"Sat",w7:"Sun",
    addBooking:"+ Booking",
    bookings:"bookings",
    noBookings:"No bookings for this date yet.",
    modalTitle:"New booking",
    editTitle:"Booking card",
    clientName:"Client name",
    time:"Time",
    placement:"Body placement",
    size:"Size",
    duration:"Duration",
    price:"Price",
    deposit:"Deposit",
    status:"Status",
    idea:"Tattoo idea",
    notes:"Booking notes",
    delete:"Delete",
    confirm:"Confirm booking",
    saved:"Booking saved.",
    deleted:"Booking deleted.",
    nameRequired:"Enter client name.",
    timeRequired:"Choose booking time."
  }
};

function hideLoader(){
  const loader=document.getElementById("loaderScreen");

  if(loader){
    loader.classList.add("hide");
    setTimeout(()=>loader.remove(),520);
  }
}

auth.onAuthStateChanged(async user=>{
  if(!user){
    location.href=BASE_PATH+"artist-auth.html";
    return;
  }

  currentUser=user;

  loadLocalCacheFast();

  try{
    await loadProfile();
    listenBookings();
  }catch(e){
    console.log("bookings load error:",e);
  }

  hideLoader();
});

setTimeout(hideLoader,2200);

function loadLocalCacheFast(){
  const cached=JSON.parse(localStorage.getItem("yyokai_profile_"+currentUser.uid)||"{}");

  if(cached.name){
    artistName.textContent=cached.name;
  }

  if(cached.accent){
    applyAccent(cached.accent);
  }

  if(cached.avatarUrl){
    avatar.innerHTML=`<img src="${cached.avatarUrl}">`;
  }

  if(cached.backgroundUrl){
    applyBackgroundImage(cached.backgroundUrl);
  }

  artistEmail.textContent=currentUser.email||"";
}

async function loadProfile(){
  const cached=JSON.parse(localStorage.getItem("yyokai_profile_"+currentUser.uid)||"{}");
  const snap=await db.ref("users/"+currentUser.uid).once("value");
  const data=snap.val()||{};

  const email=currentUser.email||data.email||"";
  const name=data.name||cached.name||currentUser.displayName||"Guest Artist";

  artistName.textContent=name;
  artistEmail.textContent=email;

  if(data.settings&&data.settings.accent){
    applyAccent(data.settings.accent);
  }

  db.ref("users/"+currentUser.uid+"/balance").on("value",snap=>{
    balanceValue.textContent="$"+Number(snap.val()||0).toFixed(2);
  });
}

function listenBookings(){
  db.ref("users/"+currentUser.uid+"/bookings").on("value",snap=>{
    bookings=snap.val()||{};
    renderCalendar();
    renderTimeline();
  });
}

function formatDate(date){
  const y=date.getFullYear();
  const m=String(date.getMonth()+1).padStart(2,"0");
  const d=String(date.getDate()).padStart(2,"0");
  return `${y}-${m}-${d}`;
}

function parseDate(str){
  const [y,m,d]=str.split("-").map(Number);
  return new Date(y,m-1,d);
}

function monthName(date){
  return date.toLocaleDateString(currentLang==="uk"?"uk-UA":"en-US",{
    month:"long",
    year:"numeric"
  });
}

function renderCalendar(){
  days.innerHTML="";
  monthTitle.textContent=monthName(currentMonth);

  const year=currentMonth.getFullYear();
  const month=currentMonth.getMonth();

  const first=new Date(year,month,1);
  let startDay=first.getDay();
  if(startDay===0)startDay=7;

  const start=new Date(year,month,1-(startDay-1));
  const today=formatDate(new Date());

  for(let i=0;i<42;i++){
    const date=new Date(start);
    date.setDate(start.getDate()+i);

    const key=formatDate(date);
    const count=Object.values(bookings).filter(b=>b.date===key).length;

    const btn=document.createElement("button");
    btn.className="day";

    if(date.getMonth()!==month)btn.classList.add("muted");
    if(key===today)btn.classList.add("today");
    if(key===selectedDate)btn.classList.add("active");

    btn.innerHTML=`
      <span>${date.getDate()}</span>
      ${count?`<span class="count">${count}</span><span class="dot"></span>`:""}
    `;

    btn.onclick=()=>{
      selectedDate=key;
      renderCalendar();
      renderTimeline();
    };

    days.appendChild(btn);
  }
}

function renderTimeline(){
  const date=parseDate(selectedDate);

  selectedDateTitle.textContent=date.toLocaleDateString(currentLang==="uk"?"uk-UA":"en-US",{
    day:"numeric",
    month:"long",
    year:"numeric"
  });

  const list=Object.entries(bookings)
    .map(([id,b])=>({id,...b}))
    .filter(b=>b.date===selectedDate)
    .sort((a,b)=>(a.time||"").localeCompare(b.time||""));

  dayCount.textContent=list.length+" "+t[currentLang].bookings;
  timeline.innerHTML="";

  if(!list.length){
    timeline.innerHTML=`<div class="empty">${t[currentLang].noBookings}</div>`;
    return;
  }

  list.forEach(item=>{
    const btn=document.createElement("button");
    btn.className="slot";

    const statusLabel=(item.status||"confirmed").replace("_"," ");

    btn.innerHTML=`
      <div class="slot-top">
        <div class="slot-time">${item.time||"—"}</div>
        <div class="slot-status">${statusLabel}</div>
      </div>
      <div class="slot-name">${escapeHtml(item.name||"Client")}</div>
      <div class="slot-idea">${escapeHtml(item.idea||item.placement||"—")}</div>
    `;

    btn.onclick=()=>openEditModal(item.id);

    timeline.appendChild(btn);
  });
}

function openCreateModal(){
  editingId=null;
  modalTitle.textContent=t[currentLang].modalTitle;
  deleteBtn.style.display="none";

  clientName.value="";
  clientTime.value="12:00";
  clientPhone.value="";
  clientTelegram.value="";
  clientInstagram.value="";
  clientPlacement.value="";
  clientSize.value="";
  clientDuration.value="";
  clientPrice.value="";
  clientDeposit.value="";
  clientStatus.value="waiting";
  clientIdea.value="";
  clientNotes.value="";

  bookingModal.classList.add("open");
}

function openEditModal(id){
  const b=bookings[id];
  if(!b)return;

  editingId=id;
  modalTitle.textContent=t[currentLang].editTitle;
  deleteBtn.style.display="block";

  clientName.value=b.name||"";
  clientTime.value=b.time||"12:00";
  clientPhone.value=b.phone||"";
  clientTelegram.value=b.telegram||"";
  clientInstagram.value=b.instagram||"";
  clientPlacement.value=b.placement||"";
  clientSize.value=b.size||"";
  clientDuration.value=b.duration||"";
  clientPrice.value=b.price||"";
  clientDeposit.value=b.deposit||"";
  clientStatus.value=b.status||"waiting";
  clientIdea.value=b.idea||"";
  clientNotes.value=b.notes||"";

  bookingModal.classList.add("open");
}

function closeBookingModal(){
  bookingModal.classList.remove("open");
}

async function confirmBooking(){
  const name=clientName.value.trim();
  const time=clientTime.value;

  if(!name){
    showToast(t[currentLang].nameRequired);
    return;
  }

  if(!time){
    showToast(t[currentLang].timeRequired);
    return;
  }

  const data={
    date:selectedDate,
    name,
    time,
    phone:clientPhone.value.trim(),
    telegram:clientTelegram.value.trim(),
    instagram:clientInstagram.value.trim(),
    placement:clientPlacement.value.trim(),
    size:clientSize.value.trim(),
    duration:clientDuration.value.trim(),
    price:clientPrice.value.trim(),
    deposit:clientDeposit.value.trim(),
    status:clientStatus.value,
    idea:clientIdea.value.trim(),
    notes:clientNotes.value.trim(),
    updatedAt:Date.now()
  };

  if(editingId){
    await db.ref("users/"+currentUser.uid+"/bookings/"+editingId).update(data);
  }else{
    data.createdAt=Date.now();
    await db.ref("users/"+currentUser.uid+"/bookings").push(data);
  }

  closeBookingModal();
  showToast(t[currentLang].saved);
}

async function deleteBooking(){
  if(!editingId)return;

  await db.ref("users/"+currentUser.uid+"/bookings/"+editingId).remove();

  editingId=null;
  closeBookingModal();
  showToast(t[currentLang].deleted);
}

function prevMonth(){
  currentMonth.setMonth(currentMonth.getMonth()-1);
  currentMonth=new Date(currentMonth);
  renderCalendar();
}

function nextMonth(){
  currentMonth.setMonth(currentMonth.getMonth()+1);
  currentMonth=new Date(currentMonth);
  renderCalendar();
}

function setLang(lang,btn){
  currentLang=lang;
  document.documentElement.lang=lang;

  Object.keys(t[lang]).forEach(key=>{
    document.querySelectorAll(`[data-i18n="${key}"]`).forEach(el=>{
      el.textContent=t[lang][key];
    });
  });

  document.querySelectorAll(".lang button").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");

  renderCalendar();
  renderTimeline();
}

function toggleProfile(){
  profileMenu.classList.toggle("open");
}

document.addEventListener("click",e=>{
  const profile=document.querySelector(".profile");

  if(profile&&!profile.contains(e.target)){
    profileMenu.classList.remove("open");
  }
});

function applyAccent(color){
  document.documentElement.style.setProperty("--accent",color);
}

function applyBackgroundImage(url){
  document.documentElement.style.setProperty("--custom-bg",`url('${url}')`);
  document.body.classList.add("has-custom-bg");
}

function goDashboard(){
  window.location.replace(BASE_PATH+"artist-dashboard.html");
}

function showToast(message){
  toast.textContent=message;
  toast.classList.add("open");

  setTimeout(()=>{
    toast.classList.remove("open");
  },3600);
}

function escapeHtml(str){
  return String(str).replace(/[&<>"']/g,m=>({
    "&":"&amp;",
    "<":"&lt;",
    ">":"&gt;",
    '"':"&quot;",
    "'":"&#039;"
  }[m]));
}
</script>
</body>
</html>
