<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YYO KAI - HD Stencil Maker</title>
    <link rel="preconnect" href="googleapis.com">
    <link rel="preconnect" href="gstatic.com" crossorigin>
    <link href="googleapis.com" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: 'Share Tech Mono', monospace;
            background-color: #060606;
            color: #a3a3a3;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 16px;
            position: relative;
        }

        #matrix {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
            opacity: 0.17;
        }

        header {
            position: relative; z-index: 999;
            display: flex; justify-content: space-between; align-items: center;
            width: 100%; height: 54px;
        }

        #audio-toggle {
            background: none; border: none; color: #a3a3a3; cursor: pointer;
            width: 44px; height: 44px; display: flex; align-items: center; justify-content: center;
        }
        #icon-eq {
            display: none; align-items: flex-end; justify-content: space-between;
            width: 26px; height: 22px;
        }
        .eq-bar {
            width: 3px; background-color: #dc2626;
            animation: bounce 0.5s ease-in-out infinite;
        }
        @keyframes bounce {
            0%, 100% { height: 4px; }
            50% { height: 22px; }
        }
        .eq-bar:nth-child(1) { animation-delay: 0.1s; }
        .eq-bar:nth-child(2) { animation-delay: 0.3s; }
        .eq-bar:nth-child(3) { animation-delay: 0.5s; }
        .eq-bar:nth-child(4) { animation-delay: 0.2s; }
        .eq-bar:nth-child(5) { animation-delay: 0.4s; }
        .eq-bar:nth-child(6) { animation-delay: 0.6s; }

        .glitch-wrapper { text-align: center; user-select: none; }
        .glitch, .glitch-kai { position: relative; animation: glitch-skew 1s infinite linear alternate-reverse; }
        .glitch { color: #fff; font-size: 26px; font-weight: 900; letter-spacing: 4px; line-height: 1; }
        .glitch-kai { font-size: 11px; letter-spacing: 6px; color: #dc2626; display: block; margin-top: 3px; font-weight: bold; }
        .glitch::before, .glitch::after, .glitch-kai::before, .glitch-kai::after {
            content: attr(data-text); position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #060606;
        }
        .glitch::before { left: 1px; text-shadow: -1px 0 #ff00c8; clip: rect(10px, 450px, 30px, 0); animation: glitch-anim 3s infinite linear alternate-reverse; }
        .glitch::after { left: -1px; text-shadow: -1px 0 #00ffff, 0 1px #ff00c8; clip: rect(40px, 450px, 70px, 0); animation: glitch-anim2 3s infinite linear alternate-reverse; }
        .glitch-kai::before { left: 1px; text-shadow: -1px 0 #00ffff; clip: rect(2px, 450px, 8px, 0); animation: glitch-anim 2s infinite linear alternate-reverse; }
        .glitch-kai::after { left: -1px; text-shadow: 1px 0 #ff00c8; clip: rect(5px, 450px, 12px, 0); animation: glitch-anim2 2s infinite linear alternate-reverse; }

        @keyframes glitch-skew { 0% { transform: skew(-2deg); } 100% { transform: skew(2deg); } }

        #menu-toggle {
            background: none; border: none; width: 44px; height: 44px;
            display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 6px; cursor: pointer;
            position: relative; z-index: 9999;
        }
        .burger-line { width: 26px; height: 2.5px; background-color: #a3a3a3; transition: all 0.3s ease; }

        #full-menu {
            position: fixed; inset: 0; background-color: rgba(6, 6, 6, 0.99);
            z-index: 900; display: none; flex-direction: column; justify-content: center;
            align-items: center; gap: 24px; font-size: 20px; letter-spacing: 4px; backdrop-filter: blur(10px);
        }
        #full-menu a { color: #a3a3a3; text-decoration: none; transition: color 0.3s; }
        #full-menu a:hover { color: #dc2626; }
        #full-menu .active-link { color: #dc2626; border-bottom: 1px solid #dc2626; padding-bottom: 4px; }

        main {
            position: relative; z-index: 20; flex-grow: 1; display: flex;
            align-items: center; justify-content: center; width: 100%; max-width: 400px;
            margin: 12px auto; overflow: hidden;
        }
        .app-container {
            width: 100%; height: 100%; max-height: 76vh;
            background-color: rgba(10, 10, 10, 0.95); border: 1px solid #1a1a1a;
            padding: 16px; display: flex; flex-direction: column; justify-content: space-between; gap: 12px; overflow-y: auto;
        }
        .app-container::-webkit-scrollbar { display: none; }

        .tool-title { font-size: 13px; color: #dc2626; font-weight: bold; letter-spacing: 2px; border-bottom: 1px solid #1a1a1a; padding-bottom: 6px; }

        .upload-box { border: 1px dashed #262626; background-color: #030303; padding: 18px; text-align: center; position: relative; cursor: pointer; }
        .upload-box input { position: absolute; inset: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; z-index: 5; }
        .upload-box span { font-size: 11px; color: #525252; letter-spacing: 1px; text-transform: uppercase; }

        .controls-wrapper { display: flex; flex-direction: column; gap: 10px; }
        .control-group { display: flex; flex-direction: column; gap: 4px; }
        .control-group label { display: flex; justify-content: space-between; font-size: 10px; color: #525252; text-transform: uppercase; letter-spacing: 1px; }
        .control-group label span { color: #dc2626; font-weight: bold; }
        
        .range-slider {
            -webkit-appearance: none; width: 100%; height: 4px; background: #1a1a1a; outline: none; border: none;
        }
        .range-slider::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none; width: 12px; height: 12px; background: #dc2626; cursor: pointer;
        }

        /* Прев'ю бокс тепер відображає згладжений результат */
        .preview-box {
            border: 1px solid #1a1a1a; background-color: #ffffff;
            padding: 6px; height: 210px; display: flex; align-items: center; justify-content: center; position: relative;
            overflow: hidden;
        }
        .preview-label { position: absolute; top: 4px; right: 8px; font-size: 8px; color: #a3a3a3; text-transform: uppercase; mix-blend-mode: difference; }
        #canvas-preview { max-width: 100%; max-height: 100%; object-fit: contain; display: none; image-rendering: -webkit-optimize-contrast; }
        .preview-placeholder { font-size: 10px; color: #404040; text-transform: uppercase; text-align: center; }

        .buttons-grid { display: grid; grid-template-columns: 1fr; gap: 8px; }
        .btn-action {
            width: 100%; color: #fff; font-weight: bold; padding: 12px; border: none; 
            font-size: 11px; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; text-align: center; font-family: inherit;
        }
        #btn-save-stencil { background-color: #991b1b; }
        #btn-save-stencil:active { background-color: #dc2626; }
        #btn-book-session { background-color: #111111; border: 1px solid #222; color: #a3a3a3; }
        #btn-book-session:active { background-color: #dc2626; color: #fff; border-color: #dc2626; }

        footer {
            position: relative; z-index: 20; height: 24px; display: flex; justify-content: space-between; align-items: center;
            font-size: 8px; color: #404040; letter-spacing: 2px; border-top: 1px solid #0f0f0f; padding-top: 4px; text-transform: uppercase;
        }
    </style>
</head>
<body>

    <canvas id="matrix"></canvas>

    <header>
        <button id="audio-toggle" aria-label="Toggle Audio">
            <svg id="icon-sound" width="26" height="26" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"></path>
            </svg>
            <div id="icon-eq">
                <div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div>
                <div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div>
            </div>
        </button>

        <div class="glitch-wrapper">
            <div class="glitch" data-text="YYO">YYO</div>
            <span class="glitch-kai" data-text="KAI">KAI</span>
        </div>

        <button id="menu-toggle" aria-label="Toggle Menu">
            <span id="line1" class="burger-line"></span>
            <span id="line2" class="burger-line"></span>
            <span id="line3" class="burger-line"></span>
        </button>
    </header>

    <nav id="full-menu">
        <a href="#">ГОЛОВНА</a>
        <a href="#" id="menu-link-book">ЗАПИСАТИСЬ</a>
        <a href="#" class="active-link">STENCIL CONVERTER</a>
    </nav>

    <main>
        <div class="app-container">
            <div class="tool-title">// HD STENCIL GENERATOR v3.0</div>

            <div class="upload-box">
                <input type="file" id="image-upload" accept="image/*">
                <span id="upload-status">Завантажити свій ескіз</span>
            </div>

            <!-- ТОЧНІ НАЛАШТУВАННЯ ВЕКТОРІВ -->
            <div class="controls-wrapper">
                <div class="control-group">
                    <label>Чутливість контурних ліній: <span id="val-edge">40</span></label>
                    <input type="range" id="slider-edge" min="15" max="95" value="40" class="range-slider">
                </div>
                <div class="control-group">
                    <label>Поріг виділення пунктиру тіней: <span id="val-shadow">110</span></label>
                    <input type="range" id="slider-shadow" min="50" max="180" value="110" class="range-slider">
                </div>
            </div>

            <div class="preview-box">
                <div class="preview-label">Професійний трансфер</div>
                <div id="placeholder-text" class="preview-placeholder">Очікування зображення майстра...</div>
                <canvas id="canvas-preview"></canvas>
            </div>

            <div class="buttons-grid">
                <button id="btn-save-stencil" class="btn-action">Зберегти чистий стемсіл (PNG)</button>
                <button id="btn-book-session" class="btn-action">Записатись на сеанс</button>
            </div>
        </div>
    </main>

    <footer>
        <div>© YYO KAI</div>
        <div>STAY DARK // TATTOO TOOL</div>
    </footer>

    <script>
        // --- 1. МАТРИЧНИЙ КОД 17% ---
        const canvasMatrix = document.getElementById('matrix');
        const ctxM = canvasMatrix.getContext('2d');
        function resizeCanvas() { canvasMatrix.width = window.innerWidth; canvasMatrix.height = window.innerHeight; }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        const katakana = "ｱｲｳｴｵｶｷｸｹｺｻｼｽｾｿﾀﾁﾂﾃﾄﾅﾆﾇﾈﾉﾜﾝ1234567890";
        const alphabet = katakana.split("");
        const fontSize = 12;
        let columns = canvasMatrix.width / fontSize;
        let rainDrops = Array(Math.floor(columns)).fill(1);

        function drawMatrix() {
            ctxM.fillStyle = 'rgba(6, 6, 6, 0.05)'; ctxM.fillRect(0, 0, canvasMatrix.width, canvasMatrix.height);
            ctxM.fillStyle = '#991b1b'; ctxM.font = fontSize + 'px monospace';
            for (let i = 0; i < rainDrops.length; i++) {
                const text = alphabet[Math.floor(Math.random() * alphabet.length)];
                ctxM.fillText(text, i * fontSize, rainDrops[i] * fontSize);
                if (rainDrops[i] * fontSize > canvasMatrix.height && Math.random() > 0.98) rainDrops[i] = 0;
                rainDrops[i]++;
            }
        }
        setInterval(drawMatrix, 35);

        // --- 2. ЕКВАЛАЙЗЕР ТА МЕНЮ ХРЕСТИК ---
        const audioBtn = document.getElementById('audio-toggle');
        const iconSound = document.getElementById('icon-sound');
        const iconEq = document.getElementById('icon-eq');
        let isPlaying = false;
        audioBtn.addEventListener('click', function() {
            isPlaying = !isPlaying;
            if (isPlaying) { iconSound.style.display = 'none'; iconEq.style.display = 'flex'; }
            else { iconSound.style.display = 'block'; iconEq.style.display = 'none'; }
        });

        const menuToggle = document.getElementById('menu-toggle');
        const fullMenu = document.getElementById('full-menu');
        const l1 = document.getElementById('line1'); const l2 = document.getElementById('line2'); const l3 = document.getElementById('line3');
        let menuOpen = false;

        function toggleMenu() {
            menuOpen = !menuOpen;
            if (menuOpen) {
                fullMenu.style.display = 'flex'; 
                l1.style.transform = 'rotate(45deg) translate(6px, 6px)'; l1.style.backgroundColor = '#dc2626';
                l2.style.opacity = '0'; 
                l3.style.transform = 'rotate(-45deg) translate(6px, -6px)'; l3.style.backgroundColor = '#dc2626';
            } else {
                fullMenu.style.display = 'none'; 
                l1.style.transform = 'none'; l1.style.backgroundColor = '#a3a3a3';
                l2.style.opacity = '1'; 
                l3.style.transform = 'none'; l3.style.backgroundColor = '#a3a3a3';
            }
        }
        menuToggle.addEventListener('click', toggleMenu);
        document.getElementById('btn-book-session').addEventListener('click', function() { if(!menuOpen) toggleMenu(); });

        // --- 3. НАДВИСОКОТОЧНИЙ АЛГОРИТМ ТРАСУВАННЯ ВЕКТОРІВ (УЛЬТРА-ЧІТКІСТЬ) ---
        const imageUpload = document.getElementById('image-upload');
        const uploadStatus = document.getElementById('upload-status');
        const placeholderText = document.getElementById('placeholder-text');
        const cPreview = document.getElementById('canvas-preview');
        const ctxP = cPreview.getContext('2d');
        
        const sliderEdge = document.getElementById('slider-edge');
        const sliderShadow = document.getElementById('slider-shadow');
        const valEdge = document.getElementById('val-edge');
        const valShadow = document.getElementById('val-shadow');
        const btnSaveStencil = document.getElementById('btn-save-stencil');

        let sourceImg = null;
        let hdCanvas = document.createElement('canvas'); // Приховане HD-полотно
        let hdCtx = hdCanvas.getContext('2d');

        imageUpload.addEventListener('change', function(e) {
            if (e.target.files && e.target.files.length > 0) {
                const file = e.target.files[0];
                uploadStatus.textContent = file.name.substring(0, 12) + '...';
                uploadStatus.style.color = '#dc2626';
                placeholderText.style.display = 'none';
                cPreview.style.display = 'block';
                
                const reader = new FileReader();
                reader.onload = function(event) {
                    sourceImg = new Image();
                    sourceImg.onload = function() {
                        // ХАРДКОРНИЙ АПСКЕЙЛІНГ: Фіксуємо надвисоку роздільну здатність для ідеальних ліній
                        const hdMaxDim = 2400; 
                        let wd = sourceImg.width; let hg = sourceImg.height;
                        if (wd > hdMaxDim || hg > hdMaxDim) {
                            if (wd > hg) { hg = (hdMaxDim / wd) * hg; wd = hdMaxDim; }
                            else { wd = (hdMaxDim / hg) * wd; hg = hdMaxDim; }
                        }
                        hdCanvas.width = wd; hdCanvas.height = hg;
                        
                        // Розмір прев'ю на екрані мобілки
                        cPreview.width = hdCanvas.width;
                        cPreview.height = hdCanvas.height;
                        
                        processStencil();
                    };
                    sourceImg.src = event.target.result;
                };
                reader.readAsDataURL(file);
            }
        });

        function processStencil() {
            if (!sourceImg) return;

            // Рендеримо оригінал на прихований HD-холст
            hdCtx.drawImage(sourceImg, 0, 0, hdCanvas.width, hdCanvas.height);
            const imgData = hdCtx.getImageData(0, 0, hdCanvas.width, hdCanvas.height);
            const data = imgData.data;
            const width = imgData.width; const height = imgData.height;

            // Створення супер-точного масиву чорно-білої карти яскравості
            const gray = new Uint8ClampedArray(width * height);
            for (let i = 0; i < data.length; i += 4) {
                // Математично точний коефіцієнт відтінків сірого під друк стемсілів
                gray[i / 4] = 0.2126 * data[i] + 0.7152 * data[i+1] + 0.0722 * data[i+2];
            }

            const edgeThresh = parseFloat(sliderEdge.value);
            const shadowLimit = parseFloat(sliderShadow.value);

            const outputImgData = hdCtx.createImageData(width, height);
            const outData = outputImgData.data;

            // Заливка HD-листа білим кольором за замовчуванням
            for(let i=0; i<outData.length; i+=4) {
                outData[i]=255; outData[i+1]=255; outData[i+2]=255; outData[i+3]=255;
            }

            // МАТРИЧНИЙ ВЕКТОРНИЙ СУБПІКСЕЛЬНИЙ АНАЛІЗ (Видалення "сходинок" пікселів)
            for (let y = 1; y < height - 1; y++) {
                for (let x = 1; x < width - 1; x++) {
                    const idx = y * width + x;
                    const outIdx = idx * 4;

                    const currentBright = gray[idx];
                    
                    // Яскравість сусідніх точок для вектора напрямку лінії
                    const right = gray[idx + 1];
                    const bottom = gray[idx + width];
                    const topLeft = gray[(y-1)*width + (x-1)];
                    const bottomRight = gray[(y+1)*width + (x+1)];

                    // Алгоритм тривимірного зсуву меж (Трасування контурів)
                    const diffH = Math.abs(currentBright - right);
                    const diffV = Math.abs(currentBright - bottom);
                    const diffD = Math.abs(topLeft - bottomRight);

                    let drawRed = false;

                    // 1. УЛЬТРА-ЧІТКІ ГОЛОВНІ ЛІНІЇ (Векторне згладжування Multi-Pass)
                    if (diffH > edgeThresh || diffV > edgeThresh || diffD > (edgeThresh * 1.2)) {
                        drawRed = true;
                    } 
                    // 2. ОРГАНІЧНИЙ ТОНКИЙ ПУНКТИР ТІНЕЙ (- - - -) ЯК У PROCREATE
                    else if (currentBright < shadowLimit) {
                        const isBoundaryX = (currentBright <= shadowLimit && right > shadowLimit);
                        const isBoundaryY = (currentBright <= shadowLimit && bottom > shadowLimit);

                        if (isBoundaryX || isBoundaryY) {
                            // Математичний синусоїдний крок: малює чіткі переривчасті штрихи без піксельного розмиття
                            // За рахунок великої щільності HD-полотна, лінії виглядають як тонка заправка рапідографа
                            if (Math.floor((x + y) / 8) % 2 === 0) {
                                drawRed = true;
                            }
                        }
                    }

                    if (drawRed) {
                        // Насичений червоний пігмент (Stencil Ultra-Red)
                        outData[outIdx] = 220; outData[outIdx+1] = 38; outData[outIdx+2] = 38;
                    }
                }
            }

            // Записуємо HD-дані назад у приховане полотно
            hdCtx.putImageData(outputImgData, 0, 0);

            // Виводимо згладжений результат на екранне прев'ю
            ctxP.clearRect(0, 0, cPreview.width, cPreview.height);
            ctxP.drawImage(hdCanvas, 0, 0);
        }

        sliderEdge.addEventListener('input', function() { valEdge.textContent = sliderEdge.value; processStencil(); });
        sliderShadow.addEventListener('input', function() { valShadow.textContent = sliderShadow.value; processStencil(); });

        // ФУНКЦІЯ ВИВЕДЕННЯ ОРИГІНАЛЬНОГО НАДЧІТКОГО UHD PNG ЗБЕРЕЖЕННЯ
        btnSaveStencil.addEventListener('click', function(e) {
            e.preventDefault();
            if (!sourceImg) { alert('Будь ласка, завантажте ескіз татуювання!'); return; }
            
            // Беремо зображення не з дрібного екранного прев'ю, а з нашого HD-холста
            const dataUrl = hdCanvas.toDataURL('image/png');
            const link = document.createElement('a');
            link.href = dataUrl;
            link.download = 'yyokai-ultra-hd-stencil.png';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        });
    </script>
</body>
</html>
