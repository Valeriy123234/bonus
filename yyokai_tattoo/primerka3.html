<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yokai Tattoo System - Gamified</title>
    <style>
        @import url('https://googleapis.com');

        html { scroll-behavior: smooth; height: 100%; }
        body { 
            background: #000; margin: 0; display: flex; flex-direction: column;
            align-items: center; justify-content: space-between; min-height: 100vh; 
            perspective: 2000px; font-family: 'Montserrat', sans-serif; color: white;
            overflow-x: hidden; padding: 30px 0; box-sizing: border-box;
        }

        .status-badge {
            padding: 8px 28px; font-size: 11px; font-weight: 700; letter-spacing: 5px;
            border-radius: 4px; transition: 0.4s;
            text-shadow: 0 0 10px currentColor; z-index: 20; text-transform: uppercase;
        }
        .status-free { background: rgba(0, 255, 100, 0.05); color: #00ff64; border: 1px solid rgba(0, 255, 100, 0.3); }
        .status-sold { background: rgba(255, 0, 0, 0.05); color: #ff0000; border: 1px solid rgba(255, 0, 0, 0.3); }

        /* РАМКА З ПІДСИЛЕНОЮ АМПЛІТУДОЮ */
        .artifact-container { 
            position: relative; width: 320px; height: 460px; margin: 20px 0;
            transform-style: preserve-3d; display: flex; align-items: center; justify-content: center;
        }

        .artifact { 
            width: 100%; height: 100%; position: relative; transform-style: preserve-3d; 
            animation: artifact_float 12s infinite ease-in-out; 
        }

        @keyframes artifact_float {
            0%, 100% { transform: rotateY(-8deg) rotateX(3deg); } /* Амплітуда + */
            50% { transform: rotateY(8deg) rotateX(-3deg); }
        }

        .layer { 
            position: absolute; inset: 0; background-size: contain; 
            background-repeat: no-repeat; background-position: center; 
            transition: opacity 0.4s ease; backface-visibility: hidden; 
        }

        #main-glow { 
            position: absolute; bottom: 15%; left: 50%; width: 280px; height: 60px; 
            filter: blur(60px); z-index: -2; transform: translateX(-50%) translateZ(-50px);
        }

        /* МЕНЮ ТА КНОПКИ */
     .selector-menu { 
    display: grid; 
    grid-template-columns: repeat(2, 1fr); 
    gap: 16px; 
    width: 90%; 
    max-width: 380px; 
    z-index: 20; 
    /* Зміщуємо вгору: зменшуємо верхній відступ або ставимо від'ємний */
    margin: 5px 0 20px 0; 
    transform: translateY(-10px); /* Пряме зміщення вгору на 10 пікселів */
}

.zone-btn { 
    background: rgba(255, 255, 255, 0.03); 
    border: 1px solid rgba(255, 255, 255, 0.1); 
    color: #666; 
    padding: 18px 5px; 
    font-size: 10px; 
    font-weight: 700;
    letter-spacing: 1px; 
    text-transform: uppercase; 
    cursor: pointer; 
    transition: 0.3s;
    font-family: 'Montserrat', sans-serif; 
    outline: none;
    border-radius: 4px;
}

.zone-btn.active { 
    background: rgba(255, 255, 255, 0.1); 
    border-color: #00ff64; 
    color: #00ff64;
    box-shadow: 0 0 15px rgba(0, 255, 100, 0.15);
}

.book-btn { 
    width: 90%; 
    max-width: 380px; 
    padding: 22px; 
    font-size: 15px; 
    font-weight: 900; 
    letter-spacing: 3px; 
    text-transform: uppercase;
    cursor: pointer; 
    border: none; 
    border-radius: 8px;
    font-family: 'Montserrat', sans-serif; 
    z-index: 20; 
    /* Підтягуємо головну кнопку теж трохи вище */
    margin-top: 5px; 
    transform: translateY(-10px);
}



        .admin-trigger { width: 100%; padding: 25px 0; opacity: 0.01; cursor: pointer; }

        body.is-sold .layer { filter: grayscale(1) brightness(0.2); }
    </style>
</head>
<body id="main-body">

    <!-- ФОНОВА МУЗИКА -->
    <audio id="bg-music" loop>
        <source src="мелодия.mp3" type="audio/mpeg">
    </audio>

    <div id="badge" class="status-badge status-free">ВІЛЬНИЙ ЕСКІЗ</div>

    <div class="artifact-container">
        <div id="main-glow" style="background: radial-gradient(circle, #00ff64, transparent 70%);"></div>
        <div class="artifact">
            <div class="layer" style="background-image: url('01.webp');"></div> 
            <div class="layer" id="target-sketch" style="transform: translateZ(20px); background-image: url('02.webp');"></div>
            <div class="layer" style="transform: translateZ(40px); background-image: url('01.webp');"></div>
        </div>
    </div>

    <div class="selector-menu">
        <button class="zone-btn active" onclick="updateImg('02.webp', this)">ЕСКІЗ</button>
        <button class="zone-btn" onclick="updateImg('03.webp', this)">ПЕРЕДПЛІЧЧЯ</button>
        <button class="zone-btn" onclick="updateImg('04.webp', this)">ГОМІЛКА</button>
        <button class="zone-btn" onclick="updateImg('05.webp', this)">БІЦЕПС</button>
        
    </div>

    <button id="main-book-btn" class="book-btn" 
            style="background: #00ff64; color: black; box-shadow: 0 10px 40px rgba(0,255,100,0.4);" 
            onclick="handleBookClick()">ВЖЕ ЗАРЕЗЕРВОВАНИЙ</button>

    <div class="admin-trigger" onclick="adminLogin()">.</div>

     <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
     <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <script>
        // ІНІЦІАЛІЗАЦІЯ ЗВУКІВ
        const uiClick = new Audio('Клик.mp3'); // ПІДСТАВ СВОЄ ПОСИЛАННЯ ТУТ
        uiClick.volume = 0.5;

        function playClick() {
            uiClick.currentTime = 0;
            uiClick.play().catch(() => {});
        }

        function startMusic() {
            document.getElementById('bg-music').play().catch(() => {});
            document.removeEventListener('touchstart', startMusic);
            document.removeEventListener('click', startMusic);
        }
        document.addEventListener('touchstart', startMusic);
        document.addEventListener('click', startMusic);

        // FIREBASE
        const firebaseConfig = { databaseURL: "https://yyokai-tattoo-system-default-rtdb.europe-west1.firebasedatabase.app/" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const sketchID = "kumiho_01";

        database.ref('sketches/' + sketchID).on('value', (snapshot) => {
            setSold(snapshot.val() === 'sold');
        });

        function adminLogin() {
            playClick(); // Звук при натисканні на адмін-точку
            const pass = prompt("Yokai Admin:");
            if (pass === "yokai123234") {
                const current = document.getElementById('main-body').classList.contains('is-sold');
                database.ref('sketches/' + sketchID).set(current ? 'free' : 'sold');
            }
        }

        function handleBookClick() {
            playClick(); // Звук при бронюванні
            setTimeout(() => {
                window.location.href='booking.html';
            }, 200); // Невелика затримка, щоб звук встиг початися
        }

        function setSold(sold) {
            const b = document.getElementById('main-body'), badge = document.getElementById('badge'), btn = document.getElementById('main-book-btn'), glow = document.getElementById('main-glow');
            if (sold) {
                b.classList.add('is-sold'); badge.innerText = "RESERVED"; badge.className = "status-badge status-sold";
                glow.style.background = "radial-gradient(circle, #ff0000, transparent 70%)";
                btn.innerText = "ЗАБРОНЬОВАНО КЛІЄНТОМ"; btn.style.background = "#111"; btn.style.color = "#444"; btn.disabled = true;
            } else {
                b.classList.remove('is-sold'); badge.innerText = "AVAILABLE"; badge.className = "status-badge status-free";
                glow.style.background = "radial-gradient(circle, #00ff64, transparent 70%)";
                btn.innerText = "ЗАБРОНЮВАТИ ЗАРАЗ"; btn.style.background = "#00ff64"; btn.style.color = "black"; btn.disabled = false;
            }
        }

        function updateImg(img, btn) {
            playClick(); // Звук при перемиканні ескізу
            const sketch = document.getElementById('target-sketch');
            sketch.style.opacity = '0';
            setTimeout(() => {
                sketch.style.backgroundImage = `url('${img}')`;
                sketch.style.opacity = '1';
            }, 150);
            document.querySelectorAll('.zone-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
    </script>
</body>
</html>
