<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yokai Tattoo System</title>
    <style>
        @import url('https://googleapis.com');

        html { scroll-behavior: smooth; height: 100%; }
        body { 
            background: #000; margin: 0; display: flex; flex-direction: column;
            align-items: center; justify-content: space-around; min-height: 100vh; 
            perspective: 2000px; font-family: 'Montserrat', sans-serif; color: white;
            overflow-x: hidden; padding: 10px 0; box-sizing: border-box;
        }

        .status-badge {
            padding: 6px 24px; font-size: 11px; font-weight: 700; letter-spacing: 5px;
            border-radius: 4px; margin-bottom: 5px; transition: 0.4s;
            text-shadow: 0 0 10px currentColor; z-index: 20; text-transform: uppercase;
        }
        .status-free { background: rgba(0, 255, 100, 0.05); color: #00ff64; border: 1px solid rgba(0, 255, 100, 0.3); }
        .status-sold { background: rgba(255, 0, 0, 0.05); color: #ff0000; border: 1px solid rgba(255, 0, 0, 0.3); }

        /* ЗБІЛЬШЕНА РАМКА */
        .artifact-container { 
            position: relative; 
            width: 380px;  /* Збільшено */
            height: 540px; /* Збільшено */
            transform-style: preserve-3d; 
            display: flex; align-items: center; justify-content: center;
        }

        /* МАКСИМАЛЬНО ПЛАВНЕ ПОГОЙДУВАННЯ */
        .artifact { 
            width: 100%; height: 100%; position: relative; transform-style: preserve-3d; 
            animation: artifact_float 20s infinite ease-in-out; 
        }

        @keyframes artifact_float {
            0%, 100% { transform: rotateY(-3deg) rotateX(1deg); }
            50% { transform: rotateY(3deg) rotateX(-1deg); }
        }

        .layer { 
            position: absolute; inset: 0; background-size: contain; 
            background-repeat: no-repeat; background-position: center; 
            transition: opacity 0.4s ease; backface-visibility: hidden; 
        }

        #main-glow { 
            position: absolute; bottom: 10%; left: 50%; width: 300px; height: 80px; 
            filter: blur(60px); z-index: -2; transform: translateX(-50%) translateZ(-50px);
        }

        .selector-menu { 
            display: grid; grid-template-columns: repeat(3, 1fr); 
            gap: 8px; width: 95%; max-width: 400px; z-index: 20;
        }
        .zone-btn { 
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1); 
            color: #666; padding: 12px 2px; font-size: 9px; font-weight: 700;
            letter-spacing: 1px; text-transform: uppercase; cursor: pointer; transition: 0.3s;
            font-family: 'Montserrat', sans-serif;
        }
        .zone-btn.active { 
            background: rgba(255, 255, 255, 0.1); border-color: #00ff64; color: #00ff64;
        }

        .book-btn { 
            width: 90%; max-width: 400px; padding: 22px; font-size: 15px; 
            font-weight: 900; letter-spacing: 3px; text-transform: uppercase;
            cursor: pointer; border: none; border-radius: 8px;
            font-family: 'Montserrat', sans-serif; z-index: 20;
        }

        .admin-trigger { width: 100%; padding: 20px 0; opacity: 0.01; cursor: pointer; }

        body.is-sold .layer { filter: grayscale(1) brightness(0.2); }
    </style>
</head>
<body id="main-body">

    <audio id="bg-music" loop>
        <source src="URL_ТВОЄЇ_ПІСНІ.mp3" type="audio/mpeg">
    </audio>

    <div id="badge" class="status-badge status-free">AVAILABLE</div>

    <div class="artifact-container">
        <div id="main-glow" style="background: radial-gradient(circle, #00ff64, transparent 70%);"></div>
        
        <div class="artifact">
            <div class="layer" style="background-image: url('01.PNG');"></div>
            <div class="layer" id="target-sketch" style="transform: translateZ(15px); background-image: url('04.PNG');"></div>
            <div class="layer" style="transform: translateZ(30px); background-image: url('01.PNG');"></div>
        </div>
    </div>

    <div class="selector-menu">
        <button class="zone-btn active" onclick="updateImg('02.PNG', this)">ORIGINAL</button>
        <button class="zone-btn" onclick="updateImg('023_arm.PNG', this)">FOREARM</button>
        <button class="zone-btn" onclick="updateImg('023_calf.PNG', this)">CALF</button>
        <button class="zone-btn" onclick="updateImg('023_bicep.PNG', this)">BICEP</button>
        <button class="zone-btn" onclick="updateImg('023_quad.PNG', this)">SIDE VIEW</button>
        <button class="zone-btn" onclick="updateImg('023_back.PNG', this)">BACK VIEW</button>
    </div>

    <button id="main-book-btn" class="book-btn" 
            style="background: #00ff64; color: black; box-shadow: 0 10px 40px rgba(0,255,100,0.4);" 
            onclick="window.location.href='booking.html'">RESERVE NOW</button>

    <div class="admin-trigger" onclick="adminLogin()">.</div>

    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>

    <script>
        function startMusic() {
            document.getElementById('bg-music').play().catch(() => {});
            document.removeEventListener('touchstart', startMusic);
            document.removeEventListener('click', startMusic);
        }
        document.addEventListener('touchstart', startMusic);
        document.addEventListener('click', startMusic);

        const firebaseConfig = { databaseURL: "https://firebasedatabase.app" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        const sketchID = "kumiho_01";

        database.ref('sketches/' + sketchID).on('value', (snapshot) => {
            setSold(snapshot.val() === 'sold');
        });

        function adminLogin() {
            const pass = prompt("Yokai Admin:");
            if (pass === "yokai123234") {
                const current = document.getElementById('main-body').classList.contains('is-sold');
                database.ref('sketches/' + sketchID).set(current ? 'free' : 'sold');
            }
        }

        function setSold(sold) {
            const b = document.getElementById('main-body'), badge = document.getElementById('badge'), btn = document.getElementById('main-book-btn'), glow = document.getElementById('main-glow');
            if (sold) {
                b.classList.add('is-sold'); badge.innerText = "RESERVED"; badge.className = "status-badge status-sold";
                glow.style.background = "radial-gradient(circle, #ff0000, transparent 70%)";
                btn.innerText = "SOLD OUT"; btn.style.background = "#111"; btn.style.color = "#444"; btn.disabled = true;
            } else {
                b.classList.remove('is-sold'); badge.innerText = "AVAILABLE"; badge.className = "status-badge status-free";
                glow.style.background = "radial-gradient(circle, #00ff64, transparent 70%)";
                btn.innerText = "RESERVE NOW"; btn.style.background = "#00ff64"; btn.style.color = "black"; btn.disabled = false;
            }
        }

        function updateImg(img, btn) {
            const sketch = document.getElementById('target-sketch');
            sketch.style.opacity = '0';
            setTimeout(() => {
                sketch.style.backgroundImage = `url('${img}')`;
                sketch.style.opacity = '1';
            }, 150);
            document.querySelectorAll('.zone-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }
    </script>
</body>
</html>
