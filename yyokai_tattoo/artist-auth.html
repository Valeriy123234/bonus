<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YYOKAI | Artist Auth</title>

  <style>
    *{margin:0;padding:0;box-sizing:border-box}

    html,body{min-height:100%;background:#000}

    body{
      font-family:Arial,sans-serif;
      color:#fff;
      background:
        radial-gradient(circle at 50% 15%,rgba(180,0,30,.24),transparent 34%),
        linear-gradient(to bottom,#000,#070202 45%,#000);
      overflow-x:hidden;
    }

    body::before{
      content:"妖  鬼  狐  墨  夜  刺青";
      position:fixed;
      inset:0;
      color:rgba(255,255,255,.025);
      font-size:90px;
      letter-spacing:34px;
      line-height:1.5;
      transform:rotate(-12deg) scale(1.15);
      pointer-events:none;
    }

    .page{
      position:relative;
      z-index:2;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:40px 20px;
    }

    .auth-box{
      width:100%;
      max-width:980px;
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:24px;
    }

    .brand{
      padding:42px;
      border-radius:34px;
      background:linear-gradient(180deg,rgba(255,255,255,.075),rgba(255,255,255,.02));
      border:1px solid rgba(255,255,255,.12);
      backdrop-filter:blur(24px);
    }

    .seal{
      color:#e5092f;
      font-size:22px;
      margin-bottom:22px;
      text-shadow:0 0 20px rgba(229,9,47,.7);
    }

    .logo{
      font-size:64px;
      font-weight:950;
      letter-spacing:.14em;
      margin-bottom:24px;
      color:#f5f0eb;
      text-shadow:0 0 35px rgba(229,9,47,.45);
    }

    .brand p{
      color:#bdb7b4;
      line-height:1.7;
      font-size:17px;
    }

    .panel{
      padding:28px;
      border-radius:34px;
      background:rgba(0,0,0,.62);
      border:1px solid rgba(255,255,255,.12);
      backdrop-filter:blur(24px);
    }

    .tabs{
      display:flex;
      gap:8px;
      margin-bottom:24px;
      background:rgba(255,255,255,.06);
      padding:6px;
      border-radius:999px;
    }

    .tabs button{
      flex:1;
      border:0;
      padding:12px;
      border-radius:999px;
      cursor:pointer;
      background:transparent;
      color:#999;
      font-weight:900;
    }

    .tabs button.active{
      background:#f5f0eb;
      color:#050505;
    }

    form{
      display:none;
      flex-direction:column;
      gap:14px;
    }

    form.active{
      display:flex;
    }

    label{
      font-size:13px;
      color:#aaa;
    }

    input{
      width:100%;
      padding:15px 16px;
      border-radius:16px;
      border:1px solid rgba(255,255,255,.13);
      background:rgba(255,255,255,.055);
      color:#fff;
      outline:none;
      font-size:15px;
    }

    input:focus{
      border-color:rgba(229,9,47,.75);
      box-shadow:0 0 0 3px rgba(229,9,47,.12);
    }

    .submit{
      margin-top:8px;
      padding:15px 18px;
      border:0;
      border-radius:999px;
      background:#e5092f;
      color:#fff;
      font-weight:950;
      cursor:pointer;
      box-shadow:0 0 30px rgba(229,9,47,.32);
    }

    .ghost{
      margin-top:14px;
      display:block;
      color:#999;
      text-align:center;
      text-decoration:none;
      font-size:14px;
    }

    .msg{
      margin-top:16px;
      min-height:22px;
      color:#ff5b74;
      font-size:14px;
      text-align:center;
    }

    @media(max-width:820px){
      .auth-box{grid-template-columns:1fr}
      .logo{font-size:46px}
      .brand{padding:30px}
    }
  </style>
</head>

<body>
  <main class="page">
    <section class="auth-box">
      <div class="brand">
        <div class="seal">妖</div>
        <div class="logo">YYOKAI</div>
        <p>
          Майстерня для тату-майстрів: стенсіли, шрифти,
          A4 split, AI-референси та підготовка до сеансу.
        </p>
      </div>

      <div class="panel">
        <div class="tabs">
          <button id="tabRegister" class="active" type="button">Реєстрація</button>
          <button id="tabLogin" type="button">Вхід</button>
        </div>

        <form id="registerForm" class="active">
          <div>
            <label>Імʼя майстра</label>
            <input id="regName" type="text" placeholder="YYOKAI Artist" required />
          </div>

          <div>
            <label>Email</label>
            <input id="regEmail" type="email" placeholder="artist@email.com" required />
          </div>

          <div>
            <label>Пароль</label>
            <input id="regPassword" type="password" placeholder="Мінімум 6 символів" required />
          </div>

          <button class="submit" type="submit">Створити профіль</button>
        </form>

        <form id="loginForm">
          <div>
            <label>Email</label>
            <input id="loginEmail" type="email" placeholder="artist@email.com" required />
          </div>

          <div>
            <label>Пароль</label>
            <input id="loginPassword" type="password" placeholder="Твій пароль" required />
          </div>

          <button class="submit" type="submit">Увійти в майстерню</button>
        </form>

        <a class="ghost" href="/index.html">← Назад на головну</a>
        <p id="msg" class="msg"></p>
      </div>
    </section>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

    import {
      getAuth,
      createUserWithEmailAndPassword,
      signInWithEmailAndPassword,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    import {
      getFirestore,
      doc,
      setDoc,
      getDoc,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "PASTE_HERE",
      authDomain: "PASTE_HERE",
      projectId: "PASTE_HERE",
      storageBucket: "PASTE_HERE",
      messagingSenderId: "PASTE_HERE",
      appId: "PASTE_HERE"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const tabRegister = document.getElementById("tabRegister");
    const tabLogin = document.getElementById("tabLogin");
    const registerForm = document.getElementById("registerForm");
    const loginForm = document.getElementById("loginForm");
    const msg = document.getElementById("msg");

    function showMessage(text) {
      msg.textContent = text;
    }

    function switchTab(type) {
      showMessage("");

      if (type === "register") {
        tabRegister.classList.add("active");
        tabLogin.classList.remove("active");
        registerForm.classList.add("active");
        loginForm.classList.remove("active");
      } else {
        tabLogin.classList.add("active");
        tabRegister.classList.remove("active");
        loginForm.classList.add("active");
        registerForm.classList.remove("active");
      }
    }

    tabRegister.addEventListener("click", () => switchTab("register"));
    tabLogin.addEventListener("click", () => switchTab("login"));

    registerForm.addEventListener("submit", async (e) => {
      e.preventDefault();

      const name = document.getElementById("regName").value.trim();
      const email = document.getElementById("regEmail").value.trim();
      const password = document.getElementById("regPassword").value;

      try {
        showMessage("Створюю профіль...");

        const userCred = await createUserWithEmailAndPassword(auth, email, password);

        await setDoc(doc(db, "users", userCred.user.uid), {
          uid: userCred.user.uid,
          name: name,
          email: email,
          role: "artist",
          plan: "free",
          stencilCredits: 3,
          createdAt: serverTimestamp()
        });

        window.location.href = "/artist-dashboard.html";
      } catch (error) {
        showMessage(error.message);
      }
    });

    loginForm.addEventListener("submit", async (e) => {
      e.preventDefault();

      const email = document.getElementById("loginEmail").value.trim();
      const password = document.getElementById("loginPassword").value;

      try {
        showMessage("Входжу...");

        const userCred = await signInWithEmailAndPassword(auth, email, password);
        const userDoc = await getDoc(doc(db, "users", userCred.user.uid));

        if (!userDoc.exists()) {
          showMessage("Профіль не знайдено.");
          return;
        }

        const data = userDoc.data();

        if (data.role !== "artist") {
          showMessage("Цей профіль не є профілем майстра.");
          return;
        }

        window.location.href = "/artist-dashboard.html";
      } catch (error) {
        showMessage(error.message);
      }
    });

    onAuthStateChanged(auth, async (user) => {
      if (!user) return;

      const userDoc = await getDoc(doc(db, "users", user.uid));

      if (userDoc.exists() && userDoc.data().role === "artist") {
        // Автовхід можна ввімкнути пізніше:
        // window.location.href = "/artist-dashboard.html";
      }
    });
  </script>
</body>
</html>
