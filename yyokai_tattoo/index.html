<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YYOKAI | MATRIX</title>
    <style>
        @import url('https://googleapis.com');

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #000; 
            color: #fff; 
            font-family: 'Space Mono', monospace; 
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
            height: 100vh;
        }

        /* ЛОУДЕР - ТЕПЕР ВІН НЕ ЗАВИСНЕ */
        #loader {
            position: fixed; inset: 0; background: #000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999;
        }
        .scanner {
            width: 200px; height: 2px;
            background: #200; position: relative; overflow: hidden;
        }
        .scanner::after {
            content: ""; position: absolute; inset: 0;
            background: #ff0000; box-shadow: 0 0 15px #ff0000;
            animation: scan 2s infinite;
        }
        @keyframes scan {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        /* ОСНОВНИЙ КОНТЕНТ */
        main { opacity: 0; text-align: center; transition: opacity 1s ease; z-index: 5; }

        /* АВАТАР */
        .avatar-box {
            position: relative; width: 150px; height: 150px; margin: 0 auto 30px;
        }
        .avatar-box img {
            width: 100%; height: 100%; border-radius: 50%;
            border: 1px solid #ff0000; padding: 5px; object-fit: cover;
        }
        .avatar-box::after {
            content: "YOKAI"; position: absolute; top: 0; right: -10px;
            background: #ff0000; color: #000; font-size: 10px; padding: 2px 5px; font-weight: bold;
        }

        h1 { font-family: 'Syncopate', sans-serif; font-size: 24px; letter-spacing: 8px; margin-bottom: 5px; }
        .tag { color: #ff0000; font-size: 10px; letter-spacing: 5px; margin-bottom: 40px; }

        /* КНОПКИ */
        .btn {
            display: block; width: 260px; padding: 15px; margin: 10px auto;
            border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.02);
            color: #fff; text-decoration: none; text-transform: uppercase;
            font-size: 12px; letter-spacing: 2px; transition: 0.3s;
        }
        .btn:hover { border-color: #ff0000; color: #ff0000; background: rgba(255,0,0,0.05); }

        /* ФОНОВИЙ ІЄРОГЛІФ */
        .kanji {
            position: absolute; font-size: 50vh; color: rgba(255,0,0,0.03);
            z-index: 1; user-select: none; pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="loader">
        <div style="color: #ff0000; letter-spacing: 5px; font-size: 10px; margin-bottom: 10px;">BOOTING SYSTEM...</div>
        <div class="scanner"></div>
    </div>

    <div class="kanji">妖怪</div>

    <main id="main">
        <div class="avatar-box">
            <!-- Встав своє посилання або залиш порожнім для тесту -->
            <img src="https://placeholder.com" alt="Avatar">
        </div>
        <h1>YYOKAI</h1>
        <div class="tag">INK_ARCHIVE_V1.0</div>
        
        <div class="links">
            <a href="https://instagram.com" class="btn">Instagram</a>
            <a href="#" class="btn">Portfolio</a>
            <a href="#" class="btn" style="border-color: #ff0000;">Book Session</a>
        </div>
    </main>

    <script>
        // Гарантований запуск навіть якщо картинки ще вантажаться
        window.onload = function() {
            setTimeout(() => {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('main').style.opacity = '1';
            }, 2000);
        };
    </script>
</body>
</html>
