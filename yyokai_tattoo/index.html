<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YYOKAI | ARCHITECT OF INK</title>
    
    <!-- ШРИФТИ: Масивний для заголовків, чистий для тексту -->
    <link href="https://googleapis.com" rel="stylesheet">
    
    <style>
        :root { --red: #ff0000; --bg: #000; --ui: #111; }
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        
        body { 
            background: var(--bg); color: #fff; 
            font-family: 'Inter', sans-serif; 
            overflow-x: hidden;
        }

        /* --- PRELOADER (Nike Style) --- */
        #loader {
            position: fixed; inset: 0; background: #000; z-index: 1000;
            display: flex; justify-content: center; align-items: center;
        }
        .loader-num {
            font-family: 'Unbounded'; font-size: 15vw; color: #fff;
            mix-blend-mode: difference;
        }

        /* --- GRAIN OVERLAY (Ефект дорогої плівки) --- */
        .noise {
            position: fixed; inset: 0; z-index: 999; opacity: 0.03;
            pointer-events: none; background: url(https://vercel.app);
        }

        /* --- HEADER / NAVIGATION --- */
        header {
            position: fixed; top: 0; width: 100%; padding: 30px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 100; mix-blend-mode: difference;
        }
        .logo { font-family: 'Unbounded'; font-size: 18px; letter-spacing: -1px; }
        .menu-btn { font-size: 10px; text-transform: uppercase; letter-spacing: 2px; }

        /* --- HERO SECTION --- */
        .hero {
            height: 100vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center; position: relative;
        }
        .hero-title {
            font-family: 'Unbounded'; font-size: 22vw; line-height: 0.75;
            text-transform: uppercase; text-align: center; letter-spacing: -0.05em;
            margin-top: -50px;
        }
        .hero-sub {
            position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%);
            font-size: 10px; letter-spacing: 5px; color: #666;
        }

        /* --- PRODUCT GRID (Stone Island Vibe) --- */
        .grid-section { padding: 100px 20px; }
        .grid {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 2px;
            background: #222; border: 1px solid #222;
        }
        .grid-item {
            aspect-ratio: 1 / 1.2; background: #000;
            display: flex; flex-direction: column; justify-content: space-between;
            padding: 30px; text-decoration: none; color: #fff;
            transition: 0.6s cubic-bezier(0.8, 0, 0.2, 1);
            position: relative; overflow: hidden;
        }
        .grid-item:hover { background: var(--red); color: #000; }
        .item-num { font-size: 10px; opacity: 0.5; }
        .item-title { font-family: 'Unbounded'; font-size: 18px; text-transform: uppercase; }

        /* --- CTA FLOATING BUTTON --- */
        .cta-fixed {
            position: fixed; bottom: 30px; right: 30px;
            background: #fff; color: #000; padding: 25px 50px;
            border-radius: 100px; text-decoration: none;
            font-family: 'Unbounded'; font-size: 12px; font-weight: 900;
            z-index: 200; transition: 0.4s;
        }
        .cta-fixed:hover { transform: scale(1.05); background: var(--red); color: #fff; }

        @media (max-width: 768px) {
            .hero-title { font-size: 25vw; }
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div id="loader">
        <div class="loader-num" id="load-val">00</div>
    </div>

    <div class="noise"></div>

    <header>
        <div class="logo">YYOKAI ©</div>
        <div class="menu-btn">SYSTEM_v1.0</div>
    </header>

    <a href="#" class="cta-fixed">ЗАПИСАТИСЯ</a>

    <main>
        <section class="hero">
            <h1 class="hero-title">YYO<br>KAI</h1>
            <div class="hero-sub">ARCHITECTURE OF INK & CODE</div>
        </section>

        <section class="grid-section">
            <div class="grid">
                <a href="https://instagram.com" class="grid-item">
                    <span class="item-num">01 / SOCIAL</span>
                    <span class="item-title">Instagram</span>
                </a>
                <a href="https://t.me" class="grid-item">
                    <span class="item-num">02 / CONNECT</span>
                    <span class="item-title">Telegram</span>
                </a>
                <a href="#" class="grid-item">
                    <span class="item-num">03 / ARCHIVE</span>
                    <span class="item-title">Portfolio</span>
                </a>
                <a href="#" class="grid-item">
                    <span class="item-num">04 / CARE</span>
                    <span class="item-title">Aftercare</span>
                </a>
            </div>
        </section>
    </main>

    <!-- GSAP - БІБЛІОТЕКА ДЛЯ ТОПОВИХ АНІМАЦІЙ -->
    <script src="https://cloudflare.com"></script>
    <script>
        // LOADER LOGIC
        let count = 0;
        const loadVal = document.getElementById('load-val');
        const interval = setInterval(() => {
            count += Math.floor(Math.random() * 20) + 1;
            if(count >= 100) {
                count = 100;
                clearInterval(interval);
                gsap.to("#loader", { 
                    y: "-100%", duration: 1.2, ease: "expo.inOut", delay: 0.5 
                });
                gsap.from(".hero-title", { 
                    y: 200, opacity: 0, duration: 1.5, ease: "expo.out", delay: 1.5 
                });
            }
            loadVal.innerText = count.toString().padStart(2, '0');
        }, 80);

        // ПЛАВНА ПОЯВА СІТКИ ПРИ СКРОЛІ
        gsap.from(".grid-item", {
            scrollTrigger: ".grid",
            opacity: 0,
            y: 50,
            stagger: 0.1,
            duration: 1
        });
    </script>
</body>
</html>
