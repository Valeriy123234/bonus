<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YYOKAI | ARCHITECT OF INK</title>
    
    <link href="https://googleapis.com" rel="stylesheet">
    
    <style>
        :root { --red: #ff0000; --bg: #000; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }

        /* --- НАДІЙНИЙ ЛОУДЕР --- */
        #loader {
            position: fixed; inset: 0; background: #000; z-index: 2000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: transform 1s cubic-bezier(0.8, 0, 0.2, 1);
        }
        .loader-num {
            font-family: 'Unbounded'; font-size: 25vw; color: #fff; line-height: 1;
            letter-spacing: -10px; transition: opacity 0.5s;
        }
        .loader-bar {
            position: fixed; bottom: 0; left: 0; height: 5px; background: var(--red);
            width: 0%; transition: width 0.2s ease-out;
        }

        /* --- UI --- */
        .noise {
            position: fixed; inset: 0; z-index: 999; opacity: 0.04;
            pointer-events: none; background: url(https://vercel.app);
        }

        header {
            position: fixed; top: 0; width: 100%; padding: 30px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 100; mix-blend-mode: difference;
        }

        /* --- HERO --- */
        .hero {
            height: 100vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
        }
        .hero-title {
            font-family: 'Unbounded'; font-size: 22vw; line-height: 0.8;
            text-transform: uppercase; letter-spacing: -0.05em;
            opacity: 0; transform: translateY(50px);
            transition: all 1.2s ease 0.5s;
        }
        .hero-title.active { opacity: 1; transform: translateY(0); }

        /* --- GRID --- */
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 2px; background: #111; border: 1px solid #111; }
        .grid-item {
            aspect-ratio: 1/1.2; background: #000; padding: 40px;
            display: flex; flex-direction: column; justify-content: flex-end;
            text-decoration: none; color: #fff; transition: 0.4s;
        }
        .grid-item:hover { background: var(--red); color: #000; }
        .grid-item h2 { font-family: 'Unbounded'; font-size: 24px; text-transform: uppercase; }

        .cta-fixed {
            position: fixed; bottom: 30px; right: 30px;
            background: #fff; color: #000; padding: 20px 40px;
            border-radius: 100px; text-decoration: none;
            font-family: 'Unbounded'; font-size: 10px; font-weight: 900;
            z-index: 200;
        }

        @media (max-width: 768px) {
            .hero-title { font-size: 28vw; }
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div id="loader">
        <div class="loader-num" id="load-val">000</div>
        <div class="loader-bar" id="l-bar"></div>
    </div>

    <div class="noise"></div>

    <header>
        <div style="font-family: 'Unbounded'; font-size: 14px;">YYOKAI ©</div>
        <div style="font-size: 9px; letter-spacing: 2px;">V.1.0_MATRIX</div>
    </header>

    <a href="#" class="cta-fixed" onclick="window.close()">ЗАПИСАТИСЯ</a>

    <main>
        <section class="hero">
            <h1 class="hero-title" id="h-title">YYO<br>KAI</h1>
        </section>

        <section class="grid">
            <a href="https://instagram.com" class="grid-item"><h2>Instagram</h2></a>
            <a href="https://t.me" class="grid-item"><h2>Telegram</h2></a>
            <a href="#" class="grid-item"><h2>Догляд</h2></a>
            <a href="#" class="grid-item" onclick="window.close()"><h2>Закрити</h2></a>
        </section>
    </main>

    <script>
        // ЛОГІКА ЗАВАНТАЖЕННЯ (БЕЗ ЗОВНІШНІХ ЗАЛЕЖНОСТЕЙ)
        document.addEventListener("DOMContentLoaded", function() {
            let count = 0;
            const loadVal = document.getElementById('load-val');
            const lBar = document.getElementById('l-bar');
            const loader = document.getElementById('loader');
            const title = document.getElementById('h-title');

            const interval = setInterval(() => {
                count += Math.floor(Math.random() * 5) + 1;
                
                if (count >= 100) {
                    count = 100;
                    clearInterval(interval);
                    
                    // Фінальна анімація
                    setTimeout(() => {
                        loadVal.style.opacity = "0";
                        loader.style.transform = "translateY(-100%)";
                        title.classList.add('active');
                    }, 500);
                }
                
                loadVal.innerText = count.toString().padStart(3, '0');
                lBar.style.width = count + "%";
            }, 50);
        });
    </script>
</body>
</html>
