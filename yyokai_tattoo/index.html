<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YYOKAI | MATRIX</title>
    <style>
        @import url('https://googleapis.com');

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #000; 
            color: #fff; 
            font-family: 'Space Mono', monospace; 
            overflow: hidden;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            min-height: 100vh;
        }

        /* --- НОВИЙ ЛОУДЕР --- */
        #loader {
            position: fixed; inset: 0; background: #000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999;
        }
        .loader-title {
            color: #ff0000; font-family: 'Syncopate'; font-size: 18px;
            letter-spacing: 10px; margin-bottom: 40px;
            text-shadow: 0 0 20px #ff0000;
        }
        .portal {
            position: relative; width: 100px; height: 100px;
        }
        .ring {
            position: absolute; width: 100%; height: 100%;
            border-radius: 50%; border: 4px solid transparent;
            border-top: 4px solid #ff0000;
            filter: drop-shadow(0 0 15px #ff0000);
            animation: spin 1s linear infinite;
        }
        .core {
            position: absolute; inset: 20px; background: #ff0000;
            border-radius: 50%; box-shadow: 0 0 40px #ff0000;
            animation: pulse 1s ease-in-out infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { transform: scale(0.8); opacity: 0.5; } 50% { transform: scale(1.1); opacity: 1; } }

        /* --- ГОЛОВНА РАМКА --- */
        .neon-frame {
            opacity: 0; transform: scale(0.9);
            border: 3px solid #ff0000;
            border-radius: 30px; /* Закруглені кути */
            padding: 40px 25px;
            text-align: center;
            width: 350px;
            background: rgba(10, 0, 0, 0.8);
            box-shadow: 0 0 30px #ff000066, inset 0 0 20px #ff000033;
            animation: glow-change 5s infinite alternate; /* Переливання рамки */
            transition: all 0.8s ease;
        }
        @keyframes glow-change {
            0% { border-color: #ff0000; box-shadow: 0 0 30px #ff000066; }
            100% { border-color: #990000; box-shadow: 0 0 50px #ff000099; }
        }

        .avatar {
            width: 140px; height: 140px; border-radius: 50%;
            border: 3px solid #ff0000; margin-bottom: 20px;
            box-shadow: 0 0 25px #ff0000; object-fit: cover;
        }

        h1 { font-family: 'Syncopate'; font-size: 32px; letter-spacing: 5px; text-shadow: 0 0 15px #ff0000; }
        .tag { color: #ff0000; font-size: 10px; letter-spacing: 5px; margin-bottom: 30px; }

        /* --- КНОПКИ --- */
        .btn {
            display: block; width: 100%; padding: 15px; margin: 15px 0;
            border-radius: 15px; border: 2px solid;
            text-decoration: none; font-weight: bold; text-transform: uppercase;
            font-size: 13px; letter-spacing: 2px; transition: 0.3s;
            background: transparent;
        }

        /* Записатись (Переливання) */
        .btn-booking {
            border-color: #fff;
            color: #fff;
            animation: booking-glow 3s infinite;
        }
        @keyframes booking-glow {
            0%, 100% { box-shadow: 0 0 10px #fff; text-shadow: 0 0 5px #fff; }
            50% { box-shadow: 0 0 25px #ff0000; border-color: #ff0000; color: #ff0000; }
        }

        /* Інстаграм (Рожевий неон) */
        .btn-insta {
            border-color: #ff00ff; color: #ff00ff;
            box-shadow: 0 0 15px #ff00ff66;
        }
        .btn-insta:hover { background: #ff00ff; color: #000; box-shadow: 0 0 30px #ff00ff; }

        /* Нижні кнопки поза рамкою */
        .bottom-grid {
            display: flex; gap: 10px; width: 350px; margin-top: 20px; opacity: 0;
        }

        /* Заживлення (Зелений неон) */
        .btn-healing {
            flex: 1; border-color: #00ff00; color: #00ff00;
            box-shadow: 0 0 15px #00ff0066; border: 2px solid; border-radius: 15px;
            padding: 12px; text-decoration: none; text-align: center; font-size: 11px;
        }

        /* Телеграм (Синій неон) */
        .btn-tg {
            flex: 1; border-color: #0088ff; color: #0088ff;
            box-shadow: 0 0 15px #0088ff66; border: 2px solid; border-radius: 15px;
            padding: 12px; text-decoration: none; text-align: center; font-size: 11px;
        }

        .show { opacity: 1 !important; transform: scale(1) !important; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="loader-title">YYOKAI MATRIX</div>
        <div class="portal">
            <div class="ring"></div>
            <div class="core"></div>
        </div>
    </div>

    <div class="neon-frame" id="frame">
        <img src="https://placeholder.com" class="avatar">
        <h1>YYOKAI</h1>
        <div class="tag">INK.ARCHIVE</div>

        <a href="#" class="btn btn-booking">Записатися</a>
        <a href="https://instagram.com" class="btn btn-insta">Instagram</a>
    </div>

    <div class="bottom-grid" id="bottom">
        <a href="#" class="btn-healing">Догляд</a>
        <a href="https://t.me" class="btn-tg">Telegram</a>
    </div>

    <script>
        window.onload = function() {
            setTimeout(() => {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('frame').classList.add('show');
                document.getElementById('bottom').classList.add('show');
            }, 3000);
        };
    </script>
</body>
</html>
