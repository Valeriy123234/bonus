<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YYOKAI | MATRIX</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --red: #ff0000; --bg: #000; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }

        /* --- ЧИСТИЙ ЛОУДЕР БЕЗ ПОЛОСКИ --- */
        #loader {
            position: fixed; inset: 0; background: #000; z-index: 2000;
            display: flex; justify-content: center; align-items: center;
            transition: transform 1s cubic-bezier(0.8, 0, 0.2, 1);
        }
        .loader-num {
            font-family: 'Unbounded'; font-size: 25vw; color: #fff; line-height: 1;
            letter-spacing: -10px;
        }

        .noise {
            position: fixed; inset: 0; z-index: 999; opacity: 0.04;
            pointer-events: none; background: url(https://vercel.app);
        }

        /* --- HERO --- */
        .hero { height: 100vh; display: flex; justify-content: center; align-items: center; }
        .hero-title {
            font-family: 'Unbounded'; font-size: 22vw; line-height: 0.8;
            text-transform: uppercase; letter-spacing: -0.05em; text-align: center;
        }

        /* --- ІМЕРСИВНА СІТКА (КАРТИНКИ ЯК КНОПКИ) --- */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; background: #111; }
        
        .grid-item {
            aspect-ratio: 1/1.4; position: relative; overflow: hidden;
            display: flex; flex-direction: column; justify-content: flex-end;
            padding: 25px; text-decoration: none; color: #fff;
        }

        /* ФОНОВІ КАРТИНКИ (Заміни URL на свої роботи) */
        .img-insta { background: linear-gradient(to top, rgba(0,0,0,0.8), transparent), url('https://unsplash.com') center/cover; }
        .img-tg { background: linear-gradient(to top, rgba(0,0,0,0.8), transparent), url('https://unsplash.com') center/cover; }
        .img-portfolio { background: linear-gradient(to top, rgba(0,0,0,0.8), transparent), url('https://unsplash.com') center/cover; }
        .img-care { background: linear-gradient(to top, rgba(0,0,0,0.8), transparent), url('https://unsplash.com') center/cover; }

        .grid-item h2 { font-family: 'Unbounded'; font-size: 14px; text-transform: uppercase; z-index: 2; letter-spacing: 1px; }
        .grid-item span { font-size: 9px; letter-spacing: 2px; margin-bottom: 5px; opacity: 0.7; z-index: 2; }

        /* ЕФЕКТ ПРИ НАТИСКАННІ */
        .grid-item:active { transform: scale(0.98); filter: brightness(1.2); }

        .cta-fixed {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: var(--red); color: #fff; padding: 20px 60px;
            border-radius: 100px; text-decoration: none;
            font-family: 'Unbounded'; font-size: 10px; font-weight: 900;
            z-index: 200; box-shadow: 0 10px 30px rgba(255,0,0,0.4);
            white-space: nowrap;
        }

        @media (max-width: 768px) {
            .hero-title { font-size: 28vw; }
        }
    </style>
</head>
<body>

    <div id="loader">
        <div class="loader-num" id="load-val">000</div>
    </div>

    <div class="noise"></div>

    <a href="#" class="cta-fixed" onclick="window.close()">ЗАПИСАТИСЯ</a>

    <main>
        <section class="hero">
            <h1 class="hero-title">YYO<br>KAI</h1>
        </section>

        <section class="grid">
            <a href="https://instagram.com" class="grid-item img-insta">
                <span>01 // IDENTITY</span>
                <h2>Instagram</h2>
            </a>
            <a href="https://t.me" class="grid-item img-tg">
                <span>02 // CONNECT</span>
                <h2>Telegram</h2>
            </a>
            <a href="#" class="grid-item img-portfolio">
                <span>03 // ARCHIVE</span>
                <h2>Portfolio</h2>
            </a>
            <a href="#" class="grid-item img-care">
                <span>04 // SYSTEM</span>
                <h2>Догляд</h2>
            </a>
        </section>
    </main>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            let count = 0;
            const loadVal = document.getElementById('load-val');
            const loader = document.getElementById('loader');

            const interval = setInterval(() => {
                count += Math.floor(Math.random() * 6) + 1;
                if (count >= 100) {
                    count = 100;
                    clearInterval(interval);
                    setTimeout(() => {
                        loader.style.transform = "translateY(-100%)";
                    }, 400);
                }
                loadVal.innerText = count.toString().padStart(3, '0');
            }, 40);
        });
    </script>
</body>
</html>
