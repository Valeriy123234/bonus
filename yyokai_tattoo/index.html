<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YYOKAI | SYSTEM</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #000; color: #fff; 
            font-family: 'Space Grotesk', sans-serif;
            overflow: hidden;
        }

        /* ЕФЕКТ ШУМУ (Глибина чорного) */
        body::after {
            content: ""; position: fixed; inset: 0;
            background-image: url("https://vercel.app");
            opacity: 0.05; pointer-events: none; z-index: 100;
        }

        /* КІНЕМАТОГРАФІЧНИЙ ЛОУДЕР */
        #loader {
            position: fixed; inset: 0; background: #000;
            display: flex; justify-content: center; align-items: center;
            z-index: 1000; transition: transform 1.2s cubic-bezier(0.8, 0, 0.2, 1);
        }
        .counter {
            font-size: 15vw; font-weight: 700; letter-spacing: -5px;
            color: #111; position: relative;
        }
        .counter::after {
            content: attr(data-percent); position: absolute; left: 0;
            color: #ff0000; width: var(--p); overflow: hidden;
            white-space: nowrap; transition: 0.1s;
        }

        /* КОНТЕНТ */
        main {
            height: 100vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            padding: 20px; opacity: 0; transform: translateY(30px);
            transition: 1s ease 0.5s;
        }

        .avatar-wrap {
            position: relative; width: 180px; height: 180px; margin-bottom: 40px;
        }
        .avatar-wrap img {
            width: 100%; height: 100%; object-fit: cover;
            filter: grayscale(1) contrast(1.1); /* Дорогий ЧБ ефект */
            border: 1px solid #222;
        }
        .avatar-wrap::before {
            content: ""; position: absolute; inset: -10px;
            border: 1px solid #ff0000; opacity: 0.3;
        }

        h1 {
            font-size: 2.5rem; letter-spacing: 15px; font-weight: 700;
            text-transform: uppercase; margin-bottom: 10px;
        }
        .sub {
            font-size: 10px; letter-spacing: 5px; color: #666;
            margin-bottom: 60px; text-transform: uppercase;
        }

        /* МІНІМАЛІСТИЧНІ КНОПКИ */
        .nav { width: 100%; max-width: 300px; }
        .link {
            display: block; width: 100%; padding: 20px;
            text-decoration: none; color: #fff;
            border-bottom: 1px solid #222;
            font-size: 11px; letter-spacing: 3px;
            text-transform: uppercase; transition: 0.4s;
            position: relative;
        }
        .link span { position: relative; z-index: 2; }
        .link::after {
            content: ""; position: absolute; left: 0; bottom: 0;
            width: 0; height: 100%; background: #ff0000;
            transition: 0.4s cubic-bezier(0.8, 0, 0.2, 1); z-index: 1;
        }
        .link:hover { color: #000; }
        .link:hover::after { width: 100%; }

        .link-booking { color: #ff0000; font-weight: 700; border-top: 1px solid #222; }

        .active-main { opacity: 1 !important; transform: translateY(0) !important; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="counter" id="count" data-percent="0%">000</div>
    </div>

    <main id="main">
        <div class="avatar-wrap">
            <img src="ТВОЄ_ФОТО" alt="YYOKAI">
        </div>
        <h1>YYOKAI</h1>
        <div class="sub">Tattoo Architecture & Code</div>

        <div class="nav">
            <a href="#" class="link link-booking"><span>Записатись</span></a>
            <a href="https://instagram.com" class="link"><span>Instagram</span></a>
            <a href="#" class="link"><span>Догляд</span></a>
            <a href="https://t.me" class="link"><span>Telegram</span></a>
        </div>
    </main>

    <script>
        // Логіка лічильника лоудера
        let count = 0;
        const countEl = document.getElementById('count');
        const interval = setInterval(() => {
            count += Math.floor(Math.random() * 10) + 1;
            if(count >= 100) {
                count = 100;
                clearInterval(interval);
                setTimeout(() => {
                    document.getElementById('loader').style.transform = 'translateY(-100%)';
                    document.getElementById('main').classList.add('active-main');
                }, 500);
            }
            countEl.innerText = count.toString().padStart(3, '0');
            countEl.setAttribute('data-percent', count + '%');
            countEl.style.setProperty('--p', count + '%');
        }, 80);
    </script>
</body>
</html>
