<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YYOKAI | INK ARCHITECT</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root { --red: #ff0000; --bg: #000; --white: #ffffff; --card-bg: #151515; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { background: var(--bg); color: var(--white); font-family: 'Inter', sans-serif; overflow-x: hidden; }

        /* --- ЛОУДЕР (ІДЕАЛЬНЕ ЦЕНТРУВАННЯ) --- */
        #loader {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; justify-content: center; align-items: center;
            transition: transform 1s cubic-bezier(0.85, 0, 0.15, 1);
        }
        .loader-num {
            font-family: 'Unbounded', sans-serif; 
            font-size: 25vw; color: #fff;
            line-height: 1;
            text-align: center;
            letter-spacing: 0.02em; /* Однаковий проміжок між цифрами */
            width: 100%;
            display: flex; justify-content: center;
        }

        .noise {
            position: fixed; inset: 0; z-index: 999; opacity: 0.06;
            pointer-events: none; background: url(https://vercel.app);
        }

        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; background: #000; position: relative; }
        .hero-title {
            font-family: 'Unbounded', sans-serif; font-size: 24vw; line-height: 0.9; /* Збільшено відступ між рядками */
            text-transform: uppercase; text-align: center; letter-spacing: -0.05em;
            display: flex; flex-direction: column; visibility: hidden;
        }
        .hero-title.visible { visibility: visible; }
        .hero-title span {
            display: inline-block; opacity: 0;
            transform: scaleY(4) translateY(200px) translateZ(-800px);
            filter: blur(20px); transition: all 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .hero-title.active span { opacity: 1; transform: scaleY(1) translateY(0) translateZ(0); filter: blur(0); }
        .hero-title span:nth-child(2) { transition-delay: 0.15s; margin-top: 20px; /* Додатковий простір між YYO та KAI */ }

        .hero-tagline {
            margin-top: 40px; font-size: 10px; letter-spacing: 8px;
            color: #444; text-transform: uppercase; font-weight: 400;
            opacity: 0; transform: translateY(15px);
            transition: all 1s ease 1s;
        }
        .hero-title.active + .hero-tagline { opacity: 1; transform: translateY(0); }


        /* --- GRID (СВІТЛІШИЙ ТОН) --- */
        .grid { display: flex; flex-direction: column; width: 100%; gap: 2px; background: #222; }
        .grid-item {
            height: 50vh; position: relative; overflow: hidden;
            display: flex; flex-direction: column; justify-content: flex-end;
            padding: 40px; text-decoration: none; color: #fff;
            background-color: var(--card-bg); /* Світліший за чорний */
        }
        
        /* Градієнт зверху вниз (затемнення) */
        .grid-item::before {
            content: ""; position: absolute; inset: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, transparent 50%, rgba(0,0,0,0.8) 100%);
            z-index: 1;
        }

        /* Місця для твоїх фото */
        .img-1 { background-image: url('1.JPG'); background-position: center; background-size: cover; }
        .img-2 { background-image: url('2.JPG'); background-position: center; background-size: cover; }
        .img-3 { background-image: url('5.JPG'); background-position: center; background-size: cover; }
        .img-4 { background-image: url('6.JPG'); background-position: center; background-size: cover; }

        .grid-item h2 { font-family: 'Unbounded', sans-serif; font-size: 28px; text-transform: uppercase; z-index: 2; position: relative; }
        .grid-item span { font-size: 10px; letter-spacing: 4px; margin-bottom: 10px; opacity: 0.5; z-index: 2; position: relative; }

        /* --- FOOTER 2026 --- */
        footer { padding: 80px 40px 140px; background: #000; border-top: 1px solid #111; }
        .footer-info { font-size: 9px; letter-spacing: 2px; color: #333; line-height: 2.5; text-transform: uppercase; }
        .footer-year { font-family: 'Unbounded', sans-serif; font-size: 12px; color: var(--red); margin-top: 30px; }

        /* --- КНОПКА ЗАПИСУ --- */
        .cta-fixed {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: var(--red); color: #fff; padding: 22px 60px;
            border-radius: 100px; text-decoration: none;
            font-family: 'Unbounded', sans-serif; font-size: 11px; font-weight: 900;
            z-index: 1000; box-shadow: 0 10px 40px rgba(255,0,0,0.5);
            white-space: nowrap; transition: 0.3s;
        }

        @media (max-width: 768px) { .hero-title { font-size: 28vw; } .grid-item { padding: 30px; } }
    </style>
</head>
<body>

    <div id="loader">
        <div class="loader-num" id="load-val">0</div>
    </div>

    <div class="noise"></div>

    <a href="#" class="cta-fixed" onclick="if(window.Telegram) Telegram.WebApp.close();">ЗАПИСАТИСЯ</a>

    <main>
        <section class="hero">
            <h1 class="hero-title" id="main-logo">
                <span>YYO</span>
                <span>KAI</span>
            </h1>
            <div class="hero-tagline">INK ARCHITECT // LVIV</div>
        </section>

        <section class="grid">
            <a href="https://www.instagram.com/yyokai.ink?igsh=MXhhNGJvNmZ5ZnljNQ==" class="grid-item img-1"><span>01 // IDENTITY</span><h2>Instagram</h2></a>
            <a href="https://t.me/veller_tattoo" class="grid-item img-2"><span>02 // CONNECT</span><h2>Telegram</h2></a>
            <a href="#" class="grid-item img-3"><span>03 // ARCHIVE</span><h2>Portfolio</h2></a>
            <a href="#" class="grid-item img-4"><span>04 // SYSTEM</span><h2>Aftercare</h2></a>
        </section>

        <footer>
            <div class="footer-info">
                YYOKAI SYSTEM PROTOCOL<br>
                ESTABLISHED IN THE FOREST<br>
                DATA SYNC: ACTIVE<br>
                SECTOR: LVIV_CENTER
            </div>
            <div class="footer-year">© 2026 // BEYOND THE LIMITS</div>
        </footer>
    </main>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            let count = 0;
            const loadVal = document.getElementById('load-val');
            const loader = document.getElementById('loader');
            const logo = document.getElementById('main-logo');

            const interval = setInterval(() => {
                count += Math.floor(Math.random() * 8) + 1;
                
                if (count >= 100) {
                    count = 100;
                    clearInterval(interval);
                    
                    setTimeout(() => {
                        loader.style.transform = "translateY(-100%)";
                        logo.classList.add('visible');
                        setTimeout(() => {
                            logo.classList.add('active');
                        }, 200);
                    }, 400);
                }
                loadVal.innerText = count;
            }, 50);
        });
    </script>
</body>
</html>
