<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YYOKAI | TATTOO SYSTEM</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --accent: #ff0000;
            --text: #ffffff;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 0, 0, 0.2);
        }

        body, html {
            margin: 0; padding: 0;
            background: var(--bg);
            color: var(--text);
            font-family: 'Space Grotesk', sans-serif;
            overflow-x: hidden;
            height: 100%;
        }

        /* --- LOADER STYLE --- */
        #loader {
            position: fixed;
            inset: 0;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: transform 0.8s cubic-bezier(0.85, 0, 0.15, 1);
        }

        .loader-dragon {
            width: 100px; height: 100px;
            border-radius: 50%;
            border-left: 2px solid var(--accent);
            border-right: 2px solid transparent;
            animation: spin 1s linear infinite;
            filter: drop-shadow(0 0 10px var(--accent));
        }

        .loader-text {
            margin-top: 30px;
            font-size: 10px;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: var(--accent);
            opacity: 0.8;
        }

        /* --- MAIN CONTENT --- */
        .main-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            background: radial-gradient(circle at center, #110000 0%, #050505 100%);
        }

        .bg-kanji {
            position: absolute;
            font-size: 60vh;
            color: rgba(255, 0, 0, 0.02);
            z-index: 0;
            user-select: none;
            font-weight: 900;
        }

        .profile-card {
            z-index: 1;
            text-align: center;
            background: var(--glass);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 30px;
            border: 1px solid var(--border);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            max-width: 320px;
            width: 85%;
        }

        .avatar {
            width: 140px; height: 140px;
            border-radius: 50%;
            margin-bottom: 20px;
            border: 2px solid var(--accent);
            padding: 5px;
            box-shadow: 0 0 20px rgba(255,0,0,0.3);
            object-fit: cover;
        }

        h1 {
            font-size: 24px;
            letter-spacing: 4px;
            margin: 10px 0;
            font-weight: 700;
        }

        .username {
            font-size: 12px;
            color: var(--accent);
            letter-spacing: 2px;
            margin-bottom: 30px;
            opacity: 0.8;
        }

        .btn {
            display: block;
            text-decoration: none;
            color: white;
            padding: 15px;
            margin: 12px 0;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255,255,255,0.1);
            font-size: 14px;
            letter-spacing: 1px;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .btn:hover {
            background: var(--accent);
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(255,0,0,0.2);
            border-color: transparent;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Анімація появи контенту */
        .fade-in {
            animation: fadeIn 1.5s ease forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <!-- LOADER -->
    <div id="loader">
        <div class="loader-dragon"></div>
        <div class="loader-text">Initializing Matrix...</div>
    </div>

    <!-- MAIN -->
    <div class="main-container">
        <div class="bg-kanji">妖怪</div>
        
        <div class="profile-card fade-in">
            <!-- Встав сюди посилання на свою аву -->
            <img src="https://placeholder.com" alt="YYOKAI" class="avatar">
            
            <h1>YYOKAI</h1>
            <div class="username">YYOKAI.INK</div>
            
            <a href="https://instagram.com" class="btn">Instagram</a>
            <a href="#" onclick="Telegram.WebApp.close()" class="btn">Portfolio</a>
            <a href="#" class="btn" style="background: rgba(255,0,0,0.1); border-color: var(--accent);">Book Session</a>
        </div>
    </div>

    <script src="https://telegram.org"></script>
    <script>
        // Скрипт лоудера
        window.addEventListener('load', () => {
            setTimeout(() => {
                const loader = document.getElementById('loader');
                loader.style.transform = 'translateY(-100%)';
            }, 2500); // 2.5 секунди затримки
        });

        // Ініціалізація Telegram WebApp
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.headerColor = '#050505';
    </script>
</body>
</html>
