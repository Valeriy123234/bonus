<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YYOKAI | ARCHITECT OF INK</title>
    
    <!-- ПРЕМІАЛЬНІ ШРИФТИ -->
    <link href="https://googleapis.com" rel="stylesheet">
    
    <style>
        :root { --red: #ff0000; --bg: #000; --white: #ffffff; }
        
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        
        body { 
            background: var(--bg); color: var(--white); 
            font-family: 'Inter', sans-serif; 
            overflow-x: hidden;
        }

        /* --- ПРЕМІАЛЬНИЙ ЛОУДЕР --- */
        #loader {
            position: fixed; inset: 0; background: #000; z-index: 2000;
            display: flex; justify-content: center; align-items: center;
            transition: transform 1.2s cubic-bezier(0.8, 0, 0.2, 1);
        }
        .loader-num {
            font-family: 'Unbounded'; font-size: 25vw; color: #fff;
            letter-spacing: -10px; line-height: 1;
        }

        /* ЕФЕКТ ШУМУ (GRAIN) */
        .noise {
            position: fixed; inset: 0; z-index: 999; opacity: 0.05;
            pointer-events: none; background: url(https://vercel.app);
        }

        /* --- HERO & LOGO (WHITE NEON) --- */
        .hero { 
            height: 100vh; display: flex; justify-content: center; 
            align-items: center; overflow: hidden; 
        }
        .hero-title {
            font-family: 'Unbounded'; font-size: 24vw; line-height: 0.8;
            text-transform: uppercase; text-align: center; letter-spacing: -0.05em;
            color: #fff;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.4), 
                         0 0 30px rgba(255, 255, 255, 0.1);
            animation: logoPulse 6s ease-in-out infinite;
        }

        @keyframes logoPulse {
            0%, 100% { 
                transform: scale(1); 
                letter-spacing: -0.05em;
                text-shadow: 0 0 15px rgba(255, 255, 255, 0.4), 0 0 30px rgba(255, 255, 255, 0.1);
            }
            50% { 
                transform: scale(1.02); 
                letter-spacing: 0.01em;
                text-shadow: 0 0 25px rgba(255, 255, 255, 0.6), 0 0 50px rgba(255, 255, 255, 0.2);
            }
        }

        /* --- МАСИВНА СІТКА КАРТОК --- */
        .grid { display: flex; flex-direction: column; width: 100%; gap: 2px; background: #111; }
        
        .grid-item {
            height: 50vh; position: relative; overflow: hidden;
            display: flex; flex-direction: column; justify-content: flex-end;
            padding: 40px; text-decoration: none; color: #fff;
        }

        .grid-item::before {
            content: ""; position: absolute; inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 70%);
            z-index: 1;
        }

        /* ФОНИ (Встав свої фото сюди) */
        .img-1 { background: url('https://unsplash.com') center/cover; }
        .img-2 { background: url('https://unsplash.com') center/cover; }
        .img-3 { background: url('https://unsplash.com') center/cover; }
        .img-4 { background: url('https://unsplash.com') center/cover; }

        .grid-item h2 { font-family: 'Unbounded'; font-size: 28px; text-transform: uppercase; z-index: 2; position: relative; }
        .grid-item span { font-size: 10px; letter-spacing: 4px; margin-bottom: 10px; opacity: 0.6; z-index: 2; position: relative; }

        /* ЕФЕКТ ПРИ КЛІКУ */
        .grid-item:active { filter: brightness(1.3); }

        /* --- СИСТЕМНИЙ ФУТЕР --- */
        footer {
            padding: 80px 40px; background: #000; border-top: 1px solid #111;
        }
        .footer-info { font-size: 9px; letter-spacing: 2px; color: #333; line-height: 2.2; text-transform: uppercase; }
        .footer-year { font-family: 'Unbounded'; font-size: 12px; color: var(--red); margin-top: 25px; opacity: 0.8; }

        /* ГОЛОВНА КНОПКА */
        .cta-fixed {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: var(--red); color: #fff; padding: 22px 60px;
            border-radius: 100px; text-decoration: none;
            font-family: 'Unbounded'; font-size: 11px; font-weight: 900;
            z-index: 200; box-shadow: 0 10px 40px rgba(255,0,0,0.4);
            white-space: nowrap; transition: 0.3s cubic-bezier(0.8, 0, 0.2, 1);
        }
        .cta-fixed:active { transform: translateX(-50%) scale(0.9); }

        @media (max-width: 768px) {
            .hero-title { font-size: 28vw; }
            .grid-item { padding: 30px; }
        }
    </style>
</head>
<body>

    <!-- LOADER -->
    <div id="loader">
        <div class="loader-num" id="load-val">000</div>
    </div>

    <div class="noise"></div>

    <!-- КНОПКА ЗАПИСУ -->
    <a href="#" class="cta-fixed" onclick="window.close()">ЗАПИСАТИСЯ</a>

    <main>
        <!-- HERO -->
        <section class="hero">
            <h1 class="hero-title">YYO<br>KAI</h1>
        </section>

        <!-- GRID КАРТКИ -->
        <section class="grid">
            <a href="https://instagram.com" class="grid-item img-1">
                <span>01 // IDENTITY</span>
                <h2>Instagram</h2>
            </a>
            <a href="https://t.me" class="grid-item img-2">
                <span>02 // CONNECT</span>
                <h2>Telegram</h2>
            </a>
            <a href="#" class="grid-item img-3">
                <span>03 // ARCHIVE</span>
                <h2>Portfolio</h2>
            </a>
            <a href="#" class="grid-item img-4">
                <span>04 // SYSTEM</span>
                <h2>Aftercare</h2>
            </a>
        </section>

        <!-- FOOTER -->
        <footer>
            <div class="footer-info">
                YYOKAI TATTOO ARCHITECTURE<br>
                LVIV CITY // CORE SECTOR<br>
                SYNCHRONIZED WITH DATABASE<br>
                ENCRYPTED TRANSFORMATION
            </div>
            <div class="footer-year">© 2026 // ESTABLISHED IN FOREST</div>
        </footer>
    </main>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            let count = 0;
            const loadVal = document.getElementById('load-val');
            const loader = document.getElementById('loader');

            const interval = setInterval(() => {
                count += Math.floor(Math.random() * 6) + 1;
                if (count >= 100) {
                    count = 100;
                    clearInterval(interval);
                    setTimeout(() => {
                        loader.style.transform = "translateY(-100%)";
                    }, 500);
                }
                loadVal.innerText = count.toString().padStart(3, '0');
            }, 50);
        });
    </script>
</body>
</html>
