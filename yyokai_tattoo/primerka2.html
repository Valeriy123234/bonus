<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOKAI TATTOO | INTERACTIVE UI</title>
    
    <link href="https://googleapis.com" rel="stylesheet">
    
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>

    <style>
        :root { 
            --red: #ff0000;
            --red-glow: rgba(255, 0, 0, 0.5);
            --font-main: 'Shippori Mincho', serif;
            --font-title: 'Cinzel', serif;
        }

        /* КРИТИЧНО: фон body має бути чорним, але все інше - прозорим */
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; color: #fff; font-family: var(--font-main); overflow: hidden; 
        }

        /* МАТРИЦЯ: найнижчий шар */
        #matrix-canvas {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 0; /* Рівень 0 */
            pointer-events: none; opacity: 0.30;
        }

        /* UI: шар над матрицею */
        #game-ui { 
            position: relative; 
            z-index: 10; /* Рівень 10 */
            width: 100%; height: 100%; 
            background: transparent; /* Обов'язково прозоро! */
        }

        .step-container { 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; width: 100%; background: transparent; padding: 0 15px;
        }

        .hidden { display: none !important; }

        .title-step { 
            font-family: var(--font-title); font-size: 2rem; letter-spacing: 12px; 
            color: var(--red); text-align: center; margin-bottom: 50px;
            text-shadow: 0 0 15px var(--red-glow);
        }

        /* КАРТКИ */
        .cards-wrapper { display: flex; gap: 30px; align-items: center; justify-content: center; width: 100%; }
        
        .rect-card {
            width: 260px; height: 460px; border: 1px solid #222; position: relative;
            cursor: pointer; overflow: hidden; background: rgba(255, 0, 0, 0.02); transition: 0.5s ease;
        }

        /* МАГІЧНИЙ КРУГ (124.png) */
        .magic-circle {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 140%; opacity: 0.2; pointer-events: none; z-index: 1;
            animation: magicSpin 20s infinite linear, levitate 6s infinite ease-in-out;
        }
        @keyframes magicSpin { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } }
        @keyframes levitate { 0%, 100% { margin-top: -15px; } 50% { margin-top: 15px; } }

        .card-img { 
            position: relative; z-index: 5; width: 100%; height: 100%; 
            object-fit: contain; filter: grayscale(0); transition: 0.5s ease; opacity: 0.8;
        }

        .cards-wrapper:hover .rect-card:not(:hover) .card-img { filter: grayscale(1); opacity: 0.15; transform: scale(0.95); }
        .rect-card:hover .card-img { transform: scale(1.05); filter: grayscale(0); opacity: 1; }
        .rect-card:hover { border-color: var(--red); box-shadow: 0 0 30px var(--red-glow); }

        .card-label { 
            position: absolute; bottom: 25px; width: 100%; text-align: center;
            font-family: var(--font-title); font-size: 1.1rem; letter-spacing: 5px; 
            color: #fff; z-index: 10; text-shadow: 0 0 10px #000;
        }

        @media (max-width: 600px) {
            .title-step { font-size: 1.3rem; letter-spacing: 5px; }
            .cards-wrapper { gap: 15px; }
            .rect-card { width: 44vw; height: 60vh; }
            .card-label { font-size: 0.8rem; bottom: 15px; }
        }

        /* ПРИМІРКА */
        .model-container { height: 65vh; margin-bottom: 20px; position: relative; display: flex; align-items: center; justify-content: center; }
        #main-char-img { height: 100%; position: relative; z-index: 10; object-fit: contain; transition: 0.4s; }

        .nav-btn { background: #111; border: 1px solid #333; color: #555; padding: 10px 20px; cursor: pointer; font-family: var(--font-title); font-size: 10px; margin: 3px; }
        .nav-btn.active { border-color: var(--red); color: #fff; box-shadow: inset 0 0 5px var(--red-glow); }

        .booking-btn {
            background: var(--red); color: white; border: none; padding: 18px 50px; 
            font-weight: bold; font-size: 1rem; cursor: pointer; letter-spacing: 4px;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%); transition: 0.3s;
        }

        /* SOLD OUT */
        #soldOverlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.95); z-index: 2000; display: none; 
            align-items: center; justify-content: center; flex-direction: column; 
        }
        .is-locked { filter: grayscale(1) brightness(0.2); pointer-events: none; }

        .admin-panel { position: fixed; bottom: 10px; right: 10px; opacity: 0.05; background: #111; padding: 5px; z-index: 3000; }
        .admin-panel:hover { opacity: 1; }
        .admin-panel input { background: #000; border: 1px solid #333; color: red; padding: 5px; width: 70px; text-align: center; font-size: 9px; }
    </style>
</head>
<body>

    <!-- ПОЛОТНО ДЛЯ КОДУ -->
    <canvas id="matrix-canvas"></canvas>

    <div id="soldOverlay">
        <h1 style="color:red; font-family:var(--font-title); letter-spacing:10px;">RESERVED</h1>
    </div>

    <div id="game-ui">
        <!-- КРОК 1: КЛАНИ -->
        <div id="step1" class="step-container">
            <h1 class="title-step">Оберіть клан</h1>
            <div class="cards-wrapper">
                <div class="rect-card" onclick="selectRace('tauren')">
                    <img src="122.png" class="card-img">
                    <div class="card-label">TAUREN</div>
                </div>
                <div class="rect-card" onclick="selectRace('elf')">
                    <img src="123.png" class="card-img">
                    <div class="card-label">ELF</div>
                </div>
            </div>
        </div>

        <!-- КРОК 2: ТІЛО -->
        <div id="step2" class="step-container hidden">
            <h1 class="title-step">Оберіть тіло</h1>
            <div class="cards-wrapper">
                <div class="rect-card" onclick="selectGender('male')">
                    <img src="124.PNG" class="magic-circle">
                    <img id="body-male-img" src="" class="card-img">
                    <div class="card-label">MALE</div>
                </div>
                <div class="rect-card" onclick="selectGender('female')">
                    <img src="124.PNG" class="magic-circle">
                    <img id="body-female-img" src="" class="card-img">
                    <div class="card-label">FEMALE</div>
                </div>
            </div>
            <p onclick="location.reload()" style="margin-top:30px; cursor:pointer; opacity:0.3; font-size:10px;">[ BACK ]</p>
        </div>

        <!-- КРОК 3: ПРИМІРКА -->
        <div id="main-ui" class="step-container hidden">
            <div class="model-container">
                <img src="124.PNG" class="magic-circle" style="width:100vh; opacity:0.25;">
                <img id="main-char-img" src="">
            </div>
            <div style="margin-bottom:20px;">
                <button class="nav-btn active" onclick="setPart('forearm', this)">Передпліччя</button>
                <button class="nav-btn" onclick="setPart('biceps', this)">Біцепс</button>
                <button class="nav-btn" onclick="setPart('calf', this)">Ікра</button>
            </div>
            <button class="booking-btn" onclick="window.open('ТВІЙ_ТГ')">ЗАМОВИТИ</button>
            <p onclick="localStorage.clear(); location.reload();" style="margin-top:15px; cursor:pointer; opacity:0.2; font-size:9px;">[ RESET ]</p>
        </div>

        <div class="admin-panel">
            <input type="password" id="admPass" placeholder="KEY">
            <button onclick="loginAdm()">OK</button>
            <div id="admTools" style="display:none; margin-top:5px;">
                <button onclick="toggleLock()" id="lockBtn" style="background:red; color:white; border:none; padding:5px; cursor:pointer; font-size:9px;">LOCK</button>
            </div>
        </div>
    </div>

    <script>
        // 1. МАТРИЦЯ (Виправлений рендер)
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        let w, h, columns, drops;
        const fontSize = 16;
        const chars = 'アァカサタナハマヤャラワガザダバパイィキシチニヒミリヰギジヂビピウゥクスツヌフムユュルグズブヅプ';

        function initMatrix() {
            w = canvas.width = window.innerWidth;
            h = canvas.height = window.innerHeight;
            columns = Math.floor(w / fontSize);
            drops = new Array(columns).fill(1);
        }

        function drawMatrix() {
            // Малюємо чорний прямокутник з низькою прозорістю, щоб код зникав плавно
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, w, h);

            ctx.fillStyle = '#ff0000';
            ctx.font = fontSize + 'px monospace';
            ctx.shadowBlur = 8;
            ctx.shadowColor = '#ff0000';

            for (let i = 0; i < drops.length; i++) {
                const text = chars[Math.floor(Math.random() * chars.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > h && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        window.addEventListener('resize', initMatrix);
        initMatrix();
        setInterval(drawMatrix, 35); // Запуск

        // 2. ДАНІ ТА ЛОГІКА
        const bodyPreviews = {
            tauren: { male: "taurenm.PNG", female: "taureng.PNG" },
            elf: { male: "taurenm.PNG", female: "taureng.PNG" }
        };

        const charImages = {
            tauren_male_forearm: "taurenm.PNG", tauren_male_biceps: "TMB.png", tauren_male_calf: "TMC.png",
            tauren_female_forearm: "taureng.PNG", tauren_female_biceps: "TFB.png", tauren_female_calf: "TFC.png",
            elf_male_forearm: "taurenm.PNG", elf_male_biceps: "EMB.png", elf_male_calf: "EMC.png",
            elf_female_forearm: "taureng.PNG", elf_female_biceps: "EFB.png", elf_female_calf: "EFC.png"
        };

        // ТУТ ПІДКЛЮЧИ FirebaseURL
        const firebaseConfig = { databaseURL: "https://firebaseio.com" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let state = { race: localStorage.getItem('race') || '', gender: localStorage.getItem('gender') || '', part: 'forearm' };
        let isBlocked = false;

        db.ref('site_status').on('value', (snap) => {
            isBlocked = snap.val() === 'blocked';
            document.getElementById('game-ui').classList.toggle('is-locked', isBlocked);
            document.getElementById('soldOverlay').style.display = isBlocked ? 'flex' : 'none';
        });

        function selectRace(r) { 
            state.race = r; localStorage.setItem('race', r); 
            document.getElementById('body-male-img').src = bodyPreviews[r].male;
            document.getElementById('body-female-img').src = bodyPreviews[r].female;
            show('step2');
        }

        function selectGender(g) { state.gender = g; localStorage.setItem('gender', g); show('main-ui'); updateView(); }
        
        function setPart(p, btn) { 
            state.part = p; 
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            updateView(); 
        }

        function updateView() {
            const key = `${state.race}_${state.gender}_${state.part}`;
            const img = document.getElementById('main-char-img');
            img.style.opacity = 0;
            setTimeout(() => { if(charImages[key]) img.src = charImages[key]; img.style.opacity = 1; }, 250);
        }

        function show(id) { document.querySelectorAll('.step-container').forEach(s => s.classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); }
        function loginAdm() { if(document.getElementById('admPass').value === "yokai123234") document.getElementById('admTools').style.display='block'; }
        function toggleLock() { db.ref('site_status').set(isBlocked ? 'active' : 'blocked'); }
        
        window.onload = () => { if (state.race && state.gender) { show('main-ui'); updateView(); } };
    </script>
</body>
</html>
