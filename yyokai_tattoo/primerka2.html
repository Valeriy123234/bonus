<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOKAI TATTOO | CHARACTER SELECT</title>
    <link href="https://googleapis.com" rel="stylesheet">
    
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>

    <style>
        :root { 
            --red: #ff0000;
            --bg: #000;
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--bg); color: #fff; 
            font-family: 'Shippori Mincho', serif; overflow: hidden; 
        }

        /* МАТРИЦЯ (ФОН 15%) */
        #matrix-canvas {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 1; pointer-events: none; opacity: 0.15;
        }

        #game-ui { position: relative; z-index: 10; width: 100%; height: 100%; transition: 0.5s; }

        .screen {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; animation: fadeIn 0.8s ease;
        }
        .hidden { display: none !important; }

        .title {
            font-family: 'Cinzel', serif; font-size: 2rem; letter-spacing: 12px;
            color: var(--red); text-align: center; margin-bottom: 60px;
        }

        /* КЛАНИ */
        .clan-wrapper { display: flex; gap: 80px; }
        .clan-card { cursor: pointer; text-align: center; transition: all 0.5s ease; }
        .clan-img { width: 220px; height: 220px; object-fit: contain; filter: grayscale(0); transition: all 0.5s ease; }

        .clan-wrapper:hover .clan-card:not(:hover) .clan-img { filter: grayscale(1); opacity: 0.15; transform: scale(0.9); }
        .clan-card:hover .clan-img { transform: scale(1.15); filter: grayscale(0); opacity: 1; }

        .clan-name { font-family: 'Cinzel', serif; margin-top: 20px; font-size: 1.1rem; letter-spacing: 5px; color: #fff; transition: 0.5s; }
        .clan-wrapper:hover .clan-card:not(:hover) .clan-name { opacity: 0.2; }

        /* ТІЛО (ПРЯМОКУТНИКИ) */
        .body-card {
            width: 250px; height: 450px; position: relative; cursor: pointer;
            border: 1px solid #222; overflow: hidden; background: #050505; transition: 0.4s;
        }
        .magic-circle {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 130%; opacity: 0.2; pointer-events: none;
            animation: rotateCircle 25s infinite linear;
        }
        @keyframes rotateCircle { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } }
        .body-img { position: relative; z-index: 5; width: 100%; height: 100%; object-fit: contain; opacity: 0.5; transition: 0.5s; }
        .body-card:hover .body-img { opacity: 1; }
        .body-card:hover { border-color: var(--red); box-shadow: 0 0 20px rgba(255,0,0,0.4); }

        /* ЗАГЛУШКА SOLD OUT */
        #lock-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.85); z-index: 1000; display: none;
            align-items: center; justify-content: center; flex-direction: column;
            animation: fadeIn 0.3s;
        }

        /* АДМІНКА */
        .admin-trigger { position: fixed; bottom: 10px; right: 10px; opacity: 0.1; cursor: pointer; font-size: 10px; z-index: 2000; color: #444; }
        .admin-trigger:hover { opacity: 1; color: var(--red); }
        .admin-modal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #0a0a0a; border: 1px solid var(--red); padding: 25px;
            z-index: 2100; display: none; text-align: center; box-shadow: 0 0 40px #000;
        }
        .admin-modal input { background: #000; border: 1px solid #333; color: var(--red); padding: 10px; margin-bottom: 15px; text-align: center; font-family: 'Cinzel'; }
        .admin-modal button { background: var(--red); color: #fff; border: none; padding: 10px 20px; cursor: pointer; font-family: 'Cinzel'; }

        /* КНОПКИ ТА ПРИМІРКА */
        .nav-btn { background: #111; border: 1px solid #333; color: #555; padding: 12px 25px; cursor: pointer; margin: 5px; font-family: 'Cinzel'; }
        .nav-btn.active { border-color: var(--red); color: #fff; }
        .book-btn { margin-top: 30px; background: var(--red); color: #fff; border: none; padding: 18px 60px; cursor: pointer; letter-spacing: 4px; font-weight: bold; clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%); }
    </style>
</head>
<body>

    <div id="lock-overlay">
        <h1 style="color:var(--red); letter-spacing:15px; font-family: 'Cinzel'; text-shadow: 0 0 20px red;">RESERVED</h1>
        <p style="font-size:10px; color:gray; letter-spacing:5px;">ACCESS DENIED BY OPERATOR</p>
    </div>

    <canvas id="matrix-canvas"></canvas>

    <div id="game-ui">
        <!-- КРОК 1 -->
        <div id="step1" class="screen">
            <h1 class="title">SELECT CLAN</h1>
            <div class="clan-wrapper">
                <div class="clan-card" onclick="show('step2')">
                    <img src="122.png" class="clan-img" alt="Tauren">
                    <div class="clan-name">TAUREN</div>
                </div>
                <div class="clan-card" onclick="show('step2')">
                    <img src="123.png" class="clan-img" alt="Elf">
                    <div class="clan-name">ELF</div>
                </div>
            </div>
        </div>

        <!-- КРОК 2 -->
        <div id="step2" class="screen hidden">
            <h1 class="title">SELECT BODY</h1>
            <div class="clan-wrapper">
                <div class="body-card" onclick="show('main-ui')">
                    <img src="124.png" class="magic-circle">
                    <img src="https://placeholder.com" class="body-img">
                </div>
                <div class="body-card" onclick="show('main-ui')">
                    <img src="124.png" class="magic-circle">
                    <img src="https://placeholder.com" class="body-img">
                </div>
            </div>
            <p onclick="location.reload()" style="margin-top:30px; opacity:0.3; font-size:10px; cursor:pointer;">[ BACK ]</p>
        </div>

        <!-- КРОК 3 -->
        <div id="main-ui" class="screen hidden">
            <div style="position:relative; height: 60vh;">
                <img src="124.png" class="magic-circle" style="width: 110%;">
                <img id="char-img" src="https://placeholder.com" style="height:100%; position:relative; z-index:5;">
            </div>
            <div style="margin-top:20px;">
                <button class="nav-btn active">FOREARM</button>
                <button class="nav-btn">BICEPS</button>
                <button class="nav-btn">CALF</button>
            </div>
            <button class="book-btn">BOOK TATTOO</button>
        </div>
    </div>

    <!-- ПРИХОВАНА АДМІНКА -->
    <div class="admin-trigger" onclick="document.getElementById('admBox').style.display='block'">⚙️ ADM</div>
    
    <div id="admBox" class="admin-modal">
        <h3 style="color:red; font-family:'Cinzel'; font-size:14px; margin-bottom:20px;">SYSTEM LOGIN</h3>
        <input type="password" id="admKey" placeholder="KEY">
        <br>
        <button onclick="checkAdm()">CONFIRM</button>
        <div id="admTools" style="display:none; margin-top:20px; border-top:1px solid #222; padding-top:20px;">
            <button onclick="toggleLock()" style="background:#fff; color:#000;">TOGGLE SITE LOCK</button>
        </div>
        <p onclick="document.getElementById('admBox').style.display='none'" style="color:gray; font-size:10px; cursor:pointer; margin-top:20px;">[ CLOSE ]</p>
    </div>

    <script>
        // МАТРИЦЯ
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        let w, h, cols, drops;
        const fSize = 16;
        const chars = 'アァカサタナハマヤャラワガザダバパイィキシチニヒミリヰギジヂビピウゥクスツヌフムユュルグズブヅプ';

        function initM() { w=canvas.width=window.innerWidth; h=canvas.height=window.innerHeight; cols=Math.floor(w/fSize); drops=new Array(cols).fill(1); }
        function drawM() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, w, h);
            ctx.fillStyle = '#ff0000';
            ctx.font = fSize + 'px monospace';
            for (let i = 0; i < drops.length; i++) {
                ctx.fillText(chars[Math.floor(Math.random()*chars.length)], i*fSize, drops[i]*fSize);
                if (drops[i]*fSize > h && Math.random() > 0.985) drops[i] = 0;
                drops[i]++;
            }
        }
        window.onresize = initM; initM(); setInterval(drawM, 80);

        // ЛОГІКА САЙТУ
        function show(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        // АДМІНКА
        let siteLocked = false;
        function checkAdm() {
            if(document.getElementById('admKey').value === 'yokai123234') {
                document.getElementById('admTools').style.display = 'block';
            } else { alert('ACCESS DENIED'); }
        }
        function toggleLock() {
            siteLocked = !siteLocked;
            document.getElementById('lock-overlay').style.display = siteLocked ? 'flex' : 'none';
            document.getElementById('game-ui').style.filter = siteLocked ? 'grayscale(1) brightness(0.2)' : 'none';
        }
    </script>
</body>
</html>
