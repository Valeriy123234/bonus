<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOKAI TATTOO | CHARACTER SELECT</title>
    <link href="https://googleapis.com" rel="stylesheet">
    
    <!-- Firebase SDK -->
      <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

    <style>
        :root { --red: #ff0000; --red-glow: rgba(255, 0, 0, 0.8); }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; color: #fff; font-family: 'Shippori Mincho', serif; overflow: hidden; }

        /* МАТРИЦЯ (25%) */
        #matrix-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; pointer-events: none; opacity: 0.25; }

        #game-ui { position: relative; z-index: 10; width: 100%; height: 100%; background: transparent; }
        .step-container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; width: 100%; transition: 0.5s; }
        .hidden { display: none !important; }

        .title-step { font-family: 'Cinzel', serif; font-size: 2rem; letter-spacing: 12px; color: var(--red); text-align: center; margin-bottom: 60px; text-shadow: 0 0 15px var(--red-glow); }

        /* КАРТКИ */
        .cards-wrapper { display: flex; gap: 40px; align-items: center; justify-content: center; width: 100%; }
        .rect-card { 
            width: 260px; height: 460px; border: 1px solid #333; position: relative; 
            cursor: pointer; overflow: hidden; background: rgba(20, 20, 20, 0.6); 
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); 
        }

        .card-img { position: relative; z-index: 5; width: 100%; height: 100%; object-fit: contain; transition: 0.6s; }

        /* МАГІЧНЕ КОЛО СТАНДАРТ */
        .magic-circle { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            width: 90%; opacity: 0.4; pointer-events: none; z-index: 1; 
            animation: magicSpin 25s infinite linear, levitate 6s infinite ease-in-out; 
        }
        /* ВЕЛИКЕ КОЛО ДЛЯ КРОКУ 2 */
        #step2 .magic-circle { width: 180% !important; opacity: 0.35; }

        @keyframes magicSpin { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } }
        @keyframes levitate { 0%, 100% { margin-top: -10px; } 50% { margin-top: 10px; } }

        /* ЛОГІКА ВИБОРУ (Амплітуда зменшена до 1.04) */
        .selected { transform: scale(1.04) !important; border-color: var(--red) !important; box-shadow: 0 0 40px var(--red-glow) !important; z-index: 20 !important; }
        .not-selected { filter: grayscale(1) !important; opacity: 0.1 !important; transform: scale(0.95) !important; }

        .card-label { position: absolute; bottom: 25px; width: 100%; text-align: center; font-family: 'Cinzel', serif; letter-spacing: 5px; z-index: 10; }

        @media (max-width: 600px) { .rect-card { width: 44vw; height: 60vh; } }

        /* ПРИМІРКА */
        .model-container { height: 65vh; margin-bottom: 20px; position: relative; display: flex; align-items: center; justify-content: center; }
        #main-char-img { height: 100%; position: relative; z-index: 10; object-fit: contain; transition: 0.4s; }
        .nav-btn { background: #111; border: 1px solid #333; color: #555; padding: 10px 20px; cursor: pointer; font-family: 'Cinzel'; font-size: 10px; margin: 3px; }
        .nav-btn.active { border-color: var(--red); color: #fff; box-shadow: 0 0 15px var(--red-glow); }
        .booking-btn { background: var(--red); color: white; border: none; padding: 18px 50px; font-weight: bold; cursor: pointer; letter-spacing: 4px; clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%); }

        /* RESERVED */
        #soldOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9000; display: none; align-items: center; justify-content: center; pointer-events: none; }
        .is-locked .step-container { display: none !important; }

        /* АДМІНКА-ДРАБИНКА */
       /* АДМІН-ПАНЕЛЬ: ФІНАЛЬНИЙ ФІКС */
.admin-panel { 
    position: fixed !important; 
    bottom: 0 !important; 
    right: 0 !important; 
    width: 60px !important; 
    height: 60px !important; 
    z-index: 999999 !important; /* Максимально високий рівень */
    background: rgba(51, 51, 51, 0.15) !important; /* Сіра зона 15% */
    cursor: pointer !important; 
    display: flex !important; 
    align-items: center !important; 
    justify-content: center !important; 
    transition: 0.3s !important;
    pointer-events: auto !important; /* Дозволяє кліки завжди */
}

/* Знак драбинки */
.admin-panel::before { 
    content: 'Ξ'; 
    color: #fff; 
    font-size: 24px; 
    opacity: 0.4; 
}

/* Розгортання при наведенні */
.admin-panel:hover { 
    width: auto !important; 
    height: auto !important; 
    background: #111 !important; 
    border-left: 1px solid red !important; 
    border-top: 1px solid red !important; 
    padding: 15px 25px !important; 
    opacity: 1 !important;
}

.admin-panel:hover::before { display: none !important; }

/* Контент всередині (інпут та кнопка) */
.admin-content { 
    display: none; 
    align-items: center; 
    gap: 10px; 
}

.admin-panel:hover .admin-content { 
    display: flex !important; 
}

.admin-panel input { 
    background: #000 !important; 
    border: 1px solid #333 !important; 
    color: red !important; 
    padding: 8px !important; 
    width: 90px !important; 
    text-align: center !important;
    font-size: 12px !important;
}

.admin-panel button {
    background: #222 !important;
    color: #fff !important;
    border: none !important;
    padding: 8px 15px !important;
    cursor: pointer !important;
}

    </style>
</head>
<body>

    <canvas id="matrix-canvas"></canvas>
    <div id="soldOverlay"><h1 style="color:red; font-family:'Cinzel'; letter-spacing:15px;">RESERVED</h1></div>

    <div id="game-ui">
        <div id="step1" class="step-container">
            <h1 class="title-step">Оберіть клан</h1>
            <div class="cards-wrapper">
                <div class="rect-card" onclick="handleSelect(this, 'tauren', 'race')">
                    <img src="122.png" class="card-img"><div class="card-label">TAUREN</div>
                </div>
                <div class="rect-card" onclick="handleSelect(this, 'elf', 'race')">
                    <img src="123.png" class="card-img"><div class="card-label">ELF</div>
                </div>
            </div>
        </div>

        <div id="step2" class="step-container hidden">
            <h1 class="title-step">Оберіть тіло</h1>
            <div class="cards-wrapper">
                <div class="rect-card" onclick="handleSelect(this, 'male', 'gender')">
                    <img src="124.PNG" class="magic-circle">
                    <img id="body-male-img" src="" class="card-img">
                    <div class="card-label">MALE</div>
                </div>
                <div class="rect-card" onclick="handleSelect(this, 'female', 'gender')">
                    <img src="124.PNG" class="magic-circle">
                    <img id="body-female-img" src="" class="card-img">
                    <div class="card-label">FEMALE</div>
                </div>
            </div>
        </div>

        <div id="main-ui" class="step-container hidden">
            <div class="model-container">
                <img src="124.PNG" class="magic-circle" style="width: 75vh; opacity: 0.4;"> 
                <img id="main-char-img" src="">
            </div>
            <div style="margin-bottom:20px;">
                <button class="nav-btn active" onclick="setPart('forearm', this)">Передпліччя</button>
                <button class="nav-btn" onclick="setPart('biceps', this)">Біцепс</button>
                <button class="nav-btn" onclick="setPart('calf', this)">Ікра</button>
            </div>
            <button class="booking-btn" onclick="window.open('ТВІЙ_ТГ_ЛІНК')">ЗАБРОНЮВАТИ</button>
            <p onclick="localStorage.clear(); location.reload();" style="margin-top:15px; cursor:pointer; opacity:0.2; font-size:9px;">[ RESET ]</p>
        </div>
    </div>

    <!-- АДМІН ПАНЕЛЬ -->
    <div class="admin-panel">
        <div class="admin-content">
            <input type="password" id="admPass" placeholder="key">
            <button onclick="loginAdm()" style="background:#222; color:#fff; border:none; padding:5px; cursor:pointer;">OK</button>
            <div id="admTools" style="display:none;">
                <button id="lockBtn" onclick="toggleLock()" style="background:red; color:white; border:none; padding:8px; cursor:pointer; margin-left:5px; font-size:9px;">LOCK</button>
            </div>
        </div>
    </div>

    <script>
        // --- НАЛАШТУВАННЯ ---
        const firebaseConfig = { databaseURL: "https://yyokai-tattoo-system-default-rtdb.europe-west1.firebasedatabase.app/" };
        
        const bodyPreviews = {
            tauren: { male: "taurenm.PNG", female: "taureng.PNG" },
            elf: { male: "taurenm.PNG", female: "taureng.PNG" }
        };

        const charImages = {
            tauren_male_forearm: "taurenm.PNG", tauren_male_biceps: "taurenm.PNG", tauren_male_calf: "taurenm.PNG",
            tauren_female_forearm: "taureng.PNG", tauren_female_biceps: "taureng.PNG", tauren_female_calf: "taureng.PNG",
            elf_male_forearm: "taurenm.PNG", elf_male_biceps: "taurenm.PNG", elf_male_calf: "taurenm.PNG",
            elf_female_forearm: "taureng.PNG", elf_female_biceps: "taureng.PNG", elf_female_calf: "taureng.PNG"
        };

        // --- ЛОГІКА ---
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let state = { race: localStorage.getItem('race') || '', gender: localStorage.getItem('gender') || '', part: 'forearm' };
        let isBlocked = false;

        // Matrix
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        let w, h, columns, drops;
        function initM() { w=canvas.width=window.innerWidth; h=canvas.height=window.innerHeight; columns=Math.floor(w/16); drops=new Array(columns).fill(1); }
        function drawM() {
            ctx.fillStyle='rgba(0,0,0,0.05)'; ctx.fillRect(0,0,w,h); 
            ctx.fillStyle='#f00'; ctx.font='16px monospace';
            for(let i=0; i<drops.length; i++) {
                ctx.fillText('アァカサタナハマヤャラワガザダバ'[Math.floor(Math.random()*15)], i*16, drops[i]*16);
                if(drops[i]*16 > h && Math.random() > 0.975) drops[i]=0; drops[i]++;
            }
        }
        window.onresize=initM; initM(); setInterval(drawM, 35);

        // Firebase Sync
        db.ref('site_status').on('value', (snap) => {
            isBlocked = snap.val() === 'blocked';
            document.getElementById('game-ui').classList.toggle('is-locked', isBlocked);
            document.getElementById('soldOverlay').style.display = isBlocked ? 'flex' : 'none';
            const btn = document.getElementById('lockBtn');
            if(btn) btn.innerText = isBlocked ? "UNLOCK" : "LOCK";
        });

        function handleSelect(element, value, type) {
            const wrapper = element.parentElement;
            wrapper.querySelectorAll('.rect-card').forEach(c => {
                c.classList.add(c === element ? 'selected' : 'not-selected');
            });

            setTimeout(() => {
                if(type === 'race') {
                    state.race = value; localStorage.setItem('race', value);
                    document.getElementById('body-male-img').src = bodyPreviews[value].male;
                    document.getElementById('body-female-img').src = bodyPreviews[value].female;
                    show('step2');
                } else {
                    state.gender = value; localStorage.setItem('gender', value);
                    show('main-ui'); updateView();
                }
            }, 700);
        }

        function show(id) {
            document.querySelectorAll('.step-container').forEach(s => {
                s.classList.add('hidden');
                s.querySelectorAll('.rect-card').forEach(c => c.classList.remove('selected', 'not-selected'));
            });
            document.getElementById(id).classList.remove('hidden');
        }

        function setPart(p, btn) { 
            state.part = p; 
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active'); updateView(); 
        }

        function updateView() {
            const key = `${state.race}_${state.gender}_${state.part}`;
            const img = document.getElementById('main-char-img');
            img.style.opacity = 0;
            setTimeout(() => { if(charImages[key]) img.src = charImages[key]; img.style.opacity = 1; }, 250);
        }

        function loginAdm() { 
            if(document.getElementById('admPass').value === "yokai123234") {
                document.getElementById('admTools').style.display='inline-block'; 
            } else {
                alert("ACCESS DENIED");
            }
        }
        
        function toggleLock() { db.ref('site_status').set(isBlocked ? 'active' : 'blocked'); }
        window.onload = () => { if (state.race && state.gender) { show('main-ui'); updateView(); } };
    </script>
</body>
</html>
