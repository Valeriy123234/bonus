<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YOKAI TATTOO | CHARACTER GENERATOR</title>
    <script src="https://gstatic.com"></script>
    <script src="https://gstatic.com"></script>

    <style>
        :root { --red: #ff0000; }
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: #fff; font-family: monospace; overflow: hidden; }

        /* ВІДЕО ФОН */
        .video-background {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; pointer-events: none;
            overflow: hidden;
        }
        #bg-video {
            width: 100%; height: 100%; object-fit: cover;
            opacity: 0.15; /* Твої 15% прозорості */
        }

        .step-container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; width: 100%; text-align: center; }
        .hidden { display: none !important; }

        /* СТИЛЬ ІКОНОК */
        .selection-icon {
            width: 180px; height: 180px; cursor: pointer; margin: 20px;
            transition: 0.4s; filter: drop-shadow(0 0 10px rgba(255,0,0,0.2));
        }
        .selection-icon:hover { transform: scale(1.05); filter: drop-shadow(0 0 20px var(--red)); }

        /* ІНТЕРФЕЙС ПРИМІРКИ */
        .main-grid { display: grid; grid-template-columns: 1fr 350px; height: 100vh; }
        .character-zone { position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        .model-container { position: relative; height: 75vh; }
        #char-img { height: 100%; object-fit: contain; }
        #tattoo-overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            object-fit: contain; mix-blend-mode: multiply; opacity: 0.9;
        }

        .part-buttons { margin-top: 20px; display: flex; gap: 10px; }
        .part-btn { background: #000; border: 1px solid #333; color: #888; padding: 10px 20px; cursor: pointer; }
        .part-btn.active { border-color: var(--red); color: #fff; box-shadow: 0 0 10px var(--red); }

        /* СПИСОК ЕСКІЗІВ */
        .sketch-list { background: rgba(0,0,0,0.85); border-left: 1px solid #222; padding: 20px; overflow-y: auto; backdrop-filter: blur(5px); }
        .sketch-card { border: 1px solid #222; margin-bottom: 15px; cursor: pointer; position: relative; transition: 0.3s; }
        .sketch-card img { width: 100%; display: block; }
        .sketch-card.blocked { filter: grayscale(1) brightness(0.2); pointer-events: none; }
        .sketch-card.blocked::after { content: "SOLD"; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: red; font-weight: bold; }

        /* АДМІНКА */
        .admin-box { position: fixed; bottom: 0; right: 0; opacity: 0.05; padding: 5px; z-index: 100; transition: 0.3s; }
        .admin-box:hover { opacity: 1; background: #1a0000; }
    </style>
</head>
<body>

    <!-- ВІДЕО ФОН -->
    <div class="video-background">
        <video autoplay loop muted playsinline id="bg-video">
            <source src="033.mp4" type="video/mp4"> <!-- ПІДСТАВ СВОЄ ПРАВИЛЬНЕ ПОСИЛАННЯ -->
        </video>
    </div>

    <!-- 1. ВИБІР РАСИ -->
    <div id="step1" class="step-container">
        <h1 style="text-shadow: 0 0 15px red; letter-spacing: 5px;">ОБЕРИ КЛАН</h1>
        <div style="display:flex;">
            <img src="122.PNG" class="selection-icon" onclick="selectRace('tauren')">
            <img src="123.PNG" class="selection-icon" onclick="selectRace('elf')">
        </div>
    </div>

    <!-- 2. ВИБІР СТАТІ -->
    <div id="step2" class="step-container hidden">
        <h1 style="text-shadow: 0 0 15px red; letter-spacing: 5px;">ОБЕРИ ТІЛО</h1>
        <div style="display:flex;">
            <img src="ПОСИЛАННЯ_MALE" class="selection-icon" onclick="selectGender('male')">
            <img src="ПОСИЛАННЯ_FEMALE" class="selection-icon" onclick="selectGender('female')">
        </div>
    </div>

    <!-- 3. ГОЛОВНИЙ ЕКРАН -->
    <div id="main-ui" class="main-grid hidden">
        <div class="character-zone">
            <button onclick="localStorage.clear(); location.reload();" style="position:absolute; top:20px; left:20px; background:none; border:1px solid #333; color:#555; cursor:pointer;">[ RESET ]</button>
            
            <div class="model-container">
                <img id="char-img" src="">
                <img id="tattoo-overlay" src="">
            </div>

            <div class="part-buttons">
                <button class="part-btn active" onclick="setPart('forearm', this)">ПРЕДПЛІЧЧЯ</button>
                <button class="part-btn" onclick="setPart('biceps', this)">БІЦЕПС</button>
                <button class="part-btn" onclick="setPart('calf', this)">ІКРА</button>
            </div>
        </div>

        <div class="sketch-list">
            <h3 style="color:red; letter-spacing:2px; text-align:center;">АРТЕФАКТИ</h3>
            <div id="firebase-sketches"></div>
        </div>
    </div>

    <!-- АДМІНКА -->
    <div class="admin-box">
        <input type="password" id="adm-pass" placeholder="key" style="width:50px; background:none; border:1px solid #333; color:red;">
        <button onclick="checkAdm()">OK</button>
        <div id="adm-tools" style="display:none; margin-top:5px;">
            <button onclick="blockItem()" style="color:red;">BLOCK SOLD</button>
        </div>
    </div>

    <script>
        // ПОСИЛАННЯ НА ФОТО ПЕРСОНАЖІВ
        const images = {
            tauren_male_forearm: "URL_1", tauren_male_biceps: "URL_2", tauren_male_calf: "URL_3",
            tauren_female_forearm: "URL_4", tauren_female_biceps: "URL_5", tauren_female_calf: "URL_6",
            elf_male_forearm: "URL_7", elf_male_biceps: "URL_8", elf_male_calf: "URL_9",
            elf_female_forearm: "URL_10", elf_female_biceps: "URL_11", elf_female_calf: "URL_12"
        };

        const firebaseConfig = { databaseURL: "ТВІЙ_URL_FIREBASE" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let state = {
            race: localStorage.getItem('race') || '',
            gender: localStorage.getItem('gender') || '',
            part: 'forearm',
            selectedID: null
        };

        if (state.race && state.gender) showMain();

        function selectRace(r) { state.race = r; localStorage.setItem('race', r); document.getElementById('step1').classList.add('hidden'); document.getElementById('step2').classList.remove('hidden'); }
        function selectGender(g) { state.gender = g; localStorage.setItem('gender', g); showMain(); }
        
        function showMain() {
            document.getElementById('step1').classList.add('hidden');
            document.getElementById('step2').classList.add('hidden');
            document.getElementById('main-ui').classList.remove('hidden');
            updateChar();
        }

        function setPart(p, btn) {
            state.part = p;
            document.querySelectorAll('.part-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            updateChar();
        }

        function updateChar() {
            const key = `${state.race}_${state.gender}_${state.part}`;
            document.getElementById('char-img').src = images[key] || "";
        }

        db.ref('sketches').on('value', snap => {
            const list = document.getElementById('firebase-sketches');
            list.innerHTML = '';
            const data = snap.val();
            for(let id in data) {
                const s = data[id];
                const div = document.createElement('div');
                div.className = `sketch-card ${s.status === 'blocked' ? 'blocked' : ''}`;
                div.innerHTML = `<img src="${s.url}">`;
                div.onclick = () => {
                    state.selectedID = id;
                    document.getElementById('tattoo-overlay').src = s.url;
                };
                list.appendChild(div);
            }
        });

        function checkAdm() { if(document.getElementById('adm-pass').value === "yokai123234") document.getElementById('adm-tools').style.display='block'; }
        function blockItem() { if(state.selectedID) db.ref('sketches/'+state.selectedID).update({status:'blocked'}); }
    </script>
</body>
</html>
