<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YYO KAI</title>
    <!-- Tailwind CSS -->
    <script src="jsdelivr.net"></script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="googleapis.com">
    <link rel="preconnect" href="gstatic.com" crossorigin>
    <link href="googleapis.com" rel="stylesheet">
    <!-- jsPDF -->
    <script src="cloudflare.com"></script>
    <style>
        body {
            font-family: 'Share Tech Mono', monospace;
            background-color: #060606;
            color: #a3a3a3;
            /* Фіксуємо екран мобілки, щоб нічого не совалося */
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
        }
        /* Глітч YYO */
        .glitch-wrapper { position: relative; }
        .glitch {
            position: relative;
            animation: glitch-skew 1s infinite linear alternate-reverse;
        }
        .glitch::before, .glitch::after {
            content: attr(data-text);
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #060606;
        }
        .glitch::before {
            left: 1px; text-shadow: -1px 0 #ff00c8;
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch-anim 5s infinite linear alternate-reverse;
        }
        .glitch::after {
            left: -1px; text-shadow: -1px 0 #00ffff, 0 1px #ff00c8;
            clip: rect(85px, 450px, 140px, 0);
            animation: glitch-anim2 5s infinite linear alternate-reverse;
        }
        @keyframes glitch-anim {
            0% { clip: rect(31px, 9999px, 94px, 0); }
            50% { clip: rect(73px, 9999px, 29px, 0); }
            100% { clip: rect(91px, 9999px, 147px, 0); }
        }
        @keyframes glitch-anim2 {
            0% { clip: rect(76px, 9999px, 116px, 0); }
            50% { clip: rect(111px, 9999px, 52px, 0); }
            100% { clip: rect(100px, 9999px, 118px, 0); }
        }
        /* Еквалайзер */
        @keyframes bounce {
            0%, 100% { height: 3px; }
            50% { height: 18px; }
        }
        .eq-bar { animation: bounce 0.5s ease-in-out infinite; }
        .eq-bar:nth-child(1) { animation-delay: 0.1s; }
        .eq-bar:nth-child(2) { animation-delay: 0.3s; }
        .eq-bar:nth-child(3) { animation-delay: 0.5s; }
        .eq-bar:nth-child(4) { animation-delay: 0.2s; }
        .eq-bar:nth-child(5) { animation-delay: 0.4s; }
        .eq-bar:nth-child(6) { animation-delay: 0.6s; }

        .dark-input {
            background: #0c0c0c;
            border: 1px solid #1f1f1f;
            color: #fff;
            text-align: center;
        }
        .dark-input:focus {
            border-color: #dc2626;
            outline: none;
        }
        /* Приховуємо дефолтний скроллбар */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="relative flex flex-col justify-between p-4 select-none touch-none">

    <!-- Матричний фон (Задній план) -->
    <canvas id="matrix" class="absolute inset-0 w-full h-full pointer-events-none z-0" style="opacity: 0.13;"></canvas>

    <!-- ШАПКА -->
    <header class="relative z-50 flex justify-between items-center w-full h-12">
        <!-- ЛІВОРУЧ: Звук -->
        <button id="audio-toggle" class="flex items-center justify-center w-8 h-8 text-neutral-500 hover:text-red-500 transition-colors focus:outline-none">
            <svg id="icon-sound" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"></path>
            </svg>
            <div id="icon-eq" class="hidden flex items-end justify-between w-5 h-4 gap-[2px]">
                <div class="eq-bar w-[2px] bg-red-600"></div>
                <div class="eq-bar w-[2px] bg-red-600"></div>
                <div class="eq-bar w-[2px] bg-red-600"></div>
                <div class="eq-bar w-[2px] bg-red-600"></div>
                <div class="eq-bar w-[2px] bg-red-600"></div>
                <div class="eq-bar w-[2px] bg-red-600"></div>
            </div>
        </button>

        <!-- ПОСЕРЕДИНІ: Логотип -->
        <div class="glitch-wrapper text-center">
            <h1 class="glitch text-2xl font-black tracking-widest text-white leading-none" data-text="YYO">YYO</h1>
            <span class="text-[9px] tracking-[0.6em] text-red-600 block mt-0.5 font-bold">KAI</span>
        </div>

        <!-- ПРАВОРУЧ: Бургер -->
        <button id="menu-toggle" class="w-8 h-8 flex flex-col justify-center items-center gap-1 focus:outline-none">
            <span id="line1" class="w-5 h-[2px] bg-neutral-400 transition-all duration-300"></span>
            <span id="line2" class="w-5 h-[2px] bg-neutral-400 transition-all duration-300"></span>
            <span id="line3" class="w-5 h-[2px] bg-neutral-400 transition-all duration-300"></span>
        </button>
    </header>

    <!-- Меню -->
    <nav id="full-menu" class="fixed inset-0 bg-neutral-950/98 z-40 hidden flex-col justify-center items-center gap-6 text-xl tracking-widest backdrop-blur-md">
        <a href="#" class="hover:text-red-500 text-neutral-300">ГОЛОВНА</a>
        <a href="#" class="hover:text-red-500 text-neutral-300">ЗАПИСАТИСЬ</a>
        <a href="#" class="text-red-600 border-b border-red-950 pb-1">TATTOO SPLITTER</a>
    </nav>

    <!-- ГОЛОВНИЙ КОНТЕНТ (Строго в один екран) -->
    <main class="relative z-10 flex-grow flex flex-col justify-center items-center w-full max-w-md mx-auto my-2 overflow-hidden touch-auto">
        <div class="w-full bg-[#0a0a0a]/90 border border-neutral-900 p-4 flex flex-col justify-between gap-4 h-full max-h-[78vh] overflow-y-auto no-scrollbar">
            
            <!-- Шапка інструменту -->
            <div class="border-b border-neutral-900 pb-2">
                <h2 class="text-xs uppercase tracking-wider text-red-600 font-bold">// SPLITTER A4</h2>
            </div>

            <!-- Завантаження -->
            <div>
                <div class="border border-dashed border-neutral-800 bg-[#040404] p-4 text-center relative rounded-sm">
                    <input type="file" id="sketch-upload" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer">
                    <span id="upload-status" class="text-[11px] text-neutral-500 uppercase tracking-wider">Завантажити контур ескізу</span>
                </div>
            </div>

            <!-- Інпути розмірів -->
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-[10px] uppercase text-neutral-500 tracking-wider mb-1">Ширина (см)</label>
                    <input type="number" id="width-cm" value="40" class="dark-input w-full p-2 text-xs rounded-sm">
                </div>
                <div>
                    <label class="block text-[10px] uppercase text-neutral-500 tracking-wider mb-1">Висота (см)</label>
                    <input type="number" id="height-cm" value="30" class="dark-input w-full p-2 text-xs rounded-sm">
                </div>
            </div>

            <!-- Схема результату (Прев'ю) -->
            <div class="border border-neutral-900 bg-[#030303] p-2 flex flex-col justify-between h-36 relative">
                <div class="absolute top-1 right-2 text-[8px] text-neutral-600 uppercase">Схема листів</div>
                
                <div id="preview-grid" class="flex-grow flex items-center justify-center p-2">
                    <p class="text-[10px] text-neutral-600 uppercase text-center">Очікування файлу...</p>
                </div>

                <div class="border-t border-neutral-900 pt-1 text-[9px] text-neutral-500 flex justify-between uppercase">
                    <span>Листів: <strong class="text-red-600 id-count">-</strong></span>
                    <span>Сітка: <strong class="text-red-600 id-layout">-</strong></span>
                </div>
            </div>

            <!-- Технічний опис (Нижній лівий текст, тепер чітко застилізований) -->
            <div class="bg-[#050505] border border-neutral-950 p-2.5 rounded-sm">
                <div class="text-[10px] text-red-600 font-bold uppercase tracking-wider mb-1">■ ТЕХНІЧНІ УМОВИ ЗШИВАННЯ:</div>
                <p class="text-[10px] text-neutral-500 leading-normal uppercase">
                    Автоматичний напуск <span class="text-neutral-300">2 см</span> додано по краях для безшовного склеювання трафарету липкою стрічкою.
                </p>
            </div>

            <!-- Кнопка -->
            <button id="btn-split" class="w-full bg-red-800 hover:bg-red-700 text-white font-bold py-2.5 uppercase tracking-widest text-xs rounded-sm transition-all active:scale-[0.98]">
                Завантажити PDF
            </button>

        </div>
    </main>

    <!-- ФУТЕР -->
    <footer class="relative z-10 w-full h-6 flex justify-between items-center text-[9px] text-neutral-600 uppercase tracking-widest border-t border-neutral-950 pt-2">
        <div>© YYO KAI</div>
        <div>TATTOO TECH</div>
    </footer>

    <script>
        // --- 1. ЯПОНСЬКИЙ МАТРИЧНИЙ КОД ---
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        const katakana = "ｱｲｳｴｵｶｷｸｹｺｻｼｽｾｿﾀﾁﾂﾃﾄﾅﾆﾇﾈﾉﾜﾝ1234567890";
        const alphabet = katakana.split("");
        const fontSize = 12;
        let columns = canvas.width / fontSize;
        let rainDrops = Array(Math.floor(columns)).fill(1);

        function drawMatrix() {
            ctx.fillStyle = 'rgba(6, 6, 6, 0.06)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#991b1b';
            ctx.font = fontSize + 'px monospace';
            for (let i = 0; i < rainDrops.length; i++) {
                const text = alphabet[Math.floor(Math.random() * alphabet.length)];
                ctx.fillText(text, i * fontSize, rainDrops[i] * fontSize);
                if (rainDrops[i] * fontSize > canvas.height && Math.random() > 0.98) rainDrops[i] = 0;
                rainDrops[i]++;
            }
        }
        setInterval(drawMatrix, 40);

        // --- 2. ЕКВАЛАЙЗЕР ---
        const audioBtn = document.getElementById('audio-toggle');
        const iconSound = document.getElementById('icon-sound');
        const iconEq = document.getElementById('icon-eq');
        let isPlaying = false;

        audioBtn.addEventListener('click', () => {
            isPlaying = !isPlaying;
            if (isPlaying) { iconSound.classList.add('hidden'); iconEq.classList.remove('hidden'); }
            else { iconSound.classList.remove('hidden'); iconEq.classList.add('hidden'); }
        });

        // --- 3. БУРГЕР МЕНЮ ---
        const menuToggle = document.getElementById('menu-toggle');
        const fullMenu = document.getElementById('full-menu');
        const l1 = document.getElementById('line1');
        const l2 = document.getElementById('line2');
        const l3 = document.getElementById('line3');
        let menuOpen = false;

        menuToggle.addEventListener('click', () => {
            menuOpen = !menuOpen;
            if (menuOpen) {
                fullMenu.classList.remove('hidden'); fullMenu.classList.add('flex');
                l1.style.transform = 'rotate(45deg) translate(4px, 4px)'; l2.style.opacity = '0'; l3.style.transform = 'rotate(-45deg) translate(4px, -4px)';
            } else {
                fullMenu.classList.add('hidden'); fullMenu.classList.remove('flex');
                l1.style.transform = 'none'; l2.style.opacity = '1'; l3.style.transform = 'none';
            }
        });

        // --- 4. СПЛІТЕР ---
        const sketchUpload = document.getElementById('sketch-upload');
        const uploadStatus = document.getElementById('upload-status');
        const widthCmInput = document.getElementById('width-cm');
        const heightCmInput = document.getElementById('height-cm');
        const btnSplit = document.getElementById('btn-split');
        const previewGrid = document.getElementById('preview-grid');
        const countDisplay = document.querySelector('.id-count');
        const layoutDisplay = document.querySelector('.id-layout');

        let loadedImage = null;

        sketchUpload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if(file) {
                uploadStatus.textContent = file.name.substring(0, 14) + '...';
                uploadStatus.classList.add('text-red-500');
                const reader = new FileReader();
                reader.onload = function(event) {
                    loadedImage = new Image();
                    loadedImage.onload = updatePreview;
                    loadedImage.src = event.target.result;
                };
                reader.readAsDataURL(file);
            }
        });

        function updatePreview() {
            const w = parseFloat(widthCmInput.value) || 40;
            const h = parseFloat(heightCmInput.value) || 30;
            const EFF_W = 19.0; const EFF_H = 27.7;
            const cols = Math.ceil(w / EFF_W); const rows = Math.ceil(h / EFF_H);
            const total = cols * rows;

            countDisplay.textContent = total;
            layoutDisplay.textContent = `${cols}x${rows}`;

            previewGrid.innerHTML = '';
            const gridContainer = document.createElement('div');
            gridContainer.className = 'grid gap-1 p-1 bg-black border border-neutral-900 w-full h-full max-h-[110px] aspect-video';
            gridContainer.style.gridTemplateColumns = `repeat(${cols}, minmax(0, 1fr))`;
            gridContainer.style.gridTemplateRows = `repeat(${rows}, minmax(0, 1fr))`;

            for (let i = 1; i <= total; i++) {
                const sheet = document.createElement('div');
                sheet.className = 'border border-red-950 bg-red-950/10 text-red-500 text-[8px] flex items-center justify-center font-bold';
                sheet.textContent = `A4 #${i}`;
                gridContainer.appendChild(sheet);
            }
            previewGrid.appendChild(gridContainer);
        }

        [widthCmInput, heightCmInput].forEach(input => input.addEventListener('input', () => { if(loadedImage) updatePreview(); }));

        btnSplit.addEventListener('click', async () => {
            if (!loadedImage) { alert('Завантажте контур!'); return; }
            const wTarget = parseFloat(widthCmInput.value); const hTarget = parseFloat(heightCmInput.value);
            if (!wTarget || !hTarget) return;

            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF({ orientation: 'p', unit: 'mm', format: 'a4' });
            const A4_W_MM = 210; const A4_H_MM = 297;
            const EFF_W_MM = 190; const EFF_H_MM = 277;
            const wTargetMm = wTarget * 10; const hTargetMm = hTarget * 10;
            const cols = Math.ceil(wTargetMm / EFF_W_MM); const rows = Math.ceil(hTargetMm / EFF_H_MM);

            let pageCount = 0;
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    if (pageCount > 0) pdf.addPage();
                    pageCount++;
                    const sx = (c * EFF_W_MM) * (loadedImage.width / wTargetMm);
                    const sy = (r * EFF_H_MM) * (loadedImage.height / hTargetMm);
                    const sWidth = A4_W_MM * (loadedImage.width / wTargetMm);
                    const sHeight = A4_H_MM * (loadedImage.height / hTargetMm);

                    const tempCanvas = document.createElement('canvas');
                    tempCanvas.width = 1000; tempCanvas.height = 1414;
                    const tempCtx = tempCanvas.getContext('2d');
                    tempCtx.fillStyle = '#FFFFFF'; tempCtx.fillRect(0, 0, tempCanvas.width, tempCanvas.height);
                    tempCtx.drawImage(loadedImage, sx, sy, sWidth, sHeight, 0, 0, tempCanvas.width, tempCanvas.height);

                    pdf.addImage(tempCanvas.toDataURL('image/jpeg', 0.8), 'JPEG', 0, 0, A4_W_MM, A4_H_MM);
                }
            }
            pdf.save(`yyo-kai-${wTarget}x${hTarget}.pdf`);
        });
    </script>
</body>
</html>
